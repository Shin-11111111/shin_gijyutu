<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .led-bar {
            transition: height 0.05s ease;
        }
        input[type="range"].fader-vertical {
            writing-mode: vertical-lr;
            appearance: none;
            width: 8px;
            height: 180px;
            background: #1e293b;
            outline: none;
            border-radius: 4px;
            position: relative;
        }
        input[type="range"].fader-vertical::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 36px;
            border-radius: 4px;
            background: #ef4444;
            cursor: pointer;
            border: 2px solid #fca5a5;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        input[type="range"].fader-vertical.master-fader::-webkit-slider-thumb {
            background: #3b82f6;
            border-color: #93c5fd;
        }
        .knob-container {
            position: relative;
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between font-sans selection:bg-teal-500 selection:text-white">

    <header class="bg-slate-900 border-b border-slate-800 p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2.5 bg-gradient-to-br from-teal-500 to-emerald-500 rounded-lg shadow-inner">
                    <i class="fa-solid fa-sliders text-2xl text-slate-950"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-emerald-400">
                        AUDIO CONSOLE
                    </h1>
                    <p class="text-xs text-slate-400">Multi-Track Mixer</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="status-indicator" class="flex items-center gap-2 px-3 py-1.5 bg-slate-800 rounded-full border border-slate-700 text-xs">
                    <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse" id="status-led"></span>
                    <span id="status-text" class="text-slate-300">Paused</span>
                </div>
                <button id="start-ctx-btn" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-slate-100 font-semibold rounded-md shadow text-sm transition flex items-center gap-2">
                    <i class="fa-solid fa-power-off"></i> Power ON
                </button>
                <div class="flex gap-2">
                    <button id="stop-all-btn" class="px-4 py-2 bg-rose-950 hover:bg-rose-900 text-rose-300 border border-rose-800 rounded-lg text-sm transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-circle-stop"></i> すべて停止
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl w-full mx-auto p-4 flex-grow grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-3 flex flex-col gap-6">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="channels-grid">
            </div>
        </div>

        <div class="flex flex-col gap-6">
            
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 flex flex-col gap-3">
                <h3 class="text-xs font-bold tracking-wider text-slate-400 uppercase flex items-center gap-1.5">
                    <i class="fa-solid fa-wave-square text-teal-400"></i> MASTER VISUALIZER
                </h3>
                <div class="relative bg-slate-950 rounded-lg overflow-hidden h-32 border border-slate-800 flex items-center justify-center">
                    <canvas id="visualizer-canvas" class="w-full h-full"></canvas>
                </div>
            </div> 

            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 flex flex-col gap-4">
                <div class="flex items-center justify-between">
                    <h3 class="text-xs font-bold tracking-wider text-slate-400 uppercase flex items-center gap-1.5">
                        <i class="fa-solid fa-volume-high text-blue-400"></i> MASTER OUT
                    </h3>
                </div>
                
                <div class="flex gap-6 justify-center items-center h-52 py-2 bg-slate-950/40 rounded-lg border border-slate-850">
                    
                    <div class="flex flex-col items-center gap-1">
                        <span class="text-[10px] text-slate-400">L</span>
                        <div class="w-3.5 h-36 bg-slate-900 rounded border border-slate-800 p-0.5 flex flex-col justify-end gap-[2px]">
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-l-9"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-l-8"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-l-7"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-l-6"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-l-5"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-l-4"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-l-3"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-l-2"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-l-1"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-l-0"></div>
                        </div>
                    </div>

                    <div class="flex flex-col items-center gap-1">
                        <span id="master-volume-val" class="text-xs font-mono text-blue-400 font-bold bg-slate-900 px-1.5 py-0.5 rounded border border-slate-700 min-w-[3rem] text-center inline-block">100%</span>
                        <input type="range" id="master-volume" min="0" max="1.0" step="0.01" value="1.0" class="fader-vertical master-fader" style="writing-mode: vertical-lr; direction: rtl;">
                    </div>

                    <div class="flex flex-col items-center gap-1">
                        <span class="text-[10px] text-slate-400">R</span>
                        <div class="w-3.5 h-36 bg-slate-900 rounded border border-slate-800 p-0.5 flex flex-col justify-end gap-[2px]">
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-r-9"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-r-8"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-r-7"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-r-6"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-r-5"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-r-4"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-r-3"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-r-2"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-r-1"></div>
                            <div class="led-bar w-full h-[8%] rounded-sm bg-slate-800" id="meter-r-0"></div>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <button id="fadeout-btn" onclick="masterFadeOut()" class="w-full px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 rounded-lg text-xs transition flex items-center justify-center gap-2" title="3秒かけてマスターをフェードアウト">
                        <i class="fa-solid fa-arrow-down-wide-short text-blue-400"></i> FADE
                    </button>
                    <button id="smooth-vol-btn" class="w-full px-3 py-2 bg-blue-900 hover:bg-blue-800 text-blue-300 border border-blue-700 rounded-lg text-xs transition flex items-center justify-center gap-2" title="ボリューム変化を滑らかにする（速度制限）" onclick="toggleSmoothVolume()">
                        <i class="fa-solid fa-gauge text-blue-400"></i> SMOOTH ON
                    </button>
                </div>

                <div class="bg-slate-950 p-3 rounded-lg border border-slate-850 flex items-center justify-between">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-slate-400 font-bold uppercase">RECORDER</span>
                        <span id="rec-status" class="text-xs text-rose-500 font-semibold flex items-center gap-1">
                            <span class="w-2 h-2 rounded-full bg-slate-700" id="rec-dot"></span> 待機中
                        </span>
                    </div>
                    <div class="flex gap-2">
                        <button id="rec-btn" class="p-2.5 bg-rose-600 hover:bg-rose-500 text-slate-100 rounded-md transition text-xs flex items-center justify-center gap-1 shadow" title="録音開始/停止">
                            <i class="fa-solid fa-microphone"></i>
                        </button>
                        <button id="download-rec-btn" disabled class="p-2.5 bg-slate-800 text-slate-500 cursor-not-allowed rounded-md transition text-xs flex items-center justify-center gap-1 shadow" title="録音したファイルを保存">
                            <i class="fa-solid fa-download"></i>
                        </button>
                    </div>
                </div>

            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 flex flex-col gap-4">
                <div class="flex items-center justify-between">
                    <h3 class="text-xs font-bold tracking-wider text-slate-400 uppercase flex items-center gap-1.5">
                        <i class="fa-solid fa-volume-high text-blue-400"></i> MASTER OUT
                    </h3>
                </div>
                
                <div class="space-y-2 border-b border-slate-800 pb-3">
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-slate-300 font-medium">ディレイエフェクト</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="fx-delay-toggle" class="sr-only peer">
                            <div class="w-9 h-5 bg-slate-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-slate-300 after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-teal-500"></div>
                        </label>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-slate-400 w-12 text-right">ディレイ時間</span>
                        <input type="range" id="fx-delay-time" min="0.1" max="1.0" step="0.05" value="0.3" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-teal-500">
                        <span id="fx-delay-time-val" class="text-[10px] text-slate-400 w-8">0.3s</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-slate-400 w-12 text-right">フィードバック</span>
                        <input type="range" id="fx-delay-feedback" min="0.0" max="0.8" step="0.05" value="0.4" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-teal-500">
                        <span id="fx-delay-feedback-val" class="text-[10px] text-slate-400 w-8">40%</span>
                    </div>
                </div>

                <div class="space-y-2 border-b border-slate-800 pb-3">
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-slate-300 font-medium">リバーブ</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="fx-reverb-toggle" class="sr-only peer">
                            <div class="w-9 h-5 bg-slate-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-slate-300 after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-purple-500"></div>
                        </label>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-slate-400 w-12 text-right">タイプ</span>
                        <select id="fx-reverb-type" class="flex-1 bg-slate-800 border border-slate-700 text-slate-300 text-[11px] rounded px-1.5 py-0.5 focus:outline-none">
                            <option value="room">ルーム</option>
                            <option value="hall">コンサートホール</option>
                            <option value="church">教会</option>
                            <option value="cave">洞窟</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-slate-400 w-12 text-right">ミックス</span>
                        <input type="range" id="fx-reverb-mix" min="0" max="1" step="0.01" value="0.3" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-purple-500">
                        <span id="fx-reverb-mix-val" class="text-[10px] text-slate-400 w-8">30%</span>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-slate-300 font-medium">マスタフィルター</span>
                        <select id="fx-filter-type" class="bg-slate-800 border border-slate-700 text-slate-300 text-[11px] rounded px-1.5 py-0.5 focus:outline-none">
                            <option value="allpass">バイパス (OFF)</option>
                            <option value="lowpass">ローパス (高域カット)</option>
                            <option value="highpass">ハイパス (低域カット)</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-slate-400 w-12 text-right">カットオフ</span>
                        <input type="range" id="fx-filter-freq" min="100" max="15000" step="100" value="8000" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-teal-500">
                        <span id="fx-filter-freq-val" class="text-[10px] text-slate-400 w-10">8000Hz</span>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 flex flex-col gap-2">
                <button id="normalize-btn" class="w-full px-4 py-2 bg-teal-600 hover:bg-teal-500 text-slate-100 border border-teal-500 rounded-lg text-sm transition flex items-center justify-center gap-2" title="ONにすると全チャンネルのゲインを統一してロックします">
                    <i class="fa-solid fa-lock"></i> Volume Leveling ON (-5dB)
                </button>
                <button id="poly-mode-btn" class="w-full px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 border border-slate-600 rounded-lg text-sm transition flex items-center justify-center gap-2" title="重ね再生ON/OFF">
                    <i class="fa-solid fa-minus"></i> MONO
                </button>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="unmuteAll()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 rounded-lg text-sm transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-volume-high text-rose-400"></i> 全MUTE解除
                    </button>
                    <button onclick="unsoloAll()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 rounded-lg text-sm transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-star text-amber-400"></i> 全SOLO解除
                    </button>
                </div>
                <button onclick="resetAllChannels()" class="w-full px-4 py-2.5 bg-rose-950 hover:bg-rose-900 text-rose-300 border border-rose-800 rounded-lg text-sm transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-rotate-left"></i> 全チャンネル設定リセット
                </button>
            </div>

        </div>
    </main>

    <script>
        let audioCtx = null;
        let masterGainNode = null;
        let masterAnalyser = null;
        let delayNode = null;
        let delayGain = null;
        let filterNode = null;
        let reverbNode = null;
        let reverbGainNode = null;
        let dryGainNode = null;
        
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let recDestNode = null;

        let isNormalizeActive = true;
        let normalizeTargetVolume = 0.5623;
        const DEFAULT_VOLUME = 0.5623;
        let isPolyMode = false;
        let isSmoothVolume = true;

        const NUM_CHANNELS = 12;
        const channels = [];

        const padColors = [
            { border: 'border-teal-500/30', text: 'text-teal-400', bg: 'bg-teal-500/10', activeBg: 'bg-teal-500/20', progressBg: 'bg-teal-400/80', knobColor: 'accent-teal-500' },
            { border: 'border-cyan-500/30', text: 'text-cyan-400', bg: 'bg-cyan-500/10', activeBg: 'bg-cyan-500/20', progressBg: 'bg-cyan-400/80', knobColor: 'accent-cyan-500' },
            { border: 'border-blue-500/30', text: 'text-blue-400', bg: 'bg-blue-500/10', activeBg: 'bg-blue-500/20', progressBg: 'bg-blue-400/80', knobColor: 'accent-blue-500' },
            { border: 'border-indigo-500/30', text: 'text-indigo-400', bg: 'bg-indigo-500/10', activeBg: 'bg-indigo-500/20', progressBg: 'bg-indigo-400/80', knobColor: 'accent-indigo-500' },
            { border: 'border-purple-500/30', text: 'text-purple-400', bg: 'bg-purple-500/10', activeBg: 'bg-purple-500/20', progressBg: 'bg-purple-400/80', knobColor: 'accent-purple-500' },
            { border: 'border-pink-500/30', text: 'text-pink-400', bg: 'bg-pink-500/10', activeBg: 'bg-pink-500/20', progressBg: 'bg-pink-400/80', knobColor: 'accent-pink-500' },
            { border: 'border-amber-500/30', text: 'text-amber-400', bg: 'bg-amber-500/10', activeBg: 'bg-amber-500/20', progressBg: 'bg-amber-400/80', knobColor: 'accent-amber-500' },
            { border: 'border-emerald-500/30', text: 'text-emerald-400', bg: 'bg-emerald-500/10', activeBg: 'bg-emerald-500/20', progressBg: 'bg-emerald-400/80', knobColor: 'accent-emerald-500' },
            { border: 'border-rose-500/30', text: 'text-rose-400', bg: 'bg-rose-500/10', activeBg: 'bg-rose-500/20', progressBg: 'bg-rose-400/80', knobColor: 'accent-rose-500' },
            { border: 'border-orange-500/30', text: 'text-orange-400', bg: 'bg-orange-500/10', activeBg: 'bg-orange-500/20', progressBg: 'bg-orange-400/80', knobColor: 'accent-orange-500' },
            { border: 'border-lime-500/30', text: 'text-lime-400', bg: 'bg-lime-500/10', activeBg: 'bg-lime-500/20', progressBg: 'bg-lime-400/80', knobColor: 'accent-lime-500' },
            { border: 'border-sky-500/30', text: 'text-sky-400', bg: 'bg-sky-500/10', activeBg: 'bg-sky-500/20', progressBg: 'bg-sky-400/80', knobColor: 'accent-sky-500' }
        ];

        for (let i = 0; i < NUM_CHANNELS; i++) {
            channels.push({
                id: i,
                name: `CH ${i + 1}`,
                audioBuffer: null,
                fileName: 'ファイルを読み込んでください',
                volume: 0.5623,
                pan: 0.0,
                pitch: 1.0,
                filter: 0,
                loop: false,
                muted: false,
                soloed: false,
                activeSources: [],
                gainNode: null,
                pannerNode: null,
                filterNode: null,
                analyserNode: null,
            });
        }

        window.addEventListener('load', () => {
            renderChannels();
            setupDomEventListeners();
            drawVisualizer();
            const btn = document.getElementById('normalize-btn');
            btn.className = "flex-1 md:flex-none px-4 py-2 bg-teal-600 hover:bg-teal-500 text-slate-100 border border-teal-500 rounded-lg text-sm transition flex items-center justify-center gap-2";
            btn.innerHTML = `<i class="fa-solid fa-lock"></i> Volume Leveling ON (-5dB)`;
        });

        function renderChannels() {
            const grid = document.getElementById('channels-grid');
            grid.innerHTML = '';

            channels.forEach((ch, idx) => {
                const color = padColors[idx];
                const channelCard = document.createElement('div');
                channelCard.id = `card-${idx}`;
                channelCard.className = `bg-slate-900 border border-slate-800 rounded-xl p-3 flex flex-col gap-3 shadow-md relative overflow-hidden transition-all duration-200 hover:border-slate-700`;
                
                channelCard.insertAdjacentHTML('beforeend', `
                    <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-slate-800 via-slate-700 to-slate-800"></div>
                    <!-- Header (CH info & Load File) -->
                    <div class="flex justify-between items-center mt-1">
                        <span class="text-xs font-black tracking-wider text-slate-400">${ch.name}</span>
                        <span class="text-[10px] bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded font-mono">Key ${idx + 1}</span>
                    </div>

                    <!-- File Input & Label -->
                    <div class="flex flex-col gap-1">
                        <label for="file-input-${idx}" class="cursor-pointer bg-slate-950 hover:bg-slate-800 border border-slate-800 hover:border-slate-700 py-1.5 px-2 rounded-lg text-center transition flex flex-col items-center justify-center gap-0.5">
                            <span class="text-[10px] text-slate-300 font-semibold truncate max-w-full block" id="file-name-${idx}">
                                <i class="fa-solid fa-file-import text-slate-500 mr-1"></i> ${ch.fileName}
                            </span>
                        </label>
                        <input type="file" id="file-input-${idx}" accept="audio/*" class="hidden" onchange="handleFileSelect(${idx}, this.files)">
                    </div>

                    <!-- Main Pad Button -->
                    <button id="pad-${idx}" 
                                    class="w-full h-16 rounded-lg ${color.bg} border ${color.border} ${color.text} font-bold text-sm tracking-widest flex flex-col items-center justify-center gap-1 transition-all duration-75 hover:scale-[0.98] active:scale-95 shadow-inner relative overflow-hidden"
                                    onclick="triggerPadPlay(${idx})">
                        <div id="progress-${idx}" class="absolute bottom-0 left-0 h-1.5 w-0 ${color.progressBg} transition-none"></div>
                        <span>PAD PLAY</span>
                        <span class="text-[9px] opacity-75 font-normal tracking-tight font-mono" id="duration-${idx}">--:--</span>
                    </button>

                    <!-- Stop Button -->
                    <button id="stop-${idx}" onclick="stopChannel(${idx})" class="w-full py-1.5 text-[9px] font-bold rounded bg-slate-800 text-rose-400 hover:bg-rose-700 hover:text-slate-300 transition flex items-center justify-center gap-1" title="STOP">
                        <i class="fa-solid fa-stop text-[10px]"></i> STOP
                    </button>

                    <!-- Controls panel -->
                    <div class="space-y-2.5 bg-slate-950/40 p-2 rounded-lg border border-slate-850">
                        <!-- Solo / Mute / Loop / Reset -->
                        <div class="grid grid-cols-4 gap-1">
                            <button id="solo-${idx}" onclick="toggleSolo(${idx})" class="py-1 text-[9px] font-bold rounded bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-amber-400 transition" title="SOLO">SOLO</button>
                            <button id="mute-${idx}" onclick="toggleMute(${idx})" class="py-1 text-[9px] font-bold rounded bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-rose-500 transition" title="MUTE">MUTE</button>
                            <button id="loop-${idx}" onclick="toggleLoop(${idx})" class="py-1 text-[9px] font-bold rounded bg-slate-800 text-slate-400 hover:bg-slate-700 transition flex items-center justify-center gap-0.5" title="LOOP">
                                <i class="fa-solid fa-arrows-spin text-[10px]"></i> LP
                            </button>
                            <button onclick="resetChannel(${idx})" class="py-1 text-[9px] font-bold rounded bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-teal-400 transition flex items-center justify-center" title="設定リセット">
                                <i class="fa-solid fa-rotate-left text-[10px]"></i>
                            </button>
                        </div>

                        <!-- Volume Slider (Vertical styled knob / Slider) -->
                        <div class="flex flex-col gap-1">
                            <div class="flex justify-between text-[9px] text-slate-500 font-mono">
                                <span>VOL</span>
                                <span id="vol-lbl-${idx}">${isNormalizeActive ? '-5dB' : Math.round(ch.volume * 100) + '%'}</span>
                            </div>
                            <input type="range" min="0" max="1" step="0.01" value="${ch.volume}" id="vol-${idx}" oninput="updateChannelVolume(${idx}, this.value)" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer ${color.knobColor}">
                        </div>

                        <!-- Pan Slider -->
                        <div class="flex flex-col gap-1">
                            <div class="flex justify-between text-[9px] text-slate-500 font-mono">
                                <span>PAN (L/R)</span>
                                <span id="pan-lbl-${idx}">${ch.pan >= 0 ? `R ${Math.round(ch.pan * 100)}%` : `L ${Math.round(Math.abs(ch.pan) * 100)}%`}</span>
                            </div>
                            <input type="range" min="-1" max="1" step="0.1" value="${ch.pan}" id="pan-${idx}" oninput="updateChannelPan(${idx}, this.value)" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer ${color.knobColor}">
                        </div>

                        <!-- Pitch Slider -->
                        <div class="flex flex-col gap-1">
                            <div class="flex justify-between text-[9px] text-slate-500 font-mono">
                                <span>SPEED / PITCH</span>
                                <span id="pitch-lbl-${idx}">${ch.pitch.toFixed(2)}x</span>
                            </div>
                            <input type="range" min="0.5" max="2.0" step="0.05" value="${ch.pitch}" id="pitch-${idx}" oninput="updateChannelPitch(${idx}, this.value)" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer ${color.knobColor}">
                        </div>

                        <!-- Filter Slider -->
                        <div class="flex flex-col gap-1">
                            <div class="flex justify-between text-[9px] text-slate-500 font-mono">
                                <span>FILTER <span class="text-slate-600">LP ← · → HP</span></span>
                                <span id="filter-lbl-${idx}">BYPASS</span>
                            </div>
                            <input type="range" min="-1" max="1" step="0.01" value="0" id="filter-${idx}" oninput="updateChannelFilter(${idx}, this.value)" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer ${color.knobColor}">
                        </div>
                    </div>
                `);

                grid.appendChild(channelCard);
            });
        }

        async function initAudioContext() {
            if (audioCtx) return Promise.resolve();

            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            masterGainNode = audioCtx.createGain();
            masterGainNode.gain.setValueAtTime(parseFloat(document.getElementById('master-volume').value), audioCtx.currentTime);

            masterAnalyser = audioCtx.createAnalyser();
            masterAnalyser.fftSize = 256;

            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = document.getElementById('fx-filter-type').value;
            filterNode.frequency.setValueAtTime(parseFloat(document.getElementById('fx-filter-freq').value), audioCtx.currentTime);

            delayNode = audioCtx.createDelay(1.0);
            delayGain = audioCtx.createGain();
            delayNode.delayTime.setValueAtTime(parseFloat(document.getElementById('fx-delay-time').value), audioCtx.currentTime);
            delayGain.gain.setValueAtTime(parseFloat(document.getElementById('fx-delay-feedback').value), audioCtx.currentTime);

            reverbNode = audioCtx.createConvolver();
            reverbGainNode = audioCtx.createGain();
            dryGainNode = audioCtx.createGain();
            reverbGainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            dryGainNode.gain.setValueAtTime(0.7, audioCtx.currentTime);
            await buildReverbIR('room');

            recDestNode = audioCtx.createMediaStreamDestination();

            routeMasterFX();

            const statusLed = document.getElementById('status-led');
            const statusText = document.getElementById('status-text');
            statusLed.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]";
            statusText.textContent = "Active";
            document.getElementById('start-ctx-btn').textContent = "Restart Audio";
            document.getElementById('start-ctx-btn').classList.replace('bg-emerald-600', 'bg-slate-800');

            preloadDefaultSounds();
        }

        async function buildReverbIR(type) {
            if (!audioCtx) return;
            const params = {
                room:   { duration: 1.2, decay: 2.0,  preDelay: 0.01 },
                hall:   { duration: 3.5, decay: 5.0,  preDelay: 0.03 },
                church: { duration: 5.0, decay: 7.0,  preDelay: 0.05 },
                cave:   { duration: 4.0, decay: 3.5,  preDelay: 0.02 },
            };
            const p = params[type] || params.room;
            const sampleRate = audioCtx.sampleRate;
            const length = sampleRate * p.duration;
            const ir = audioCtx.createBuffer(2, length, sampleRate);
            for (let c = 0; c < 2; c++) {
                const data = ir.getChannelData(c);
                const preDelaySamples = Math.floor(p.preDelay * sampleRate);
                for (let i = 0; i < length; i++) {
                    if (i < preDelaySamples) { data[i] = 0; continue; }
                    const t = (i - preDelaySamples) / sampleRate;
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t / p.duration, p.decay);
                }
            }
            reverbNode.buffer = ir;
        }

        function routeMasterFX() {
            if (!audioCtx) return;

            try {
                masterGainNode.disconnect();
                filterNode.disconnect();
                delayNode.disconnect();
                delayGain.disconnect();
                dryGainNode.disconnect();
                reverbGainNode.disconnect();
                reverbNode.disconnect();
            } catch (e) {}

            const delayEnabled = document.getElementById('fx-delay-toggle').checked;
            const reverbEnabled = document.getElementById('fx-reverb-toggle').checked;

            // masterGain → filter → dry/reverb分岐
            masterGainNode.connect(filterNode);
            filterNode.connect(dryGainNode);
            dryGainNode.connect(masterAnalyser);

            if (reverbEnabled) {
                filterNode.connect(reverbNode);
                reverbNode.connect(reverbGainNode);
                reverbGainNode.connect(masterAnalyser);
            }

            if (delayEnabled) {
                filterNode.connect(delayNode);
                delayNode.connect(delayGain);
                delayGain.connect(masterAnalyser);
                delayGain.connect(delayNode);
            }

            masterAnalyser.connect(audioCtx.destination);
            masterAnalyser.connect(recDestNode);
        }

        function setupChannelNodes(ch) {
            if (!audioCtx) return;
            
            if (!ch.gainNode) {
                ch.gainNode = audioCtx.createGain();
                ch.pannerNode = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
                ch.filterNode = audioCtx.createBiquadFilter();
                ch.filterNode.type = 'allpass';
                ch.filterNode.frequency.setValueAtTime(20000, audioCtx.currentTime);

                ch.gainNode.gain.setValueAtTime(ch.muted ? 0 : ch.volume, audioCtx.currentTime);
                if (ch.pannerNode) {
                    ch.pannerNode.pan.setValueAtTime(ch.pan, audioCtx.currentTime);
                }

                if (ch.pannerNode) {
                    ch.gainNode.connect(ch.pannerNode);
                    ch.pannerNode.connect(ch.filterNode);
                } else {
                    ch.gainNode.connect(ch.filterNode);
                }
                ch.filterNode.connect(masterGainNode);
            }
        }

        function preloadDefaultSounds() {
        }

        function createSynthTone(freq, duration, padIdx) {
            const sampleRate = audioCtx.sampleRate;
            const numSamples = sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, numSamples, sampleRate);
            const data = buffer.getChannelData(0);

            const types = ['sine', 'triangle', 'sawtooth', 'square'];
            const chosenType = types[padIdx % types.length];

            for (let i = 0; i < numSamples; i++) {
                const t = i / sampleRate;
                let val = 0;

                if (chosenType === 'sine') {
                    val = Math.sin(2 * Math.PI * freq * t);
                } else if (chosenType === 'triangle') {
                    val = Math.abs((t * freq) % 1 - 0.5) * 4 - 1;
                } else if (chosenType === 'sawtooth') {
                    val = 2 * ((t * freq) % 1) - 1;
                } else if (chosenType === 'square') {
                    val = Math.sin(2 * Math.PI * freq * t) >= 0 ? 0.5 : -0.5;
                }

                const envelope = Math.exp(-t * 5);
                data[i] = val * envelope * 0.4;
            }
            return buffer;
        }

        function handleFileSelect(idx, files) {
            if (files.length === 0) return;
            const file = files[0];
            
            const nameLabel = document.getElementById(`file-name-${idx}`);
            nameLabel.innerHTML = `<i class="fa-solid fa-spinner animate-spin text-teal-400 mr-1"></i> 読込中...`;
            
            if (!audioCtx) {
                initAudioContext().then(() => decodeAndLoadFile(idx, file));
            } else {
                decodeAndLoadFile(idx, file);
            }
        }

        function decodeAndLoadFile(idx, file) {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                
                audioCtx.decodeAudioData(arrayBuffer, function(buffer) {
                    channels[idx].audioBuffer = buffer;
                    channels[idx].fileName = file.name;

                    // デフォルト設定に戻す
                    const ch = channels[idx];
                    ch.pan = 0.0; ch.pitch = 1.0; ch.loop = false; ch.muted = false; ch.soloed = false;
                    document.getElementById(`pan-${idx}`).value = 0;
                    document.getElementById(`pan-lbl-${idx}`).textContent = 'C';
                    document.getElementById(`pitch-${idx}`).value = 1.0;
                    document.getElementById(`pitch-lbl-${idx}`).textContent = '1.00x';
                    document.getElementById(`mute-${idx}`).className = "py-1 text-[9px] font-bold rounded bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-rose-500 transition";
                    document.getElementById(`solo-${idx}`).className = "py-1 text-[9px] font-bold rounded bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-amber-400 transition";
                    document.getElementById(`loop-${idx}`).className = "py-1 text-[9px] font-bold rounded bg-slate-800 text-slate-400 hover:bg-slate-700 transition flex items-center justify-center gap-0.5";
                    if (audioCtx && ch.pannerNode) ch.pannerNode.pan.setTargetAtTime(0, audioCtx.currentTime, 0.01);

                    const nameLabel = document.getElementById(`file-name-${idx}`);
                    nameLabel.innerHTML = `<i class="fa-solid fa-file-audio text-teal-400 mr-1"></i> ${file.name}`;
                    nameLabel.title = file.name;
                    
                    updateDurationLabel(idx, buffer.duration);

                    if (isNormalizeActive) {
                        const targetGain = calcNormalizeGain(buffer);
                        channels[idx].volume = targetGain;
                        const slider = document.getElementById(`vol-${idx}`);
                        const label = document.getElementById(`vol-lbl-${idx}`);
                        if (slider) slider.value = Math.min(1.0, targetGain);
                        if (label) label.textContent = `-5dB`;
                        if (audioCtx && channels[idx].gainNode) {
                            channels[idx].gainNode.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.02);
                        }
                    }

                    const padBtn = document.getElementById(`pad-${idx}`);
                    padBtn.classList.add('bg-emerald-500/40');
                    setTimeout(() => padBtn.classList.remove('bg-emerald-500/40'), 500);

                }, function(error) {
                    const nameLabel = document.getElementById(`file-name-${idx}`);
                    nameLabel.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-rose-500 mr-1"></i> エラー`;
                    showConsoleNotification(`チャンネル ${idx + 1} の音声デコードに失敗しました。ファイル形式を確認してください。`);
                });
            };

            reader.readAsArrayBuffer(file);
        }

        function updateDurationLabel(idx, seconds) {
            const durLabel = document.getElementById(`duration-${idx}`);
            if (!durLabel) return;
            
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            const formatted = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            durLabel.textContent = formatted;
        }

        function triggerPadPlay(idx) {
            if (!channels[idx].audioBuffer) {
                showConsoleNotification(`CH ${idx + 1}：音源ファイルを読み込んでください`);
                return;
            }
            if (!audioCtx) {
                initAudioContext().then(() => playBuffer(idx));
            } else {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                playBuffer(idx);
            }
        }

        function playBuffer(idx) {
            const ch = channels[idx];
            if (!ch.audioBuffer || !audioCtx) return;

            setupChannelNodes(ch);

            if (!isPolyMode && ch.activeSources.length > 0) {
                stopChannel(idx);
            }

            const source = audioCtx.createBufferSource();
            source.buffer = ch.audioBuffer;
            source.playbackRate.value = ch.pitch;
            source.loop = ch.loop;

            const isAnyTrackSoloed = channels.some(c => c.soloed);
            const isSilencedBySolo = isAnyTrackSoloed && !ch.soloed;

            const currentGain = (ch.muted || isSilencedBySolo) ? 0.0 : ch.volume;
            ch.gainNode.gain.setValueAtTime(currentGain, audioCtx.currentTime);

            if (ch.pannerNode) {
                source.connect(ch.pannerNode);
            } else {
                source.connect(ch.gainNode);
            }

            source.start(0);
            ch.activeSources.push(source);
            ch.playStartTime = audioCtx.currentTime;
            ch.playDuration = ch.audioBuffer.duration / ch.pitch;

            const padBtn = document.getElementById(`pad-${idx}`);
            const color = padColors[idx];
            padBtn.classList.replace(color.bg, color.activeBg);

            const card = document.getElementById(`card-${idx}`);
            if (card) {
                card.classList.add('shadow-lg', color.bg);
                card.classList.replace('border-slate-800', color.border.replace('/30', '/70'));
                card.querySelector('.absolute').className = `absolute top-0 left-0 right-0 h-1 ${color.activeBg} animate-pulse`;
            }

            source.onended = () => {
                const index = ch.activeSources.indexOf(source);
                if (index > -1) {
                    ch.activeSources.splice(index, 1);
                }
                
                if (ch.activeSources.length === 0) {
                    padBtn.classList.replace(color.activeBg, color.bg);
                    const prog = document.getElementById(`progress-${idx}`);
                    if (prog) prog.style.width = '0%';

                    const card = document.getElementById(`card-${idx}`);
                    if (card) {
                        card.classList.remove('shadow-lg', color.bg);
                        card.classList.replace(color.border.replace('/30', '/70'), 'border-slate-800');
                        card.querySelector('.absolute').className = `absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-slate-800 via-slate-700 to-slate-800`;
                    }
                }
            };
        }

        function updateChannelVolume(idx, val) {
            const ch = channels[idx];

            if (isNormalizeActive) {
                const slider = document.getElementById(`vol-${idx}`);
                if (slider) slider.value = normalizeTargetVolume;
                return;
            }

            ch.volume = parseFloat(val);
            
            const volPct = Math.round(ch.volume * 100);
            document.getElementById(`vol-lbl-${idx}`).textContent = `${volPct}%`;

            if (audioCtx && ch.gainNode) {
                const isAnyTrackSoloed = channels.some(c => c.soloed);
                const isSilencedBySolo = isAnyTrackSoloed && !ch.soloed;
                const currentGain = (ch.muted || isSilencedBySolo) ? 0.0 : ch.volume;
                ch.gainNode.gain.setTargetAtTime(currentGain, audioCtx.currentTime, 0.01);
            }
        }

        function updateChannelPan(idx, val) {
            const ch = channels[idx];
            ch.pan = parseFloat(val);
            
            let panTxt = 'C';
            if (ch.pan < 0) panTxt = `L${Math.round(Math.abs(ch.pan) * 10)}`;
            if (ch.pan > 0) panTxt = `R${Math.round(ch.pan * 10)}`;
            document.getElementById(`pan-lbl-${idx}`).textContent = panTxt;

            if (audioCtx && ch.pannerNode) {
                ch.pannerNode.pan.setTargetAtTime(ch.pan, audioCtx.currentTime, 0.01);
            }
        }

        function updateChannelPitch(idx, val) {
            const ch = channels[idx];
            ch.pitch = parseFloat(val);
            document.getElementById(`pitch-lbl-${idx}`).textContent = `${ch.pitch.toFixed(2)}x`;

            ch.activeSources.forEach(src => {
                try {
                    src.playbackRate.setTargetAtTime(ch.pitch, audioCtx.currentTime, 0.02);
                } catch (e) {}
            });
        }

        function updateChannelFilter(idx, val) {
            const ch = channels[idx];
            ch.filter = parseFloat(val);
            const label = document.getElementById(`filter-lbl-${idx}`);

            if (Math.abs(ch.filter) < 0.01) {
                label.textContent = 'BYPASS';
                if (ch.filterNode) { ch.filterNode.type = 'allpass'; }
                return;
            }

            if (ch.filter < 0) {
                const freq = Math.round(20 * Math.pow(100, 1 + ch.filter));
                label.textContent = `LP ${freq}Hz`;
                if (ch.filterNode) {
                    ch.filterNode.type = 'lowpass';
                    ch.filterNode.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.01);
                }
            } else {
                const freq = Math.round(200 * Math.pow(100, ch.filter));
                label.textContent = `HP ${freq}Hz`;
                if (ch.filterNode) {
                    ch.filterNode.type = 'highpass';
                    ch.filterNode.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.01);
                }
            }
        }

        function toggleMute(idx) {
            const ch = channels[idx];
            ch.muted = !ch.muted;

            const muteBtn = document.getElementById(`mute-${idx}`);
            if (ch.muted) {
                muteBtn.className = "py-1 text-[9px] font-bold rounded bg-rose-600 text-slate-100 transition";
            } else {
                muteBtn.className = "py-1 text-[9px] font-bold rounded bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-rose-500 transition";
            }

            applySoloMuteStates();
        }

        function toggleSolo(idx) {
            const ch = channels[idx];
            ch.soloed = !ch.soloed;

            const soloBtn = document.getElementById(`solo-${idx}`);
            if (ch.soloed) {
                soloBtn.className = "py-1 text-[9px] font-bold rounded bg-amber-500 text-slate-950 transition";
            } else {
                soloBtn.className = "py-1 text-[9px] font-bold rounded bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-amber-400 transition";
            }

            applySoloMuteStates();
        }

        function toggleLoop(idx) {
            const ch = channels[idx];
            ch.loop = !ch.loop;

            const loopBtn = document.getElementById(`loop-${idx}`);
            if (ch.loop) {
                loopBtn.className = "py-1 text-[9px] font-bold rounded bg-teal-600 text-slate-100 transition flex items-center justify-center gap-0.5";
            } else {
                loopBtn.className = "py-1 text-[9px] font-bold rounded bg-slate-800 text-slate-400 hover:bg-slate-700 transition flex items-center justify-center gap-0.5";
            }

            ch.activeSources.forEach(src => {
                src.loop = ch.loop;
            });
        }

        function applySoloMuteStates() {
            if (!audioCtx) return;

            const isAnyTrackSoloed = channels.some(c => c.soloed);

            channels.forEach(ch => {
                if (!ch.gainNode) return;
                
                const isSilencedBySolo = isAnyTrackSoloed && !ch.soloed;
                const targetGain = (ch.muted || isSilencedBySolo) ? 0.0 : ch.volume;
                
                ch.gainNode.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.02);
            });
        }

        function setupDomEventListeners() {
            document.getElementById('start-ctx-btn').addEventListener('click', () => {
                initAudioContext().then(() => {
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume().then(() => {
                            document.getElementById('status-led').className = "w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]";
                            document.getElementById('status-text').textContent = "Active";
                            showConsoleNotification('オーディオエンジンを再開しました');
                        });
                    } else {
                        showConsoleNotification('エンジンはすでに稼働中です');
                    }
                });
            });

            document.getElementById('stop-all-btn').addEventListener('click', stopAllChannels);

            window.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;
                const key = e.key;
                if (key >= '1' && key <= '9') {
                    triggerPadPlay(parseInt(key) - 1);
                } else if (key === '0') {
                    triggerPadPlay(9);
                } else if (key === '-') {
                    triggerPadPlay(10);
                } else if (key === '^') {
                    triggerPadPlay(11);
                }
            });

            document.getElementById('master-volume').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                document.getElementById('master-volume-val').textContent = `${Math.round(val * 100)}%`;
                if (audioCtx && masterGainNode) {
                    if (isSmoothVolume) {
                        masterGainNode.gain.setTargetAtTime(val, audioCtx.currentTime, 0.3);
                    } else {
                        masterGainNode.gain.setTargetAtTime(val, audioCtx.currentTime, 0.01);
                    }
                }
            });

            document.getElementById('fx-delay-toggle').addEventListener('change', () => {
                if (audioCtx) routeMasterFX();
            });

            document.getElementById('fx-reverb-toggle').addEventListener('change', () => {
                if (audioCtx) routeMasterFX();
            });

            document.getElementById('fx-reverb-type').addEventListener('change', async (e) => {
                if (audioCtx) {
                    await buildReverbIR(e.target.value);
                    routeMasterFX();
                }
            });

            document.getElementById('fx-reverb-mix').addEventListener('input', (e) => {
                const mix = parseFloat(e.target.value);
                document.getElementById('fx-reverb-mix-val').textContent = `${Math.round(mix * 100)}%`;
                if (audioCtx && reverbGainNode && dryGainNode) {
                    reverbGainNode.gain.setTargetAtTime(mix, audioCtx.currentTime, 0.01);
                    dryGainNode.gain.setTargetAtTime(1 - mix, audioCtx.currentTime, 0.01);
                }
            });

            document.getElementById('fx-delay-time').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                document.getElementById('fx-delay-time-val').textContent = `${val.toFixed(2)}s`;
                if (audioCtx && delayNode) {
                    delayNode.delayTime.setTargetAtTime(val, audioCtx.currentTime, 0.01);
                }
            });

            document.getElementById('fx-delay-feedback').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                document.getElementById('fx-delay-feedback-val').textContent = `${Math.round(val * 100)}%`;
                if (audioCtx && delayGain) {
                    delayGain.gain.setTargetAtTime(val, audioCtx.currentTime, 0.01);
                }
            });

            document.getElementById('fx-filter-type').addEventListener('change', (e) => {
                const val = e.target.value;
                if (audioCtx && filterNode) {
                    filterNode.type = val;
                }
            });

            document.getElementById('fx-filter-freq').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                document.getElementById('fx-filter-freq-val').textContent = `${val}Hz`;
                if (audioCtx && filterNode) {
                    filterNode.frequency.setTargetAtTime(val, audioCtx.currentTime, 0.01);
                }
            });

            document.getElementById('rec-btn').addEventListener('click', toggleRecording);
            document.getElementById('download-rec-btn').addEventListener('click', downloadRecording);
            document.getElementById('normalize-btn').addEventListener('click', normalizeGains);
            document.getElementById('poly-mode-btn').addEventListener('click', () => {
                isPolyMode = !isPolyMode;
                const btn = document.getElementById('poly-mode-btn');
                if (isPolyMode) {
                    btn.className = "px-4 py-2 bg-teal-900 hover:bg-teal-800 text-teal-300 border border-teal-700 rounded-lg text-sm transition flex items-center justify-center gap-2";
                    btn.innerHTML = `<i class="fa-solid fa-layer-group"></i> POLY`;
                } else {
                    btn.className = "px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 border border-slate-600 rounded-lg text-sm transition flex items-center justify-center gap-2";
                    btn.innerHTML = `<i class="fa-solid fa-minus"></i> MONO`;
                }
            });
        }

        function normalizeGains() {
            const btn = document.getElementById('normalize-btn');
            isNormalizeActive = !isNormalizeActive;

            if (isNormalizeActive) {
            normalizeTargetVolume = DEFAULT_VOLUME;
            applyNormalizeToAll();
            btn.className = "flex-1 md:flex-none px-4 py-2 bg-teal-600 hover:bg-teal-500 text-slate-100 border border-teal-500 rounded-lg text-sm transition flex items-center justify-center gap-2";
            btn.innerHTML = `<i class="fa-solid fa-lock"></i> Volume Leveling ON (-5dB)`;
            showConsoleNotification(`Volume LevelingをONにしました (-5dB)`);
            } else {
                channels.filter(ch => ch.audioBuffer !== null).forEach(ch => {
                    ch.volume = DEFAULT_VOLUME;
                    const slider = document.getElementById(`vol-${ch.id}`);
                    const label = document.getElementById(`vol-lbl-${ch.id}`);
                    if (slider) slider.value = DEFAULT_VOLUME;
                    if (label) label.textContent = `${Math.round(DEFAULT_VOLUME * 100)}%`;
                    if (audioCtx && ch.gainNode) {
                        const isAnyTrackSoloed = channels.some(c => c.soloed);
                        const isSilencedBySolo = isAnyTrackSoloed && !ch.soloed;
                        const currentGain = (ch.muted || isSilencedBySolo) ? 0.0 : DEFAULT_VOLUME;
                        ch.gainNode.gain.setTargetAtTime(currentGain, audioCtx.currentTime, 0.02);
                    }
                });
                btn.className = "flex-1 md:flex-none px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 rounded-lg text-sm transition flex items-center justify-center gap-2";
                btn.innerHTML = `<i class="fa-solid fa-sliders"></i> Volume Leveling OFF`;
                showConsoleNotification(`Volume LevelingをOFFにしました (全チャンネル -5dB に復元)`);
            }
        }

        function calcNormalizeGain(buffer) {
            let peak = 0;
            for (let c = 0; c < buffer.numberOfChannels; c++) {
                const data = buffer.getChannelData(c);
                for (let i = 0; i < data.length; i++) {
                    const abs = Math.abs(data[i]);
                    if (abs > peak) peak = abs;
                }
            }
            if (peak === 0) return DEFAULT_VOLUME;
            const targetPeak = 0.5623;
            return targetPeak / peak;
        }

        function applyNormalizeToAll() {
            channels.filter(ch => ch.audioBuffer !== null).forEach(ch => {
                const targetGain = calcNormalizeGain(ch.audioBuffer);
                ch.volume = targetGain;
                const slider = document.getElementById(`vol-${ch.id}`);
                const label = document.getElementById(`vol-lbl-${ch.id}`);
                if (slider) slider.value = Math.min(1.0, targetGain);
                if (label) label.textContent = `-5dB`;
                if (audioCtx && ch.gainNode) {
                    const isAnyTrackSoloed = channels.some(c => c.soloed);
                    const isSilencedBySolo = isAnyTrackSoloed && !ch.soloed;
                    const currentGain = (ch.muted || isSilencedBySolo) ? 0.0 : normalizeTargetVolume;
                    ch.gainNode.gain.setTargetAtTime(currentGain, audioCtx.currentTime, 0.02);
                }
            });
        }

        function stopAllChannels() {
            channels.forEach((ch, idx) => {

                if (card) {

                }
                const prog = document.getElementById(`progress-${idx}`);
                if (prog) prog.style.width = '0%';

        }

        function stopChannel(idx) {

        function toggleRecording() {
            if (!audioCtx) {
                showConsoleNotification("まず最初にオーディオエンジンを起動してください。");
                return;
            }

            const recBtn = document.getElementById('rec-btn');
            const recDot = document.getElementById('rec-dot');
            const recStatusText = document.getElementById('rec-status');

            if (!isRecording) {
                recordedChunks = [];
                const destStream = recDestNode.stream;
                
                mediaRecorder = new MediaRecorder(destStream);
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        recordedChunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    document.getElementById('download-rec-btn').disabled = false;
                    document.getElementById('download-rec-btn').classList.replace('bg-slate-800', 'bg-teal-600');
                    document.getElementById('download-rec-btn').classList.replace('text-slate-500', 'text-slate-100');
                    document.getElementById('download-rec-btn').classList.add('hover:bg-teal-500');
                };

                mediaRecorder.start();
                isRecording = true;

                recBtn.classList.replace('bg-rose-600', 'bg-slate-700');
                recBtn.innerHTML = `<i class="fa-solid fa-stop text-rose-500 animate-pulse"></i>`;
                recDot.className = "w-2 h-2 rounded-full bg-rose-500 animate-ping";
                recStatusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-rose-500 animate-ping"></span> 録音中...`;
            } else {
                if (mediaRecorder) {
                    mediaRecorder.stop();
                }
                isRecording = false;

                recBtn.classList.replace('bg-slate-700', 'bg-rose-600');
                recBtn.innerHTML = `<i class="fa-solid fa-microphone"></i>`;
                recDot.className = "w-2 h-2 rounded-full bg-emerald-500";
                recStatusText.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span> 録音完了`;
            }
        }

        function downloadRecording() {
            if (recordedChunks.length === 0) return;

            const blob = new Blob(recordedChunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `web-console-record-${Date.now()}.webm`;
            document.body.appendChild(a);
            a.click();
            
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 100);
        }

        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);

            if (audioCtx) {
                channels.forEach((ch, idx) => {
                    if (ch.activeSources.length === 0 || !ch.playDuration) return;
                    const elapsed = audioCtx.currentTime - ch.playStartTime;
                    const pct = ch.loop ? (elapsed % ch.playDuration) / ch.playDuration : Math.min(elapsed / ch.playDuration, 1);
                    const prog = document.getElementById(`progress-${idx}`);
                    if (prog) prog.style.width = `${pct * 100}%`;
                });
            }

            const canvas = document.getElementById('visualizer-canvas');
            const ctx = canvas.getContext('2d');
            const fallbackMsg = document.getElementById('fallback-viz-msg');

            if (canvas.clientWidth > 0 && canvas.clientHeight > 0 &&
                (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight)) {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
            }

            ctx.fillStyle = 'rgba(2, 6, 23, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!audioCtx || !masterAnalyser) {
                ctx.strokeStyle = 'rgba(20, 184, 166, 0.1)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                const t = Date.now() * 0.002;
                for (let i = 0; i < canvas.width; i++) {
                    const y = canvas.height / 2 + Math.sin(i * 0.01 + t) * 10;
                    if (i === 0) ctx.moveTo(i, y);
                    else ctx.lineTo(i, y);
                }
                ctx.stroke();
                return;
            }

            if (fallbackMsg) fallbackMsg.style.display = 'none';

            const bufferLength = masterAnalyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            masterAnalyser.getByteFrequencyData(dataArray);

            const barWidth = (canvas.width / bufferLength) * 1.5;
            let barHeight;
            let x = 0;

            const grad = ctx.createLinearGradient(0, canvas.height, 0, 0);
            grad.addColorStop(0, '#10b981');
            grad.addColorStop(0.5, '#14b8a6');
            grad.addColorStop(1, '#3b82f6');
            ctx.fillStyle = grad;

            for (let i = 0; i < bufferLength; i++) {
                barHeight = dataArray[i] / 1.5;
                ctx.fillRect(x, canvas.height - barHeight, barWidth - 1, barHeight);
                x += barWidth;
            }

            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            const averageLevel = sum / bufferLength;
            
            const leftLevel = Math.min(100, Math.max(0, (averageLevel * 1.4) + (Math.sin(Date.now() * 0.005) * 15)));
            const rightLevel = Math.min(100, Math.max(0, (averageLevel * 1.4) + (Math.cos(Date.now() * 0.005) * 15)));

            updateLEDMeter('meter-l', leftLevel);
            updateLEDMeter('meter-r', rightLevel);
        }

        function updateLEDMeter(elementIdPrefix, amplitudeValue) {
            const activeLedsCount = Math.floor(amplitudeValue / 10);
            
            for (let i = 0; i < 10; i++) {
                const ledElement = document.getElementById(`${elementIdPrefix}-${i}`);
                if (!ledElement) continue;

                if (i < activeLedsCount) {
                    if (i < 6) {
                        ledElement.className = "led-bar w-full h-[8%] rounded-sm bg-emerald-500 shadow-[0_0_3px_rgba(16,185,129,0.5)]";
                    } else if (i < 8) {
                        ledElement.className = "led-bar w-full h-[8%] rounded-sm bg-amber-500 shadow-[0_0_3px_rgba(245,158,11,0.5)]";
                    } else {
                        ledElement.className = "led-bar w-full h-[8%] rounded-sm bg-rose-500 shadow-[0_0_5px_rgba(244,63,94,0.8)]";
                    }
                } else {
                    ledElement.className = "led-bar w-full h-[8%] rounded-sm bg-slate-800 transition-colors duration-200";
                }
            }
        }

        function resetChannel(idx) {
            const ch = channels[idx];

            ch.activeSources.forEach(src => { try { src.onended = null; src.stop(); } catch(e) {} });
            ch.activeSources = [];

            ch.pan = 0.0; ch.pitch = 1.0; ch.filter = 0; ch.loop = false; ch.muted = false; ch.soloed = false;
            const normalizedGain = ch.audioBuffer ? calcNormalizeGain(ch.audioBuffer) : DEFAULT_VOLUME;
            ch.volume = normalizedGain;

            document.getElementById(`vol-${idx}`).value = Math.min(1.0, normalizedGain);
            document.getElementById(`vol-lbl-${idx}`).textContent = `-5dB`;
            document.getElementById(`pan-${idx}`).value = 0;
            document.getElementById(`pan-lbl-${idx}`).textContent = 'C';
            document.getElementById(`pitch-${idx}`).value = 1.0;
            document.getElementById(`pitch-lbl-${idx}`).textContent = '1.00x';
            document.getElementById(`mute-${idx}`).className = "py-1 text-[9px] font-bold rounded bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-rose-500 transition";
            document.getElementById(`solo-${idx}`).className = "py-1 text-[9px] font-bold rounded bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-amber-400 transition";
            document.getElementById(`loop-${idx}`).className = "py-1 text-[9px] font-bold rounded bg-slate-800 text-slate-400 hover:bg-slate-700 transition flex items-center justify-center gap-0.5";
            const color = padColors[idx];
            const padBtn = document.getElementById(`pad-${idx}`);
            if (padBtn) padBtn.className = `w-full h-16 rounded-lg ${color.bg} border ${color.border} ${color.text} font-bold text-sm tracking-widest flex flex-col items-center justify-center gap-1 transition-all duration-75 hover:scale-[0.98] active:scale-95 shadow-inner`;

            document.getElementById(`filter-${idx}`).value = 0;
            document.getElementById(`filter-lbl-${idx}`).textContent = 'BYPASS';
            if (audioCtx && ch.filterNode) { ch.filterNode.type = 'allpass'; }

            if (audioCtx && ch.gainNode) {
                ch.gainNode.gain.setTargetAtTime(normalizedGain, audioCtx.currentTime, 0.02);
                if (ch.pannerNode) ch.pannerNode.pan.setTargetAtTime(0, audioCtx.currentTime, 0.01);
            }
            applySoloMuteStates();
            showConsoleNotification(`CH ${idx + 1} の設定をリセットしました`);
        }

        async function resetMasterFX() {
            document.getElementById('fx-delay-toggle').checked = false;
            document.getElementById('fx-delay-time').value = 0.3;
            document.getElementById('fx-delay-time-val').textContent = '0.30s';
            document.getElementById('fx-delay-feedback').value = 0.4;
            document.getElementById('fx-delay-feedback-val').textContent = '40%';

            document.getElementById('fx-filter-type').value = 'allpass';
            document.getElementById('fx-filter-freq').value = 8000;
            document.getElementById('fx-filter-freq-val').textContent = '8000Hz';

            document.getElementById('fx-reverb-toggle').checked = false;
            document.getElementById('fx-reverb-type').value = 'room';
            document.getElementById('fx-reverb-mix').value = 0.3;
            document.getElementById('fx-reverb-mix-val').textContent = '30%';

            if (audioCtx) {
                delayNode.delayTime.setTargetAtTime(0.3, audioCtx.currentTime, 0.01);
                delayGain.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.01);
                filterNode.type = 'allpass';
                filterNode.frequency.setTargetAtTime(8000, audioCtx.currentTime, 0.01);
                reverbGainNode.gain.setTargetAtTime(0.3, audioCtx.currentTime, 0.01);
                dryGainNode.gain.setTargetAtTime(0.7, audioCtx.currentTime, 0.01);
                await buildReverbIR('room');
                routeMasterFX();
            }
            showConsoleNotification('MASTER FX をリセットしました');
        }

        function masterFadeOut() {
            if (!audioCtx || !masterGainNode) {
                showConsoleNotification('Power ONしてから使用してください');
                return;
            }
            const btn = document.getElementById('fadeout-btn');
            const slider = document.getElementById('master-volume');
            const currentGain = masterGainNode.gain.value;

            if (btn.dataset.fading === 'true') return;
            btn.dataset.fading = 'true';
            btn.className = "px-3 py-1.5 bg-blue-900 text-blue-300 border border-blue-700 rounded-lg text-xs flex items-center gap-1.5 cursor-not-allowed";
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin text-blue-400"></i> FADING...`;

            masterGainNode.gain.setValueAtTime(currentGain, audioCtx.currentTime);
            masterGainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3);

            const startTime = performance.now();
            const startVal = currentGain;
            function animateFader() {
                const elapsed = (performance.now() - startTime) / 1000;
                if (elapsed >= 3) {
                    slider.value = 0;
                    document.getElementById('master-volume-val').textContent = '0%';
                    btn.dataset.fading = 'false';
                    btn.className = "px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 rounded-lg text-xs transition flex items-center gap-1.5";
                    btn.innerHTML = `<i class="fa-solid fa-arrow-down-wide-short text-blue-400"></i> FADE`;
                    if (audioCtx && masterGainNode) {
                        masterGainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                    }
                    showConsoleNotification('フェードアウト完了');
                    return;
                }
                const val = startVal * (1 - elapsed / 3);
                slider.value = val;
                document.getElementById('master-volume-val').textContent = `${Math.round(val * 100)}%`;
                requestAnimationFrame(animateFader);
            }
            requestAnimationFrame(animateFader);
        }

        function toggleSmoothVolume() {
            isSmoothVolume = !isSmoothVolume;
            const btn = document.getElementById('smooth-vol-btn');
            if (isSmoothVolume) {
                btn.className = "w-full px-3 py-2 bg-blue-900 hover:bg-blue-800 text-blue-300 border border-blue-700 rounded-lg text-xs transition flex items-center justify-center gap-2";
                btn.innerHTML = `<i class="fa-solid fa-gauge text-blue-400"></i> SMOOTH ON`;
                showConsoleNotification('ボリューム速度制限 ON：急激な変化を抑制します');
            } else {
                btn.className = "w-full px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 rounded-lg text-xs transition flex items-center justify-center gap-2";
                btn.innerHTML = `<i class="fa-solid fa-gauge text-slate-400"></i> SMOOTH OFF`;
                showConsoleNotification('ボリューム速度制限 OFF');
            }
        }

        function showConsoleNotification(message) {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-16 right-4 max-w-sm bg-slate-900 border border-slate-700 text-slate-100 px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 animate-bounce z-50 text-xs";
            toast.innerHTML = `
                <i class="fa-solid fa-circle-info text-teal-400 text-lg"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 4000);
        }
