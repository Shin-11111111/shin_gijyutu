<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホワイトボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

        :root {
            --sidebar-bg: #1e1e2e;
            --sidebar-width: 68px;
            --btn-size: 48px;
            --accent: #7c6af7;
            --accent2: #f7c948;
            --surface: #2a2a3e;
            --border: rgba(255,255,255,0.08);
            --text-muted: rgba(255,255,255,0.45);
        }

        * { box-sizing: border-box; }
        body { font-family: 'Noto Sans JP', sans-serif; margin: 0; }

        #chalkboard {
            cursor: crosshair;
            background-color: #ffffff;
            touch-action: none;
            display: block;
        }
        #chalkboard.pan-cursor { cursor: grab; }
        #chalkboard.pan-cursor.grabbing { cursor: grabbing; }

        #controls {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            gap: 4px;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: none;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            position: relative;
        }
        #controls::-webkit-scrollbar { display: none; }

        .tb-divider {
            width: 36px;
            height: 1px;
            background: var(--border);
            margin: 4px 0;
            flex-shrink: 0;
        }

        .tb-label {
            font-size: 9px;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-align: center;
            line-height: 1;
            padding: 2px 0 0;
            user-select: none;
        }

        .tb-btn {
            width: var(--btn-size);
            height: var(--btn-size);
            border-radius: 12px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.55);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            font-size: 9.5px;
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 500;
            transition: background 0.15s, color 0.15s, transform 0.1s;
            position: relative;
            flex-shrink: 0;
        }
        .tb-btn svg { flex-shrink: 0; }
        .tb-btn:hover {
            background: var(--surface);
            color: #fff;
            transform: scale(1.05);
        }
        .tb-btn.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 12px rgba(124,106,247,0.45);
        }
        .tb-btn.active-yellow {
            background: var(--accent2);
            color: #1a1a2e;
            box-shadow: 0 2px 12px rgba(247,201,72,0.4);
        }
        .tb-btn.active-red {
            background: #f75a68;
            color: #fff;
            box-shadow: 0 2px 12px rgba(247,90,104,0.4);
        }
        .tb-btn.active-teal {
            background: #2dd4bf;
            color: #0f2a27;
            box-shadow: 0 2px 12px rgba(45,212,191,0.4);
        }
        .tb-btn.active-indigo {
            background: #818cf8;
            color: #fff;
            box-shadow: 0 2px 12px rgba(129,140,248,0.4);
        }

        .color-dot {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
            flex-shrink: 0;
        }
        .color-dot:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.5); }
        .color-dot.active {
            border-color: #fff;
            box-shadow: 0 0 0 2px var(--accent);
            transform: scale(1.1);
        }

        .color-picker-wrap {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            overflow: hidden;
            border: 2.5px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s;
            position: relative;
            flex-shrink: 0;
        }
        .color-picker-wrap:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.5); }
        .color-picker-wrap.active { border-color: #fff; box-shadow: 0 0 0 2px var(--accent); }
        .color-picker-wrap input[type="color"] {
            position: absolute;
            top: -4px; left: -4px;
            width: calc(100% + 8px);
            height: calc(100% + 8px);
            border: none;
            padding: 0;
            cursor: pointer;
            border-radius: 0;
        }

        .color-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 4px 0;
        }

        .tb-slider-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 4px 0;
            width: 100%;
        }
        .tb-slider-label {
            font-size: 9px;
            color: var(--text-muted);
            text-align: center;
        }
        input[type="range"].tb-slider {
            -webkit-appearance: none;
            width: 44px;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            outline: none;
            writing-mode: horizontal-tb;
        }
        input[type="range"].tb-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 2px solid #fff;
        }
        input[type="number"].tb-number {
            width: 44px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 6px;
            color: #fff;
            font-size: 11px;
            text-align: center;
            padding: 2px 0;
        }
        input[type="number"].tb-number:focus { outline: none; border-color: var(--accent); }

        .tb-toggle-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 4px 0;
        }
        .toggle-track {
            width: 34px;
            height: 18px;
            background: rgba(255,255,255,0.15);
            border-radius: 9px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-track.on { background: #3b82f6; }
        .toggle-thumb {
            position: absolute;
            top: 2px; left: 2px;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #fff;
            transition: transform 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        .toggle-track.on .toggle-thumb { transform: translateX(16px); }
        .toggle-label-text {
            font-size: 8px;
            color: var(--text-muted);
            text-align: center;
            max-width: 52px;
            line-height: 1.2;
        }

        #controls-mobile {
            display: none;
            flex-direction: row;
            align-items: center;
            padding: 6px 8px;
            gap: 4px;
            background: var(--sidebar-bg);
            border-top: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
            flex-shrink: 0;
        }
        #controls-mobile::-webkit-scrollbar { display: none; }

        .mb-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.55);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            font-size: 8px;
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }
        .mb-btn:hover { background: var(--surface); color: #fff; }
        .mb-btn.active { background: var(--accent); color: #fff; }
        .mb-btn.active-yellow { background: var(--accent2); color: #1a1a2e; }
        .mb-btn.active-red { background: #f75a68; color: #fff; }
        .mb-btn.active-teal { background: #2dd4bf; color: #0f2a27; }
        .mb-btn.active-indigo { background: #818cf8; color: #fff; }

        .mb-divider {
            width: 1px;
            height: 28px;
            background: var(--border);
            flex-shrink: 0;
            margin: 0 2px;
        }

        .mb-color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s;
            flex-shrink: 0;
        }
        .mb-color-dot:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.5); }
        .mb-color-dot.active { border-color: #fff; box-shadow: 0 0 0 2px var(--accent); }

        .mb-color-picker-wrap {
            width: 22px; height: 22px;
            border-radius: 50%; overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer; position: relative; flex-shrink: 0;
        }
        .mb-color-picker-wrap input[type="color"] {
            position: absolute; top: -4px; left: -4px;
            width: calc(100% + 8px); height: calc(100% + 8px);
            border: none; padding: 0; cursor: pointer;
        }

        .mode-button.active { }

        #canvasContainer:fullscreen {
            position: fixed; top:0; left:0;
            width:100vw; height:100vh;
            z-index:100; background:#fff;
            margin:0; border:none; padding:0;
        }
        #canvasContainer:fullscreen #chalkboard { width:100%; height:100%; border:none; }

        @media (max-width: 767px) {
            #controls { display: none !important; }
            #controls-mobile { display: flex !important; }
        }
    </style>
</head>

        <div class="mb-color-picker-wrap" title="カスタム">
            <input type="color" id="colorPickerM" value="#000000">
        </div>

        <div class="mb-divider"></div>

        <input type="range" id="lineWidthRangeM" min="1" max="50" value="5" style="-webkit-appearance:none;width:52px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;outline:none;flex-shrink:0;">
        <input type="number" id="lineWidthInputM" min="1" max="50" value="5" style="width:34px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#fff;font-size:11px;text-align:center;padding:2px 0;flex-shrink:0;">

        <div class="mb-divider"></div>

        <button id="zoomInButtonM" class="mb-btn" title="拡大">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <button id="zoomOutButtonM" class="mb-btn" title="縮小">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <button id="resetViewButtonM" class="mb-btn" title="リセット">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1018 0 9 9 0 00-18 0"/><polyline points="3 3 3 12 12 12"/></svg>
        </button>
        <button id="undoButtonM" class="mb-btn" title="元に戻す" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
        </button>
        <button id="clearButtonM" class="mb-btn" title="クリア">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
        </button>
        <button id="screenshotButtonM" class="mb-btn" title="保存">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
        <button id="fullscreenButtonM" class="mb-btn" title="全画面">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 00-2 2v3"/><path d="M21 8V5a2 2 0 00-2-2h-3"/><path d="M3 16v3a2 2 0 002 2h3"/><path d="M16 21h3a2 2 0 002-2v-3"/></svg>
        </button>

    </div>

    <script>
        let canvas, ctx;
        let isDrawing = false;
        let isPanning = false; 
        let isObjectMoving = false;
        let isResizing = false;
        let isRotating = false;
        let lastX = 0;
        let lastY = 0;
        let currentColor = '#000000'; 
        let history = [];
        let currentHistoryIndex = -1;
        const MAX_HISTORY = 50;
        const blackboardBackgroundColor = '#ffffff'; 
        let currentMode = 'draw'; 
        let selectedObject = null;
        let objects = [];
        let currentStroke = null;
        let editingTextObject = null;
        let scale = 1.0;
        let offsetX = 0;
        let offsetY = 0;
        const zoomFactor = 1.1;
        const maxScale = 4.0;
        const minScaleUnrestricted = 0.25; 
        let currentModeSetting = 'unrestricted';
        const FIXED_WIDTH = 1920; 
        const FIXED_HEIGHT = 1080; 
        const HIGHLIGHTER_DEFAULT_WIDTH = 20;
        const HIGHLIGHTER_OPACITY = 0.5;
        const DEFAULT_LINE_WIDTH = 5;
        const DEFAULT_ERASER_WIDTH = 10;
        const HANDLE_SIZE = 10;
        const ROTATE_HANDLE_OFFSET = 30;
        let activeHandle = null;

        const canvasContainer = document.getElementById('canvasContainer');
        const colorPicker = document.getElementById('colorPicker');
        const colorBlack = document.getElementById('colorBlack'); 
        const colorRed = document.getElementById('colorRed');
        const colorBlue = document.getElementById('colorBlue');
        const colorYellow = document.getElementById('colorYellow');
        const lineWidthRange = document.getElementById('lineWidthRange');
        const lineWidthInput = document.getElementById('lineWidthInput');
        const lineWidthLabel = document.getElementById('lineWidthLabel');
        const drawModeButton = document.getElementById('drawModeButton'); 
        const highlighterModeButton = document.getElementById('highlighterModeButton'); 
        const eraserModeButton = document.getElementById('eraserModeButton');
        const textToolButton = document.getElementById('textToolButton');
        const imageToolButton = document.getElementById('imageToolButton');
        const clearButton = document.getElementById('clearButton');
        const screenshotButton = document.getElementById('screenshotButton');
        const messageBox = document.getElementById('messageBox');
        const textInputOverlay = document.getElementById('textInputOverlay');
        const imageFileInput = document.getElementById('imageFileInput'); 
        const zoomInButton = document.getElementById('zoomInButton');
        const zoomOutButton = document.getElementById('zoomOutButton');
        const resetViewButton = document.getElementById('resetViewButton');
        const panModeButton = document.getElementById('panModeButton'); 
        const fixedModeToggle = document.getElementById('fixedModeToggle');
        const modeLabel = document.getElementById('modeLabel');
        const fullscreenButton = document.getElementById('fullscreenButton'); 

        window.onload = function() {
            canvas = document.getElementById('chalkboard');
            if (!canvas.getContext) {
                showMessage('お使いのブラウザはCanvasに対応していません。');
                return;
            }
            ctx = canvas.getContext('2d');

            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            setModeSetting(false);
            setupEventListeners();
            setDrawMode(); 
            colorBlack.classList.add('active');
            
            saveToHistory();
        };

        window.addEventListener('resize', resizeCanvas);
        document.addEventListener('fullscreenchange', resizeCanvas);

        function resizeCanvas() {
            const isFullscreen = document.fullscreenElement === canvasContainer;

            if (isFullscreen) {
                canvas.width = canvasContainer.clientWidth;
                canvas.height = canvasContainer.clientHeight;
            } else {
                const containerWidth = canvasContainer.clientWidth;
                const containerHeight = canvasContainer.clientHeight;
                
                if (currentModeSetting === 'fixed') {
                    canvas.width = FIXED_WIDTH;
                    canvas.height = FIXED_HEIGHT;
                    const displayHeight = containerWidth * (FIXED_HEIGHT / FIXED_WIDTH);
                    canvas.style.height = `${displayHeight}px`;
                    
                } else {
                    canvas.width = containerWidth;
                    canvas.height = containerHeight > 0 ? containerHeight : containerWidth * (9 / 16);
                    canvas.style.height = ``;
                }
            }
            redrawCanvas();
        }
        
        function setModeSetting(isFixed) {
            currentModeSetting = isFixed ? 'fixed' : 'unrestricted';
            
            if (isFixed) {
                modeLabel.textContent = '固定';
                showMessage(`固定モード (1920x1080)`, '#10b981'); 
            } else {
                modeLabel.textContent = '無制限';
                showMessage(`無制限モード`, '#3b82f6'); 
            }
            resetView(); 
            resizeCanvas();
        }

        function saveToHistory() {
            history = history.slice(0, currentHistoryIndex + 1);
            
            const currentState = JSON.parse(JSON.stringify(objects));
            history.push(currentState);
            
            if (history.length > MAX_HISTORY) {
                history.shift();
            }
            
            currentHistoryIndex = history.length - 1;
            
            updateUndoButtonState();
        }

        function undo() {
            if (currentHistoryIndex > 0) {
                currentHistoryIndex--;
                objects = JSON.parse(JSON.stringify(history[currentHistoryIndex]));
                redrawCanvas();
                showMessage('操作を元に戻しました');
            }
            updateUndoButtonState();
        }

        function updateUndoButtonState() {
            const undoButton = document.getElementById('undoButton');
            if (undoButton) {
                undoButton.disabled = currentHistoryIndex <= 0;
            }
        }

        function setupEventListeners() {
            fixedModeToggle.addEventListener('change', (e) => setModeSetting(e.target.checked));
            
            const undoButton = document.getElementById('undoButton');
            if (undoButton) {
                undoButton.addEventListener('click', undo);
            }

            colorYellow.addEventListener('click', () => selectColor('#facc15', colorYellow));
            
            canvas.addEventListener('mousedown', handleStart);
            canvas.addEventListener('mousemove', handleMove);
            canvas.addEventListener('mouseup', handleEnd);
            canvas.addEventListener('mouseleave', handleEnd);
            canvas.addEventListener('wheel', handleZoomWheel); 

            canvas.addEventListener('touchstart', handleStart);
            canvas.addEventListener('touchmove', handleMove);
            canvas.addEventListener('touchend', handleEnd);
            canvas.addEventListener('touchcancel', handleEnd);
            
            textInputOverlay.addEventListener('blur', stopEditingText);
            textInputOverlay.addEventListener('input', updateTextObject);
            textInputOverlay.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    stopEditingText();
                }
            });

            imageFileInput.addEventListener('change', handleImageFileSelect);

            document.getElementById('colorBlack').addEventListener('click', () => selectColor('#1a1a2e', colorBlack));
            colorRed.addEventListener('click', () => selectColor('#f75a68', colorRed));
            colorBlue.addEventListener('click', () => selectColor('#60a5fa', colorBlue));
            colorYellow.addEventListener('click', () => selectColor('#f7c948', colorYellow));
            colorPicker.addEventListener('input', (e) => selectColor(e.target.value, document.getElementById('colorPickerWrap')));

            const toggleTrack = document.getElementById('toggleTrack');
            if (toggleTrack) {
                toggleTrack.addEventListener('click', () => {
                    const newVal = !fixedModeToggle.checked;
                    fixedModeToggle.checked = newVal;
                    toggleTrack.classList.toggle('on', newVal);
                    setModeSetting(newVal);
                });
            }
            
            lineWidthRange.addEventListener('input', updateLineWidth);
            lineWidthInput.addEventListener('input', updateLineWidth);

            drawModeButton.addEventListener('click', setDrawMode);
            highlighterModeButton.addEventListener('click', setHighlighterMode); 
            eraserModeButton.addEventListener('click', setEraserMode);
            panModeButton.addEventListener('click', setPanMode);
            textToolButton.addEventListener('click', setTextMode);
            imageToolButton.addEventListener('click', setImageMode); 

            clearButton.addEventListener('click', clearCanvas);
            screenshotButton.addEventListener('click', takeScreenshot);
            
            fullscreenButton.addEventListener('click', toggleFullscreen);

            zoomInButton.addEventListener('click', () => zoom(zoomFactor));
            zoomOutButton.addEventListener('click', () => zoom(1 / zoomFactor));
            resetViewButton.addEventListener('click', resetView);

            document.addEventListener('keydown', handleKeyDown);

            const mobileColorMapping = [
                ['colorBlackM', '#1a1a2e'],
                ['colorRedM', '#f75a68'],
                ['colorBlueM', '#60a5fa'],
                ['colorYellowM', '#f7c948'],
            ];
            mobileColorMapping.forEach(([id, color]) => {
                const btn = document.getElementById(id);
                if (btn) btn.addEventListener('click', () => selectColor(color, btn));
            });
            const colorPickerM = document.getElementById('colorPickerM');
            if (colorPickerM) colorPickerM.addEventListener('input', (e) => selectColor(e.target.value, colorPickerM));

            const mModeMap = [
                ['drawModeButtonM', setDrawMode],
                ['highlighterModeButtonM', setHighlighterMode],
                ['eraserModeButtonM', setEraserMode],
                ['textToolButtonM', setTextMode],
                ['imageToolButtonM', setImageMode],
                ['panModeButtonM', setPanMode],
                ['zoomInButtonM', () => zoom(zoomFactor)],
                ['zoomOutButtonM', () => zoom(1 / zoomFactor)],
                ['resetViewButtonM', resetView],
                ['undoButtonM', undo],
                ['clearButtonM', clearCanvas],
                ['screenshotButtonM', takeScreenshot],
                ['fullscreenButtonM', toggleFullscreen],
            ];
            mModeMap.forEach(([id, fn]) => {
                const btn = document.getElementById(id);
                if (btn) btn.addEventListener('click', fn);
            });

            const lineWidthRangeM = document.getElementById('lineWidthRangeM');
            const lineWidthInputM = document.getElementById('lineWidthInputM');
            if (lineWidthRangeM) lineWidthRangeM.addEventListener('input', (e) => {
                lineWidthRange.value = e.target.value;
                lineWidthInput.value = e.target.value;
                updateLineWidth(e);
            });
            if (lineWidthInputM) lineWidthInputM.addEventListener('input', (e) => {
                lineWidthRange.value = e.target.value;
                lineWidthInput.value = e.target.value;
                updateLineWidth(e);
            });
            lineWidthRange.addEventListener('input', (e) => {
                if (lineWidthRangeM) lineWidthRangeM.value = e.target.value;
                if (lineWidthInputM) lineWidthInputM.value = e.target.value;
            });
        }
        
        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
                fullscreenButton.textContent = '全画面';
                showMessage('全画面表示を終了しました');
            } else {
                canvasContainer.requestFullscreen()
                    .then(() => {
                        showMessage('全画面表示を開始しました', '#3b82f6');
                    })
                    .catch(err => {
                        showMessage(`全画面表示エラー: ${err.message}`, '#dc2626');
                    });
            }
        }

        function drawStroke(stroke) {
            if (stroke.points.length < 1) return;

            ctx.beginPath();
            ctx.strokeStyle = stroke.color;
            ctx.lineWidth = stroke.width / scale;
            
            if (stroke.isHighlighter) {
                ctx.globalAlpha = HIGHLIGHTER_OPACITY; 
            } else {
                ctx.globalAlpha = 1.0; 
            }

            ctx.moveTo(stroke.points[0].x, stroke.points[0].y);

            for (let i = 1; i < stroke.points.length; i++) {
                ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
            }
            ctx.stroke();
            
            ctx.globalAlpha = 1.0; 
        }
        
        function drawText(textObject) {
            ctx.fillStyle = textObject.color;
            
            const lines = textObject.content.split('\n');
            let y = textObject.y;
            const baseFontSize = parseInt(textObject.font);
            const actualFontSize = baseFontSize / scale; 
            const lineHeight = actualFontSize * 1.2; 
            
            ctx.font = `${actualFontSize}px Inter`;

            lines.forEach(line => {
                ctx.fillText(line, textObject.x, y);
                y += lineHeight;
            });
            
            if (selectedObject === textObject && !editingTextObject) {
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 2 / scale;
                
                let textWidths = lines.map(line => ctx.measureText(line).width * scale);
                const maxWidth = Math.max(...textWidths) / scale;
                const totalHeight = lines.length * lineHeight;
                
                ctx.strokeRect(textObject.x - 2/scale, textObject.y - actualFontSize - 2/scale, maxWidth + 4/scale, totalHeight + 4/scale);
                
                textObject.width = maxWidth;
                textObject.height = totalHeight;
            }
        }

        function drawImage(imageObject) {
            const centerX = imageObject.x + imageObject.width / 2;
            const centerY = imageObject.y + imageObject.height / 2;

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(imageObject.rotation || 0);
            ctx.translate(-centerX, -centerY);

            if (imageObject.img && imageObject.img.complete) {
                ctx.drawImage(
                    imageObject.img, 
                    imageObject.x, 
                    imageObject.y, 
                    imageObject.width, 
                    imageObject.height
                );
            } else {
                ctx.fillStyle = '#f3f4f6'; 
                ctx.fillRect(imageObject.x, imageObject.y, imageObject.width, imageObject.height);
                
                ctx.strokeStyle = '#9ca3af'; 
                ctx.lineWidth = 2 / scale;
                ctx.strokeRect(imageObject.x, imageObject.y, imageObject.width, imageObject.height);

                ctx.fillStyle = '#6b7280'; 
                ctx.font = `${16 / scale}px Inter`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(
                    'ローカル画像', 
                    imageObject.x + imageObject.width / 2, 
                    imageObject.y + imageObject.height / 2
                );
                ctx.textAlign = 'left';
                ctx.textBaseline = 'alphabetic';
            }
            
            if (selectedObject === imageObject) {
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 2 / scale;
                ctx.strokeRect(imageObject.x, imageObject.y, imageObject.width, imageObject.height);
                
                drawImageHandles(imageObject);
            }
            ctx.restore();
        }

        function drawImageHandles(imageObject) {
            const handleSize = HANDLE_SIZE / scale; 
            
            ctx.fillStyle = '#3b82f6'; 
            ctx.strokeStyle = '#ffffff'; 
            ctx.lineWidth = 1 / scale;

            const corners = [
                {x: imageObject.x, y: imageObject.y},
                {x: imageObject.x + imageObject.width, y: imageObject.y},
                {x: imageObject.x + imageObject.width, y: imageObject.y + imageObject.height},
                {x: imageObject.x, y: imageObject.y + imageObject.height}
            ];

            const rotateHandleY = imageObject.y - ROTATE_HANDLE_OFFSET / scale;
            const rotateHandleX = imageObject.x + imageObject.width / 2;

            const centerX = imageObject.x + imageObject.width / 2;
            const centerY = imageObject.y + imageObject.height / 2;

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(imageObject.rotation);
            ctx.translate(-centerX, -centerY);

            corners.forEach(corner => {
                ctx.beginPath();
                ctx.arc(corner.x, corner.y, handleSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            });

            ctx.beginPath();
            ctx.arc(rotateHandleX, rotateHandleY, handleSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            const topCenterX = imageObject.x + imageObject.width / 2;
            const topCenterY = imageObject.y;
            
            ctx.moveTo(topCenterX, topCenterY);
            ctx.lineTo(rotateHandleX, rotateHandleY);
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 1 / scale;
            ctx.stroke();

            ctx.restore();
        }


        function redrawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);

            objects.forEach(obj => {
                if (obj.type === 'stroke') {
                    drawStroke(obj);
                } else if (obj.type === 'text') {
                    if (obj !== editingTextObject) {
                        drawText(obj);
                    }
                } else if (obj.type === 'image') {
                    drawImage(obj);
                }
            });

            if (isDrawing && currentStroke) {
                drawStroke(currentStroke);
            }

            ctx.restore(); 
        }

        function constrainView() {
            if (currentModeSetting !== 'fixed' ) {
                return;
            }

            if (scale <= 1.0) {
                 offsetX = 0;
                 offsetY = 0;
                 return;
            }

            const maxPanX = (canvas.width * (scale - 1)) / 2; 
            const maxPanY = (canvas.height * (scale - 1)) / 2;

            offsetX = Math.min(Math.max(offsetX, -maxPanX), maxPanX);
            offsetY = Math.min(Math.max(offsetY, -maxPanY), maxPanY);
        }

        function zoom(ratio) {
            stopEditingText();
            
            let minScale = minScaleUnrestricted;
            if (currentModeSetting === 'fixed') {
                minScale = 1.0; 
            }
            
            const newScale = Math.min(Math.max(scale * ratio, minScale), maxScale);
            if (newScale === scale) return; 

            const zoomCenterX = canvas.width / 2;
            const zoomCenterY = canvas.height / 2;

            const virtualCenterX = (zoomCenterX - offsetX) / scale;
            const virtualCenterY = (zoomCenterY - offsetY) / scale;

            offsetX = zoomCenterX - virtualCenterX * newScale;
            offsetY = zoomCenterY - virtualCenterY * newScale;
            scale = newScale;
            
            constrainView();

            redrawCanvas();
            showMessage(`ズーム: ${Math.round(scale * 100)}%`);
        }
        
        function handleZoomWheel(e) {
            e.preventDefault(); 
            stopEditingText();

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const canvasX = mouseX * (canvas.width / rect.width);
            const canvasY = mouseY * (canvas.height / rect.height);

            const virtualXBefore = (canvasX - offsetX) / scale;
            const virtualYBefore = (canvasY - offsetY) / scale;
            
            let minScale = minScaleUnrestricted;
            if (currentModeSetting === 'fixed') {
                minScale = 1.0; 
            }

            const ratio = e.deltaY < 0 ? zoomFactor : 1 / zoomFactor;
            const newScale = Math.min(Math.max(scale * ratio, minScale), maxScale);
            if (newScale === scale) return;

            scale = newScale;

            offsetX = canvasX - virtualXBefore * scale;
            offsetY = canvasY - virtualYBefore * scale;
            
            constrainView();

            redrawCanvas();
            showMessage(`ズーム: ${Math.round(scale * 100)}%`);
        }

        function resetView() {
            stopEditingText();
            scale = 1.0;
            offsetX = 0;
            offsetY = 0;
            redrawCanvas();
            showMessage('キャンバス位置をリセットしました');
        }
        
        function getVirtualCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const clientXRel = clientX - rect.left;
            const clientYRel = clientY - rect.top;

            const rawX = clientXRel * (canvas.width / rect.width);
            const rawY = clientYRel * (canvas.height / rect.height);
            
            return {
                x: (rawX - offsetX) / scale,
                y: (rawY - offsetY) / scale,
                rawX: rawX, 
                rawY: rawY
            };
        }

        function getObjectAt(virtualX, virtualY) {
            for (let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];
                if (obj.type === 'text' || obj.type === 'image') {
                    
                    if (obj.type === 'image' && obj.rotation) {
                        const centerX = obj.x + obj.width / 2;
                        const centerY = obj.y + obj.height / 2;
                        const rotatedVirtualX = centerX + (virtualX - centerX) * Math.cos(-obj.rotation) - (virtualY - centerY) * Math.sin(-obj.rotation);
                        const rotatedVirtualY = centerY + (virtualX - centerX) * Math.sin(-obj.rotation) + (virtualY - centerY) * Math.cos(-obj.rotation);
                        
                        if (rotatedVirtualX >= obj.x && rotatedVirtualX <= obj.x + obj.width &&
                            rotatedVirtualY >= obj.y && rotatedVirtualY <= obj.y + obj.height) {
                            return obj;
                        }
                    } else if (obj.type === 'text') {
                        const baseFontSize = parseInt(obj.font);
                        const lineHeight = baseFontSize * 1.2; 
                        const numLines = obj.content.split('\n').length;
                        
                        let yOffsetStart = obj.y - baseFontSize * 1.2; 
                        let height = numLines * lineHeight;

                        if (virtualX >= obj.x && virtualX <= obj.x + obj.width &&
                            virtualY >= yOffsetStart && virtualY <= yOffsetStart + height) {
                            return obj;
                        }
                    } else {
                         if (virtualX >= obj.x && virtualX <= obj.x + obj.width &&
                            virtualY >= obj.y && virtualY <= obj.y + obj.height) {
                            return obj;
                        }
                    }
                }
            }
            return null;
        }

        function getResizeHandleAt(virtualX, virtualY, imageObject) {
            if (!imageObject || imageObject.type !== 'image') return null;

            const handleSize = HANDLE_SIZE / scale; 
            const centerX = imageObject.x + imageObject.width / 2;
            const centerY = imageObject.y + imageObject.height / 2;

            const corners = [
                {x: imageObject.x, y: imageObject.y, name: 'topLeft'},
                {x: imageObject.x + imageObject.width, y: imageObject.y, name: 'topRight'},
                {x: imageObject.x + imageObject.width, y: imageObject.y + imageObject.height, name: 'bottomRight'},
                {x: imageObject.x, y: imageObject.y + imageObject.height, name: 'bottomLeft'}
            ];

            for (const corner of corners) {
                const rotatedX = centerX + (corner.x - centerX) * Math.cos(imageObject.rotation) - (corner.y - centerY) * Math.sin(imageObject.rotation);
                const rotatedY = centerY + (corner.x - centerX) * Math.sin(imageObject.rotation) + (corner.y - centerY) * Math.cos(imageObject.rotation);
                
                const distance = Math.sqrt(Math.pow(virtualX - rotatedX, 2) + Math.pow(virtualY - rotatedY, 2));
                if (distance <= handleSize) {
                    return corner.name;
                }
            }
            return null;
        }

        function getRotateHandleAt(virtualX, virtualY, imageObject) {
            if (!imageObject || imageObject.type !== 'image') return null;

            const handleSize = HANDLE_SIZE / scale;
            const rotateHandleY = imageObject.y - ROTATE_HANDLE_OFFSET / scale;
            const rotateHandleX = imageObject.x + imageObject.width / 2;
            
            const centerX = imageObject.x + imageObject.width / 2;
            const centerY = imageObject.y + imageObject.height / 2;
            
            const rotatedRotateHandleX = centerX + (rotateHandleX - centerX) * Math.cos(imageObject.rotation) - (rotateHandleY - centerY) * Math.sin(imageObject.rotation);
            const rotatedRotateHandleY = centerY + (rotateHandleX - centerX) * Math.sin(imageObject.rotation) + (rotateHandleY - centerY) * Math.cos(imageObject.rotation);

            const distance = Math.sqrt(Math.pow(virtualX - rotatedRotateHandleX, 2) + Math.pow(virtualY - rotatedRotateHandleY, 2));
            if (distance <= handleSize) {
                return 'rotate';
            }
            return null;
        }


        function handleStart(e) {
            e.preventDefault();
            const { x, y, rawX, rawY } = getVirtualCoordinates(e);
            
            if(editingTextObject) stopEditingText();

            if (currentMode === 'pan' && selectedObject && selectedObject.type === 'image') {
                activeHandle = getResizeHandleAt(x, y, selectedObject);
                if (activeHandle) {
                    isResizing = true;
                    isObjectMoving = false;
                    isPanning = false;
                    [lastX, lastY] = [x, y];
                    canvas.classList.remove('grabbing');
                    showMessage(`画像リサイズ (${activeHandle})`);
                    return;
                }
                
                activeHandle = getRotateHandleAt(x, y, selectedObject);
                if (activeHandle === 'rotate') {
                    isRotating = true;
                    isObjectMoving = false;
                    isPanning = false;
                    [lastX, lastY] = [x, y];
                    canvas.classList.remove('grabbing');
                    showMessage('画像回転');
                    return;
                }
            }

            selectedObject = getObjectAt(x, y); 
            
            updateLineWidthLabel();

            updateColorPickerUI();

            if (currentMode === 'pan' || (e.touches && e.touches.length === 2)) {
                
                if (selectedObject && (selectedObject.type === 'text' || selectedObject.type === 'image')) {
                    isObjectMoving = true;
                    isPanning = false; 
                    [lastX, lastY] = [x, y];
                    canvas.classList.remove('grabbing'); 
                    redrawCanvas(); 
                    
                    if (selectedObject.type === 'text') {
                        const currentFontSize = parseInt(selectedObject.font); 
                        const lineWidthUIValue = Math.min(Math.max(Math.round(currentFontSize / 3), 1), 50); 
                        lineWidthRange.value = lineWidthUIValue;
                        lineWidthInput.value = lineWidthUIValue;
                        showMessage(`フォントサイズ: ${currentFontSize}px (太さコントロールで変更可能)`);
                    }

                } else {
                    isPanning = true;
                    isObjectMoving = false;
                    selectedObject = null;
                    updateLineWidthLabel();
                    updateColorPickerUI();
                    [lastX, lastY] = [rawX, rawY]; 
                    canvas.classList.add('grabbing'); 
                    redrawCanvas();
                }
                return;
            }
            
            if (currentMode === 'text') {
                if (selectedObject && selectedObject.type === 'text') {
                    startEditingText(selectedObject);
                } else {
                    insertText(x, y);
                }
                selectedObject = null; 
                return;
            }
            
            if (currentMode === 'image') {
                selectedObject = null;
                return;
            }
            
            if (currentMode === 'draw' || currentMode === 'eraser' || currentMode === 'highlighter') {
                isDrawing = true;
                selectedObject = null;
                updateLineWidthLabel();
                updateColorPickerUI();
                
                let strokeColor = currentColor;
                let strokeWidth = parseInt(lineWidthRange.value);
                let isHighlighter = false;

                if (currentMode === 'eraser') {
                    strokeColor = blackboardBackgroundColor;
                } else if (currentMode === 'highlighter') {
                    isHighlighter = true;
                    strokeColor = hexToRgba(currentColor, HIGHLIGHTER_OPACITY); 
                    strokeWidth = HIGHLIGHTER_DEFAULT_WIDTH;
                }
                
                currentStroke = {
                    type: 'stroke',
                    points: [{ x, y }],
                    color: strokeColor,
                    width: strokeWidth,
                    isEraser: currentMode === 'eraser',
                    isHighlighter: isHighlighter 
                };
                
                [lastX, lastY] = [x, y];
                redrawCanvas(); 
            }
        }

        function handleMove(e) {
            e.preventDefault(); 
            const { x, y, rawX, rawY } = getVirtualCoordinates(e);

            if (isResizing && selectedObject && selectedObject.type === 'image') {
                resizeImage(x, y);
                [lastX, lastY] = [x, y];
                redrawCanvas();
                return;
            }
            
            if (isRotating && selectedObject && selectedObject.type === 'image') {
                rotateImage(x, y);
                [lastX, lastY] = [x, y];
                redrawCanvas();
                return;
            }


            if (isPanning) {
                const dx = rawX - lastX;
                const dy = rawY - lastY;
                offsetX += dx;
                offsetY += dy;
                [lastX, lastY] = [rawX, rawY];
                
                constrainView();
                
                redrawCanvas();
                return;
            }
            
            if (isObjectMoving && selectedObject) {
                const dx = x - lastX;
                const dy = y - lastY;
                
                selectedObject.x += dx;
                selectedObject.y += dy;
                
                [lastX, lastY] = [x, y];
                redrawCanvas();
                return;
            }
            
            if (!isDrawing) return;

            currentStroke.points.push({ x, y });
            redrawCanvas();

            [lastX, lastY] = [x, y];
        }

        function handleEnd(e) {
            if (isPanning) {
                isPanning = false;
                canvas.classList.remove('grabbing');
                return;
            }
            
            if (isObjectMoving) {
                isObjectMoving = false;
                redrawCanvas(); 
                return;
            }

            if (isResizing) {
                isResizing = false;
                activeHandle = null;
                redrawCanvas();
                return;
            }

            if (isRotating) {
                isRotating = false;
                activeHandle = null;
                redrawCanvas();
                return;
            }

            if (!isDrawing) return;
            isDrawing = false;
            
            if (currentStroke && currentStroke.points.length >= 1) { 
                objects.push(currentStroke);
                saveToHistory();
            }
            currentStroke = null;
            
            redrawCanvas();
        }

        function insertText(x, y) {
            const newText = {
                type: 'text',
                x: x,
                y: y,
                content: '新しいテキスト',
                font: `${parseInt(lineWidthRange.value) * 3}px Inter`, 
                color: currentColor,
                width: 150, 
                height: 40 
            };
            objects.push(newText);
            startEditingText(newText);
            redrawCanvas();
        }

        function startEditingText(textObject) {
            editingTextObject = textObject;
            selectedObject = null; 

            const rect = canvas.getBoundingClientRect();
            
            const screenX = textObject.x * scale + offsetX;
            const screenY = textObject.y * scale + offsetY;
            
            const baseFontSize = parseInt(textObject.font);
            const actualFontSize = baseFontSize * scale * (rect.width / canvas.width); 
            
            textInputOverlay.style.position = 'fixed';
            textInputOverlay.style.left = `${rect.left + screenX * (rect.width / canvas.width)}px`;
            textInputOverlay.style.top  = `${rect.top + (screenY - baseFontSize * 1.2 * scale) * (rect.height / canvas.height)}px`;
            
            textInputOverlay.style.color = textObject.color;
            textInputOverlay.style.fontSize = `${actualFontSize}px`;
            textInputOverlay.value = textObject.content;
            
            textInputOverlay.style.width = `${textObject.width * scale * (rect.width / canvas.width)}px`;
            textInputOverlay.style.height = `${textObject.height * scale * (rect.height / canvas.height)}px`;
            
            textInputOverlay.style.position = 'absolute';
            textInputOverlay.style.display = 'block';
            textInputOverlay.focus();
            
            redrawCanvas(); 
        }

        function updateTextObject() {
            if (editingTextObject) {
                editingTextObject.content = textInputOverlay.value;

                const rect = canvas.getBoundingClientRect();
                
                const virtualScaleFactor = (canvas.width / rect.width) * (1 / scale);
                
                editingTextObject.width = textInputOverlay.offsetWidth * virtualScaleFactor;
                editingTextObject.height = textInputOverlay.offsetHeight * virtualScaleFactor;

                redrawCanvas();
            }
        }

        function stopEditingText() {
            if (editingTextObject) {
                const completedObj = editingTextObject;
                editingTextObject.content = textInputOverlay.value.trim() || ' ';
                updateTextObject();
                textInputOverlay.style.display = 'none';
                editingTextObject = null;
                saveToHistory();
                redrawCanvas();
                setPanMode();
                selectedObject = completedObj;
            }
        }
        
        function handleImageFileSelect(e) {
            const file = e.target.files[0];
            
            if (!file) {
                setDrawMode(); 
                return;
            }
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const virtualX = (centerX - offsetX) / scale;
            const virtualY = (centerY - offsetY) / scale;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const aspectRatio = img.width / img.height;
                    const initialWidth = 150;
                    const initialHeight = initialWidth / aspectRatio;
                    
                    const newImage = {
                        type: 'image',
                        x: virtualX - initialWidth / 2, 
                        y: virtualY - initialHeight / 2, 
                        url: 'local_file', 
                        width: initialWidth,
                        height: initialHeight,
                        originalWidth: initialWidth,
                        originalHeight: initialHeight,
                        rotation: 0,
                        img: img
                    };
                    objects.push(newImage);
                    saveToHistory();
                    redrawCanvas();
                    showMessage('ローカル画像を挿入しました。移動やリサイズが可能です', '#059669'); 
                    
                    imageFileInput.value = null; 
                    setPanMode();
                    selectedObject = newImage;
                };
                img.onerror = () => {
                    showMessage('画像ファイルの読み込みに失敗しました', '#dc2626');
                    imageFileInput.value = null; 
                    setDrawMode();
                };
                img.src = e.target.result; 
            };
            reader.readAsDataURL(file);
        }
        
        function resizeImage(currentX, currentY) {
            if (!selectedObject || selectedObject.type !== 'image' || !activeHandle) return;

            const img = selectedObject;
            const originalX = img.x;
            const originalY = img.y;
            const originalWidth = img.width;
            const originalHeight = img.height;
            const aspectRatio = img.img.width / img.img.height;
            
            const centerX = img.x + img.width / 2;
            const centerY = img.y + img.height / 2;

            const rotatedMouseX = centerX + (currentX - centerX) * Math.cos(-img.rotation) - (currentY - centerY) * Math.sin(-img.rotation);
            const rotatedMouseY = centerY + (currentX - centerX) * Math.sin(-img.rotation) + (currentY - centerY) * Math.cos(-img.rotation);

            let newWidth, newHeight, newX, newY;

            switch (activeHandle) {
                case 'topLeft':
                    newWidth = originalWidth - (rotatedMouseX - originalX);
                    newHeight = newWidth / aspectRatio;
                    newX = originalX + (originalWidth - newWidth);
                    newY = originalY + (originalHeight - newHeight);
                    break;
                case 'topRight':
                    newWidth = rotatedMouseX - originalX;
                    newHeight = newWidth / aspectRatio;
                    newX = originalX;
                    newY = originalY + (originalHeight - newHeight);
                    break;
                case 'bottomRight':
                    newWidth = rotatedMouseX - originalX;
                    newHeight = newWidth / aspectRatio;
                    newX = originalX;
                    newY = originalY;
                    break;
                case 'bottomLeft':
                    newWidth = originalWidth - (rotatedMouseX - originalX);
                    newHeight = newWidth / aspectRatio;
                    newX = originalX + (originalWidth - newWidth);
                    newY = originalY;
                    break;
                default:
                    return;
            }

            const minSize = 20; 
            if (newWidth < minSize || newHeight < minSize) {
                return;
            }

            img.width = newWidth;
            img.height = newHeight;
            img.x = newX;
            img.y = newY;
        }

        function rotateImage(currentX, currentY) {
            if (!selectedObject || selectedObject.type !== 'image' || activeHandle !== 'rotate') return;

            const img = selectedObject;
            const centerX = img.x + img.width / 2;
            const centerY = img.y + img.height / 2;

            const dx = currentX - centerX;
            const dy = currentY - centerY;

            const newRotation = Math.atan2(dy, dx) + Math.PI / 2;

            img.rotation = newRotation;
        }
        
        function hexToRgba(hex, alpha) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            if (!result) return `rgba(0, 0, 0, ${alpha})`;
            
            const r = parseInt(result[1], 16);
            const g = parseInt(result[2], 16);
            const b = parseInt(result[3], 16);
            
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function updateColorPickerUI() {
            let activeColor = currentColor;

            if (selectedObject && selectedObject.type === 'text') {
                activeColor = selectedObject.color;
            }

            document.querySelectorAll('.color-dot, .mb-color-dot').forEach(btn => btn.classList.remove('active'));
            document.getElementById('colorPickerWrap')?.classList.remove('active');

            colorPicker.value = activeColor;
            const colorPickerM = document.getElementById('colorPickerM');
            if (colorPickerM) colorPickerM.value = activeColor;

            if (activeColor === '#1a1a2e' || activeColor === '#000000') {
                colorBlack.classList.add('active');
                document.getElementById('colorBlackM')?.classList.add('active');
            } else if (activeColor === '#f75a68' || activeColor === '#ef4444') {
                colorRed.classList.add('active');
                document.getElementById('colorRedM')?.classList.add('active');
            } else if (activeColor === '#60a5fa' || activeColor === '#3b82f6') {
                colorBlue.classList.add('active');
                document.getElementById('colorBlueM')?.classList.add('active');
            } else if (activeColor === '#f7c948' || activeColor === '#facc15') {
                colorYellow.classList.add('active');
                document.getElementById('colorYellowM')?.classList.add('active');
            } else {
                document.getElementById('colorPickerWrap')?.classList.add('active');
            }

            if (currentMode === 'highlighter') {
                highlighterModeButton.style.backgroundColor = '';
                drawModeButton.style.backgroundColor = '';
            } else if (currentMode === 'draw') {
                drawModeButton.style.backgroundColor = '';
                highlighterModeButton.style.backgroundColor = '';
            } else {
                drawModeButton.style.backgroundColor = '';
                highlighterModeButton.style.backgroundColor = '';
            }
        }

        function isColorLight(color) {
            const hex = color.replace('#', '');
            const r = parseInt(hex.substr(0, 2), 16);
            const g = parseInt(hex.substr(2, 2), 16);
            const b = parseInt(hex.substr(4, 2), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            return brightness > 155;
        }

        function selectColor(color, activeElement) {
            if (selectedObject && selectedObject.type === 'text') {
                selectedObject.color = color;
                redrawCanvas();
                showMessage('テキストの色を変更しました', color);
            } else {

        function takeScreenshot() {
            let originalScale, originalOffsetX, originalOffsetY, originalWidth, originalHeight;
            let finalCanvas = canvas;
            
            originalScale = scale;
            originalOffsetX = offsetX;
            originalOffsetY = offsetY;
            originalWidth = canvas.width;
            originalHeight = canvas.height;

            finalCanvas = document.createElement('canvas');
            finalCanvas.width = FIXED_WIDTH;
            finalCanvas.height = FIXED_HEIGHT;
            const tempCtx = finalCanvas.getContext('2d');
            
            let virtualViewX, virtualViewY, virtualViewWidth, virtualViewHeight;

            if (currentModeSetting === 'fixed') {
                virtualViewX = 0;
                virtualViewY = 0;
                virtualViewWidth = originalWidth;
                virtualViewHeight = originalHeight;
            } else {
                virtualViewX = -originalOffsetX / originalScale;
                virtualViewY = -originalOffsetY / originalScale;
                virtualViewWidth = originalWidth / originalScale;
                virtualViewHeight = originalHeight / originalScale;
            }

            const targetScaleX = finalCanvas.width / virtualViewWidth;
            const targetScaleY = finalCanvas.height / virtualViewHeight;
            const renderScale = Math.min(targetScaleX, targetScaleY); 

            tempCtx.save();
            
            tempCtx.scale(renderScale, renderScale);
            tempCtx.translate(-virtualViewX, -virtualViewY);
            
            tempCtx.lineCap = 'round';
            tempCtx.lineJoin = 'round';
            objects.forEach(obj => {
                if (obj.type === 'stroke') {
                    if (obj.isHighlighter) {
                        tempCtx.globalAlpha = HIGHLIGHTER_OPACITY; 
                    } else {
                        tempCtx.globalAlpha = 1.0; 
                    }

                    tempCtx.beginPath();
                    tempCtx.strokeStyle = obj.color;
                    tempCtx.lineWidth = obj.width; 
                    tempCtx.moveTo(obj.points[0].x, obj.points[0].y);

                    for (let i = 1; i < obj.points.length; i++) {
                        tempCtx.lineTo(obj.points[i].x, obj.points[i].y);
                    }
                    tempCtx.stroke();
                    tempCtx.globalAlpha = 1.0; 
                    
                } else if (obj.type === 'text') {
                    tempCtx.fillStyle = obj.color;
                    const baseFontSize = parseInt(obj.font);
                    tempCtx.font = `${baseFontSize}px Inter`; 

                    const lines = obj.content.split('\n');
                    let y = obj.y;
                    const lineHeight = baseFontSize * 1.2;

                    lines.forEach(line => {
                        tempCtx.fillText(line, obj.x, y);
                        y += lineHeight;
                    });

                } else if (obj.type === 'image') {
                    const centerX = obj.x + obj.width / 2;
                    const centerY = obj.y + obj.height / 2;

                    tempCtx.save();
                    tempCtx.translate(centerX, centerY);
                    tempCtx.rotate(obj.rotation || 0);
                    tempCtx.translate(-centerX, -centerY);

                    if (obj.img && obj.img.complete) {
                        tempCtx.drawImage(obj.img, obj.x, obj.y, obj.width, obj.height);
                    }
                    tempCtx.restore();
                }
            });
            
            tempCtx.restore();

            
            const dataURL = finalCanvas.toDataURL('image/png'); 
            
            const a = document.createElement('a');
            a.href = dataURL;
            a.download = `${currentModeSetting}_whiteboard_drawing_1920x1080.png`; 
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            scale = originalScale;
            offsetX = originalOffsetX;
            offsetY = originalOffsetY;
            redrawCanvas(); 

            showMessage('画像を保存しました', '#10b981');
        }

        function showMessage(text, color = '#f59e0b') { 
            messageBox.textContent = text;
            messageBox.style.backgroundColor = color;
            
            const r = parseInt(color.slice(1, 3), 16);
            const g = parseInt(color.slice(3, 5), 16);
            const b = parseInt(color.slice(5, 7), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            messageBox.style.color = brightness > 180 ? '#000000' : '#ffffff';

            messageBox.style.opacity = 1;
            
            setTimeout(() => {
                messageBox.style.opacity = 0;
            }, 2000);
        }
        
        function handleKeyDown(event) {
            if (textInputOverlay.style.display !== 'block') {
                
                if (event.key === 'Backspace' || event.key === 'Delete') {
                    
                    if (selectedObject) {
                        event.preventDefault(); 
                        
                        deleteSelectedObject();
                        showMessage('オブジェクトを削除しました', '#ef4444');
                    } else if (currentMode === 'draw' || currentMode === 'highlighter' || currentMode === 'eraser') {
                    }
                }
            }
        }

        function deleteSelectedObject() {
            if (selectedObject) {
                const index = objects.indexOf(selectedObject);

                if (index > -1) {
                    objects.splice(index, 1);
                }
                selectedObject = null;
                redrawCanvas();
            }
        }
    </script>
