<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wood CAD</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #000000;
  --surface: #0d0d0d;
  --surface2: #181818;
  --surface3: #222222;
  --border: rgba(255,255,255,0.1);
  --border-strong: rgba(255,255,255,0.2);
  --text: #e8e8e8;
  --text-muted: #666;
  --accent: #e8a84c;
  --accent-dim: rgba(232,168,76,0.12);
  --danger: #e85c4c;
}
body {
  font-family:'Helvetica Neue',Arial,'Hiragino Sans',sans-serif;
  background:var(--bg); color:var(--text);
  height:100vh; display:flex; flex-direction:column; overflow:hidden;
}
#toolbar {
  height:46px; background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 14px; gap:6px; flex-shrink:0;
  overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch; scrollbar-width:thin;
}
#toolbar::-webkit-scrollbar { height:5px; }
#toolbar::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:3px; }
.logo { font-size:14px; font-weight:700; color:var(--accent); letter-spacing:.04em; margin-right:10px; flex-shrink:0; }
.sep { width:1px; height:22px; background:var(--border); margin:0 4px; flex-shrink:0; }
.spacer { width:14px; flex-shrink:0; }
.tb-btn {
  height:30px; padding:0 11px;
  background:transparent; border:1px solid transparent; border-radius:5px;
  color:var(--text-muted); font-size:12px; cursor:pointer;
  display:flex; align-items:center; gap:5px; white-space:nowrap; flex-shrink:0;
  transition:all .15s;
}
.tb-btn:hover { border-color:var(--border); color:var(--text); background:rgba(255,255,255,.04); }
.tb-btn.active { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
.tb-btn:disabled { opacity:.3; cursor:not-allowed; pointer-events:none; }
.tb-btn svg { width:14px; height:14px; flex-shrink:0; }
@media (max-width: 900px) {
  #toolbar { padding:0 8px; gap:2px; }
  .tb-btn { padding:0 8px; }
  .tb-label { display:none; }
  .spacer { width:6px; }
}
#main { flex:1; display:flex; overflow:hidden; }
#side {
  width:210px; background:var(--surface);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column; flex-shrink:0; overflow:hidden;
}
.panel-hd {
  padding:10px 13px 8px; font-size:10px; font-weight:600;
  letter-spacing:.1em; text-transform:uppercase;
  color:var(--text-muted); border-bottom:1px solid var(--border);
}
#mat-list {
  flex:1; overflow-y:auto; padding:7px;
  display:flex; flex-direction:column; gap:5px;
}
#mat-list::-webkit-scrollbar { width:3px; }
#mat-list::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:2px; }
.mat-item {
  border:1px solid var(--border); border-radius:7px; padding:8px 9px;
  cursor:pointer; transition:all .15s; background:var(--surface2);
}
.mat-item:hover { border-color:var(--border-strong); }
.mat-item.sel { border-color:var(--accent); background:var(--accent-dim); }
.mat-name { font-size:11px; font-weight:600; color:var(--text); margin-bottom:3px; display:flex; justify-content:space-between; align-items:center; }
.mat-dim { font-size:10px; color:var(--text-muted); font-family:monospace; }
.mat-badge { font-size:9px; background:var(--accent-dim); border:1px solid rgba(232,168,76,.4); color:var(--accent); border-radius:3px; padding:1px 5px; }
.color-dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; flex-shrink:0; border:1px solid rgba(255,255,255,.2); }
.stock-badge { font-size:9px; background:rgba(76,175,80,.12); border:1px solid rgba(76,175,80,.4); color:#8fce8f; border-radius:3px; padding:1px 5px; margin-left:3px; }
.mat-item.stock { border-color:rgba(76,175,80,.25); }
.mat-item.stock.sel { border-color:#4caf50; background:rgba(76,175,80,.1); }
.mat-preview-wrap { margin-top:6px; background:var(--surface3); border-radius:3px; overflow:hidden; }
.mat-preview-wrap canvas { display:block; }
.add-btn {
  margin:7px; height:34px; background:var(--accent-dim);
  border:1px dashed rgba(232,168,76,.4); border-radius:7px;
  color:var(--accent); font-size:12px; cursor:pointer;
  transition:all .15s; flex-shrink:0;
}
.add-btn:hover { background:rgba(232,168,76,.22); border-color:var(--accent); }
#canvas-wrap { flex:1; position:relative; overflow:hidden; background:#000; }
canvas#scene { position:absolute; inset:0; display:block; touch-action:none; }
.hint {
  position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,.7); border:1px solid var(--border);
  border-radius:6px; padding:5px 13px; font-size:10px; color:var(--text-muted);
  pointer-events:none; white-space:nowrap;
}
.measure-readout {
  position:absolute; top:14px; left:50%; transform:translateX(-50%);
  background:rgba(255,80,80,.15); border:1px solid #ff5050;
  border-radius:7px; padding:7px 16px; font-size:13px; font-weight:700;
  color:#ff8a8a; pointer-events:none; white-space:nowrap; letter-spacing:.02em;
  font-family:monospace;
}
#inspector {
  width:215px; background:var(--surface);
  border-left:1px solid var(--border);
  display:flex; flex-direction:column; flex-shrink:0;
}
#insp-body { flex:1; padding:11px; overflow-y:auto; }
#insp-body::-webkit-scrollbar { width:3px; }
#insp-body::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:2px; }
.insp-empty { color:var(--text-muted); font-size:12px; text-align:center; margin-top:40px; line-height:1.8; }
.insp-sec { margin-bottom:13px; }
.insp-lbl { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:6px; }
.insp-axis-badge {
  position:absolute; top:7px; left:8px; display:none;
  font-size:11px; font-weight:700; padding:2px 8px; border-radius:4px;
  background:rgba(0,0,0,.6); backdrop-filter:blur(2px); pointer-events:none;
  letter-spacing:.03em; border:1px solid transparent; transition:opacity .1s;
}
.insp-row { display:flex; align-items:center; gap:5px; margin-bottom:4px; }
.insp-row label { font-size:11px; color:var(--text-muted); width:32px; flex-shrink:0; }
.insp-row input {
  flex:1; height:26px; background:var(--surface3);
  border:1px solid var(--border); border-radius:4px;
  color:var(--text); font-size:12px; padding:0 7px;
  font-family:monospace; outline:none;
  transition:border-color .15s;
}
.insp-row input:focus { border-color:var(--accent); }
.insp-row input[readonly] { color:var(--text-muted); background:var(--surface2,var(--surface3)); cursor:not-allowed; }
.insp-row .unit { font-size:10px; color:var(--text-muted); flex-shrink:0; width:16px; }
.len-slider {
  width:100%; margin:2px 0 10px; height:16px;
  -webkit-appearance:none; appearance:none; background:transparent; cursor:pointer;
}
.len-slider::-webkit-slider-runnable-track { height:4px; border-radius:2px; background:var(--border-strong); }
.len-slider::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none; width:14px; height:14px; border-radius:50%;
  background:var(--accent); border:2px solid var(--surface); margin-top:-5px;
  box-shadow:0 1px 3px rgba(0,0,0,.4);
}
.len-slider::-moz-range-track { height:4px; border-radius:2px; background:var(--border-strong); }
.len-slider::-moz-range-thumb {
  width:14px; height:14px; border-radius:50%; background:var(--accent);
  border:2px solid var(--surface); box-shadow:0 1px 3px rgba(0,0,0,.4);
}
.apply-btn {
  width:100%; height:30px; background:var(--accent); border:none;
  border-radius:5px; color:#000; font-size:12px; font-weight:700;
  cursor:pointer; margin-top:3px; transition:opacity .15s;
}
.apply-btn:hover { opacity:.85; }

.rot-grid { display:grid; grid-template-columns:28px 1fr 36px 1fr; gap:4px 5px; align-items:center; }
.rot-axis-lbl { font-size:10px; color:var(--text-muted); text-align:right; }
.rot-btn { height:24px; background:var(--surface3); border:1px solid var(--border); border-radius:4px; color:var(--text); font-size:11px; cursor:pointer; transition:all .15s; }
.rot-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
.rot-val { font-size:12px; font-family:monospace; color:var(--accent); text-align:center; font-weight:600; }
.corner-picker {
  display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;
  width:64px; height:44px; margin:2px 0 10px; position:relative;
  border:1.5px solid var(--border-strong); border-radius:4px; background:var(--surface3);
}
.corner-btn {
  border:none; background:transparent; padding:0; cursor:pointer; position:relative;
}
.corner-btn::before {
  content:''; position:absolute; width:12px; height:12px; opacity:.35;
  border:1.5px solid var(--text-muted); background:transparent;
}
.corner-btn[data-corner="3"]::before { top:-1.5px; left:-1.5px; border-right:none; border-bottom:none; }
.corner-btn[data-corner="1"]::before { top:-1.5px; right:-1.5px; border-left:none; border-bottom:none; }
.corner-btn[data-corner="2"]::before { bottom:-1.5px; left:-1.5px; border-right:none; border-top:none; }
.corner-btn[data-corner="0"]::before { bottom:-1.5px; right:-1.5px; border-left:none; border-top:none; }
.corner-btn:hover::before { opacity:.7; border-color:var(--accent); }
.corner-btn.active::before { opacity:1; border-color:var(--accent); background:var(--accent-dim); }
.corner-btn.has-cut::before { border-style:solid; background:var(--accent); opacity:.85; }
.corner-btn.has-cut.active::before { background:var(--accent); opacity:1; box-shadow:0 0 0 1.5px var(--accent); }
.hide-btn {
  width:100%; height:30px; background:transparent;
  border:1px solid var(--border-strong); border-radius:5px;
  color:var(--text-muted); font-size:12px; cursor:pointer; margin-top:5px; transition:all .15s;
}
.hide-btn:hover { border-color:var(--text-muted); color:var(--text); }
.del-btn {
  width:100%; height:30px; background:transparent;
  border:1px solid rgba(232,92,76,.35); border-radius:5px;
  color:var(--danger); font-size:12px; cursor:pointer; margin-top:5px; transition:all .15s;
}
.del-btn:hover { background:rgba(232,92,76,.1); border-color:var(--danger); }
#statusbar {
  height:23px; background:var(--surface);
  border-top:1px solid var(--border);
  display:flex; align-items:center; padding:0 13px; gap:14px; flex-shrink:0;
}
#statusbar span { font-size:11px; color:var(--text-muted); font-family:monospace; }
#statusbar strong { color:var(--text); font-weight:500; }
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.75);
  display:none; align-items:center; justify-content:center; z-index:100;
}
.overlay.show { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border-strong);
  border-radius:11px; width:310px; padding:19px;
  box-shadow:0 4px 32px rgba(0,0,0,.8);
}
.modal h3 { font-size:14px; margin-bottom:13px; }
.field { margin-bottom:9px; }
.field label { display:block; font-size:11px; color:var(--text-muted); margin-bottom:3px; }
.field input {
  width:100%; height:31px; background:var(--surface3);
  border:1px solid var(--border); border-radius:5px;
  color:var(--text); font-size:13px; padding:0 9px; outline:none;
}
.field input:focus { border-color:var(--accent); }
.mactions { display:flex; gap:7px; margin-top:14px; }
.mactions button { flex:1; height:32px; border-radius:5px; font-size:12px; font-weight:600; cursor:pointer; }
.mactions .ok { background:var(--accent); border:none; color:#000; }
.mactions .ok:hover { opacity:.85; }
.mactions .cancel { background:transparent; border:1px solid var(--border-strong); color:var(--text-muted); }
.export-box {
  background:var(--surface); border:1px solid var(--border-strong);
  border-radius:11px; width:470px; padding:19px;
  box-shadow:0 4px 32px rgba(0,0,0,.8);
}
.export-box h3 { font-size:14px; margin-bottom:13px; }
.etable { width:100%; border-collapse:collapse; font-size:12px; }
.etable th { text-align:left; padding:5px 8px; border-bottom:1px solid var(--border); color:var(--text-muted); font-size:10px; text-transform:uppercase; letter-spacing:.06em; }
.etable td { padding:6px 8px; border-bottom:1px solid var(--border); color:var(--text); font-family:monospace; }
.close-btn {
  margin-top:13px; width:100%; height:30px; background:transparent;
  border:1px solid var(--border-strong); border-radius:5px;
  color:var(--text-muted); font-size:12px; cursor:pointer;
}
.cutdiag-box {
  background:var(--surface); border:1px solid var(--border-strong);
  border-radius:11px; width:640px; max-width:92vw; max-height:82vh;
  padding:19px; box-shadow:0 4px 32px rgba(0,0,0,.8);
  display:flex; flex-direction:column;
}
.cutdiag-box h3 { font-size:14px; margin-bottom:4px; flex-shrink:0; }
.cutdiag-legend { font-size:10px; color:var(--text-muted); margin-bottom:13px; display:flex; gap:14px; flex-shrink:0; }
.cutdiag-legend span { display:inline-flex; align-items:center; gap:5px; }
.cutdiag-swatch { width:11px; height:11px; border-radius:2px; display:inline-block; border:1px solid rgba(255,255,255,.15); }
#cutdiag-body { overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:17px; padding-right:4px; }
#cutdiag-body::-webkit-scrollbar { width:5px; }
#cutdiag-body::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:3px; }
.cutdiag-title { font-size:11px; color:var(--text-muted); margin-bottom:6px; font-family:monospace; display:flex; justify-content:space-between; gap:8px; }
.cutdiag-bar { display:flex; height:40px; border-radius:5px; overflow:hidden; border:1px solid var(--border-strong); background:var(--surface3); }
.cutdiag-seg {
  position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-width:3px; color:#1a1005; font-size:10px; font-weight:700; overflow:hidden;
  border-right:1px solid rgba(0,0,0,.3); text-shadow:0 1px 1px rgba(255,255,255,.15);
}
.cutdiag-seg:last-child { border-right:none; }
.cutdiag-seg.stock { color:#f0e8da; text-shadow:0 1px 2px rgba(0,0,0,.7); }
.cutdiag-seg-name { white-space:nowrap; text-overflow:ellipsis; overflow:hidden; max-width:100%; padding:0 5px; }
.cutdiag-seg-len { font-family:monospace; font-size:9px; opacity:.85; }
.cutdiag-kerf { width:5px; flex-shrink:0; background:repeating-linear-gradient(45deg,#000 0,#000 2px,#1a1a1a 2px,#1a1a1a 4px); }
.close-btn:hover { border-color:var(--text-muted); }
</style>
</head>
<body>

<div id="toolbar">
  <span class="logo">Wood CAD</span>
  <div class="sep"></div>
  <button class="tb-btn" onclick="openAddModal()" title="材料を追加">
	<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="12" height="8" rx="1.5"/><line x1="4" y1="7" x2="10" y2="7"/><line x1="7" y1="4" x2="7" y2="10"/></svg>
	<span class="tb-label">材料を追加</span>
  </button>
  <button class="tb-btn" id="btn-move" onclick="setMode('move')" title="移動">
	<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 1v12M1 7h12"/><path d="M4.5 3.5L1 7l3.5 3.5M9.5 3.5L13 7l-3.5 3.5"/></svg>
	<span class="tb-label">移動</span>
  </button>
  <button class="tb-btn" id="btn-rotate" onclick="setMode('rotate')" title="回転">
	<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 7A5 5 0 1 1 7 2"/><path d="M10 1l2 1.5-1.5 2"/></svg>
	<span class="tb-label">回転</span>
  </button>
  <div class="sep"></div>
  <button class="tb-btn" id="btn-undo" onclick="undo()" disabled title="元に戻す">
	<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 7A5 5 0 1 0 3.4 3.4"/><path d="M2 3v4h4"/></svg>
	<span class="tb-label">元に戻す</span>
  </button>
  <button class="tb-btn" id="btn-redo" onclick="redo()" disabled title="やり直す">
	<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 7A5 5 0 1 1 10.6 3.4"/><path d="M12 3v4h-4"/></svg>
	<span class="tb-label">やり直す</span>
  </button>
  <div class="sep"></div>
  <button class="tb-btn" onclick="resetCamera()" title="視点リセット">
	<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><circle cx="7" cy="7" r="2"/></svg>
	<span class="tb-label">視点リセット</span>
  </button>
  <div class="spacer"></div>
  <button class="tb-btn" onclick="saveProject()" title="保存">
	<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2h8l2 2v8H2z"/><path d="M4 2v3h6V2M4 8h6v4H4z"/></svg>
	<span class="tb-label">保存</span>
  </button>
  <button class="tb-btn" onclick="document.getElementById('load-file').click()" title="開く">
	<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6V3a1 1 0 0 1 1-1h3l1 1.5h4a1 1 0 0 1 1 1V6"/><path d="M2 6h10v5a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6z"/></svg>
	<span class="tb-label">開く</span>
  </button>
  <input type="file" id="load-file" accept=".json,.woodcad" style="display:none" onchange="loadProject(event)">
  <div class="sep"></div>
  <button class="tb-btn" onclick="showExport()" title="部材リスト">
	<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 2v7M4.5 6.5L7 9l2.5-2.5"/><path d="M2 12h10"/></svg>
	<span class="tb-label">部材リスト</span>
  </button>
  <button class="tb-btn" onclick="showCutDiagram()" title="材料取り図">
	<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="12" height="6" rx="0.5"/><line x1="5" y1="4" x2="5" y2="10"/><line x1="9.5" y1="4" x2="9.5" y2="10"/></svg>
	<span class="tb-label">材料取り図</span>
  </button>
  <button class="tb-btn" id="btn-measure" onclick="toggleMeasureMode()" title="計測">
	<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="5" width="12" height="4" rx="0.5"/><line x1="3.5" y1="5" x2="3.5" y2="7"/><line x1="6" y1="5" x2="6" y2="7.5"/><line x1="8.5" y1="5" x2="8.5" y2="7"/><line x1="11" y1="5" x2="11" y2="7.5"/></svg>
	<span class="tb-label">計測</span>
  </button>
</div>

<div id="main">
  <div id="side">
	<div class="panel-hd">部材パネル</div>
	<div id="mat-list"></div>
	<button class="add-btn" onclick="openAddModal()">＋ 新しい部材を追加</button>
  </div>
  <div id="canvas-wrap">
	<canvas id="scene"></canvas>
	<div id="measure-readout" class="measure-readout" style="display:none;"></div>
	<div class="hint">左ドラッグ: 視点回転 ／ スクロール: ズーム ／ m: 移動 ／ r: 回転 ／ s: 選択</div>
  </div>
  <div id="inspector">
	<div class="panel-hd">プロパティ</div>
	<div id="insp-body"><p class="insp-empty">部材を選択すると<br>詳細を編集できます</p></div>
  </div>
</div>

<div id="statusbar">
  <span>部材数: <strong id="st-count">0</strong></span>
  <span>選択中: <strong id="st-sel">なし</strong></span>
  <span>モード: <strong id="st-mode">選択</strong></span>
</div>

<div id="ov-add" class="overlay">
  <div class="modal">
	<h3>新しい部材を追加</h3>
	<div class="field"><label>名前</label><input type="text" id="m-name" placeholder="例: 棚板"></div>
	<div class="field"><label>長さ（mm）</label><input type="number" id="m-len" value="600" min="10" max="3000"></div>
	<div class="field"><label>奥行き（mm）</label><input type="number" id="m-wid" value="150" min="10" max="1000"></div>
	<div class="field"><label>厚み（mm）</label><input type="number" id="m-dep" value="12" min="3" max="100"></div>
	<div class="mactions">
	  <button class="cancel" onclick="closeOv('ov-add')">キャンセル</button>
	  <button class="ok" onclick="submitAdd()">追加する</button>
	</div>
  </div>
</div>

<div id="ov-export" class="overlay">
  <div class="export-box">
	<h3>部材リスト</h3>
	<table class="etable">

</div>

<div id="ov-cutdiagram" class="overlay">
  <div class="cutdiag-box">
	<h3>材料取り図</h3>
	<div class="cutdiag-legend">
	  <span><span class="cutdiag-swatch" style="background:#b07038"></span>使用する部材</span>
	  <span><span class="cutdiag-swatch" style="background:repeating-linear-gradient(45deg,rgba(0,0,0,.4) 0 3px,#c8864a 3px 6px)"></span>残材（未使用）</span>
	  <span><span class="cutdiag-swatch" style="background:repeating-linear-gradient(45deg,#000 0,#000 2px,#1a1a1a 2px,#1a1a1a 4px)"></span>切り代（5mm）</span>
	</div>
	<div id="cutdiag-body"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const SCALE = 0.004;

// Both rotation gizmos (the main 3D view's rings and the inspector preview's
// rings) are drawn as FIXED axes — the red ring always represents the
// original world X direction, the green ring always the original world Y,
// the blue ring always the original world Z, regardless of how the piece
// has already been rotated. So a drag on a given ring must apply its delta
// rotation around that FIXED world axis, composed on top of whatever
// rotation the piece already has — not treated as one more term in a
// sequential (intrinsic) X-then-Y-then-Z Euler chain. The latter would make
// the piece's *local* Y axis drift away from the fixed vertical green ring
// after the local frame had already been tilted by an X rotation, so
// dragging "Y" would visibly spin the piece around what looks like a
// completely different (e.g. Z-like) direction instead of around the ring
// being dragged.
function axisVector(axis) {
  return axis==='x' ? new THREE.Vector3(1,0,0) : axis==='y' ? new THREE.Vector3(0,1,0) : new THREE.Vector3(0,0,1);
}
function eulerToQuat(rx, ry, rz) {
  return new THREE.Quaternion().setFromEuler(new THREE.Euler(rx||0, ry||0, rz||0, 'XYZ'));
}
function quatToEuler(q) {
  return new THREE.Euler().setFromQuaternion(q, 'XYZ');
}
// Rotates by `angle` around the fixed world `axis`, applied on top of the
// existing (origRx, origRy, origRz) orientation, and returns the resulting
// orientation re-expressed as XYZ Euler angles (still stored that way for
// compatibility with the rest of the app — undo/redo, save/load, etc).
function composeWorldRotation(origRx, origRy, origRz, axis, angle) {
  const origQuat = eulerToQuat(origRx, origRy, origRz);
  const deltaQuat = new THREE.Quaternion().setFromAxisAngle(axisVector(axis), angle);
  const newQuat = deltaQuat.multiply(origQuat);
  const e = quatToEuler(newQuat);
  // Every rotation step in this app is a 90° increment, so the result should
  // always land exactly on a multiple of 90° — clean up the tiny
  // floating-point drift that repeated quaternion round-trips can introduce,
  // so it doesn't gradually accumulate across many rotations.
  const STEP = Math.PI/2;
  return {
	x: Math.round(e.x/STEP)*STEP,
	y: Math.round(e.y/STEP)*STEP,
	z: Math.round(e.z/STEP)*STEP,
  };
}
let scene, camera, renderer, raycaster, mouse;
let pieces = [], sel = null, mode = 'select';
let hist = [], fut = [], mc = 0;
let drag = false, orbit = false, dragMoved = false;
let lenCommitTimer = null, pendingLenCommit = null;

function flushPendingLenCommit() {
  if (pendingLenCommit) {
	clearTimeout(lenCommitTimer);
	const fn = pendingLenCommit;
	pendingLenCommit = null;
	fn();
  }
}
let measureMode = false, measurePoints = [], measureGroup = null, measureDownPos = null;
let gizmoGrp = null;
let gizmoDrag = null;
let gizmoHover = null;
let dragOff = {x:0,z:0}, orbitSt = {x:0,y:0};
let snapGuides = [];
let camTh = 0.5, camPh = 1.05, camD = 7.5;
let camTgt = new THREE.Vector3(0,0,0);
let rotSt = 0;

function init() {
  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  camera = new THREE.PerspectiveCamera(45, W/H, 0.01, 200);
  refreshCam();

  renderer = new THREE.WebGLRenderer({canvas: document.getElementById('scene'), antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.shadowMap.enabled = true;

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
  sun.position.set(6,12,8); sun.castShadow = true; scene.add(sun);
  const fill = new THREE.DirectionalLight(0xd0e8ff, 0.4);
  fill.position.set(-5, 4, -6);
  scene.add(fill);

  scene.add(new THREE.GridHelper(16, 32, 0x333333, 0x222222));

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  const cv = renderer.domElement;
  cv.addEventListener('mousedown', onDown);
  cv.addEventListener('mousemove', onMove);
  cv.addEventListener('mouseup', onUp);
  cv.addEventListener('wheel', onWheel, {passive:false});
  cv.addEventListener('contextmenu', e=>e.preventDefault());
  cv.addEventListener('touchstart', onTouchStart, {passive:false});
  cv.addEventListener('touchmove', onTouchMove, {passive:false});
  cv.addEventListener('touchend', onTouchEnd, {passive:false});
  cv.addEventListener('touchcancel', onTouchEnd, {passive:false});
  window.addEventListener('resize', onResize);

  (function loop(){ requestAnimationFrame(loop); renderer.render(scene,camera); })();

  addPiece('板①', 600, 150, 12, 0, 1.25);
  addPiece('板②', 600, 150, 12,  0.9, 0.2);
  addPiece('板③', 600, 60, 12, -0.5, -0.8);
  snapshot();
}

function refreshCam() {
  camera.position.set(
	camTgt.x + camD*Math.sin(camPh)*Math.sin(camTh),
	camTgt.y + camD*Math.cos(camPh),
	camTgt.z + camD*Math.sin(camPh)*Math.cos(camTh)
  );
  camera.lookAt(camTgt);
}

function onResize() {
  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  camera.aspect = W/H; camera.updateProjectionMatrix();
  renderer.setSize(W, H);
}

function toNDC(e) {
  const r = renderer.domElement.getBoundingClientRect();
  return { x:((e.clientX-r.left)/r.width)*2-1, y:-((e.clientY-r.top)/r.height)*2+1 };
}

function hitPiece(e) {
  const n = toNDC(e); mouse.set(n.x, n.y);
  raycaster.setFromCamera(mouse, camera);
  const meshes = pieces.map(p => p.grp.children[0]);
  const hits = raycaster.intersectObjects(meshes, false);
  if (!hits.length) return null;
  const best = hits[0];
  const p = pieces.find(p => p.grp.children[0] === best.object);
  return p ? {piece: p, point: best.point} : null;
}

function toggleMeasureMode() {
  measureMode = !measureMode;
  document.getElementById('btn-measure').classList.toggle('active', measureMode);
  renderer.domElement.style.cursor = measureMode ? 'crosshair' : 'default';
  if (!measureMode) clearMeasure();
  deselect();
}

function clearMeasure() {
  measurePoints = [];
  if (measureGroup) {
	measureGroup.children.slice().forEach(c => {
	  measureGroup.remove(c);
	  c.geometry.dispose();
	  c.material.dispose();
	});
	scene.remove(measureGroup);
	measureGroup = null;
  }
  hideMeasureReadout();
}

function nearestCorner(piece, worldPoint) {
  // The 8 corners of the piece's box, in its own local (unrotated) space,
  // then transformed by its actual current position+rotation so this works
  // correctly for rotated/standing boards too.
  const hx = (piece.len * SCALE) / 2, hy = (piece.dep * SCALE) / 2, hz = (piece.wid * SCALE) / 2;
  piece.grp.updateMatrixWorld(true);
  let best = null, bestDist = Infinity;
  for (const sx of [-1, 1]) for (const sy of [-1, 1]) for (const sz of [-1, 1]) {
	const world = new THREE.Vector3(sx*hx, sy*hy, sz*hz).applyMatrix4(piece.grp.matrixWorld);
	const d = world.distanceTo(worldPoint);
	if (d < bestDist) { bestDist = d; best = world; }
  }
  return best;
}

function measurePickPoint(e) {
  const hit = hitPiece(e);
  // Snap to whichever corner of the clicked board is nearest the click —
  // measuring board-to-board distances almost always means "from this
  // edge/corner to that one", not an arbitrary point on the face.
  if (hit) return nearestCorner(hit.piece, hit.point);
  const n = toNDC(e); mouse.set(n.x, n.y);
  raycaster.setFromCamera(mouse, camera);
  const plane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
  const pt = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, pt);
  return pt;
}

function addMeasurePoint(e) {
  const pt = measurePickPoint(e);
  if (!pt) return;

  if (measurePoints.length >= 2) clearMeasure(); // start a fresh measurement
  measurePoints.push(pt);
  if (!measureGroup) { measureGroup = new THREE.Group(); scene.add(measureGroup); }

  const dot = new THREE.Mesh(
	new THREE.SphereGeometry(0.02, 8, 8),
	new THREE.MeshBasicMaterial({ color: 0xff5050, depthTest: false })
  );
  dot.position.copy(pt);
  dot.renderOrder = 999;
  measureGroup.add(dot);

  if (measurePoints.length === 2) {
	const [p0, p1] = measurePoints;
	const geo = new THREE.BufferGeometry().setFromPoints([p0, p1]);
	const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0xff5050, depthTest: false }));
	line.renderOrder = 999;
	measureGroup.add(line);
	showMeasureReadout(p0.distanceTo(p1) / SCALE);
  } else {
	hideMeasureReadout();
  }
}

function showMeasureReadout(mm) {
  const el = document.getElementById('measure-readout');
  if (!el) return;
  el.textContent = `📏 距離: ${mm.toFixed(1)} mm`;
  el.style.display = 'block';
}

function hideMeasureReadout() {
  const el = document.getElementById('measure-readout');
  if (el) el.style.display = 'none';
}

function onDown(e) {
  drag=false; orbit=false;
  clearGuides();

  if (measureMode) {
	measureDownPos = {x:e.clientX, y:e.clientY};
	orbit = true; orbitSt = {x:e.clientX, y:e.clientY}; // still allow rotating the view
	return;
  }

  if (e.button===2||e.button===1) { orbit=true; orbitSt={x:e.clientX,y:e.clientY}; return; }

  const ring = hitGizmoRing(e);
  if (ring && sel) {
	const axis = ring.userData.axis;
	const startAng = screenAngleForAxis(e, axis);
	gizmoDrag = {axis, startAng, origRx: sel.rx||0, origRy: sel.ry||0, origRz: sel.rz||0};
	setGizmoHighlight(axis);
	return;
  }

  const hit = hitPiece(e);
  if (hit) {
	selectPiece(hit.piece);
	drag=true;
	dragMoved=false;
	const plane = new THREE.Plane(new THREE.Vector3(0,1,0), -hit.piece.y);
	const pt = new THREE.Vector3();
	const n = toNDC(e); mouse.set(n.x,n.y); raycaster.setFromCamera(mouse,camera);
	raycaster.ray.intersectPlane(plane, pt);
	dragOff = {x: hit.piece.x-pt.x, z: hit.piece.z-pt.z};
  } else {
	orbit=true; orbitSt={x:e.clientX,y:e.clientY};
	deselect();
  }
}

function onMove(e) {
  if (orbit) {
	const dx=e.clientX-orbitSt.x, dy=e.clientY-orbitSt.y;
	camTh -= dx*0.007;
	camPh = Math.max(0.12, Math.min(Math.PI*0.47, camPh-dy*0.007));
	orbitSt={x:e.clientX,y:e.clientY};
	refreshCam(); return;
  }

  if (gizmoDrag && sel) {
	const ang = screenAngleForAxis(e, gizmoDrag.axis);
	const delta = ang - gizmoDrag.startAng;
	const snapped = Math.round(delta/(Math.PI/2))*(Math.PI/2);
	const e2 = composeWorldRotation(gizmoDrag.origRx, gizmoDrag.origRy, gizmoDrag.origRz, gizmoDrag.axis, snapped);
	sel.rx = e2.x; sel.ry = e2.y; sel.rz = e2.z;
	applyTransform(sel);
	updateGizmoPos();
	syncInspRot();
	if(window._syncInspPreview) window._syncInspPreview();
	return;
  }

  if (!e.buttons) {
	const ring = hitGizmoRing(e);
	const axis = ring ? ring.userData.axis : null;
	if (axis !== gizmoHover) {
	  gizmoHover = axis;
	  setGizmoHighlight(axis);
	  renderer.domElement.style.cursor = axis ? 'pointer' : 'default';
	}
  }

  if (!sel || !e.buttons) return;
  const n=toNDC(e); mouse.set(n.x,n.y); raycaster.setFromCamera(mouse,camera);
  if (drag && sel) {
	const plane = new THREE.Plane(new THREE.Vector3(0,1,0), -sel.y);
	const pt = new THREE.Vector3();
	raycaster.ray.intersectPlane(plane, pt);
	const rawX = Math.round((pt.x+dragOff.x)*20)/20;
	const rawZ = Math.round((pt.z+dragOff.z)*20)/20;

	clearGuides();
	const snap = computeSnappedPos(rawX, rawZ);
	dragMoved = true;
	sel.x = snap.x;
	sel.z = snap.z;
	if (snap.guideX) addGuideLine('x', snap.guideX.at, snap.guideX.other);
	if (snap.guideZ) addGuideLine('z', snap.guideZ.at, snap.guideZ.other);

	applyTransform(sel);
	updateGizmoPos();
	syncInspPos();
  }
}

function onUp(e) {
  if (measureMode) {
	if (measureDownPos && e) {
	  const dx = e.clientX-measureDownPos.x, dy = e.clientY-measureDownPos.y;
	  if (Math.hypot(dx,dy) < 6) addMeasurePoint(e); // tap, not a camera-rotate drag
	}
	measureDownPos = null;
	drag=false; orbit=false;
	return;
  }

  if (drag && sel && dragMoved) { pushApart(sel); snapshot(); }
  clearGuides();
  if (gizmoDrag && sel) {
	liftAboveGround(sel);
	pushApart(sel);
	syncInspRot();
	if(window._syncInspPreview) window._syncInspPreview();
	snapshot();
	gizmoDrag=null;
	setGizmoHighlight(null);
  }
  drag=false; orbit=false; dragMoved=false;
}

// Touch support: a single finger behaves like the left mouse button (select
// + move a piece it lands on, or orbit the camera otherwise). Multi-touch
// (e.g. pinch) is left alone so it doesn't fight with page/browser gestures.
function onTouchStart(e) {
  if (e.touches.length !== 1) return;
  e.preventDefault();
  const t = e.touches[0];
  onDown({ clientX:t.clientX, clientY:t.clientY, button:0, buttons:1, preventDefault(){} });
}
function onTouchMove(e) {
  if (e.touches.length !== 1) return;
  e.preventDefault();
  const t = e.touches[0];
  onMove({ clientX:t.clientX, clientY:t.clientY, buttons:1, preventDefault(){} });
}
function onTouchEnd(e) {
  const t = e.changedTouches && e.changedTouches[0];
  onUp(t ? { clientX:t.clientX, clientY:t.clientY } : undefined);
}
function onWheel(e) { e.preventDefault(); camD=Math.max(1.5,Math.min(24,camD+e.deltaY*0.012)); refreshCam(); }

const WOOD_PALETTE = [
  { hex:0xc8864a, css:'#c8864a', dark:'#7a4c1e', mid:'#b07038' }, // オーク（明るい橙褐）
  { hex:0x9a5c2e, css:'#9a5c2e', dark:'#5a3010', mid:'#7a4820' }, // ウォルナット（深い褐色）
  { hex:0xe0a85a, css:'#e0a85a', dark:'#906028', mid:'#c88840' }, // パイン（明るい黄褐）
  { hex:0x7a4428, css:'#7a4428', dark:'#401808', mid:'#602e18' }, // ローズウッド（赤褐）
  { hex:0xd4986a, css:'#d4986a', dark:'#885030', mid:'#b87848' }, // チェリー（ピンク褐）
  { hex:0xb87c3c, css:'#b87c3c', dark:'#704018', mid:'#9a6028' }, // チーク（中間褐）
  { hex:0xeabc7a, css:'#eabc7a', dark:'#987040', mid:'#d09c58' }, // メープル（淡い黄褐）
  { hex:0x8c5030, css:'#8c5030', dark:'#502010', mid:'#703818' }, // マホガニー（赤みがかった褐）
  { hex:0xc4a060, css:'#c4a060', dark:'#786028', mid:'#a88040' }, // アッシュ（くすんだ黄褐）
  { hex:0xa07848, css:'#a07848', dark:'#5a3c18', mid:'#845e30' }, // ビーチ（中間）
  { hex:0xd4b480, css:'#d4b480', dark:'#886838', mid:'#b89060' }, // バーチ（淡い褐）
  { hex:0x6a3820, css:'#6a3820', dark:'#340e04', mid:'#4e2410' }, // エボニー（濃い赤褐）
];
function woodColor(seed) { return WOOD_PALETTE[seed % WOOD_PALETTE.length].hex; }
function woodCSS(seed)   { return WOOD_PALETTE[seed % WOOD_PALETTE.length]; }

const GIZMO_COLORS = { x:0xff3333, y:0x33ee33, z:0x3388ff };
const GIZMO_COLORS_HOVER = { x:0xff8888, y:0x88ff88, z:0x88bbff };

function createGizmo(piece) {
  removeGizmo();
  const W=piece.len*SCALE, H=piece.dep*SCALE, D=piece.wid*SCALE;
  const diagR = Math.sqrt(W*W+H*H+D*D)*0.55;
  const tube  = diagR*0.04;

  gizmoGrp = new THREE.Group();
  gizmoGrp.position.copy(piece.grp.position);

  ['x','y','z'].forEach(axis=>{
	const visGeo = new THREE.TorusGeometry(diagR, tube, 8, 56);
	const visMat = new THREE.MeshBasicMaterial({color:GIZMO_COLORS[axis], transparent:true, opacity:0.9, side:THREE.DoubleSide, depthTest:false});
	const visMesh = new THREE.Mesh(visGeo, visMat);

	const hitGeo = new THREE.TorusGeometry(diagR, diagR*0.2, 6, 32);
	const hitMat = new THREE.MeshBasicMaterial({transparent:true, opacity:0, side:THREE.DoubleSide});
	const hitMesh = new THREE.Mesh(hitGeo, hitMat);

	if (axis==='x') { visMesh.rotation.y=Math.PI/2; hitMesh.rotation.y=Math.PI/2; }
	if (axis==='y') { visMesh.rotation.x=Math.PI/2; hitMesh.rotation.x=Math.PI/2; }

	const ring = new THREE.Group();
	ring.add(visMesh); ring.add(hitMesh);
	ring.userData = {axis, visMat, hitMesh};
	gizmoGrp.add(ring);
  });

  scene.add(gizmoGrp);
}

function removeGizmo() {
  if (gizmoGrp) { scene.remove(gizmoGrp); gizmoGrp=null; }
  gizmoDrag=null; gizmoHover=null;
}

function updateGizmoPos() {
  if (!gizmoGrp || !sel) return;
  gizmoGrp.position.copy(sel.grp.position);
}

function hitGizmoRing(e) {
  if (!gizmoGrp) return null;
  const n=toNDC(e); mouse.set(n.x,n.y);
  raycaster.setFromCamera(mouse, camera);
  const hitMeshes = gizmoGrp.children.map(r=>r.userData.hitMesh);
  const hits = raycaster.intersectObjects(hitMeshes, false);
  if (!hits.length) return null;
  return gizmoGrp.children.find(r=>r.userData.hitMesh===hits[0].object) || null;
}

function setGizmoHighlight(axis) {
  if (!gizmoGrp) return;
  gizmoGrp.children.forEach(r=>{
	const isHit = r.userData.axis===axis;
	r.userData.visMat.color.set(isHit ? GIZMO_COLORS_HOVER[r.userData.axis] : GIZMO_COLORS[r.userData.axis]);
	r.userData.visMat.opacity = isHit ? 1.0 : 0.9;
  });
}

function screenAngleForAxis(e, axis) {
  const pos = sel.grp.position.clone().project(camera);
  const rect = renderer.domElement.getBoundingClientRect();
  const cx = (pos.x+1)/2*rect.width + rect.left;
  const cy = (-pos.y+1)/2*rect.height + rect.top;
  return Math.atan2(e.clientY-cy, e.clientX-cx);
}

function buildPieceGeometry(piece) {
  const W = piece.len*SCALE, H = piece.dep*SCALE, D = piece.wid*SCALE;
  const cuts = piece.cornerCuts;
  const hasCuts = cuts && cuts.some(c => c && c.dx > 0 && c.dz > 0);
  if (!hasCuts) {
	return new THREE.BoxGeometry(W, H, D);
  }
  const hx = W/2, hz = D/2;

  // Perimeter walked in a fixed, consistent order: SW -> SE -> NE -> NW -> SW.
  // (User-facing corner indices 0-3 have their own +X/-X, +Z/-Z meaning —
  // see CORNER_TO_PERIM below — this array is purely "position i around the
  // perimeter", independent of that.)
  const corners        = [{x:-hx,z:-hz}, {x:hx,z:-hz}, {x:hx,z:hz}, {x:-hx,z:hz}];
  const signsForPerim  = [[-1,-1],       [1,-1],        [1,1],       [-1,1]];
  // Map each user-facing corner index (0: +X+Z, 1: +X-Z, 2: -X+Z, 3: -X-Z —
  // matching the picker UI) to its position in the perimeter walk above.
  const CORNER_TO_PERIM = {0:2, 1:1, 2:3, 3:0};
  const cutsByPerimIdx = [null,null,null,null];
  for (let uc = 0; uc < 4; uc++) {
	const c = cuts[uc];
	if (c && c.dx > 0 && c.dz > 0) cutsByPerimIdx[CORNER_TO_PERIM[uc]] = c;
  }

  // Build the ordered vertex list around the perimeter, substituting two
  // points (instead of one corner) wherever a cut is active.
  const pts = [];
  for (let i = 0; i < 4; i++) {
	const cut = cutsByPerimIdx[i];
	const [sx, sz] = signsForPerim[i];
	if (!cut) { pts.push(corners[i]); continue; }
	// Clamp so a cut can never consume an entire edge (which would collapse
	// the shape into a degenerate sliver or triangle).
	const dx = Math.min(cut.dx*SCALE, W - 0.001);
	const dz = Math.min(cut.dz*SCALE, D - 0.001);
	const cx = sx*hx, cz = sz*hz;
	const zOffsetPt = { x: cx, z: cz - sz*dz };       // point along the constant-X edge
	const xOffsetPt = { x: cx - sx*dx, z: cz };       // point along the constant-Z edge
	// Which of the two edges meeting at this corner is the "incoming" one
	// (arrived at while walking the perimeter in increasing-index order)
	// alternates every step — SW and NE arrive via a constant-X edge, SE
	// and NW arrive via a constant-Z edge — so the two substituted points
	// must swap order accordingly to keep the path from crossing itself.
	if (i % 2 === 0) { pts.push(zOffsetPt); pts.push(xOffsetPt); }
	else { pts.push(xOffsetPt); pts.push(zOffsetPt); }
  }

  // The extruded shape is drawn in a 2D (u,v) plane and extruded along a
  // third axis; afterwards the whole geometry is rotated so u->X, v->-Z,
  // extrude->Y, landing it in the same board-local frame (X=length,
  // Y=thickness, Z=width, centered at the origin) as a plain BoxGeometry.
  const sp = (x, z) => new THREE.Vector2(x, -z);
  const shape = new THREE.Shape();
  shape.moveTo(...sp(pts[0].x, pts[0].z).toArray());
  for (let i = 1; i < pts.length; i++) shape.lineTo(...sp(pts[i].x, pts[i].z).toArray());
  shape.lineTo(...sp(pts[0].x, pts[0].z).toArray());

  const geo = new THREE.ExtrudeGeometry(shape, { depth: H, bevelEnabled: false });
  geo.rotateX(-Math.PI/2);
  geo.translate(0, -H/2, 0);
  return geo;
}

function buildMesh(piece) {
  const grp = new THREE.Group();
  const geo = buildPieceGeometry(piece);
  const mat = new THREE.MeshLambertMaterial({color: woodColor(piece.seed), emissive:new THREE.Color(0), emissiveIntensity:0});
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow=true; mesh.receiveShadow=true;
  grp.add(mesh);
  grp.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({color:0x603010,transparent:true,opacity:0.5})));
  return grp;
}

function worldExtents(p) {
  // A board's true world-space footprint/height depends on its rotation —
  // e.g. rotated 90° it may stand on its length or width instead of its
  // thickness, or its length may run along Z instead of X. Compute all
  // three world-axis half-extents from the rotation matrix once, so the
  // vertical stacking logic (pieceTop/effectiveHeight) and the horizontal
  // footprint (getAABB, used for overlap checks and edge-snap guides) never
  // disagree about a rotated piece's real size.
  const hx = (p.len * SCALE) / 2, hy = (p.dep * SCALE) / 2, hz = (p.wid * SCALE) / 2;
  const m = new THREE.Matrix4().makeRotationFromEuler(
	new THREE.Euler(p.rx || 0, p.ry || 0, p.rz || 0, 'XYZ')
  );
  const e = m.elements;
  return {
	x: Math.abs(e[0]) * hx + Math.abs(e[4]) * hy + Math.abs(e[8]) * hz,
	y: Math.abs(e[1]) * hx + Math.abs(e[5]) * hy + Math.abs(e[9]) * hz,
	z: Math.abs(e[2]) * hx + Math.abs(e[6]) * hy + Math.abs(e[10]) * hz,
  };
}

function effectiveHeight(p) { return 2 * worldExtents(p).y; }

function applyTransform(p) {
  p.y = Math.max(0, p.y || 0);
  p.grp.position.set(p.x, p.y + effectiveHeight(p)/2, p.z);
  p.grp.rotation.set(p.rx||0, p.ry||0, p.rz||0, 'XYZ');
  if (gizmoGrp && sel===p) gizmoGrp.position.copy(p.grp.position);
}

function liftAboveGround(p) {
  p.grp.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(p.grp);
  if (box.min.y < -0.0001) {
	p.y += -box.min.y;
	p.grp.position.set(p.x, p.y + effectiveHeight(p)/2, p.z);
  }
  const iy = document.getElementById('i-y');
  if (iy) iy.value = p.y.toFixed(2);
}

function getAABB(p) {
  const ext = worldExtents(p);
  return { minX: p.x - ext.x, maxX: p.x + ext.x, minZ: p.z - ext.z, maxZ: p.z + ext.z };
}

function pieceTop(p) { return p.y + effectiveHeight(p); }

function clearSnapGuides() {
  snapGuides.forEach(g => { scene.remove(g); g.geometry.dispose(); g.material.dispose(); });
  snapGuides = [];
}

function addSnapGuideLine(p1, p2) {
  const geo = new THREE.BufferGeometry().setFromPoints([p1, p2]);
  const mat = new THREE.LineBasicMaterial({ color: 0xff3d9a, transparent: true, opacity: 0.9, depthTest: false });
  const line = new THREE.Line(geo, mat);
  line.renderOrder = 999;
  scene.add(line);
  snapGuides.push(line);
}

function drawAxisGuide(axis, coord, p, other) {
  const y = Math.max(pieceTop(p), pieceTop(other)) + 0.015;
  const a = getAABB(p), b = getAABB(other);
  if (axis === 'x') {
	const zMin = Math.min(a.minZ, b.minZ) - 0.15, zMax = Math.max(a.maxZ, b.maxZ) + 0.15;
	addSnapGuideLine(new THREE.Vector3(coord, y, zMin), new THREE.Vector3(coord, y, zMax));
  } else {
	const xMin = Math.min(a.minX, b.minX) - 0.15, xMax = Math.max(a.maxX, b.maxX) + 0.15;
	addSnapGuideLine(new THREE.Vector3(xMin, y, coord), new THREE.Vector3(xMax, y, coord));
  }
}

// While dragging, find the closest edge/center alignment against another
// board along one axis — so two boards can be dropped flush against each
// other (or perfectly lined up) instead of relying on the eye.
function findAxisSnap(axis, p, rawCoord) {
  const THRESH = 0.05; // world units (~12.5mm) catch distance
  const half = axis === 'x' ? (p.len * SCALE) / 2 : (p.wid * SCALE) / 2;
  let best = null, bestDist = THRESH;
  for (const other of pieces) {
	if (other === p || other.stock) continue;
	const b = getAABB(other);
	const oMin = axis === 'x' ? b.minX : b.minZ;
	const oMax = axis === 'x' ? b.maxX : b.maxZ;
	const oCenter = axis === 'x' ? other.x : other.z;
	const candidates = [
	  { value: oMin - half, guide: oMin },     // touch: p's far edge meets other's near edge
	  { value: oMax + half, guide: oMax },     // touch: p's near edge meets other's far edge
	  { value: oMin + half, guide: oMin },     // flush: edges aligned on the near side
	  { value: oMax - half, guide: oMax },     // flush: edges aligned on the far side
	  { value: oCenter,     guide: oCenter },  // centers aligned
	];
	for (const c of candidates) {
	  const d = Math.abs(rawCoord - c.value);
	  if (d < bestDist) { bestDist = d; best = { value: c.value, guideCoord: c.guide, other }; }
	}
  }
  return best;
}

let guideGroup = null;
const SNAP_THRESHOLD = 0.08; // world units (~20mm at SCALE=0.004) — how close an edge must be to snap flush

function ensureGuideGroup() {
  if (!guideGroup) { guideGroup = new THREE.Group(); scene.add(guideGroup); }
  return guideGroup;
}

function clearGuides() {
  if (!guideGroup) return;
  guideGroup.children.slice().forEach(c => {
	guideGroup.remove(c);
	c.geometry.dispose();
	c.material.dispose();
  });
}

function addGuideLine(axis, at, other) {
  const a = getAABB(sel), b = getAABB(other);
  const y = Math.max(pieceTop(sel), pieceTop(other)) + 0.01;
  const mat = new THREE.LineBasicMaterial({ color: 0x4ec3ff, depthTest: false, transparent: true, opacity: 0.9 });
  const geo = new THREE.BufferGeometry();
  let points;
  if (axis === 'x') {
	const z0 = Math.min(a.minZ, b.minZ) - 0.15, z1 = Math.max(a.maxZ, b.maxZ) + 0.15;
	points = [new THREE.Vector3(at, y, z0), new THREE.Vector3(at, y, z1)];
  } else {
	const x0 = Math.min(a.minX, b.minX) - 0.15, x1 = Math.max(a.maxX, b.maxX) + 0.15;
	points = [new THREE.Vector3(x0, y, at), new THREE.Vector3(x1, y, at)];
  }
  geo.setFromPoints(points);
  const line = new THREE.Line(geo, mat);
  line.renderOrder = 999;
  ensureGuideGroup().add(line);
}

// Snap the piece being dragged so its edges/center land flush against the
// edges/center of any other piece within SNAP_THRESHOLD, and report which
// guide line(s) to draw for the snap(s) that were applied.
function computeSnappedPos(rawX, rawZ) {
  const selExt = worldExtents(sel);
  const hw = selExt.x, hd = selExt.z;
  let snapX = rawX, snapZ = rawZ;
  let guideX = null, guideZ = null;

  // Edge matches and center matches are tracked separately (per axis) so
  // edges can be given strict priority: two boards being lined up flush is
  // almost always what's intended, and for thin boards the center sits only
  // a few mm from the edge, well within the snap radius of both — without
  // this priority, whichever happened to be numerically closer could win,
  // occasionally locking a board's edge onto another board's *center* line
  // instead of its edge.
  let bestEdgeX = SNAP_THRESHOLD, edgeX = null;
  let bestCenterX = SNAP_THRESHOLD, centerX = null;
  let bestEdgeZ = SNAP_THRESHOLD, edgeZ = null;
  let bestCenterZ = SNAP_THRESHOLD, centerZ = null;

  for (const other of pieces) {
	if (other === sel || other.stock) continue;
	// Only snap against pieces that are actually vertically relevant to the
	// one being dragged: either on the same height "layer" (both sitting at
	// the same Y — e.g. two boards side by side on the floor), or a piece
	// the dragged piece is currently resting directly on top of (its bottom
	// meets that piece's top — e.g. a board standing on top of another,
	// being slid across that same supporting board's surface). Without the
	// second case, a piece that's already stacked stays elevated for its
	// entire drag (Y only updates on release), so this guard would wrongly
	// exclude the very board it's sitting on and sliding across — exactly
	// the piece its edges should be snapping against. Anything else (an
	// unrelated, differently-elevated piece elsewhere in the design) is
	// still excluded, so a dragged board can't manufacture a false overlap
	// with something it was never near.
	const sameLevel = Math.abs(other.y - sel.y) < 0.01;
	const restingOnOther = Math.abs(sel.y - pieceTop(other)) < 0.01;
	if (!sameLevel && !restingOnOther) continue;
	const ob = getAABB(other);

	const selEdgesX = [rawX - hw, rawX + hw];
	const otherEdgesX = [ob.minX, ob.maxX];
	selEdgesX.forEach(se => otherEdgesX.forEach(oe => {
	  const d = Math.abs(se - oe);
	  if (d < bestEdgeX) { bestEdgeX = d; edgeX = { snap: rawX + (oe - se), at: oe, other }; }
	}));
	{
	  const oe = (ob.minX + ob.maxX) / 2;
	  const d = Math.abs(rawX - oe);
	  if (d < bestCenterX) { bestCenterX = d; centerX = { snap: oe, at: oe, other }; }
	}

	const selEdgesZ = [rawZ - hd, rawZ + hd];
	const otherEdgesZ = [ob.minZ, ob.maxZ];
	selEdgesZ.forEach(se => otherEdgesZ.forEach(oe => {
	  const d = Math.abs(se - oe);
	  if (d < bestEdgeZ) { bestEdgeZ = d; edgeZ = { snap: rawZ + (oe - se), at: oe, other }; }
	}));
	{
	  const oe = (ob.minZ + ob.maxZ) / 2;
	  const d = Math.abs(rawZ - oe);
	  if (d < bestCenterZ) { bestCenterZ = d; centerZ = { snap: oe, at: oe, other }; }
	}
  }

  const pickX = edgeX || centerX;
  if (pickX) { snapX = pickX.snap; guideX = { at: pickX.at, other: pickX.other }; }
  const pickZ = edgeZ || centerZ;
  if (pickZ) { snapZ = pickZ.snap; guideZ = { at: pickZ.at, other: pickZ.other }; }

  return { x: snapX, z: snapZ, guideX, guideZ };
}

function pushApart(moved) {
  if (moved.stock) return;
  const MAX_ITER = 20;
  for (let iter = 0; iter < MAX_ITER; iter++) {
	// 1) Settle vertically: rest on top of whatever piece(s) this piece is
	//    actually, physically interpenetrating (X, Y, and Z all overlapping
	//    at once) — not merely sharing an XZ footprint with something at a
	//    different height. Two boards can legitimately share the same XZ
	//    footprint while stacked (one flush on top of the other) without
	//    ever intersecting in 3D; that's a valid configuration, not a
	//    conflict, so moving the lower one must not yank it up onto the
	//    upper one just because their footprints overlap. If this piece
	//    isn't truly intersecting anything, leave its height as-is — don't
	//    force it back down to the floor either, since the height may have
	//    been set deliberately (e.g. typed into the Y field).
	const fa = getAABB(moved);
	let restY = 0, hasOverlap = false;
	for (const other of pieces) {
	  if (other === moved || other.stock) continue;
	  const ob = getAABB(other);
	  const ox = Math.min(fa.maxX, ob.maxX) - Math.max(fa.minX, ob.minX);
	  const oz = Math.min(fa.maxZ, ob.maxZ) - Math.max(fa.minZ, ob.minZ);
	  if (ox <= 0.001 || oz <= 0.001) continue; // no footprint overlap at all
	  const yOverlap = Math.min(pieceTop(moved), pieceTop(other)) - Math.max(moved.y, other.y);
	  if (yOverlap > 0.0005) { // genuine interpenetration, not just touching/flush
		hasOverlap = true;
		restY = Math.max(restY, pieceTop(other));
	  }
	}
	if (hasOverlap && Math.abs(moved.y - restY) > 0.0001) {
	  moved.y = restY;
	  applyTransform(moved);
	}

	// 2) Resolve horizontal collisions only against pieces that actually
	//    occupy the same vertical band (real overlap) — pieces stacked
	//    above/below moved don't collide horizontally.
	let moved_ = false;
	for (const other of pieces) {
	  if (other === moved || other.stock) continue;
	  const overlapY = Math.min(pieceTop(moved), pieceTop(other)) - Math.max(moved.y, other.y);
	  if (overlapY <= 0.0005) continue;
	  const a = getAABB(moved), b = getAABB(other);
	  // No artificial margin here: boards that are already flush (zero real
	  // overlap) must stay flush, not get shoved apart by a fixed gap.
	  // EPS only absorbs floating-point jitter from the snap/AABB math so
	  // truly-touching boards aren't endlessly re-triggered as "overlapping".
	  const EPS = 0.0001;
	  const overlapX = Math.min(a.maxX, b.maxX) - Math.max(a.minX, b.minX);
	  const overlapZ = Math.min(a.maxZ, b.maxZ) - Math.max(a.minZ, b.minZ);
	  if (overlapX > EPS && overlapZ > EPS) {
		if (overlapX < overlapZ) {
		  const dir = moved.x < other.x ? -1 : 1;
		  moved.x += dir * overlapX;
		} else {
		  const dir = moved.z < other.z ? -1 : 1;
		  moved.z += dir * overlapZ;
		}
		applyTransform(moved);
		moved_ = true;
	  }
	}
	if (!moved_) break;
  }
  syncInspPos();
}

function rebuildGeom(p) {
  const geo = buildPieceGeometry(p);
  const mesh = p.grp.children[0];
  mesh.geometry.dispose();
  mesh.geometry = geo;
  const edges = p.grp.children[1];
  edges.geometry.dispose();
  edges.geometry = new THREE.EdgesGeometry(geo);
}

function setHighlight(p, on) {
  const mat = p.grp.children[0].material;
  mat.emissive.set(on ? 0xffa020 : 0x000000);
  mat.emissiveIntensity = on ? 0.55 : 0;

  const OUTLINE_ID = '__outline__';
  const existing = p.grp.children.find(c => c.userData.id === OUTLINE_ID);
  if (on) {
	const base = p.grp.children[0];
	if (existing) {
	  // The piece may have been resized (length/width/depth) since the
	  // outline was first created — refresh its geometry so it always
	  // matches the current size instead of staying at the old size.
	  existing.geometry.dispose();
	  existing.geometry = base.geometry.clone();
	} else {
	  const oGeo = base.geometry.clone();
	  const oMat = new THREE.MeshBasicMaterial({
		color: 0xffdd44,
		side: THREE.BackSide,
	  });
	  const outline = new THREE.Mesh(oGeo, oMat);
	  outline.scale.multiplyScalar(1.02);
	  outline.userData.id = OUTLINE_ID;
	  outline.renderOrder = -1;
	  p.grp.add(outline);
	}
  } else if (existing) {
	p.grp.remove(existing);
	existing.geometry.dispose();
	existing.material.dispose();
  }
}

function addPiece(name, len, wid, dep, x, z) {
  const p = {
	id:++mc, name:name||`部材${mc}`,
	len:+len, wid:+wid, dep:+dep,
	x: x!==undefined?x:(Math.random()-.5)*3,
	y:0,
	z: z!==undefined?z:(Math.random()-.5)*3,
	rx:0, ry:0, rz:0, seed:mc, childRemnantId: null, cornerCuts: [null,null,null,null]
  };
  p.grp = buildMesh(p);
  applyTransform(p);
  scene.add(p.grp);
  pieces.push(p);
  refreshSide();
  document.getElementById('st-count').textContent=pieces.length;
}

function addPieceStock(name, len, wid, dep, parentSeed) {
  const p = {
	id:++mc, name:name||`残材${mc}`,
	len:+len, wid:+wid, dep:+dep,
	x:0, y:0, z:0, rx:0, ry:0, rz:0,
	seed: parentSeed !== undefined ? parentSeed : mc,
	stock: true, childRemnantId: null, cornerCuts: [null,null,null,null]
  };
  p.grp = buildMesh(p);
  pieces.push(p);
  refreshSide();
  document.getElementById('st-count').textContent=pieces.length;
  return p;
}

let toastTimer = null;
function toRemnantName(name) {
  // Strip any existing "（残材）" suffix before re-adding one, so repeatedly
  // placing and re-cutting an offcut doesn't keep stacking the suffix
  // ("板①（残材）（残材）（残材）...").
  return name.replace(/（残材）+$/, '') + '（残材）';
}
function showRemnantToast(remnantLen) {
  let toast = document.getElementById('remnant-toast');
  if (!toast) {
	toast = document.createElement('div');
	toast.id = 'remnant-toast';
	toast.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#1a3a1a;border:1px solid #4caf50;color:#8fce8f;font-size:12px;padding:8px 18px;border-radius:8px;z-index:200;pointer-events:none;font-family:monospace;transition:opacity .3s;';
	document.body.appendChild(toast);
  }
  toast.textContent = remnantLen <= 0
	? '残材がなくなりました'
	: `残材 ${remnantLen}mm（切り代 5mm 引き済み）`;
  toast.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ toast.style.opacity='0'; }, 3000);
}

let lenWarnTimer = null;
function showLenWarning(msg) {
  let toast = document.getElementById('len-warn-toast');
  if (!toast) {
	toast = document.createElement('div');
	toast.id = 'len-warn-toast';
	toast.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#3a1a1a;border:1px solid #e05252;color:#ffb0b0;font-size:12px;padding:8px 18px;border-radius:8px;z-index:200;pointer-events:none;font-family:monospace;transition:opacity .3s;';
	document.body.appendChild(toast);
  }
  toast.textContent = '⚠ ' + msg;
  toast.style.opacity = '1';
  clearTimeout(lenWarnTimer);
  lenWarnTimer = setTimeout(()=>{ toast.style.opacity='0'; }, 3000);
}

function placeStockPiece() {
  if (!sel || !sel.stock) return;
  sel.stock = false;
  sel.x = (Math.random()-.5)*3;
  sel.z = (Math.random()-.5)*3;
  sel.y = 0;
  applyTransform(sel);
  scene.add(sel.grp);
  pushApart(sel);
  showInspector(sel);
  refreshSide();
  snapshot();
}

function selectPiece(p) {
  flushPendingLenCommit();
  if (sel) setHighlight(sel, false);
  sel = p;
  setHighlight(p, true);
  if (mode==='rotate') createGizmo(p); else removeGizmo();
  refreshSide();
  showInspector(p);
  document.getElementById('st-sel').textContent=p.name;

}

function deselect() {
  flushPendingLenCommit();
  if (sel) setHighlight(sel, false);
  removeGizmo();
  sel=null;
  document.getElementById('st-sel').textContent='なし';
  refreshSide();
  document.getElementById('insp-body').innerHTML='<p class="insp-empty">部材を選択すると<br>詳細を編集できます</p>';

}

function refreshSide() {
  const list=document.getElementById('mat-list');
  list.innerHTML='';
  const maxLen = 600;
  pieces.forEach(p=>{
	const d=document.createElement('div');
	d.className='mat-item'+(p.stock?' stock':'')+(sel===p?' sel':'');
	const PW=176, PH=36;
	const stockTag = p.stock ? `<span class="stock-badge">在庫</span>` : '';
	const wc = woodCSS(p.seed);
	d.innerHTML=`<div class="mat-name"><span class="color-dot" style="background:${wc.css}"></span>${p.name}<span class="mat-badge">#${p.id}</span>${stockTag}</div><div class="mat-dim">長さ ${p.len} × 奥行 ${p.wid} × 厚み ${p.dep} mm</div><div class="mat-preview-wrap"><canvas width="${PW}" height="${PH}"></canvas></div>`;
	d.onclick=()=>selectPiece(p);
	d.ondblclick=()=>{ selectPiece(p); if (p.stock) placeStockPiece(); };
	if (p.stock) d.title = 'ダブルクリックで配置';
	list.appendChild(d);
	const cv=d.querySelector('canvas'), ctx=cv.getContext('2d');
	const PAD=4;
	const scaleX=(PW-PAD*2)/maxLen;
	const sc=scaleX;
	const rw=Math.max(4, p.len*sc), rh=Math.max(4, p.wid*sc);
	const rx=PAD, ry=(PH-rh)/2;
	const grad=ctx.createLinearGradient(rx,0,rx+rw,0);
	grad.addColorStop(0, wc.dark); grad.addColorStop(0.35, wc.css);
	grad.addColorStop(0.65, wc.mid); grad.addColorStop(1, wc.dark);
	ctx.fillStyle=grad; ctx.beginPath();
	ctx.rect(rx,ry,rw,rh); ctx.fill();
	ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=1;
	for(let x=rx+7;x<rx+rw;x+=7){
	  ctx.beginPath(); ctx.moveTo(x,ry); ctx.lineTo(x,ry+rh); ctx.stroke();
	}
	ctx.strokeStyle='rgba(100,60,20,0.6)'; ctx.lineWidth=1;
	ctx.beginPath(); ctx.rect(rx,ry,rw,rh); ctx.stroke();
	ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='9px monospace';
	ctx.textBaseline='middle';
	ctx.fillText('t'+p.dep, rx+rw+5, PH/2);
  });
}

function showInspector(p) {
  const KERF_ = 5;
  const initExisting = p.childRemnantId ? pieces.find(pc => pc.id === p.childRemnantId) : null;
  const initAvailable = initExisting ? initExisting.len : 0;
  const initSliderMax = initAvailable > 0 ? p.len + initAvailable + KERF_ : p.len;

  document.getElementById('insp-body').innerHTML=`
	<div class="insp-sec" style="margin-bottom:8px">
	  <div style="position:relative;">
		<canvas id="insp-3d" width="191" height="150" style="display:block;border-radius:6px;border:1px solid var(--border);cursor:grab;background:#0d0d0d;"></canvas>
		<div id="insp-axis-badge" class="insp-axis-badge"></div>
	  </div>
	</div>
	<div class="insp-sec">
	  <div class="insp-lbl">名前</div>
	  <div class="insp-row"><input type="text" id="i-name" value="${p.name}" style="flex:1"></div>
	</div>
	<div class="insp-sec">
	  <div class="insp-lbl">サイズ</div>
	  <div class="insp-row"><label>長さ</label><input type="number" id="i-len" value="${p.len}" min="10" max="3000"><span class="unit">mm</span></div>
	  <input type="range" id="i-len-slider" min="10" max="${initSliderMax}" step="1" value="${p.len}" class="len-slider">

  `;
  const bind = (id, fn) => { const el=document.getElementById(id); if(el) el.addEventListener('input', fn); };
  bind('i-name', ()=>{ if(!sel) return; sel.name=document.getElementById('i-name').value||sel.name; refreshSide(); document.getElementById('st-sel').textContent=sel.name; });
  bind('i-len',  ()=>{ if(!sel) return; sel.len=Math.max(10,+document.getElementById('i-len').value||10); rebuildGeom(sel); applyTransform(sel); setHighlight(sel,true); refreshSide(); syncLenSlider(); });
  bind('i-wid',  ()=>{ if(!sel) return; sel.wid=Math.max(10,+document.getElementById('i-wid').value||10); rebuildGeom(sel); applyTransform(sel); setHighlight(sel,true); refreshSide(); });
  // 厚み(i-dep)は読み取り専用にしたため、変更を反映するバインドは意図的に設けていない。

  const lenSlider = document.getElementById('i-len-slider');
  function syncLenSlider() {
	if (!lenSlider || !sel) return;
	// The slider's usable range should cover everything a single edit could
	// actually reach: down to the minimum, and up to however much could be
	// reclaimed from this piece's own paired offcut (including the kerf
	// that comes back on a full reclaim) — not just capped at the current
	// length, which would make the slider one-directional (shortening
	// only) and unable to ever move back up after a cut.
	const existing = sel.childRemnantId ? pieces.find(pc => pc.id === sel.childRemnantId) : null;
	const available = existing ? existing.len : 0;
	const maxLen = available > 0 ? sel.len + available + KERF : sel.len;

  }
  if (lenSlider) {
	// Live visual preview while dragging, exactly like typing in the number

  // which corner's dx/dz values the two fields below are currently showing.
  (function initCornerCut() {
	const ccButtons = Array.from(document.querySelectorAll('.corner-btn'));
	const dxEl = document.getElementById('cc-dx');
	const dzEl = document.getElementById('cc-dz');
	const clearBtn = document.getElementById('cc-clear');
	if (!ccButtons.length || !dxEl || !dzEl) return;

	if (!Array.isArray(sel.cornerCuts)) sel.cornerCuts = [null,null,null,null];
	let activeCorner = 0;

	function refreshButtons() {

	  dzEl.value = c ? c.dz : 0;
	}
	refreshButtons();

	function applyCornerCut() {
	  const dx = Math.max(0, +dxEl.value || 0);
	  const dz = Math.max(0, +dzEl.value || 0);
	  sel.cornerCuts[activeCorner] = (dx > 0 && dz > 0) ? { dx, dz } : null;
	  rebuildGeom(sel);
	  applyTransform(sel);
	  setHighlight(sel, true);
	  refreshButtons();
	}

	ccButtons.forEach(btn => {
	  btn.addEventListener('click', () => {
		activeCorner = +btn.dataset.corner;

	dxEl.addEventListener('input', applyCornerCut);
	dzEl.addEventListener('input', applyCornerCut);
	if (clearBtn) clearBtn.addEventListener('click', () => {
	  dxEl.value = 0; dzEl.value = 0;

	  rebuildGeom(sel);
	  applyTransform(sel);
	  setHighlight(sel, true);
	  refreshButtons();
	  snapshot();

  })();

  const KERF = 5;
  const lenEl = document.getElementById('i-len');
  if (lenEl) {
	flushPendingLenCommit();
	lenEl.dataset.prev = p.len;

	function commitLenChange() {
	  pendingLenCommit = null;
	  if (!sel || sel !== p) return;
	  const prev = +lenEl.dataset.prev;
	  const rawInput = +lenEl.value;
	  let next = Math.max(10, rawInput || 10);

	  if (!rawInput || rawInput < 10) {
		showLenWarning('長さが短すぎます（最小 10mm）');
	  }

	  if (next === prev) { lenEl.value = next; return; }

	  // Find THIS piece's own paired offcut — not just any piece that shares
	  // the same root seed. Once a remnant itself gets cut further, several
	  // pieces can end up sharing one root seed (the original board, plus
	  // each generation of leftover), and a seed-only search has no way to

	  // it could grab an unrelated, earlier-generation remnant instead,
	  // silently pulling material from (or dumping it into) the wrong piece.
	  let existing = sel.childRemnantId ? pieces.find(pc => pc.id === sel.childRemnantId) : null;

	  if (next < prev) {

		if (existing) {
		  existing.len = existing.len + (prev - next) - KERF;
		  existing.len = Math.max(10, existing.len);
		  existing.name = toRemnantName(sel.name);
		  scene.remove(existing.grp);
            existing.grp = buildMesh(existing);
            applyTransform(existing);
            if (!existing.stock) scene.add(existing.grp);
            refreshSide();
            showRemnantToast(existing.len);
		} else if (cut >= 10) {
		  const created = addPieceStock(toRemnantName(sel.name), cut, sel.wid, sel.dep, sel.seed);
		  created.childParentId = sel.id;
		  sel.childRemnantId = created.id;
		  showRemnantToast(cut);
		} else if (cut > 0) {
		  showLenWarning(`端材（${cut}mm）は小さすぎて残せませんでした`);
		}
	  } else {
		const extend = next - prev;
		const available = existing ? existing.len : 0;
		const fullReclaim = available > 0 && extend >= available;

		if (fullReclaim) {
		  // Reclaiming the ENTIRE remnant is treated as completely undoing
		  // that cut — not just gluing the leftover back on — so the kerf
		  // that was lost when the cut was made comes back too, landing
		  // exactly on the length this piece had before that cut, instead
		  // of staying 5mm short forever. This is the outcome whenever the
		  // full remnant is being used up, regardless of whether the typed
		  // value exactly matched prev+available or asked for even more.
		  const maxLen = prev + available + KERF;
		  if (next !== maxLen) {
			if (next > maxLen) {
			  showLenWarning(`長さが足りません（最大 ${maxLen}mm までです）`);
			}
			next = maxLen;
			lenEl.value = next;
		  }
		  sel.len = next;
		  rebuildGeom(sel);
		  applyTransform(sel);
		  setHighlight(sel, true);

		  pieces = pieces.filter(pc => pc !== existing);
		  // If `existing` itself already had material cut further from it
		  // (its own child remnant), that piece doesn't disappear along
		  // with `existing` — it's still real, physical leftover material.
		  // Re-point it to whoever is absorbing `existing`'s space now, so
		  // it stays reachable instead of becoming an orphan that nothing
		  // can ever reclaim from again.
		  sel.childRemnantId = existing.childRemnantId || null;
		  if (sel.childRemnantId) {
			const grandchild = pieces.find(pc => pc.id === sel.childRemnantId);
			if (grandchild) grandchild.childParentId = sel.id;
		  }
		  // `existing` may have been placed out in the 3D workspace (not
		  // just sitting in the stock list) — removing it from the data
		  // model alone would leave its mesh behind as an unreachable
		  // "ghost" board that's still visible but can no longer be
		  // selected or moved.
		  if (!existing.stock) scene.remove(existing.grp);
		  showRemnantToast(0);
		  refreshSide();
		} else {
		  // Partial reclaim: the cut still genuinely happened to some
		  // degree, so the kerf stays lost, same as ever.
		  if (extend > available) {
			next = prev + available;
			lenEl.value = next;
			sel.len = next;
			rebuildGeom(sel);
			applyTransform(sel);
			setHighlight(sel, true);
			showLenWarning(
			  available > 0
				? `長さが足りません（伸ばせるのはあと ${available}mm までです）`
				: '長さが足りません（残材がありません）'
			);
		  }
		  if (existing) {
			existing.len = existing.len - (next - prev);
			existing.name = toRemnantName(sel.name);
			existing.grp = buildMesh(existing);
			applyTransform(existing);
			showRemnantToast(existing.len);
			refreshSide();
		  }
		}
	  }

	  lenEl.dataset.prev = next;
	  syncLenSlider();
	  snapshot();
	}

	// Commit only on an explicit confirmation — pressing Enter, or the field
	// losing focus (as a safety net so an edit isn't silently lost if the
	// person clicks elsewhere without pressing Enter) — rather than on every
	// native 'change' event. This makes each commit a single, deliberate
	// action instead of something that could fire mid-edit.
	lenEl.addEventListener('keydown', e => {
	  if (e.key === 'Enter') {
		e.preventDefault();
		clearTimeout(lenCommitTimer);
		pendingLenCommit = null;
		commitLenChange();

	  }
	});
	lenEl.addEventListener('blur', () => {
	  clearTimeout(lenCommitTimer);
	  pendingLenCommit = null;
	  commitLenChange();
	});
  }
  document.getElementById('insp-body').querySelectorAll('input:not(#i-len):not(#i-len-slider)').forEach(el=>el.addEventListener('change', ()=>snapshot()));

}

function syncInspPos() {
  if (!sel) return;
  const ix=document.getElementById('i-x'), iz=document.getElementById('i-z'), iy=document.getElementById('i-y');
  if(ix) ix.value=sel.x.toFixed(2);
  if(iz) iz.value=sel.z.toFixed(2);

function syncInspRot() {
  if (!sel) return;
  const toDeg = r => Math.round(((r||0)*180/Math.PI + 360)) % 360;
  const ex=document.getElementById('i-rx-disp'), ey=document.getElementById('i-ry-disp'), ez=document.getElementById('i-rz-disp');
  if(ex) ex.textContent=toDeg(sel.rx)+'°';
  if(ey) ey.textContent=toDeg(sel.ry)+'°';
  if(ez) ez.textContent=toDeg(sel.rz)+'°';

function applyInspector() {
  if (!sel) return;
  const p = sel;

  const newName = document.getElementById('i-name').value.trim() || p.name;
  const newLen  = Math.max(10, +document.getElementById('i-len').value || 10);
  const newWid  = Math.max(10, +document.getElementById('i-wid').value || 10);
  const newDep  = Math.max(3,  +document.getElementById('i-dep').value || 3);
  const newX    = +document.getElementById('i-x').value || 0;
  const newZ    = +document.getElementById('i-z').value || 0;
  const newY    = Math.max(0, +document.getElementById('i-y').value || 0);
  const newRy   = p.ry || 0;

  const dimChanged = (p.len!==newLen || p.wid!==newWid || p.dep!==newDep);

  p.name=newName; p.len=newLen; p.wid=newWid; p.dep=newDep;
  p.x=newX; p.z=newZ; p.y=newY; p.ry=newRy; p.rx=p.rx||0; p.rz=p.rz||0;

  if (dimChanged) rebuildGeom(p);
  applyTransform(p);
  setHighlight(p, true);

  snapshot();

function rotateAxis(axis, deg) {
  if (!sel) return;
  const r = deg * Math.PI / 180;
  const e2 = composeWorldRotation(sel.rx||0, sel.ry||0, sel.rz||0, axis, r);
  sel.rx = e2.x; sel.ry = e2.y; sel.rz = e2.z;
  applyTransform(sel);
  liftAboveGround(sel);
  pushApart(sel);
  syncInspRot();
  if (window._syncInspPreview) window._syncInspPreview();
  snapshot();
}

let _iR=null, _iS=null, _iC=null, _iMesh=null, _iRings=[];

function updateRingPreRotation() {
  // The preview rings represent FIXED world axes (matching the main 3D
  // view's gizmo and the new world-space drag composition below), so they
  // always sit at their default orientation regardless of how the piece has
  // already been rotated — no per-rotation tracking needed.
  const xRing = _iRings.find(g => g.userData.axis === 'x');
  const yRing = _iRings.find(g => g.userData.axis === 'y');
  const zRing = _iRings.find(g => g.userData.axis === 'z');
  if (xRing) xRing.rotation.set(0, Math.PI/2, 0);
  if (yRing) yRing.rotation.set(Math.PI/2, 0, 0);
  if (zRing) zRing.rotation.set(0, 0, 0);
}
let _iTheta=0.5, _iPhi=0.9, _iDist=1, _iH=0;
let _iActive=null;
let _iOrbit=false, _iOLX=0, _iOLY=0;
let _iRaf=null;
function _iUpdateCam() {
  if (!_iC) return;
  _iC.position.set(
	_iDist*Math.sin(_iPhi)*Math.sin(_iTheta),
	_iDist*Math.cos(_iPhi),
	_iDist*Math.sin(_iPhi)*Math.cos(_iTheta)
  );
  _iC.lookAt(0, _iH, 0);
}

function initInspPreview(p) {
  const cv = document.getElementById('insp-3d');
  if (!cv) return;

  if (_iRaf) { cancelAnimationFrame(_iRaf); _iRaf=null; }
  _iRings=[];

  if (_iR) { _iR.dispose(); }
  _iR = new THREE.WebGLRenderer({canvas:cv, antialias:true});
  _iR.setClearColor(0x0d0d0d,1);
  _iR.setSize(191,150);

  _iS = new THREE.Scene();
  _iC = new THREE.PerspectiveCamera(42, 191/150, 0.001, 100);

  _iS.add(new THREE.AmbientLight(0xffffff,0.65));
  const dl=new THREE.DirectionalLight(0xfffaee,1.1); dl.position.set(3,5,4); _iS.add(dl);
  const dl2=new THREE.DirectionalLight(0xd0e8ff,0.35); dl2.position.set(-3,2,-3); _iS.add(dl2);

  const W=p.len*SCALE, H=p.dep*SCALE, D=p.wid*SCALE;
  const geo=new THREE.BoxGeometry(W,H,D);
  _iMesh=new THREE.Group();
  const _iBoxMesh = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({color:woodColor(p.seed)}));
  const _iEdgeMesh = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({color:0x603010,transparent:true,opacity:0.6}));
  _iBoxMesh.renderOrder=1; _iEdgeMesh.renderOrder=1;
  _iMesh.add(_iBoxMesh); _iMesh.add(_iEdgeMesh);
  _iMesh.rotation.set(p.rx||0,p.ry||0,p.rz||0,'XYZ');
  _iMesh.position.set(0,H/2,0);
  _iS.add(_iMesh);

  const maxDim=Math.max(W,H,D);
  _iDist=maxDim*4.2+0.4;
  _iTheta=0.4; _iPhi=0.72;
  _iH=H/2;

  const diagR = Math.sqrt(W*W+H*H+D*D)*0.5 + maxDim*0.22;
  const center = new THREE.Vector3(0, H/2, 0);

  function makeRing(axis, color) {
	const tGeo=new THREE.TorusGeometry(diagR, diagR*0.04, 8, 64);
	const tMat=new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.9, side:THREE.DoubleSide, depthTest:true, depthWrite:false});
	const tMesh=new THREE.Mesh(tGeo,tMat);
	const hGeo=new THREE.TorusGeometry(diagR, diagR*0.18, 6, 32);
	const hMat=new THREE.MeshBasicMaterial({transparent:true, opacity:0, side:THREE.DoubleSide});
	const hMesh=new THREE.Mesh(hGeo,hMat);

	grp.add(tMesh); grp.add(hMesh);

    if(axis==='y') grp.rotation.x = Math.PI/2;

	if (!document.getElementById('insp-3d')) return;
