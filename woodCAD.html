  const raycaster=new THREE.Raycaster();
  const mouse2=new THREE.Vector2();

  function getHitRing(e) {
	const rect=cv.getBoundingClientRect();
	mouse2.set(((e.clientX-rect.left)/rect.width)*2-1, -((e.clientY-rect.top)/rect.height)*2+1);
	raycaster.setFromCamera(mouse2,_iC);
	const hitMeshes=_iRings.map(g=>g.userData.hMesh);
	const hits=raycaster.intersectObjects(hitMeshes,false);
	if(!hits.length) return null;
	return _iRings.find(g=>g.userData.hMesh===hits[0].object);
  }

  const AXIS_LABEL = { x:'X軸', y:'Y軸', z:'Z軸' };
  const AXIS_COLOR = { x:'#ff4444', y:'#44ee44', z:'#4488ff' };

  function _iSetRingVisual(highlightAxis) {
	_iRings.forEach(g => {
	  const on = g.userData.axis === highlightAxis;
	  const dim = highlightAxis && !on;
	  g.userData.mat.opacity = on ? 1 : (dim ? 0.18 : 0.75);
	  g.scale.setScalar(on ? 1.08 : 1);
	});
  }

  function _iShowAxisBadge(axis, dragging) {
	const badge = document.getElementById('insp-axis-badge');
	if (!badge) return;
	if (!axis) { badge.style.display = 'none'; return; }
	badge.textContent = AXIS_LABEL[axis] + (dragging ? ' ・回転中' : '');
	badge.style.color = AXIS_COLOR[axis];
	badge.style.borderColor = dragging ? AXIS_COLOR[axis] : 'transparent';
	badge.style.display = 'block';
  }

  cv.onmousemove = e=>{
	if (_iActive || _iOrbit) return;
	const hit=getHitRing(e);
	const axis = hit ? hit.userData.axis : null;
	_iSetRingVisual(axis);
	_iShowAxisBadge(axis, false);
	cv.style.cursor = hit ? 'pointer' : 'grab';
  };

  cv.onmouseleave = () => {
	if (_iActive || _iOrbit) return;
	_iSetRingVisual(null);
	_iShowAxisBadge(null, false);
  };

  cv.onmousedown = e=>{
	e.preventDefault();
	const hit=getHitRing(e);
	if (hit) {
	  const rect=cv.getBoundingClientRect();
	  const dx=e.clientX-rect.left-rect.width/2;
	  const dy=e.clientY-rect.top-rect.height/2;
	  const axis=hit.userData.axis;
	  _iActive={axis, startAngle:Math.atan2(dy,dx), origRx:sel.rx||0, origRy:sel.ry||0, origRz:sel.rz||0};
	  _iSetRingVisual(axis);
	  _iShowAxisBadge(axis, true);
	  cv.style.cursor='crosshair';
	} else {
	  _iOrbit=true; _iOLX=e.clientX; _iOLY=e.clientY;
	  _iShowAxisBadge(null, false);
	  cv.style.cursor='grabbing';
	}
  };

  if (window._iMouseMove) window.removeEventListener('mousemove', window._iMouseMove);
  if (window._iMouseUp)   window.removeEventListener('mouseup',   window._iMouseUp);

  window._iMouseMove = e => {
	if (_iActive) {
	  const rect=cv.getBoundingClientRect();
	  const dx=e.clientX-rect.left-rect.width/2;
	  const dy=e.clientY-rect.top-rect.height/2;
	  const ang=Math.atan2(dy,dx);
	  const delta=ang-_iActive.startAngle;
	  const snapped=Math.round(delta/(Math.PI/2))*(Math.PI/2);
	  const e2 = composeWorldRotation(_iActive.origRx, _iActive.origRy, _iActive.origRz, _iActive.axis, snapped);
	  _iMesh.rotation.set(e2.x, e2.y, e2.z, 'XYZ');
	  return;
	}
	if (_iOrbit) {
	  const dx2=e.clientX-_iOLX, dy2=e.clientY-_iOLY;
	  _iTheta-=dx2*0.012; _iPhi=Math.max(0.1,Math.min(Math.PI*0.48,_iPhi-dy2*0.012));
	  _iOLX=e.clientX; _iOLY=e.clientY;
	  _iUpdateCam();
	}
  };
  window._iMouseUp = ()=>{
	if (_iActive && sel) {
	  sel.rx = _iMesh.rotation.x; sel.ry = _iMesh.rotation.y; sel.rz = _iMesh.rotation.z;
	  applyTransform(sel);
	  liftAboveGround(sel);
	  pushApart(sel);
	  _iMesh.rotation.set(sel.rx||0,sel.ry||0,sel.rz||0,'XYZ');
	  syncInspRot();
	  snapshot();
	  _iActive=null;
	}
	_iOrbit=false;
	_iSetRingVisual(null);
	_iShowAxisBadge(null, false);
  };
  window.addEventListener('mousemove', window._iMouseMove);
  window.addEventListener('mouseup',   window._iMouseUp);

  window._syncInspPreview = ()=>{
	if (!sel||!_iMesh) return;
	_iMesh.rotation.set(sel.rx||0,sel.ry||0,sel.rz||0,'XYZ');
  };
}

function deletePiece() {
  if (!sel) return;
  scene.remove(sel.grp);
  removeGizmo();
  pieces=pieces.filter(p=>p!==sel);
  deselect();
  document.getElementById('st-count').textContent=pieces.length;
  snapshot();
}

function toggleHide() {
  if (!sel) return;
  sel.stock = !sel.stock;
  if (sel.stock) {
	scene.remove(sel.grp);
	if (gizmoGrp) removeGizmo();
  } else {
	sel.x = (Math.random()-.5)*3;
	sel.z = (Math.random()-.5)*3;
	applyTransform(sel);
	scene.add(sel.grp);
	pushApart(sel);
  }
  showInspector(sel);
  refreshSide();
  snapshot();
}

function setMode(m) {
  mode=m;
  document.getElementById('btn-move').classList.toggle('active',m==='move');
  document.getElementById('btn-rotate').classList.toggle('active',m==='rotate');
  document.getElementById('st-mode').textContent={select:'選択',move:'移動',rotate:'回転'}[m]||'選択';
  if (m==='rotate' && sel) createGizmo(sel);
  else removeGizmo();
}
function resetCamera() { camTh=0.5; camPh=1.05; camD=7.5; camTgt.set(0,0,0); refreshCam(); }

function snapshot() {
  const s=JSON.stringify(pieces.map(p=>({...p,grp:null})));
  hist.push(s); if(hist.length>50) hist.shift();
  fut=[];
  document.getElementById('btn-undo').disabled=hist.length<2;
  document.getElementById('btn-redo').disabled=true;
}

function saveProject() {
  const data = {
	app: 'WoodPlanner',
	version: 1,
	savedAt: new Date().toISOString(),
	mc: mc,
	pieces: pieces.map(p => ({...p, grp:null}))
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  a.href = url;
  a.download = `woodplanner_${ts}.woodcad`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showSaveToast('💾 プロジェクトを保存しました');
}

function loadProject(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
	try {
	  const data = JSON.parse(e.target.result);
	  if (!data.pieces || !Array.isArray(data.pieces)) throw new Error('invalid format');

	  pieces.forEach(p => scene.remove(p.grp));
	  removeGizmo();
	  pieces = [];
	  deselect();

	  data.pieces.forEach(d => {
		const p = {...d};
		p.grp = buildMesh(p);
		applyTransform(p);
		if (!p.stock) scene.add(p.grp);
		pieces.push(p);
	  });
	  mc = data.mc || pieces.reduce((m,p)=>Math.max(m,p.id||0), 0);

	  refreshSide();
	  document.getElementById('st-count').textContent = pieces.length;
	  hist=[]; fut=[];
	  snapshot();
	  showSaveToast('📂 プロジェクトを読み込みました');
	} catch (err) {
	  showSaveToast('⚠ ファイルを読み込めませんでした');
	}
	event.target.value = '';
  };
  reader.readAsText(file);
}

let saveToastTimer = null;
function showSaveToast(msg) {
  let toast = document.getElementById('remnant-toast');
  if (!toast) {
	toast = document.createElement('div');
	toast.id = 'remnant-toast';
	toast.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#1a3a1a;border:1px solid #4caf50;color:#8fce8f;font-size:12px;padding:8px 18px;border-radius:8px;z-index:200;pointer-events:none;font-family:monospace;transition:opacity .3s;';
	document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(saveToastTimer);
  saveToastTimer = setTimeout(()=>{ toast.style.opacity='0'; }, 2500);
}

function restore(snap) {
  pieces.forEach(p=>scene.remove(p.grp));
  pieces=[];
  JSON.parse(snap).forEach(d=>{
	const p={...d};
	p.grp=buildMesh(p);
	applyTransform(p);
	if (!p.stock) scene.add(p.grp);
	pieces.push(p);
  });
  deselect();
  refreshSide();
  document.getElementById('st-count').textContent=pieces.length;
}

function undo() {
  if(hist.length<2) return;
  fut.push(hist.pop());
  restore(hist[hist.length-1]);
  document.getElementById('btn-undo').disabled=hist.length<2;
  document.getElementById('btn-redo').disabled=false;
}
function redo() {
  if(!fut.length) return;
  const s=fut.pop(); hist.push(s);
  restore(s);
  document.getElementById('btn-undo').disabled=false;
  document.getElementById('btn-redo').disabled=fut.length===0;
}

function openAddModal() {
  document.getElementById('m-name').value=`部材${mc+1}`;
  document.getElementById('ov-add').classList.add('show');
  setTimeout(()=>document.getElementById('m-name').focus(),50);
}
function closeOv(id) { document.getElementById(id).classList.remove('show'); }
function submitAdd() {
  addPiece(
	document.getElementById('m-name').value,
	document.getElementById('m-len').value,
	document.getElementById('m-wid').value,
	document.getElementById('m-dep').value
  );
  closeOv('ov-add');
  snapshot();
}
function showExport() {
  document.getElementById('exp-body').innerHTML=
	pieces.map((p,i)=>`<tr><td>${i+1}</td><td>${p.name}</td><td>${p.len}mm</td><td>${p.wid}mm</td><td>${p.dep}mm</td></tr>`).join('');
  document.getElementById('ov-export').classList.add('show');
}

function cornerCutClipPath(p) {
  const cuts = p.cornerCuts;
  if (!cuts || !cuts.some(c => c && c.dx > 0 && c.dz > 0)) return null;
  // Walk the segment's rectangle clockwise from top-left, in percentage
  // space: TL, TR, BR, BL. Matches the same "user corner index -> which
  // physical corner" mapping as the 3D geometry (0: +len+wid, 1: +len-wid,
  // 2: -len+wid, 3: -len-wid), just re-expressed for a flat 2D rectangle
  // instead of the 3D board — top edge = +width side, right edge = +length
  // side, so corner0 lands top-right, corner2 top-left, etc.
  const order = [2, 0, 1, 3]; // user-corner index at each of TL, TR, BR, BL
  const cornerXY = [[0,0], [100,0], [100,100], [0,100]];
  const pts = [];
  for (let i = 0; i < 4; i++) {
	const cut = cuts[order[i]];
	const [cx, cy] = cornerXY[i];
	if (cut && cut.dx > 0 && cut.dz > 0) {
	  const fx = Math.min(99, (cut.dx / p.len) * 100);
	  const fz = Math.min(99, (cut.dz / p.wid) * 100);
	  const dirX = cx === 0 ? 1 : -1, dirY = cy === 0 ? 1 : -1;
	  const ptAlongX = [cx + dirX*fx, cy];
	  const ptAlongY = [cx, cy + dirY*fz];
	  // Same alternating order as the 3D shape builder — otherwise the
	  // notch's two edges cross instead of forming a clean diagonal cut.
	  if (i % 2 === 0) { pts.push(ptAlongY); pts.push(ptAlongX); }
	  else { pts.push(ptAlongX); pts.push(ptAlongY); }
	} else {
	  pts.push([cx, cy]);
	}
  }
  return 'polygon(' + pts.map(pt => `${pt[0]}% ${pt[1]}%`).join(', ') + ')';
}

function showCutDiagram() {
  const KERF = 5;
  const groups = {};
  pieces.forEach(p => { (groups[p.seed] = groups[p.seed] || []).push(p); });

  const rows = Object.keys(groups).map(seed => {
	// Used pieces first (largest first), offcut/stock pieces last — matches
	// the order they'd actually be cut off the original board.
	const ordered = [...groups[seed]].sort((a,b) => {
	  if (!!a.stock !== !!b.stock) return a.stock ? 1 : -1;
	  return b.len - a.len;
	});
	const cutCount = Math.max(0, ordered.length - 1);
	const totalLen = ordered.reduce((s,p)=>s+p.len,0) + cutCount*KERF;
	return { seed:Number(seed), pieces:ordered, totalLen, cutCount };
  }).sort((a,b) => b.totalLen - a.totalLen);

  const body = document.getElementById('cutdiag-body');
  body.innerHTML = '';
  const rowRefs = [];

  if (!rows.length) {
	body.innerHTML = '<p class="insp-empty">部材がありません</p>';
  } else {
	const maxLen = Math.max(...rows.map(r => r.totalLen));
	rows.forEach(r => {
	  const wc = woodCSS(r.seed);
	  const dims = r.pieces[0];

	  const rowEl = document.createElement('div');
	  rowEl.className = 'cutdiag-row';
	  rowEl.innerHTML = `<div class="cutdiag-title">
		<span>元板 #${r.seed}（幅 ${dims.wid} × 厚み ${dims.dep}mm）</span>
		<span>全長 ${r.totalLen}mm　切断 ${r.cutCount}回</span>
	  </div>`;

	  const barWrap = document.createElement('div');
	  barWrap.style.width = Math.max(10, (r.totalLen / maxLen) * 100) + '%';

	  const bar = document.createElement('div');
	  bar.className = 'cutdiag-bar';
	  r.pieces.forEach((p, i) => {
		const seg = document.createElement('div');
		seg.className = 'cutdiag-seg' + (p.stock ? ' stock' : '');
		seg.style.flex = `${p.len} 0 0`;
		seg.style.background = p.stock
		  ? `repeating-linear-gradient(45deg, rgba(0,0,0,.35) 0 4px, transparent 4px 8px), ${wc.css}`
		  : `linear-gradient(${wc.dark}, ${wc.css} 40%, ${wc.mid} 70%, ${wc.dark})`;
		const clip = cornerCutClipPath(p);
		if (clip) seg.style.clipPath = clip;
		seg.title = `${p.name} ｜ ${p.len}mm` + (p.stock ? '（残材・未使用）' : '') + (clip ? '（角を切り取り済み）' : '');
		seg.innerHTML = `<span class="cutdiag-seg-name">${p.name}</span><span class="cutdiag-seg-len">${p.len}mm</span>`;
		bar.appendChild(seg);
		if (i < r.pieces.length - 1) {
		  const kerf = document.createElement('div');
		  kerf.className = 'cutdiag-kerf';
		  bar.appendChild(kerf);
		}
	  });

	  barWrap.appendChild(bar);
	  rowEl.appendChild(barWrap);
	  body.appendChild(rowEl);
	  rowRefs.push({ bar, wid: dims.wid, totalLen: r.totalLen });
	});
  }

  document.getElementById('ov-cutdiagram').classList.add('show');

  // Give every bar the SAME real-world mm-per-pixel scale on both axes
  // (derived from how many pixels the length axis actually rendered at),
  // instead of a fixed height unrelated to the piece's true width. Without
  // this, a cut that's the same size in both directions (e.g. 30x30mm)
  // would render stretched, since the horizontal axis scales with length
  // while a fixed-height bar has no relationship to the physical width.
  if (rowRefs.length) {
	const widestBar = rowRefs.reduce((a,b) => a.totalLen > b.totalLen ? a : b);
	const pxPerMm = widestBar.bar.getBoundingClientRect().width / widestBar.totalLen;
	rowRefs.forEach(({ bar, wid }) => {
	  bar.style.height = Math.max(20, Math.min(220, wid * pxPerMm)) + 'px';
	});
  }
}

document.querySelectorAll('.overlay').forEach(el=>
  el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('show'); })
);
document.addEventListener('keydown',e=>{
  if (document.activeElement.tagName==='INPUT') return;
  if(e.key==='Escape'){ setMode('select'); document.querySelectorAll('.overlay').forEach(el=>el.classList.remove('show')); }
  if((e.metaKey||e.ctrlKey)&&e.key==='z'&&!e.shiftKey){ e.preventDefault(); undo(); }
  if((e.metaKey||e.ctrlKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){ e.preventDefault(); redo(); }
  if(e.key==='Delete'||e.key==='Backspace') deletePiece();
  if(e.key==='m') setMode('move');
  if(e.key==='r') setMode('rotate');
  if(e.key==='s') setMode('select');
  if(e.key==='a') openAddModal();
});

init();
</script>
