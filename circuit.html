<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回路図エディタ</title>
<style>
  :root{
    --bg:#eef2f8;
    --panel:#1a2540;
    --panel-text:#e8eef8;
    --accent:#2563eb;
    --grid:#c8d4e8;
    --line:#1e2a3a;
    --canvas:#f7faff;
    --mono:'IBM Plex Mono','Courier New',monospace;
    --display:'Zen Kaku Gothic New','Hiragino Sans',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:var(--display);
    background:var(--bg);
    color:var(--line);
    height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  header{
    background:var(--panel);
    color:var(--panel-text);
    padding:10px 20px;
    display:flex;
    align-items:center;
    gap:16px;
    border-bottom:3px solid var(--accent);
    flex-shrink:0;
  }
  header h1{
    font-size:18px;
    font-weight:700;
    letter-spacing:0.05em;
  }
  header .sub{
    font-family:var(--mono);
    font-size:11px;
    color:#a9b8af;
    letter-spacing:0.1em;
  }
  .layout{
    flex:1;
    display:flex;
    overflow:hidden;
  }
  .sidebar{
    width:200px;
    background:var(--panel);
    color:var(--panel-text);
    overflow-y:auto;
    flex-shrink:0;
    padding:14px 10px;
  }
  .sidebar h2{
    font-size:11px;
    font-family:var(--mono);
    letter-spacing:0.15em;
    color:var(--accent);
    margin:14px 6px 8px;
    text-transform:uppercase;
  }
  .sidebar h2:first-child{margin-top:0;}
  .symbol-btn{
    display:flex;
    align-items:center;
    gap:8px;
    width:100%;
    background:#1e2d50;
    border:1px solid #2d4070;
    color:var(--panel-text);
    border-radius:6px;
    padding:8px 8px;
    margin-bottom:6px;
    cursor:pointer;
    text-align:left;
    font-family:var(--display);
    font-size:12px;
    transition:background 0.15s, border-color 0.15s;
  }
  .symbol-btn:hover{
    background:#263660;
    border-color:var(--accent);
  }
  .symbol-btn:active{
    transform:translateY(1px);
  }
  .symbol-btn svg{
    width:34px;
    height:34px;
    flex-shrink:0;
  }
  .symbol-btn .label{
    line-height:1.3;
  }
  .canvas-wrap{
    flex:1;
    position:relative;
    overflow:hidden;
    background:var(--canvas);
  }
  #canvas{
    width:100%;
    height:100%;
    display:block;
    cursor:default;
    background-image:
      linear-gradient(to right, var(--grid) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
    background-size:20px 20px;
  }
  .toolbar{
    position:absolute;
    top:12px;
    left:12px;
    display:flex;
    gap:8px;
    z-index:5;
  }
  .toolbar button{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.05em;
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:5px;
    padding:7px 12px;
    cursor:pointer;
    color:var(--line);
    transition:background 0.12s, color 0.12s;
  }
  .toolbar button:hover{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
  }
  .toolbar button.active{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
  }
  .hint{
    position:absolute;
    bottom:12px;
    left:12px;
    font-family:var(--mono);
    font-size:11px;
    color:#8a8478;
    background:rgba(255,253,248,0.9);
    padding:8px 12px;
    border-radius:5px;
    border:1px solid var(--grid);
    max-width:420px;
    line-height:1.6;
    z-index:5;
  }
  .zoom-panel{
    position:absolute;
    bottom:12px;
    right:12px;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:6px;
    z-index:5;
  }
  .status{
    font-family:var(--mono);
    font-size:11px;
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:5px;
    padding:5px 10px;
    color:var(--line);
  }
  .zoom-btns{
    display:flex;
    gap:4px;
  }
  .zoom-btns button{
    font-family:var(--mono);
    font-size:12px;
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:5px;
    padding:5px 10px;
    cursor:pointer;
    color:var(--line);
    transition:background 0.12s, color 0.12s;
  }
  .zoom-btns button:hover{
    background:var(--accent);
    color:#fff;
    border-color:var(--accent);
  }
  .label-editor{
    position:absolute;
    display:none;
    background:#fff;
    border:2px solid var(--accent);
    border-radius:4px;
    font-family:var(--mono);
    font-size:12px;
    padding:2px 6px;
    outline:none;
    z-index:20;
    min-width:60px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
  }
  .elem-wire{ stroke:var(--line); stroke-width:2; fill:none; }
  .elem-symbol{ stroke:var(--line); stroke-width:2; fill:none; }
  .elem-selected{ stroke:var(--accent) !important; }
  .elem-label{
    font-family:var(--mono);
    font-size:12px;
    fill:var(--line);
    user-select:none;
  }
  .node-dot{
    fill:var(--accent);
    stroke:none;
  }
  .canvas-wrap.wire-active #canvas{
    cursor: crosshair;
    outline: 3px solid var(--accent);
    outline-offset: -3px;
  }
  .wire-mode-banner{
    position:absolute;
    top:58px;
    left:50%;
    transform:translateX(-50%);
    background:var(--accent);
    color:#fff;
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.08em;
    padding:7px 20px;
    border-radius:20px;
    z-index:6;
    pointer-events:none;
    display:none;
    white-space:nowrap;
    box-shadow:0 3px 12px rgba(37,99,235,0.35);
  }
  .canvas-wrap.wire-active .wire-mode-banner{
    display:block;
  }
</style>
</head>
<body>

<header>
  <h1>回路図エディタ</h1>
  <span class="sub">CIRCUIT SCHEMATIC</span>
</header>

<div class="layout">
  <aside class="sidebar">
    <h2>配線</h2>
    <button class="symbol-btn" data-type="wire">
      <svg viewBox="0 0 40 40"><line x1="4" y1="20" x2="36" y2="20" stroke="currentColor" stroke-width="2"/></svg>
      <span class="label">配線</span>
    </button>

    <h2>電源・接地</h2>
    <button class="symbol-btn" data-type="battery">
      <svg viewBox="0 0 40 40">
        <line x1="4" y1="20" x2="14" y2="20" stroke="currentColor" stroke-width="2"/>
        <line x1="14" y1="10" x2="14" y2="30" stroke="currentColor" stroke-width="3"/>
        <line x1="22" y1="6" x2="22" y2="34" stroke="currentColor" stroke-width="1.5"/>
        <line x1="22" y1="20" x2="36" y2="20" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span class="label">直流電源(電池)</span>
    </button>
    <button class="symbol-btn" data-type="ac-source">
      <svg viewBox="0 0 40 40">
        <line x1="4" y1="20" x2="11" y2="20" stroke="currentColor" stroke-width="2"/>
        <circle cx="20" cy="20" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
        <path d="M14 20 Q17 14 20 20 Q23 26 26 20" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <line x1="29" y1="20" x2="36" y2="20" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span class="label">交流電源</span>
    </button>
    <button class="symbol-btn" data-type="ground">
      <svg viewBox="0 0 40 40">
        <line x1="20" y1="2" x2="20" y2="20" stroke="currentColor" stroke-width="2"/>
        <line x1="10" y1="20" x2="30" y2="20" stroke="currentColor" stroke-width="2"/>
        <line x1="14" y1="25" x2="26" y2="25" stroke="currentColor" stroke-width="2"/>
        <line x1="18" y1="30" x2="22" y2="30" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span class="label">アース</span>
    </button>
    <button class="symbol-btn" data-type="gnd">
      <svg viewBox="0 0 40 40">
        <line x1="20" y1="2" x2="20" y2="18" stroke="currentColor" stroke-width="2"/>
        <line x1="10" y1="18" x2="30" y2="18" stroke="currentColor" stroke-width="2"/>
        <line x1="12" y1="24" x2="16" y2="18" stroke="currentColor" stroke-width="1.5"/>
        <line x1="18" y1="24" x2="22" y2="18" stroke="currentColor" stroke-width="1.5"/>
        <line x1="24" y1="24" x2="28" y2="18" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="label">グラウンド(GND)</span>
    </button>

    <h2>基本素子</h2>
    <button class="symbol-btn" data-type="resistor">
      <svg viewBox="0 0 40 40">
        <line x1="2" y1="20" x2="10" y2="20" stroke="currentColor" stroke-width="2"/>
        <rect x="10" y="13" width="20" height="14" stroke="currentColor" stroke-width="2" fill="none"/>
        <line x1="30" y1="20" x2="38" y2="20" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span class="label">抵抗器</span>
    </button>
    <button class="symbol-btn" data-type="capacitor">
      <svg viewBox="0 0 40 40">
        <line x1="2" y1="20" x2="18" y2="20" stroke="currentColor" stroke-width="2"/>
        <line x1="18" y1="8" x2="18" y2="32" stroke="currentColor" stroke-width="2.5"/>
        <line x1="24" y1="8" x2="24" y2="32" stroke="currentColor" stroke-width="2.5"/>
        <line x1="24" y1="20" x2="38" y2="20" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span class="label">コンデンサ</span>
    </button>
    <button class="symbol-btn" data-type="inductor">
      <svg viewBox="0 0 40 40">
        <line x1="2" y1="20" x2="8" y2="20" stroke="currentColor" stroke-width="2"/>
        <path d="M8 20 a4 7 0 0 1 8 0 a4 7 0 0 1 8 0 a4 7 0 0 1 8 0 a4 7 0 0 1 8 0" stroke="currentColor" stroke-width="2" fill="none"/>
      </svg>
      <span class="label">コイル(インダクタ)</span>
    </button>
    <button class="symbol-btn" data-type="diode">
      <svg viewBox="0 0 40 40">
        <line x1="2" y1="20" x2="38" y2="20" stroke="currentColor" stroke-width="2"/>
        <polygon points="14,11 14,29 28,20" stroke="currentColor" stroke-width="2" fill="none"/>
        <line x1="28" y1="8" x2="28" y2="32" stroke="currentColor" stroke-width="2.5"/>
      </svg>
      <span class="label">ダイオード</span>
    </button>
    <button class="symbol-btn" data-type="led">
      <svg viewBox="0 0 40 40">
        <line x1="2" y1="22" x2="38" y2="22" stroke="currentColor" stroke-width="2"/>
        <polygon points="14,13 14,31 28,22" stroke="currentColor" stroke-width="2" fill="none"/>
        <line x1="28" y1="10" x2="28" y2="34" stroke="currentColor" stroke-width="2.5"/>
        <path d="M22 10 L26 6 M26 6 L26 9 M26 6 L23 6" stroke="currentColor" stroke-width="1.2" fill="none"/>
        <path d="M26 13 L30 9 M30 9 L30 12 M30 9 L27 9" stroke="currentColor" stroke-width="1.2" fill="none"/>
      </svg>
      <span class="label">発光ダイオード(LED)</span>
    </button>

    <h2>半導体・可変素子</h2>
    <button class="symbol-btn" data-type="transistor">
      <svg viewBox="0 0 40 40">
        <line x1="0" y1="20" x2="14" y2="20" stroke="currentColor" stroke-width="2"/>
        <circle cx="22" cy="20" r="11" stroke="currentColor" stroke-width="2" fill="none"/>
        <line x1="14" y1="13" x2="14" y2="27" stroke="currentColor" stroke-width="2.5"/>
        <line x1="14" y1="15" x2="24" y2="11" stroke="currentColor" stroke-width="2"/>
        <line x1="14" y1="25" x2="24" y2="29" stroke="currentColor" stroke-width="2"/>
        <line x1="24" y1="11" x2="24" y2="3" stroke="currentColor" stroke-width="2"/>
        <line x1="24" y1="29" x2="24" y2="37" stroke="currentColor" stroke-width="2"/>
        <polygon points="20,24 24,29 17,28" fill="currentColor" stroke="none"/>
      </svg>
      <span class="label">トランジスタ(NPN)</span>
    </button>
    <button class="symbol-btn" data-type="varresistor">
      <svg viewBox="0 0 40 40">
        <line x1="2" y1="22" x2="10" y2="22" stroke="currentColor" stroke-width="2"/>
        <rect x="10" y="15" width="20" height="14" stroke="currentColor" stroke-width="2" fill="none"/>
        <line x1="30" y1="22" x2="38" y2="22" stroke="currentColor" stroke-width="2"/>
        <line x1="20" y1="2" x2="20" y2="15" stroke="currentColor" stroke-width="2"/>
        <polygon points="17,12 20,15 23,12" fill="currentColor" stroke="none"/>
      </svg>
      <span class="label">可変抵抗器</span>
    </button>

    <h2>スイッチ・素子</h2>
    <button class="symbol-btn" data-type="switch">
      <svg viewBox="0 0 40 40">
        <line x1="2" y1="20" x2="12" y2="20" stroke="currentColor" stroke-width="2"/>
        <circle cx="13" cy="20" r="1.8" fill="currentColor"/>
        <line x1="14" y1="19" x2="28" y2="11" stroke="currentColor" stroke-width="2"/>
        <circle cx="27" cy="20" r="1.8" fill="currentColor"/>
        <line x1="28" y1="20" x2="38" y2="20" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span class="label">スイッチ</span>
    </button>
    <button class="symbol-btn" data-type="motor">
      <svg viewBox="0 0 40 40">
        <line x1="2" y1="20" x2="11" y2="20" stroke="currentColor" stroke-width="2"/>
        <circle cx="20" cy="20" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
        <text x="20" y="24" font-size="11" text-anchor="middle" fill="currentColor" font-family="sans-serif">M</text>
        <line x1="29" y1="20" x2="38" y2="20" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span class="label">モータ</span>
    </button>
    <button class="symbol-btn" data-type="lamp">
      <svg viewBox="0 0 40 40">
        <line x1="2" y1="20" x2="11" y2="20" stroke="currentColor" stroke-width="2"/>
        <circle cx="20" cy="20" r="9" stroke="currentColor" stroke-width="2" fill="none"/>
        <line x1="14" y1="14" x2="26" y2="26" stroke="currentColor" stroke-width="1.5"/>
        <line x1="14" y1="26" x2="26" y2="14" stroke="currentColor" stroke-width="1.5"/>
        <line x1="29" y1="20" x2="38" y2="20" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span class="label">電球(ランプ)</span>
    </button>
    <button class="symbol-btn" data-type="fuse">
      <svg viewBox="0 0 40 40">
        <line x1="2" y1="20" x2="10" y2="20" stroke="currentColor" stroke-width="2"/>
        <rect x="10" y="14" width="20" height="12" stroke="currentColor" stroke-width="2" fill="none"/>
        <line x1="10" y1="20" x2="30" y2="20" stroke="currentColor" stroke-width="1.5"/>
        <line x1="30" y1="20" x2="38" y2="20" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span class="label">ヒューズ</span>
    </button>

    <h2>その他</h2>
    <button class="symbol-btn" data-type="junction">
      <svg viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="5" fill="currentColor"/>
      </svg>
      <span class="label">接続点</span>
    </button>
    <button class="symbol-btn" data-type="text">
      <svg viewBox="0 0 40 40"><text x="6" y="26" font-size="16" fill="currentColor" font-family="monospace">Aa</text></svg>
      <span class="label">テキスト注記</span>
    </button>
  </aside>

  <div class="canvas-wrap">
    <div class="toolbar">
      <button id="btn-select" class="active">選択 / 移動</button>
      <button id="btn-rotate">90°回転</button>
      <button id="btn-delete">削除モード</button>
      <button id="btn-clear">全消去</button>
      <button id="btn-save">保存(.csv)</button>
      <button id="btn-load">読み込み(.csv)</button>
      <button id="btn-export">SVGダウンロード</button>
      <button id="btn-screenshot">スクリーンショット</button>
    </div>
    <input id="file-loader" type="file" accept=".csv" style="display:none"/>
    <svg id="canvas" tabindex="0"></svg>
    <div class="wire-mode-banner">配線モード — 始点をクリック / Escでキャンセル</div>
    <input id="label-editor" class="label-editor" type="text"/>
    <div class="zoom-panel">
      <div class="status" id="status">部品: 0 ／ 配線: 0</div>
      <div class="zoom-btns">
        <button id="btn-zoom-in">＋</button>
        <button id="btn-zoom-reset">リセット</button>
        <button id="btn-zoom-out">－</button>
      </div>
    </div>
    <div class="hint">
      左の部品をクリックして配置 → クリックでキャンバスに置く<br>
      配線: 始点→終点クリックでL字接続<br><b>R</b>キーで折れ方向切替<br><b>Esc</b>・右クリックでキャンセル<br>
      ホイールでズーム、中ボタンまたはSpaceドラッグで移動<br>Delキーで選択削除
    </div>
  </div>
</div>

<script>
const svg = document.getElementById('canvas');
const GRID = 20;
const NS = 'http://www.w3.org/2000/svg';

let elements = [];
let wires = [];
let nextId = 1;
let mode = 'select';
let selectedId = null;
let placingType = null;

let dragging = null;
let wireStart = null;

function symbolBody(type){
  switch(type){
    case 'battery':
      return `
        <line x1="-20" y1="0" x2="-6" y2="0"/>
        <line x1="-6" y1="-10" x2="-6" y2="10" stroke-width="3"/>
        <line x1="2" y1="-14" x2="2" y2="14" stroke-width="1.5"/>
        <line x1="2" y1="0" x2="20" y2="0"/>
      `;
    case 'ac-source':
      return `
        <line x1="-20" y1="0" x2="-9" y2="0"/>
        <circle cx="0" cy="0" r="9" fill="none"/>
        <path d="M-6 0 Q-3 -6 0 0 Q3 6 6 0" fill="none"/>
        <line x1="9" y1="0" x2="20" y2="0"/>
      `;
    case 'ground':
      return `
        <line x1="0" y1="-20" x2="0" y2="0"/>
        <line x1="-10" y1="0" x2="10" y2="0"/>
        <line x1="-6" y1="5" x2="6" y2="5"/>
        <line x1="-2" y1="10" x2="2" y2="10"/>
      `;
    case 'gnd':
      return `
        <line x1="0" y1="-20" x2="0" y2="0"/>
        <line x1="-10" y1="0" x2="10" y2="0"/>
        <line x1="-6" y1="6" x2="-2" y2="0" stroke-width="1.5"/>
        <line x1="0" y1="6" x2="4" y2="0" stroke-width="1.5"/>
        <line x1="6" y1="6" x2="10" y2="0" stroke-width="1.5"/>
      `;
    case 'resistor':
      return `
        <line x1="-20" y1="0" x2="-12" y2="0"/>
        <rect x="-12" y="-7" width="24" height="14" fill="none"/>
        <line x1="12" y1="0" x2="20" y2="0"/>
      `;
    case 'capacitor':
      return `
        <line x1="-20" y1="0" x2="-4" y2="0"/>
        <line x1="-4" y1="-12" x2="-4" y2="12" stroke-width="2.5"/>
        <line x1="4" y1="-12" x2="4" y2="12" stroke-width="2.5"/>
        <line x1="4" y1="0" x2="20" y2="0"/>
      `;
    case 'inductor':
      return `
        <line x1="-20" y1="0" x2="-12" y2="0"/>
        <path d="M-12 0 a4 7 0 0 1 8 0 a4 7 0 0 1 8 0 a4 7 0 0 1 8 0 a4 7 0 0 1 8 0" fill="none"/>
        <line x1="20" y1="0" x2="20" y2="0"/>
      `;
    case 'diode':
      return `
        <line x1="-20" y1="0" x2="20" y2="0"/>
        <polygon points="-6,-9 -6,9 8,0" fill="none"/>
        <line x1="8" y1="-13" x2="8" y2="13" stroke-width="2.5"/>
      `;
    case 'led':
      return `
        <line x1="-20" y1="0" x2="20" y2="0"/>
        <polygon points="-6,-9 -6,9 8,0" fill="none"/>
        <line x1="8" y1="-13" x2="8" y2="13" stroke-width="2.5"/>
        <path d="M2 -12 L8 -18 M8 -18 L8 -14 M8 -18 L4 -18"/>
        <path d="M8 -8 L14 -14 M14 -14 L14 -10 M14 -14 L10 -14"/>
      `;
    case 'transistor':
      return `
        <line x1="-20" y1="0" x2="-6" y2="0"/>
        <circle cx="2" cy="0" r="11" fill="none"/>
        <line x1="-6" y1="-7" x2="-6" y2="7" stroke-width="2.5"/>
        <line x1="-6" y1="-5" x2="4" y2="-9"/>
        <line x1="-6" y1="5" x2="4" y2="9"/>
        <line x1="4" y1="-9" x2="4" y2="-17"/>
        <line x1="4" y1="9" x2="4" y2="17"/>
        <polygon points="0,4 4,9 -3,8" fill="currentColor" stroke="none"/>
      `;
    case 'varresistor':
      return `
        <line x1="-20" y1="0" x2="-12" y2="0"/>
        <rect x="-12" y="-7" width="24" height="14" fill="none"/>
        <line x1="12" y1="0" x2="20" y2="0"/>
        <line x1="0" y1="-20" x2="0" y2="-7"/>
        <polygon points="-3,-10 0,-7 3,-10" fill="currentColor" stroke="none"/>
      `;
    case 'switch':
      return `
        <line x1="-20" y1="0" x2="-9" y2="0"/>
        <circle cx="-8" cy="0" r="1.8" fill="currentColor" stroke="none"/>
        <line x1="-7" y1="-1" x2="9" y2="-9"/>
        <circle cx="9" cy="0" r="1.8" fill="currentColor" stroke="none"/>
        <line x1="9" y1="0" x2="20" y2="0"/>
      `;
    case 'motor':
      return `
        <line x1="-20" y1="0" x2="-9" y2="0"/>
        <circle cx="0" cy="0" r="9" fill="none"/>
        <text x="0" y="4" font-size="11" text-anchor="middle" fill="currentColor" stroke="none" font-family="sans-serif">M</text>
        <line x1="9" y1="0" x2="20" y2="0"/>
      `;
    case 'lamp':
      return `
        <line x1="-20" y1="0" x2="-9" y2="0"/>
        <circle cx="0" cy="0" r="9" fill="none"/>
        <line x1="-6" y1="-6" x2="6" y2="6" stroke-width="1.5"/>
        <line x1="-6" y1="6" x2="6" y2="-6" stroke-width="1.5"/>
        <line x1="9" y1="0" x2="20" y2="0"/>
      `;
    case 'fuse':
      return `
        <line x1="-20" y1="0" x2="-12" y2="0"/>
        <rect x="-12" y="-6" width="24" height="12" fill="none"/>
        <line x1="-12" y1="0" x2="12" y2="0" stroke-width="1.5"/>
        <line x1="12" y1="0" x2="20" y2="0"/>
      `;
    case 'junction':
      return `<circle cx="0" cy="0" r="4" fill="currentColor" stroke="none"/>`;
    case 'text':
      return `<text x="0" y="5" font-size="14" fill="currentColor" stroke="none" font-family="monospace" text-anchor="middle" data-text-body="1">TEXT</text>`;
    default:
      return '';
  }
}

function labelText(type){
  const m = {
    battery:'電池', 'ac-source':'AC電源', ground:'GND', resistor:'R',
    capacitor:'C', inductor:'L', diode:'D', led:'LED', switch:'SW',
    motor:'M', lamp:'LAMP', fuse:'FUSE', junction:'', text:'',
    transistor:'Tr', varresistor:'VR', gnd:'GND'
  };
  return m[type] || '';
}

function snap(v){ return Math.round(v / GRID) * GRID; }

const BASE_SCALE = 2;
let viewX = 0, viewY = 0, viewScale = BASE_SCALE;

function applyViewport(){
  const wrap = svg.parentElement;
  const w = wrap.clientWidth, h = wrap.clientHeight;
  svg.setAttribute('viewBox', `${viewX} ${viewY} ${w / viewScale} ${h / viewScale}`);
  const gs = GRID * viewScale;
  const ox = ((-viewX * viewScale) % gs + gs) % gs;
  const oy = ((-viewY * viewScale) % gs + gs) % gs;
  svg.style.backgroundSize = `${gs}px ${gs}px`;
  svg.style.backgroundPosition = `${ox}px ${oy}px`;
}

function screenToWorld(cx, cy){
  const rect = svg.getBoundingClientRect();
  const sx = cx - rect.left, sy = cy - rect.top;
  const wrap = svg.parentElement;
  return {
    x: viewX + sx / viewScale,
    y: viewY + sy / viewScale
  };
}

function addDot(g){ return ([tx,ty])=>{
  const c = document.createElementNS(NS,'circle');
  c.setAttribute('cx',tx); c.setAttribute('cy',ty);
  c.setAttribute('r','2.5');
  c.setAttribute('class','node-dot');
  g.appendChild(c);
};}

const canvasWrap = svg.parentElement;
const wireModeBanner = document.querySelector('.wire-mode-banner');

function setWireMode(active, hasStart){
  if(active){
    canvasWrap.classList.add('wire-active');
    wireModeBanner.textContent = hasStart
      ? '✏️ 配線モード — 終点をクリック / Escでキャンセル'
      : '✏️ 配線モード — 始点をクリック / Escでキャンセル';
  } else {
    canvasWrap.classList.remove('wire-active');
  }
}

let wireMousePos = null;
let wireCornerMode = 'H';

function routeWire(start, end){
  if(start.x === end.x || start.y === end.y){
    return [start, end];
  }
  if(wireCornerMode === 'H'){
    return [start, {x: end.x, y: start.y}, end];
  } else {
    return [start, {x: start.x, y: end.y}, end];
  }
}

function render(){
  svg.innerHTML = '';

  wires.forEach(w=>{
    if(w.pts.length < 2) return;
    const pts = w.pts.map(p=>`${p.x},${p.y}`).join(' ');

    const hitPl = document.createElementNS(NS,'polyline');
    hitPl.setAttribute('points', pts);
    hitPl.setAttribute('fill','none');
    hitPl.setAttribute('stroke','transparent');
    hitPl.setAttribute('stroke-width','12');
    hitPl.dataset.id = 'w'+w.id;
    hitPl.dataset.kind = 'wire';
    svg.appendChild(hitPl);

    const pl = document.createElementNS(NS,'polyline');
    pl.setAttribute('points', pts);
    pl.setAttribute('class', 'elem-wire' + (selectedId===('w'+w.id) ? ' elem-selected':''));
    pl.setAttribute('fill','none');
    pl.dataset.id = 'w'+w.id;
    pl.dataset.kind = 'wire';
    svg.appendChild(pl);
  });

  if(mode === 'wire' && wireStart && wireMousePos){
    const {x:mx, y:my} = wireMousePos;
    const previewPts = routeWire(wireStart, {x:mx,y:my});
    if(previewPts.length >= 2){
      const pts = previewPts.map(p=>`${p.x},${p.y}`).join(' ');
      const pl = document.createElementNS(NS,'polyline');
      pl.setAttribute('points', pts);
      pl.setAttribute('fill','none');
      pl.setAttribute('stroke','var(--accent)');
      pl.setAttribute('stroke-width','1.5');
      pl.setAttribute('stroke-dasharray','6 3');
      pl.setAttribute('pointer-events','none');
      svg.appendChild(pl);
    }
  }

  elements.forEach(el=>{
    const g = document.createElementNS(NS,'g');
    g.setAttribute('transform', `translate(${el.x},${el.y}) rotate(${el.rot})`);
    g.dataset.id = 'e'+el.id;
    g.dataset.kind = 'elem';
    g.style.cursor = 'pointer';

    const hit = document.createElementNS(NS,'rect');
    hit.setAttribute('x', '-24');
    hit.setAttribute('y', '-24');
    hit.setAttribute('width', '48');
    hit.setAttribute('height', '48');
    hit.setAttribute('fill', 'transparent');
    hit.setAttribute('stroke', 'none');
    g.appendChild(hit);

    const body = document.createElementNS(NS,'g');
    body.setAttribute('class','elem-symbol' + (selectedId===('e'+el.id) ? ' elem-selected':''));
    body.innerHTML = symbolBody(el.type);
    if(el.type === 'text'){
      const tb = body.querySelector('[data-text-body]');
      if(tb) tb.textContent = el.label || 'TEXT';
    }
    g.appendChild(body);

    const lbl = labelText(el.type);
    if(lbl){
      const DIAG = 18;
      const off = {x: DIAG, y: -DIAG};

      const rad = el.rot * Math.PI / 180;
      const rx = off.x * Math.cos(rad) - off.y * Math.sin(rad);
      const ry = off.x * Math.sin(rad) + off.y * Math.cos(rad);

      const txt = el.label !== undefined ? el.label : lbl;
      const charW = 8, pad = 4;
      const bw = txt.length * charW + pad * 2;

      const bg = document.createElementNS(NS,'rect');
      bg.setAttribute('x', rx - bw/2);
      bg.setAttribute('y', ry - 11);
      bg.setAttribute('width', bw);
      bg.setAttribute('height', 14);
      bg.setAttribute('fill', 'none');
      bg.setAttribute('rx', '2');
      g.appendChild(bg);

      const t = document.createElementNS(NS,'text');
      t.setAttribute('x', rx);
      t.setAttribute('y', ry);
      t.setAttribute('class','elem-label');
      t.setAttribute('text-anchor','middle');
      t.setAttribute('transform', `rotate(${-el.rot}, ${rx}, ${ry})`);
      t.textContent = txt;
      t.dataset.labelId = el.id;
      g.appendChild(t);
    }

    if(el.type === 'transistor'){
      [[-20,0],[4,-17],[4,17]].forEach(addDot(g));
    } else if(el.type === 'ground' || el.type === 'gnd'){
      addDot(g)([0,-20]);
    } else if(el.type === 'varresistor'){
      [[-20,0],[20,0],[0,-20]].forEach(addDot(g));
    } else if(el.type !== 'junction' && el.type !== 'text'){
      [[-20,0],[20,0]].forEach(addDot(g));
    }

    svg.appendChild(g);
  });

  document.getElementById('status').textContent =
    `部品: ${elements.length} ／ 配線: ${wires.length} ／ ズーム: ${Math.round(viewScale / BASE_SCALE * 100)}%`;
}

svg.addEventListener('click', (e)=>{
  if(panning) return;
  const {x, y} = screenToWorld(e.clientX, e.clientY);
  const sx = snap(x), sy = snap(y);

  if(mode === 'place'){
    elements.push({id: nextId++, type: placingType, x: sx, y: sy, rot:0, label: undefined});
    mode = 'select';
    placingType = null;
    setActiveTool('btn-select');
    render();
    return;
  }

  if(mode === 'wire'){
    if(!wireStart){
      wireStart = {x: sx, y: sy};
      wireMousePos = {x: sx, y: sy};
      setWireMode(true, true);
    } else {
      if(wireStart.x !== sx || wireStart.y !== sy){
        const pts = routeWire(wireStart, {x:sx, y:sy});
        wires.push({id: nextId++, pts});
      }
      wireStart = null;
      wireMousePos = null;
      setWireMode(true, false);
      render();
    }
    return;
  }

  if(mode === 'delete'){
    const target = e.target.closest('[data-id]');
    if(target){
      const id = target.dataset.id;
      if(id.startsWith('e')) elements = elements.filter(el=>'e'+el.id !== id);
      else wires = wires.filter(w=>'w'+w.id !== id);
      render();
    }
    return;
  }

  if(e.target === svg){
    selectedId = null;
    render();
  }
});

let panning = false;
let panStart = null;

svg.addEventListener('mousedown', (e)=>{
  if(e.button === 1 || (e.button === 0 && spaceDown)){
    panning = true;
    panStart = {cx: e.clientX, cy: e.clientY, vx: viewX, vy: viewY};
    e.preventDefault();
    return;
  }
  if(mode !== 'select') return;
  const target = e.target.closest('[data-id]');
  if(!target) return;
  const id = target.dataset.id;
  selectedId = id;

  if(id.startsWith('e')){
    const el = elements.find(x=>'e'+x.id === id);
    const {x, y} = screenToWorld(e.clientX, e.clientY);
    dragging = {
      id: el.id,
      offsetX: x - el.x,
      offsetY: y - el.y
    };
  }
  render();
});

svg.addEventListener('mousemove', (e)=>{
  if(panning && panStart){
    const dx = (e.clientX - panStart.cx) / viewScale;
    const dy = (e.clientY - panStart.cy) / viewScale;
    viewX = panStart.vx - dx;
    viewY = panStart.vy - dy;
    applyViewport();
    return;
  }
  if(mode === 'wire' && wireStart){
    const {x, y} = screenToWorld(e.clientX, e.clientY);
    wireMousePos = {x: snap(x), y: snap(y)};
    render();
    return;
  }
  if(!dragging) return;
  const {x, y} = screenToWorld(e.clientX, e.clientY);
  const el = elements.find(x=>x.id === dragging.id);
  if(!el) return;
  el.x = snap(x - dragging.offsetX);
  el.y = snap(y - dragging.offsetY);
  render();
});

window.addEventListener('mouseup', ()=>{
  panning = false;
  panStart = null;
  dragging = null;
});

let spaceDown = false;
window.addEventListener('keydown', (e)=>{
  if(e.code === 'Space' && !e.repeat){
    spaceDown = true;
    svg.style.cursor = 'grab';
    e.preventDefault();
  }
  if(e.code === 'KeyR' && mode === 'wire' && wireStart){
    wireCornerMode = wireCornerMode === 'H' ? 'V' : 'H';
    render();
  }
  if(e.code === 'Escape'){
    mode = 'select';
    wireStart = null;
    wireMousePos = null;
    setWireMode(false);
    setActiveTool('btn-select');
    document.querySelectorAll('.symbol-btn').forEach(b=>{ b.style.borderColor=''; b.style.background=''; });
    render();
  }
});
window.addEventListener('keyup', (e)=>{
  if(e.code === 'Space'){
    spaceDown = false;
    svg.style.cursor = '';
  }
});

svg.addEventListener('wheel', (e)=>{
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
  const newScale = Math.min(BASE_SCALE * 8, Math.max(BASE_SCALE * 0.2, viewScale * factor));
  const {x: wx, y: wy} = screenToWorld(e.clientX, e.clientY);
  viewScale = newScale;
  const rect = svg.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  viewX = wx - sx / viewScale;
  viewY = wy - sy / viewScale;
  applyViewport();
  updateZoomStatus();
}, {passive: false});

function updateZoomStatus(){
  document.getElementById('status').textContent =
    `部品: ${elements.length} ／ 配線: ${wires.length} ／ ズーム: ${Math.round(viewScale / BASE_SCALE * 100)}%`;
}

svg.addEventListener('contextmenu', (e)=>{
  if(mode === 'wire' && wireStart){
    wireStart = null;
    wireMousePos = null;
    setWireMode(false);
    render();
    e.preventDefault();
  }
});

window.addEventListener('keydown', (e)=>{
  if(e.key === 'Delete' || e.key === 'Backspace'){
    if(selectedId){
      if(selectedId.startsWith('e')) elements = elements.filter(el=>'e'+el.id !== selectedId);
      else wires = wires.filter(w=>'w'+w.id !== selectedId);
      selectedId = null;
      render();
    }
  }
});

const labelEditor = document.getElementById('label-editor');
let editingId = null;

svg.addEventListener('dblclick', (e)=>{
  let labelTarget = e.target.closest('[data-label-id]');
  let textBodyTarget = e.target.closest('[data-text-body]');

  let targetEl = null;
  if(labelTarget){
    targetEl = elements.find(x => x.id === parseInt(labelTarget.dataset.labelId));
  } else if(textBodyTarget){
    const g = e.target.closest('[data-id]');
    if(g) targetEl = elements.find(x => 'e'+x.id === g.dataset.id);
  }
  if(!targetEl) return;
  e.stopPropagation();
  editingId = targetEl.id;

  const svgRect = svg.getBoundingClientRect();
  const hitNode = labelTarget || textBodyTarget;
  const bbox = hitNode.getBoundingClientRect();
  labelEditor.style.display = 'block';
  labelEditor.style.left = (bbox.left - svgRect.left - 4) + 'px';
  labelEditor.style.top  = (bbox.top  - svgRect.top  - 2) + 'px';
  labelEditor.style.width = Math.max(80, bbox.width + 16) + 'px';
  labelEditor.value = targetEl.label !== undefined ? targetEl.label : (targetEl.type === 'text' ? 'TEXT' : labelText(targetEl.type));
  labelEditor.focus();
  labelEditor.select();
});

function commitLabel(){
  if(editingId === null) return;
  const el = elements.find(x=>x.id === editingId);
  if(el) el.label = labelEditor.value;
  labelEditor.style.display = 'none';
  editingId = null;
  render();
}

labelEditor.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){ commitLabel(); e.preventDefault(); }
  if(e.key === 'Escape'){ labelEditor.style.display='none'; editingId=null; }
  e.stopPropagation();
});
labelEditor.addEventListener('blur', commitLabel);


document.querySelectorAll('.symbol-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const type = btn.dataset.type;
    if(type === 'wire'){
      if(mode === 'wire'){
        mode = 'select';
        wireStart = null;
        wireMousePos = null;
        setActiveTool('btn-select');
        document.querySelectorAll('.symbol-btn').forEach(b=>{ b.style.borderColor=''; b.style.background=''; });
        setWireMode(false);
      } else {
        mode = 'wire';
        wireStart = null;
        setActiveTool(null);
        document.querySelectorAll('.symbol-btn').forEach(b=>{ b.style.borderColor=''; b.style.background=''; });
        btn.style.borderColor = 'var(--accent)';
        btn.style.background = 'var(--accent)';
        setWireMode(true, false);
      }
    } else {
      mode = 'place';
      placingType = type;
      setActiveTool(null);
      document.querySelectorAll('.symbol-btn').forEach(b=>{ b.style.borderColor=''; b.style.background=''; });
      btn.style.borderColor = 'var(--accent)';
    }
  });
});

function setActiveTool(id){
  document.querySelectorAll('.toolbar button').forEach(b=>b.classList.remove('active'));
  if(id) document.getElementById(id).classList.add('active');
}

document.getElementById('btn-zoom-in').addEventListener('click', ()=>{

});
document.getElementById('btn-zoom-out').addEventListener('click', ()=>{

  applyViewport(); updateZoomStatus();
});
document.getElementById('btn-zoom-reset').addEventListener('click', ()=>{
  viewX = 0; viewY = 0; viewScale = BASE_SCALE;
  applyViewport(); updateZoomStatus();
});


document.getElementById('btn-select').addEventListener('click', ()=>{
  mode = 'select'; placingType = null; wireStart = null;
  setWireMode(false);
  setActiveTool('btn-select');
  document.querySelectorAll('.symbol-btn').forEach(b=>{ b.style.borderColor=''; b.style.background=''; });
});

document.getElementById('btn-delete').addEventListener('click', ()=>{

  setWireMode(false);
  setActiveTool('btn-delete');

});

document.getElementById('btn-rotate').addEventListener('click', ()=>{

document.getElementById('btn-clear').addEventListener('click', ()=>{

document.getElementById('btn-save').addEventListener('click', ()=>{
  const lines = [];
  lines.push('CIRCUIT_CSV_V1');
  lines.push('## ELEMENTS');
  lines.push('id,type,x,y,rot,label');
  elements.forEach(el => {
    const label = el.label !== undefined ? el.label : '';
    lines.push(`${el.id},${el.type},${el.x},${el.y},${el.rot},${label}`);
  });
  lines.push('## WIRES');
  lines.push('id,pts');
  wires.forEach(w => {
    const ptsStr = w.pts.map(p => `${p.x}:${p.y}`).join('|');
    lines.push(`${w.id},${ptsStr}`);
  });
  lines.push(`## NEXTID,${nextId}`);

  const blob = new Blob([lines.join('\n')], {type: 'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'circuit.csv';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('btn-load').addEventListener('click', ()=>{
  document.getElementById('file-loader').click();
});

document.getElementById('file-loader').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try {
      const lines = ev.target.result.split('\n').map(l => l.trim()).filter(l => l);
      if(lines[0] !== 'CIRCUIT_CSV_V1') { alert('対応していないファイル形式です'); return; }

      const newElements = [], newWires = [];
      let newNextId = 1;
      let section = '';

      for(let i = 1; i < lines.length; i++){
        const line = lines[i];
        if(line.startsWith('## ELEMENTS')){ section = 'elements'; continue; }
        if(line.startsWith('## WIRES'))   { section = 'wires';    continue; }
        if(line.startsWith('## NEXTID'))  {
          newNextId = parseInt(line.split(',')[1]) || 1;
          continue;
        }
        if(line.startsWith('id,')) continue;

        if(section === 'elements'){
          const parts = line.split(',');
          const id   = parseInt(parts[0]);
          const type = parts[1];
          const x    = parseInt(parts[2]);
          const y    = parseInt(parts[3]);
          const rot  = parseInt(parts[4]);
          const label = parts.slice(5).join(',') || undefined;
          if(!isNaN(id) && type) newElements.push({id, type, x, y, rot, label: label === '' ? undefined : label});
        }
        if(section === 'wires'){
          const comma = line.indexOf(',');
          const id  = parseInt(line.slice(0, comma));
          const pts = line.slice(comma + 1).split('|').map(p => {
            const [px, py] = p.split(':');
            return {x: parseInt(px), y: parseInt(py)};
          });
          if(!isNaN(id) && pts.length >= 2) newWires.push({id, pts});
        }
      }

      if(confirm(`部品 ${newElements.length} 個、配線 ${newWires.length} 本を読み込みます。現在のデータは上書きされます。`)){
        elements = newElements;
        wires    = newWires;
        nextId   = newNextId;
        selectedId = null;
        render();
      }
    } catch(err){
      alert('読み込みに失敗しました: ' + err.message);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});



document.getElementById('btn-export').addEventListener('click', ()=>{
  selectedId = null;
  render();
  const clone = svg.cloneNode(true);
  clone.setAttribute('xmlns', NS);
  clone.removeAttribute('style');

  clone.querySelectorAll('.node-dot').forEach(n => n.remove());
  clone.querySelectorAll('polyline[stroke-dasharray]').forEach(n => n.remove());
  clone.querySelectorAll('rect[fill="transparent"]').forEach(n => n.remove());
  clone.querySelectorAll('polyline[stroke="transparent"]').forEach(n => n.remove());

  const styleRules = {
    'elem-wire':   'stroke:#1e2a3a;stroke-width:2;fill:none;',
    'elem-symbol': 'stroke:#1e2a3a;stroke-width:2;fill:none;',
    'elem-label':  'font-family:monospace;font-size:12px;fill:#1e2a3a;',
  };
  clone.querySelectorAll('*').forEach(node => {
    const cls = node.getAttribute('class') || '';
    let style = '';
    cls.split(' ').forEach(c => { if(styleRules[c]) style += styleRules[c]; });
    if(style) node.setAttribute('style', style);
    ['stroke','fill'].forEach(attr => {
      if(node.getAttribute(attr) === 'currentColor') node.setAttribute(attr, '#1e2a3a');
    });
  });

  const bg = document.createElementNS(NS,'rect');
  bg.setAttribute('width','100%'); bg.setAttribute('height','100%'); bg.setAttribute('fill','#ffffff');
  clone.insertBefore(bg, clone.firstChild);

  const serializer = new XMLSerializer();
  let src = serializer.serializeToString(clone);
  src = src.replace(/currentColor/g, '#1e2a3a');
  const blob = new Blob([src], {type:'image/svg+xml'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'circuit.svg';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('btn-screenshot').addEventListener('click', ()=>{
  const prevSelected = selectedId;
  selectedId = null;
  const prevWireStart = wireStart;
  wireStart = null;
  render();

  const clone = svg.cloneNode(true);
  clone.setAttribute('xmlns', NS);

  clone.querySelectorAll('.node-dot').forEach(n => n.remove());
  clone.querySelectorAll('polyline[stroke-dasharray]').forEach(n => n.remove());

  const styleRules = {
    'elem-wire':     'stroke:#1e2a3a;stroke-width:2;fill:none;',
    'elem-symbol':   'stroke:#1e2a3a;stroke-width:2;fill:none;',
    'elem-selected': 'stroke:#2563eb;',
    'elem-label':    'font-family:IBM Plex Mono,Courier New,monospace;font-size:12px;fill:#1e2a3a;',
  };
  clone.querySelectorAll('*').forEach(node => {
    const cls = node.getAttribute('class') || '';
    let style = node.getAttribute('style') || '';
    cls.split(' ').forEach(c => {
      if(styleRules[c]) style += styleRules[c];
    });
    if(style) node.setAttribute('style', style);
    ['stroke','fill'].forEach(attr => {
      if(node.getAttribute(attr) === 'currentColor')
        node.setAttribute(attr, '#1e2a3a');
    });
  });

  const bg = document.createElementNS(NS, 'rect');
  bg.setAttribute('width', '100%');
  bg.setAttribute('height', '100%');
  bg.setAttribute('fill', '#ffffff');
  clone.insertBefore(bg, clone.firstChild);

  clone.removeAttribute('style');
  clone.style.cssText = '';

  const serializer = new XMLSerializer();
  let src = serializer.serializeToString(clone);
  src = src.replace(/currentColor/g, '#1e2a3a');

  const img = new Image();
  const svgBlob = new Blob([src], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(svgBlob);
  img.onload = ()=>{
    const canvas = document.createElement('canvas');
    canvas.width  = svg.clientWidth  * window.devicePixelRatio;
    canvas.height = svg.clientHeight * window.devicePixelRatio;
    const ctx = canvas.getContext('2d');
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, svg.clientWidth, svg.clientHeight);
    ctx.drawImage(img, 0, 0, svg.clientWidth, svg.clientHeight);
    URL.revokeObjectURL(url);
    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'circuit.jpg';
      a.click();
    }, 'image/jpeg', 0.95);
  };
  img.src = url;

  selectedId = prevSelected;
  wireStart = prevWireStart;
  render();
});


function resizeCanvas(){
  const wrap = svg.parentElement;
  svg.setAttribute('width', wrap.clientWidth);
  svg.setAttribute('height', wrap.clientHeight);
  applyViewport();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
render();
</script>
