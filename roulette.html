<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ルーレット</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @layer base {
            html, body {
                font-family: 'Inter', sans-serif;
            }
        }
        #wheelContainer {
            position: relative;
            width: 70vmin; 
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            flex-shrink: 0;
        }
        #pointer {
            position: absolute;
            top: -25px; 
            left: calc(50% - 15px);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ef4444;
            z-index: 10;
        }
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #333;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5); 
            position: relative;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        @media (max-width: 1023px) {
            #wheelContainer { width: 90vmin; }
        }
    </style>
</head>

<body class="bg-gray-100 p-6 min-h-screen flex flex-col items-center">
    <h1 class="text-3xl font-bold mb-6 text-gray-800 w-full text-center flex-shrink-0">ルーレット</h1>
    <div class="w-full max-w-6xl">
        <div class="w-full max-w-6xl lg:flex lg:space-x-12 lg:items-start">
            <div class="lg:w-1/2 flex justify-center items-start mb-8 lg:mb-0 lg:sticky lg:top-6">
                <div id="wheelContainer">
                    <div id="pointer"></div>
                    <canvas id="wheel"></canvas>
                </div>
            </div>

            <div class="lg:w-1/2 flex flex-col items-center lg:items-start justify-start pt-4">
                <div class="w-full max-w-md lg:max-w-full">
                    <div class="flex items-center gap-3 mb-4">
                        <label class="text-gray-700 font-semibold whitespace-nowrap">等分数:</label>
                        <input id="divCount" type="number" min="2" max="40" value="10"
                            class="w-20 border rounded-lg p-2 text-center shadow-sm focus:border-red-500 focus:ring focus:ring-red-500 focus:ring-opacity-50 font-bold text-lg">
                        <span class="text-gray-500 text-sm">（2〜40）</span>
                    </div>

                    <div id="segmentFields" class="flex flex-col gap-2 mb-4 max-h-72 overflow-y-auto pr-1"></div>

                    <button id="spinButton" class="mt-2 w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition duration-150 ease-in-out shadow-lg disabled:opacity-50">
                        スタート
                    </button>
                </div>

                <div id="result" class="mt-6 p-4 bg-white border border-red-300 text-red-700 text-4xl font-extrabold rounded-lg shadow-inner w-full max-w-md lg:max-w-full text-center">
                    項目を入力してください
                </div>
            </div>

        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinButton = document.getElementById('spinButton');
        const resultDiv = document.getElementById('result');
        const divCountInput = document.getElementById('divCount');
        const segmentFields = document.getElementById('segmentFields');

        let segments = [];
        let rotation = 0;
        let spinning = false;

        function loadFromStorage() {
            divCountInput.value = 10;
            buildSegmentFields(10, null);
        }

        function getDefaultColor(i, total) {
            const hue = Math.round((i / total) * 360);
            return `hsl(${hue}, 85%, 58%)`;
        }

        function buildSegmentFields(count, prevData) {
            segmentFields.innerHTML = '';
            const userColors = new Set();
            if (prevData) {
                prevData.forEach((d, i) => {
                    if (i < count && d && d.userDefined) userColors.add(i);
                });
            }

            const autoIndices = [];
            for (let i = 0; i < count; i++) {
                if (!userColors.has(i)) autoIndices.push(i);
            }

            for (let i = 0; i < count; i++) {
                const label = prevData && prevData[i] ? prevData[i].label : String(i + 1);
                let color;
                if (userColors.has(i) && prevData[i]) {
                    color = prevData[i].color;
                } else {
                    const autoRank = autoIndices.indexOf(i);
                    const hue = Math.round((autoRank / autoIndices.length) * 360);
                    color = `hsl(${hue}, 85%, 58%)`;
                }
                const row = document.createElement('div');
                row.className = 'flex items-center gap-2';
                row.innerHTML = `
                    <span class="text-gray-500 text-sm w-5 text-right flex-shrink-0">${i + 1}</span>
                    <input type="text" class="seg-label border rounded-lg p-2 flex-grow shadow-sm focus:border-red-500 focus:ring focus:ring-red-500 focus:ring-opacity-50" value="${label}" placeholder="ラベル">
                    <input type="color" class="seg-color w-10 h-10 rounded-lg border cursor-pointer shadow-sm flex-shrink-0" value="${color}">
                `;
                segmentFields.appendChild(row);
            }
            segmentFields.querySelectorAll('.seg-label').forEach(el => {
                el.addEventListener('input', buildSegmentsFromFields);
            });
            segmentFields.querySelectorAll('.seg-color').forEach(el => {
                el.addEventListener('input', () => {
                    el.dataset.userDefined = 'true';
                    buildSegmentsFromFields();
                });
            });
            buildSegmentsFromFields();
        }

        function buildSegmentsFromFields() {
            const labels = segmentFields.querySelectorAll('.seg-label');
            const colors = segmentFields.querySelectorAll('.seg-color');
            segments = [];
            labels.forEach((lbl, i) => {
                segments.push({
                    label: lbl.value.trim() || String(i + 1),
                    color: colors[i].value,
                    userDefined: colors[i].dataset.userDefined === 'true'
                });
            });
            spinButton.disabled = segments.length < 2;
            if (segments.length >= 2) resultDiv.textContent = '準備完了！';
            drawWheel();
        }

        function handleDivCountChange() {
            let count = parseInt(divCountInput.value);
            if (isNaN(count) || count < 2) count = 2;
            if (count > 40) count = 40;
            divCountInput.value = count;
            const prevData = segments.map(s => ({ label: s.label, color: s.color, userDefined: s.userDefined }));
            buildSegmentFields(count, prevData);
        }
        divCountInput.addEventListener('change', handleDivCountChange);
        divCountInput.addEventListener('input', handleDivCountChange);

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
            if (!spinning) drawWheel();
        }
        window.addEventListener('resize', resizeCanvas);

        function drawWheel() {
            if (!segments.length) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }
            const rect = canvas.getBoundingClientRect();
            const cx = rect.width / 2, cy = rect.height / 2;
            const radius = Math.min(cx, cy);
            const segmentAngleRad = 2 * Math.PI / segments.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(rotation * Math.PI / 180);
            segments.forEach((seg, i) => {
                const start = i * segmentAngleRad, end = start + segmentAngleRad;
                ctx.beginPath(); ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, start, end); ctx.closePath();
                ctx.fillStyle = seg.color; ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                ctx.save();
                ctx.rotate(start + segmentAngleRad / 2);
                ctx.textAlign = 'right'; ctx.fillStyle = '#000';
                const fontSize = Math.max(14, radius * 0.1);
                ctx.font = `bold ${fontSize}px sans-serif`;
                ctx.fillText(seg.label, radius - Math.max(10, radius * 0.03), 5);
                ctx.restore();
            });
            ctx.restore();
        }

        function spin() {
            if (spinning || !segments.length) return;
            spinning = true;
            spinButton.disabled = true;
            resultDiv.textContent = '回転中...';
            const targetRotation = rotation + (5 + Math.random() * 3) * 360 + Math.random() * 360;
            const start = rotation, duration = 5000, startTime = performance.now();
            function animate(now) {
                const progress = Math.min((now - startTime) / duration, 1);
                rotation = start + (targetRotation - start) * (1 - Math.pow(1 - progress, 3));
                drawWheel();
                if (progress < 1) { requestAnimationFrame(animate); return; }
                rotation = ((rotation % 360) + 360) % 360;
                const segDeg = 360 / segments.length;
                const pointerAngle = ((360 - (rotation % 360)) + 270) % 360;
                const resultIndex = Math.floor(pointerAngle / segDeg) % segments.length;
                resultDiv.textContent = `結果: ${segments[resultIndex].label}`;
                spinning = false;
                spinButton.disabled = false;
            }
            requestAnimationFrame(animate);
        }

        spinButton.addEventListener('click', spin);

        window.onload = () => {
            loadFromStorage();
            requestAnimationFrame(() => resizeCanvas());
        };
    </script>
</body>
</html>
