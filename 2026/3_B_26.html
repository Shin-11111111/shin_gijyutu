<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学3年・重要英単語帳</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-front: #ffffff;
            --card-back: #4a90e2;
            --text-front: #2c3e50;
            --text-back: #ffffff;
            --accent-color: #e74c3c;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        /* 進捗バー */
        .progress-container {
            width: 350px;
            background-color: #e0e0e0;
            height: 6px;
            border-radius: 3px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--accent-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .counter {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 10px;
        }

        /* 単語帳カードの外枠 */
        .card-container {
            width: 350px;
            height: 230px;
            perspective: 1000px;
            cursor: pointer;
        }

        /* カードのインナー */
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-radius: 12px;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        /* 表・裏の共通スタイル */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 表面 */
        .card-front {
            background-color: var(--card-front);
            color: var(--text-front);
            border: 2px solid #dcdde1;
        }

        .word {
            font-size: 2.2rem;
            font-weight: bold;
        }

        .hint {
            font-size: 0.85rem;
            color: #95a5a6;
            margin-top: 15px;
        }

        /* 裏面 */
        .card-back {
            background-color: var(--card-back);
            color: var(--text-back);
            transform: rotateY(180deg);
        }

        .meaning {
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
        }

        .example {
            font-size: 0.9rem;
            margin-top: 15px;
            text-align: center;
            opacity: 0.95;
            line-height: 1.4;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 12px;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
        }

        /* コントロールボタン */
        .controls {
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }

        button {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

    <h1>中3重要英単語・熟語</h1>
    <div class="subtitle">高校入試頻出フレーズ</div>

    <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
    </div>
    <div class="counter" id="counter">1 / 15</div>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="word" id="word-eng">environment</div>
                <div class="hint">タップで意味を表示</div>
            </div>
            <div class="card-face card-back">
                <div class="meaning" id="word-jp">環境</div>
                <div class="example" id="word-ex">We must protect the environment.</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevWord()">前へ</button>
        <button onclick="nextWord()">次へ</button>
    </div>

    <script>
        // 中3レベルの重要単語・熟語リスト（15語）
        const wordList = [
            { eng: "environment", jp: "環境", ex: "We must protect the environment." },
            { eng: "government", jp: "政府", ex: "The government made a new rule." },
            { eng: "experience", jp: "経験、経験する", ex: "I have a lot of experience in cooking." },
            { eng: "population", jp: "人口", ex: "The population of Japan is decreasing." },
            { eng: "relationship", jp: "関係、つながり", ex: "They have a good relationship." },
            { eng: "improve", jp: "〜を向上させる、改善する", ex: "I want to improve my English skills." },
            { eng: "receive", jp: "〜を受け取る", ex: "She received a letter from her friend." },
            { eng: "accept", jp: "〜を受け入れる", ex: "It is important to accept differences." },
            { eng: "international", jp: "国際的な", ex: "Narita is an international airport." },
            { eng: "convenient", jp: "便利な、都合が良い", ex: "Computers are very convenient." },
            { eng: "traditional", jp: "伝統的な", ex: "Kyoto has many traditional buildings." },
            { eng: "look forward to ~", jp: "〜を楽しみに待つ", ex: "I'm looking forward to seeing you." },
            { eng: "take part in ~", jp: "〜に参加する (=join)", ex: "He will take part in the marathon." },
            { eng: "agree with ~", jp: "〜に賛成する", ex: "I agree with your opinion." },
            { eng: "because of ~", jp: "〜の理由で、〜のせいで", ex: "The game was canceled because of rain." }
        ];

        let currentIndex = 0;
        const cardElement = document.getElementById('card');
        const engElement = document.getElementById('word-eng');
        const jpElement = document.getElementById('word-jp');
        const exElement = document.getElementById('word-ex');
        const counterElement = document.getElementById('counter');
        const progressElement = document.getElementById('progress');

        function flipCard() {
            cardElement.classList.toggle('is-flipped');
        }

        function updateCard() {
            if (cardElement.classList.contains('is-flipped')) {
                cardElement.classList.remove('is-flipped');
                setTimeout(dataData, 250);
            } else {
                dataData();
            }
        }

        function dataData() {
            // 文字の更新
            engElement.textContent = wordList[currentIndex].eng;
            jpElement.textContent = wordList[currentIndex].jp;
            exElement.textContent = "Ex: " + wordList[currentIndex].ex;
            
            // カウンターと進捗バーの更新
            counterElement.textContent = `${currentIndex + 1} / ${wordList.length}`;
            const progressPercent = ((currentIndex + 1) / wordList.length) * 100;
            progressElement.style.width = progressPercent + "%";

            // 文字数が多い熟語などのフォントサイズ微調整
            if (wordList[currentIndex].eng.length > 12) {
                engElement.style.fontSize = "1.8rem";
            } else {
                engElement.style.fontSize = "2.2rem";
            }
        }

        function nextWord() {
            currentIndex = (currentIndex + 1) % wordList.length;
            updateCard();
        }

        function prevWord() {
            currentIndex = (currentIndex - 1 + wordList.length) % wordList.length;
            updateCard();
        }

        // 初期実行（進捗バーの初期位置を設定）
        dataData();
    </script>
</body>
</html>
