<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学歴史 一問一答クイズ100</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --success-color: #2ecc71;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }
        .quiz-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .quiz-num {
            font-weight: bold;
            color: var(--primary-color);
            font-size: 1.1em;
            margin-bottom: 10px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 5px;
        }
        .quiz-question {
            font-size: 1.2em;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .options-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        @media(min-width: 600px) {
            .options-group {
                grid-template-columns: 1fr 1fr;
            }
        }
        .option-btn {
            background-color: #fff;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            padding: 15px;
            font-size: 1em;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #f1f5f9;
            border-color: #94a3b8;
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
        /* 正解・不正解のスタイル */
        .option-btn.correct {
            background-color: #d1fae5;
            border-color: var(--success-color);
            color: #065f46;
            font-weight: bold;
        }
        .option-btn.wrong {
            background-color: #fee2e2;
            border-color: var(--accent-color);
            color: #991b1b;
        }
        .explanation {
            margin-top: 15px;
            padding: 15px;
            background-color: #eff6ff;
            border-left: 5px solid #3b82f6;
            border-radius: 4px;
            display: none;
            font-size: 0.95em;
            line-height: 1.5;
        }
        /* 結果表示 */
        #result-panel {
            display: none;
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 30px;
        }
        .score-title {
            font-size: 1.8em;
            font-weight: bold;
            color: var(--primary-color);
        }
        .score-num {
            font-size: 3.5em;
            font-weight: bold;
            color: var(--accent-color);
            margin: 20px 0;
        }
        .submit-btn {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 40px auto 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background-color: #1a252f;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>中学歴史 一問一答 100問クイズ</h1>
    
    <div id="quiz-container">
        <!-- クイズがJavaScriptによってここに自動生成されます -->
    </div>

    <button class="submit-btn" onclick="calculateScore()">採点する</button>

    <div id="result-panel">
        <div class="score-title">あなたの得点</div>
        <div class="score-num"><span id="score-output">0</span> / 100 点</div>
        <p id="score-comment"></p>
        <button class="submit-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); location.reload();">もう一度挑戦する</button>
    </div>
</div>

<script>
// 100問のクイズデータ（問題、選択肢、正解のインデックス、解説）
const quizData = [
    // 旧石器〜古墳
    { q: "打製石器を使い、狩りや採集を行っていた時代を何というか？", a: ["旧石器時代", "新石器時代", "縄文時代", "弥生時代"], c: 0, e: "土器の出現前の時代を旧石器時代と呼び、打製石器が使われていました。" },
    { q: "縄文時代に、食べ物の残りかすなどを捨てた場所を何というか？", a: ["古墳", "貝塚", "高地性集落", "遺跡"], c: 1, e: "貝塚は当時のゴミ捨て場であり、当時の食生活を知る手がかりになります。" },
    { q: "弥生時代に大陸から伝わり、社会を大きく変化させた農業は何か？", a: ["畑作", "稲作", "新田開発", "輪作"], c: 1, e: "縄文時代晩期から弥生時代にかけて、大陸から本格的な稲作（米作り）が伝わりました。" },
    { q: "弥生時代の代表的な遺跡で、佐賀県にある環濠集落の遺跡はどこか？", a: ["三内丸山遺跡", "登呂遺跡", "吉野ヶ里遺跡", "岩宿遺跡"], c: 2, e: "吉野ヶ里遺跡は、濠や柵で囲まれた大規模な環濠集落の遺跡です。" },
    { q: "『漢書』地理志に記された、紀元前1世紀頃の日本の呼び名は何か？", a: ["倭", "日本", "邪馬台国", "狗奴国"], c: 0, e: "中国の歴史書では、当時の日本や日本人のことを「倭（わ）」と呼んでいました。" },
    { q: "3世紀に倭の30余りの小国を従え、中国（魏）に使いを送った女王は誰か？", a: ["推古天皇", "持統天皇", "卑弥呼", "北条政子"], c: 2, e: "邪馬台国の女王である卑弥呼は、魏に使いを送り「親魏倭王」の称号を得ました。" },
    { q: "4世紀から6世紀頃、豪族の墓として造られた巨大な土盛りを何というか？", a: ["貝塚", "古墳", "ピラミッド", "都城"], c: 1, e: "前方後円墳をはじめとする巨大なお墓が造られたこの時代を古墳時代と呼びます。" },
    { q: "5世紀頃、朝鮮半島から日本に移住し、大陸の技術や文化を伝えた人々を何というか？", a: ["遣隋使", "渡来人", "防人", "御家人"], c: 1, e: "渡来人によって、漢字、仏教、儒教、須恵器（すえき）などの技術が伝えられました。" },

    // 飛鳥〜奈良
    { q: "聖徳太子（厩戸王）が推古天皇の摂政となり、蘇我氏と協力して政治を行った時代は？", a: ["古墳時代", "飛鳥時代", "奈良時代", "平安時代"], c: 1, e: "飛鳥地方（奈良県）に都が置かれていたため、飛鳥時代と呼ばれます。" },
    { q: "聖徳太子が定めた、家柄にとらわれず能力のある人物を役人に登用する制度は何か？", a: ["十七条の憲法", "冠位十二階", "公地公民", "班田収授法"], c: 1, e: "冠位十二階は、冠の色で位を表し、個人の才能や功績を評価する制度です。" },
    { q: "645年、中大兄皇子と中臣鎌足らが蘇我氏を倒して始めた政治改革を何というか？", a: ["大化の改新", "壬申の乱", "承久の乱", "建武の新政"], c: 0, e: "中大兄皇子（のちの天智天皇）らが始めた、天皇中心の国づくりを目指す大改革です。" },
    { q: "大化の改新で示された、土地と人民を国家（天皇）のものとする原則を何というか？", a: ["版籍奉還", "分国法", "公地公民", "惣村"], c: 2, e: "それまで豪族が私有していた土地（田荘）と民（部民）を国家が直接支配する仕組みです。" },
    { q: "天武天皇の死後に起こった、古代最大の後継者争いの乱は何か？", a: ["平治の乱", "保元の乱", "壬申の乱", "承久の乱"], c: 2, e: "672年、天智天皇の跡継ぎを巡り、大友皇子と大海人皇子（のちの天武天皇）が戦いました。" },
    { q: "701年に制定され、唐の仕組みを手本にした律（刑罰）と令（政治のきまり）を何というか？", a: ["御成敗式目", "公事方御定書", "武家諸法度", "大宝律令"], c: 3, e: "大宝律令の完成により、日本は本格的な「律令国家」となりました。" },
    { q: "710年、唐の都（長安）にならって奈良に造られた都を何というか？", a: ["藤原京", "平城京", "平安京", "長岡京"], c: 1, e: "「なんと（710）美しい平城京」と覚えられます。ここから奈良時代が始まります。" },
    { q: "奈良時代に、国家の力で社会の不安を収めようと、東大寺の大仏を造らせた天皇は誰か？", a: ["聖武天皇", "天武天皇", "桓武天皇", "醍醐天皇"], c: 0, e: "聖武天皇は、全国に国分寺・国分尼寺を建て、都に東大寺の大仏を建立しました。" },
    { q: "奈良時代の税で、地方の特産物を都に納める義務を何というか？", a: ["租", "調", "庸", "防人"], c: 1, e: "「租」は米、「調」は特産物（絹や布など）、「庸」は労役の代わりの布を納める税です。" },
    { q: "現存する日本最古の和歌集で、防人や東国の農民の歌も収められているものは何か？", a: ["古今和歌集", "新古今和歌集", "万葉集", "懐風藻"], c: 2, e: "万葉集には、天皇から庶民まで幅広い人々の歌が約4500首収められています。" },

    // 平安時代
    { q: "794年、桓武天皇が現在の京都に遷した都を何というか？", a: ["平城京", "平安京", "恭仁京", "難波京"], c: 1, e: "「鳴くよ（794）ウグイス平安京」から、約400年続く平安時代が始まります。" },
    { q: "平安時代に、娘を天皇のきさきにして、その親戚として権力を握った藤原氏の政治を何というか？", a: ["院政", "摂関政治", "執権政治", "幕政"], c: 1, e: "幼い天皇の時は「摂政」、成人後は「関白」として政治の実権を握りました。" },
    { q: "藤原氏の全盛期を築き、「この世をば わが世とぞ思う…」と詠んだ人物は誰か？", a: ["藤原不比等", "藤原良房", "藤原道長", "藤原頼通"], c: 2, e: "藤原道長とその子・頼通の時代に、摂関政治は全盛期を迎えました。" },
    { q: "894年、菅原道真の提案により廃止された、唐へ送る使節の派遣を何というか？", a: ["遣隋使", "遣唐使", "新羅使", "宋使"], c: 1, e: "「白紙（894）に戻そう遣唐使」。唐の衰退と、日本の国風文化の発達の契機となりました。" },
    { q: "平安時代中期、日本の風土や生活に合わせた独自の文化を何というか？", a: ["天平文化", "弘仁・貞観文化", "国風文化", "化政文化"], c: 2, e: "かな文字の普及に伴い、紫式部の『源氏物語』や清少納言の『枕草子』などが誕生しました。" },
    { q: "天皇が位を譲って上皇（法皇）となった後も、そのまま政治の実権を握る政治形態を何というか？", a: ["摂関政治", "院政", "執権政治", "親政"], c: 1, e: "1086年、白河上皇が始めたものが最初とされ、摂関家を抑える役割を持ちました。" },
    { q: "12世紀後半、平治の乱などで武士の頂点に立ち、武士として初めて太政大臣になった人物は誰か？", a: ["平清盛", "平将門", "源頼朝", "源義家"], c: 0, e: "平清盛は日宋貿易を推進し、大輪田泊（現在の神戸港）を修築したことでも有名です。" },

    // 鎌倉時代
    { q: "源頼朝が現在の神奈川県に開き、日本で最初の本格的な武家政権となった幕府は何か？", a: ["鎌倉幕府", "室町幕府", "江戸幕府", "六波羅探題"], c: 0, e: "1192年（または1185年）に成立した武士の政権です。" },
    { q: "鎌倉幕府において、将軍と御家人の間で結ばれた「土地の保護」と「軍役の義務」の関係を何というか？", a: ["寄進", "惣領制", "御恩と奉公", "封建領主"], c: 2, e: "将軍が土地を認める「御恩」に対し、武士が命がけで戦う「奉公」で応える主従関係です。" },
    { q: "源頼朝の死後、北条氏が就任して幕府の実権を握った、将軍を補佐する最高職を何というか？", a: ["管領", "執権", "老中", "大老"], c: 1, e: "北条時政や義時らが就任し、以後北条氏による「執権政治」が続きました。" },
    { q: "1221年、後鳥羽上皇が幕府を倒そうと兵を挙げ、敗れて隠岐に流された事件を何というか？", a: ["承久の乱", "保元の乱", "平治の乱", "観応の擾乱"], c: 0, e: "承久の乱の後、幕府は朝廷を監視するために京都に「六波羅探題」を設置しました。" },
    { q: "1232年、北条泰時が定めた、武士社会の慣習をまとめた最初の武家法律は何か？", a: ["十七条の憲法", "御成敗式目（貞永式目）", "武家諸法度", "公事方御定書"], c: 1, e: "裁判の基準を明確にし、公平な裁判を行うために定められました。" },
    { q: "13世紀後半、2度にわたり元（モンゴル帝国）が日本に攻めてきた出来事を何というか？", a: ["元寇", "白村江の戦い", "文禄・慶長の役", "刀伊の入寇"], c: 0, e: "文永の役（1274年）と弘安の役（1281年）の2回、執権・北条時宗の時代に起こりました。" },
    { q: "元寇の後、困窮した御家人の領地をタダで取り戻させるために幕府が出した法令は何か？", a: ["武家諸法度", "徳政令（永仁の徳政令）", "惣領制", "倹約令"], c: 1, e: "借金を帳消しにしようとしましたが、かえって経済が混乱し、武士の幕府不信を招きました。" },

    // 室町時代
    { q: "鎌倉幕府の滅亡後、後醍醐天皇が始めた天皇中心の新しい政治を何というか？", a: ["院政", "大化の改新", "建武の新政", "大政奉還"], c: 2, e: "武士の不満を買い、わずか数年で足利尊氏によって崩壊しました。" },
    { q: "足利尊氏が京都に開き、約240年続いた武家政権を何というか？", a: ["鎌倉幕府", "室町幕府", "江戸幕府", "豊臣政権"], c: 1, e: "3代将軍の足利義満のときに京都の室町に邸宅が移されたため、こう呼ばれます。" },
    { q: "室町幕府の3代将軍で、南北朝の合一や、明との間で勘合貿易を行ったのは誰か？", a: ["足利尊氏", "足利義満", "足利義政", "足利義昭"], c: 1, e: "足利義満は金閣（鹿苑寺）を建て、北山文化の中心となりました。" },
    { q: "勘合貿易において、正式な貿易船と倭寇（海賊）を区別するために使われた札を何というか？", a: ["朱印状", "勘合（勘合符）", "割符", "裏書"], c: 1, e: "明から支給された「勘合」を合わせることで、正式な船であることを証明しました。" },
    { q: "1467年、将軍の跡継ぎ争いなどから始まり、約11年間京都を戦場とした、戦国時代のきっかけとなった乱は何か？", a: ["応仁の乱", "観応の擾乱", "嘉吉の乱", "承久の乱"], c: 0, e: "「人の世むなしい（1467）応仁の乱」。ここから下剋上の風潮が強まる戦国時代へと突入します。" },
    { q: "室町時代、農民たちが団結して、領主や高利貸し（土倉・酒屋）に対して徳政令を求めて起こした暴動を何というか？", a: ["一向一揆", "土一揆（徳政一揆）", "国一揆", "百姓一揆"], c: 1, e: "正長の土一揆（1428年）などが有名で、民衆の力が向上したことを示しています。" },
    { q: "8代将軍・足利義政の時代に栄えた、銀閣に代表される、禅宗の影響を受けた簡素な文化を何というか？", a: ["北山文化", "東山文化", "桃山文化", "元禄文化"], c: 1, e: "東山文化では、現在の和風建築の基礎となる「書院造」が完成しました。" },

    // 安土桃山時代
    { q: "1543年、種子島に漂着したポルトガル人によって日本に伝えられた武器は何か？", a: ["羅針盤", "鉄砲（火縄銃）", "大砲", "弓矢"], c: 1, e: "鉄砲の伝来は、その後の戦術や城の造り方を大きく変えました。" },
    { q: "1549年、鹿児島に来日し、日本に初めてキリスト教を伝えたイエズス会の宣教師は誰か？", a: ["フランシスコ・ザビエル", "ルイス・フロイス", "ペリー", "マルコ・ポーロ"], c: 0, e: "「以後よく（1549）伝わるキリスト教」。ザビエルによって西日本を中心に広まりました。" },
    { q: "織田信長が、室町幕府を滅ぼした後に本拠地とした、琵琶湖のほとりに築いた城は何か？", a: ["大阪城", "姫路城", "安土城", "伏見城"], c: 2, e: "五層七階の豪華な城でしたが、本能寺の変のあとに焼失しました。" },
    { q: "織田信長が城下町の商業を盛んにするため、座の特権を廃止し、市場の税を免除した政策を何というか？", a: ["楽市・楽座", "地租改正", "株仲間", "太閤検地"], c: 0, e: "だれでも自由に商売ができるようにすることで、経済を活性化させました。" },
    { q: "織田信長が明智光秀に裏切られ、自害に追い込まれた1582年の事件を何というか？", a: ["本能寺の変", "山崎の戦い", "長篠の戦い", "桶狭間の戦い"], c: 0, e: "「いちごパンツ（1582）の本能寺」。これにより信長の天下統一の夢は絶たれました。" },
    { q: "信長の後を継ぎ天下を統一した豊臣秀吉が、全国の田畑の広さや土地のよしあしを調べた政策は何か？", a: ["藩田収授法", "太閤検地", "地租改正", "人掃令"], c: 1, e: "ものさしや枡（ます）を統一し、収穫量を「石高（こくだか）」で表して、農民から直接年貢を取り立てました。" },
    { q: "豊臣秀吉が、一揆を防ぎ、農民を農業に専念させるために農民から武器を没収した政策を何というか？", a: ["刀狩", "惣無事令", "バテレン追放令", "武家諸法度"], c: 0, e: "刀狩と太閤検地により、武士と農民の身分が明確に区別される「兵農分離」が進みました。" },

    // 江戸時代（前半）
    { q: "1600年、徳川家康が石田三成らの西軍を破り、天下を決定づけた戦いを何というか？", a: ["関ヶ原の戦い", "大坂の陣", "長篠の戦い", "壇ノ浦の戦い"], c: 0, e: "「ヒーロー群れる（1600）関ヶ原」。この戦いに勝利した家康が主導権を握ります。" },
    { q: "徳川家康が1603年に征夷大将軍となり、開いた幕府は何か？", a: ["鎌倉幕府", "室町幕府", "江戸幕府", "豊臣政権"], c: 2, e: "現在の東京（江戸）に置かれ、約260年間続く平和な時代を築きました。" },
    { q: "江戸幕府が、大名を統制するために定めた法律を何というか？", a: ["御成敗式目", "武家諸法度", "公事方御定書", "十七条の憲法"], c: 1, e: "2代将軍・秀忠の時に制定され、無断での城の修理や婚姻などが禁止されました。" },
    { q: "3代将軍・徳川家光が定めた、大名に1年おきに江戸と領地を往復させる制度を何というか？", a: ["参勤交代", "江戸在番", "天下普請", "改易"], c: 0, e: "大名に多額の費用を使わせ、幕府に反抗する経済力を奪う目的もありました。" },
    { q: "1637年、九州でキリスト教徒の弾圧や重い年貢に反対して、天草四郎を大将に起こった一揆は何か？", a: ["島原・天草一揆", "大塩平八郎の乱", "一向一揆", "山城の国一揆"], c: 0, e: "これを機に、幕府はキリスト教の禁止と鎖国への動きをさらに強めました。" },
    { q: "江戸幕府がキリシタンを摘発するために、キリストやマリアの像を踏ませた制度（行事）を何というか？", a: ["宗門改", "絵踏（踏絵）", "寺請制度", "檀家"], c: 1, e: "絵踏を行わせ、踏めない者をキリシタンとして処刑・弾圧しました。" },
    { q: "鎖国下の日本において、ヨーロッパで唯一貿易を許された国と、その貿易港（出島）の場所はどこか？", a: ["イギリス・横浜", "ポルトガル・堺", "オランダ・長崎", "スペイン・平戸"], c: 2, e: "長崎の人工島である「出島」で、オランダおよび中国（清）とのみ貿易を行いました。" },
    { q: "江戸時代、五人程度の近隣農民でグループを作らせ、年貢の納入や犯罪防止に連帯責任を負わせた制度は？", a: ["五人組", "惣村", "株仲間", "若衆組"], c: 0, e: "農民同士を相互に監視させるための仕組みです。" },
    { q: "17世紀末から18世紀初め（元禄期）、上方（京都・大阪）を中心に栄えた町人文化を何というか？", a: ["東山文化", "元禄文化", "化政文化", "天平文化"], c: 1, e: "近松門左衛門の人形浄瑠璃、井原西鶴の浮世草子、松尾芭蕉の俳諧などが有名です。" },

    // 江戸時代（後半）
    { q: "5代将軍・徳川綱吉が出した、極端な動物愛護を強制し民衆を苦しめた法令を何というか？", a: ["武家諸法度", "生類憐みの令", "不当利得禁止令", "奢侈禁止令"], c: 1, e: "特に犬が手厚く保護されたため、綱吉は「犬公方（いぬくぼう）」と呼ばれました。" },
    { q: "8代将軍・徳川吉宗が行った、享保の改革において、大名に米を納めさせる代わりに江戸滞在を免除した制度は？", a: ["公事方御定書", "上米の制", "目安箱", "相対済令"], c: 1, e: "幕府の財政難を切り抜けるための臨時の措置です。" },
    { q: "田沼意次が老中だった時代に、商人が結成した同業者組織を公認し、税を徴収して財政を潤そうとした組織は？", a: ["座", "株仲間", "問屋", "組合"], c: 1, e: "株仲間を積極的に奨励しましたが、賄賂（わいろ）政治の横行を招いたとも批判されました。" },
    { q: "松平定信が行った「寛政の改革」において、旗本や御家人の借金を帳消しにした命令を何というか？", a: ["徳政令", "棄捐令", "人返しの法", "囲米"], c: 1, e: "生活に困窮した武士を救うために出された、借金破棄の命令です。" },
    { q: "1837年、飢饉に苦しむ人々を救うため、大坂で幕府の元役人が武装蜂起した事件を何というか？", a: ["大塩平八郎の乱", "島原の乱", "生麦事件", "水野忠邦の乱"], c: 0, e: "元幕府の役人（与力）が反乱を起こしたことは、幕府に大きな衝撃を与えました。" },
    { q: "杉田玄白や前野良沢らが、オランダ語の解剖書を翻訳して出版した医学書は何か？", a: ["解体新書", "古事記伝", "学問のすすめ", "海防新論"], c: 0, e: "これにより、西洋の学問を学ぶ「蘭学」が急速に発展しました。" },
    { q: "江戸時代後半、伊能忠敬が日本全国を実際に歩いて測量し、作成した精巧な地図は何か？", a: ["大日本沿海輿地全図", "坤輿万国全図", "日本国地理図", "江戸幕府公式地図"], c: 0, e: "現代の衛星写真と比較しても、極めて正確な日本地図を完成させました。" },
    { q: "19世紀初め、江戸（化政期）を中心に、浮世絵や滑稽本など町人の間で流行した文化を何というか？", a: ["天平文化", "元禄文化", "化政文化", "明治文化"], c: 2, e: "葛飾北斎や歌川広重の浮世絵、十返舎一九の『東海道中膝栗毛』などが有名です。" },

    // 幕末
    { q: "1853年、浦賀（神奈川県）に黒船で来航し、日本に開国を要求したアメリカの提督は誰か？", a: ["ペリー", "ハリス", "マッカーサー", "オールコック"], c: 0, e: "「いや（18）降参（53）ペリー来航」。これにより日本の鎖国体制は終わりを迎えます。" },
    { q: "1854年、幕府がアメリカと結び、下田・箱館の2港を開港することを取り決めた条約は何か？", a: ["日米修好通商条約", "日米和親条約", "下関条約", "日韓協約"], c: 1, e: "この条約により、200年以上続いた鎖国が終わりました。" },
    { q: "1858年、大老の井伊直弼が天皇の許可を得ずにアメリカと結んだ、不平等な通商条約は何か？", a: ["日米和親条約", "日米修好通商条約", "南京条約", "日露通好条約"], c: 1, e: "日本に「領事裁判権」を認め、「関税自主権」がないという不平等条約でした。" },
    { q: "日米修好通商条約に反対する武士や公家を、井伊直弼が大量に処刑・弾圧した事件を何というか？", a: ["安政の大獄", "桜田門外の変", "本能寺の変", "坂下門外の変"], c: 0, e: "この弾圧に対する怒りから、翌年、井伊直弼は「桜田門外の変」で暗殺されました。" },
    { q: "幕末、対立していた薩摩藩と長州藩の間を結びつけ、薩長同盟を仲介した土佐出身の人物は誰か？", a: ["西郷隆盛", "木戸孝允", "坂本龍馬", "勝海舟"], c: 2, e: "1866年、坂本龍馬や中岡慎太郎の仲介により、薩長同盟が成立し倒幕運動が本格化しました。" },
    { q: "1867年、江戸幕府の15代将軍・徳川慶喜が、政権を天皇に返上した出来事を何というか？", a: ["大政奉還", "王政復古の大号令", "版籍奉還", "武家諸法度廃止"], c: 0, e: "「人離（18）ろくな（67）大政奉還」。これにより鎌倉幕府以来、約680年続いた武士の政治が終了しました。" },

    // 明治時代（前半）
    { q: "大政奉還の後、天皇中心の新政府を樹立することを宣言した新政府の命令は何か？", a: ["五箇条の御誓文", "王政復古の大号令", "版籍奉還", "廃藩置県"], c: 1, e: "1867年末に出され、総裁・議定・参与の三職が置かれました。" },
    { q: "明治新政府が、旧大名（藩主）から土地と人民を天皇に返させた改革を何というか？", a: ["版籍奉還", "廃藩置県", "地租改正", "秩禄処分"], c: 0, e: "1869年に行われ、「版」は土地、「籍」は人民を意味します。" },
    { q: "1871年、藩を廃止して全国を政府が直接支配する県に置き換え、中央集権を確立した改革は何か？", a: ["版籍奉還", "廃藩置県", "秩禄処分", "学制"], c: 1, e: "大名に代わって、政府から新しく「府知事」や「県令」が派遣されました。" },
    { q: "明治時代、欧米の進んだ制度や文化を取り入れ、生活様式が急速に西洋化した現象を何というか？", a: ["文明開化", "和魂洋才", "富国強兵", "殖産興業"], c: 0, e: "洋食（牛鍋）や洋服、レンガ建築、散髪（断髪）などが流行しました。" },
    { q: "1873年、土地の所有者に地券を交付し、地価の3%を現金で納税させた税制改革を何というか？", a: ["租庸調の制", "太閤検地", "地租改正", "年貢一律化"], c: 2, e: "天候に左右されず、国が安定した税収を得られるようになりました。" },
    { q: "満20歳以上の男子に兵役の義務を課し、近代的な軍隊を創設した1873年の法令は何か？", a: ["徴兵令", "学制", "武道奨励令", "保安条例"], c: 0, e: "「国民皆兵」を目指しましたが、農民による「血税一揆」などの反対運動も起きました。" },
    { q: "西郷隆盛らが主張した、武力を使ってでも朝鮮を開国させようとする考えを何というか？", a: ["征韓論", "尊王攘夷", "岩倉使節団", "脱亜論"], c: 0, e: "この主張が政府内で退けられたため、西郷隆盛や板垣退助らは政府を去りました。" },
    { q: "1877年、不平士族が西郷隆盛を担ぎ上げて起こした、日本最後の士族反乱（内戦）は何か？", a: ["西南戦争", "戊辰戦争", "徴兵令反対一揆", "秩父事件"], c: 0, e: "新政府の徴兵による軍隊が士族軍を破り、武士の時代が完全に終わったことを示しました。" },
    { q: "板垣退助らが「民撰議院設立の建白書」を提出したことから始まった、国会開設を求める運動は？", a: ["自由民権運動", "尊王攘夷運動", "大正デモクラシー", "国家総動員運動"], c: 0, e: "国民の自由や権利を認めさせ、憲法や国会の開設を求めました。" },

    // 明治時代（後半）
    { q: "初代内閣総理大臣に就任し、のちに大日本帝国憲法の発布に深く関わった人物は誰か？", a: ["板垣退助", "大隈重信", "伊藤博文", "山県有朋"], c: 2, e: "1885年に内閣制度が創設され、伊藤博文が初代首相となりました。" },
    { q: "1889年2月11日に発布された、天皇が定めて国民に授ける形式の近代憲法は何か？", a: ["大日本帝国憲法", "日本国憲法", "五箇条の御誓文", "十七条の憲法"], c: 0, e: "ドイツ（プロイセン）の憲法を手本とし、天皇に強い権限（主権）が与えられていました。" },
    { q: "1894年、陸奥宗光外相がイギリスとの間で調印に成功した、不平等条約の一部撤廃内容は何か？", a: ["関税自主権の回復", "領事裁判権（治外法権）の撤廃", "最恵国待遇の撤廃", "下関条約の破棄"], c: 1, e: "日清戦争の直前に調印され、悲願の不平等条約改正への第一歩となりました。" },
    { q: "1894年、朝鮮での甲午農民戦争（東学党の乱）をきっかけに始まった、日本と清の戦争は何か？", a: ["日清戦争", "日露戦争", "阿片戦争", "北清事変"], c: 0, e: "「一発急（1894）に日清戦争」。日本の勝利に終わりました。" },
    { q: "日清戦争の講和条約として結ばれ、日本が遼東半島や台湾、多額の賠償金を得た条約は何か？", a: ["ポーツマス条約", "下関条約", "北京条約", "日韓協約"], c: 1, e: "山口県の下関で、伊藤博文と清の李鴻章の間で結ばれました。" },
    { q: "下関条約で日本が得た遼東半島を、清へ返還するようロシア・フランス・ドイツが要求した出来事は？", a: ["三国干渉", "日英同盟", "四カ国条約", "満州事変"], c: 0, e: "日本はこれを受け入れざるを得ず、国内でロシアへの反発（臥薪嘗胆）が高まりました。" },
    { q: "日清戦争の賠償金をもとに建設され、1901年に操業を開始した北九州の官営工場はどこか？", a: ["富岡製糸場", "八幡製鉄所", "足尾銅山", "長崎造船所"], c: 1, e: "筑豊炭田の石炭と、中国の大冶（ターイエ）鉄鉱石を利用して日本の重工業化を支えました。" },
    { q: "1904年、韓国や満州（中国東北部）の支配権をめぐって勃発した、日本とロシアの戦争は何か？", a: ["日清戦争", "日露戦争", "第一次世界大戦", "シベリア出兵"], c: 1, e: "「一夜を（1904）明ければ日露戦争」。激戦の末、米国の仲介で講和となりました。" },
    { q: "日露戦争の講和条約（ポーツマス条約）の仲介を行った、当時のアメリカ大統領は誰か？", a: ["リンカーン", "ウィルソン", "セオドア・ルーズベルト", "ワシントン"], c: 2, e: "ルーズベルト大統領の仲介により、米国のポーツマスで講和条約が結ばれました。" },
    { q: "1911年、小村寿太郎外相がアメリカなどと調印し、完全に達成した条約改正の内容は何か？", a: ["領事裁判権の撤廃", "関税自主権の回復", "山東省の利権獲得", "樺太千島交換"], c: 1, e: "これにより、幕末以来の不平等条約が完全に解消されました。" },

    // 大正時代
    { q: "1914年、ヨーロッパを主戦場として勃発し、日本も日英同盟を理由に参戦した大戦争は何か？", a: ["日露戦争", "第一次世界大戦", "第二次世界大戦", "日中戦争"], c: 1, e: "連合国と中央同盟国の間の戦争で、新兵器が大量投入される総力戦となりました。" },
    { q: "第一次世界大戦中、日本が中国（袁世凱政府）に対して突きつけた、権益拡大の要求を何というか？", a: ["二十一条の要求", "山東出兵", "対華宣戦布告", "満州工作"], c: 0, e: "1915年に出され、中国の反日運動や欧米の警戒心を強める原因となりました。" },
    { q: "1917年、レーニンの指導によりロシアで起こり、世界最初の社会主義政府が樹立された革命は何か？", a: ["フランス革命", "ロシア革命", "辛亥革命", "産業革命"], c: 1, e: "これに対し、日本を含む列強は抑え込みのため「シベリア出兵」を行いました。" },
    { q: "1918年、シベリア出兵を見越した業者の買い占めで米価が急騰し、富山県から全国に広がった暴動は？", a: ["米騒動", "秩父事件", "大塩平八郎の乱", "足尾暴動"], c: 0, e: "この米騒動の責任をとって、寺内正毅内閣が退陣しました。" },
    { q: "米騒動の後、日本で最初の本格的な「政党内閣」を組織し、「平民宰相」と呼ばれた首相は誰か？", a: ["原敬", "犬養毅", "加藤高明", "高橋是清"], c: 0, e: "爵位を持たない衆議院議員の原敬が首相となり、広く歓迎されました。" },
    { q: "大正時代、民主主義や自由主義を求める政治的・社会的風潮が高まった運動を何というか？", a: ["自由民権運動", "大正デモクラシー", "新劇運動", "護憲運動"], c: 1, e: "吉野作造の「民本主義」などが理論的支柱となりました。" },
    { q: "1923年9月1日、南関東一帯に甚大な被害をもたらし、経済や社会に大きな打撃を与えた大災害は何か？", a: ["阪神・淡路大震災", "東日本大震災", "関東大震災", "濃尾地震"], c: 2, e: "死者・行方不明者は10万人を超え、東京や横浜の大部分が焼け野原となりました。" },
    { q: "1925年、満25歳以上の全ての男子に選挙権を認めた法律を何というか？", a: ["治安維持法", "普通選挙法", "国家総動員法", "公職選挙法"], c: 1, e: "納税額による制限が撤廃されましたが、女性への選挙権はまだ認められませんでした。" },
    { q: "普通選挙法と同時に制定された、社会主義思想などを厳しく取り締まるための法律は何か？", a: ["治安維持法", "保安条例", "破壊活動防止法", "国家安全法"], c: 0, e: "国体（天皇制）の変革や私有財産制の否認を目的とする結社を取り締まりました。" },

    // 昭和（戦前・戦中）
    { q: "1929年、アメリカのニューヨーク株価大暴落から始まり、世界中に広がった深刻な不況を何というか？", a: ["世界恐慌", "リーマンショック", "オイルショック", "昭和恐慌"], c: 0, e: "各国はブロック経済やニューディール政策で対抗しようとしました。" },
    { q: "1931年、関東軍（日本軍）が南満州鉄道の線路を爆破し、満州全土を占領した事件（満州事変の端緒）は？", a: ["柳条湖事件", "盧溝橋事件", "五・一五事件", "二・二六事件"], c: 0, e: "自作自演の爆破事件を機に、満州の武力占領を進め、翌年「満州国」を建国しました。" },
    { q: "1932年、海軍の青年将校らが首相官邸を襲撃し、犬養毅首相を暗殺した事件を何というか？", a: ["二・二六事件", "五・一五事件", "満州事変", "桜田門外の変"], c: 1, e: "「話せば分かる」「問答無用」のやり取りが有名です。これにより政党内閣の時代が終わりました。" },
    { q: "満州国を認めない国際連盟の勧告に対し、1933年に日本がとった対抗措置は何か？", a: ["国際連盟を脱退", "対米宣戦布告", "ワシントン条約破棄", "満州国解体"], c: 0, e: "松岡洋右全権らが総会を退場し、日本は国際的に孤立していきました。" },
    { q: "1936年、陸軍の皇道派青年将校らが数々の政府高官を暗殺し、東京の中心部を占拠したクーデター事件は？", a: ["五・一五事件", "二・二六事件", "三一五事件", "血盟団事件"], c: 1, e: "鎮圧後、陸軍の政治的発言権がさらに強まる結果となりました。" },
    { q: "1937年、北京郊外での武力衝突（盧溝橋事件）をきっかけに始まった、日本と中国の全面的な戦争は何か？", a: ["日清戦争", "満州事変", "日中戦争", "太平洋戦争"], c: 2, e: "当初は「北支事変」「支那事変」と呼ばれ、宣戦布告がないまま泥沼化しました。" },
    { q: "1938年、日中戦争の長期化に伴い、政府が議会の承認なしに人や物資を戦争に動員できるようにした法律は？", a: ["治安維持法", "国家総動員法", "国防保安法", "軍機保護法"], c: 1, e: "これにより、国民生活の全てが戦争最優先の体制（総力戦体制）に組み込まれました。" },
    { q: "1940年、日本がドイツ・イタリアと結んだ、軍事同盟を何というか？", a: ["日独伊三国同盟", "日英同盟", "日ソ中立条約", "防共協定"], c: 0, e: "枢軸国側の陣営を形成し、アメリカやイギリスなどの連合国との対立が決定づけられました。" },
    { q: "1941年12月8日、日本軍がハワイの真珠湾を奇襲攻撃したことから始まった戦争を何というか？", a: ["日中戦争", "太平洋戦争（大東亜戦争）", "第一次世界大戦", "シベリア戦争"], c: 1, e: "アメリカ・イギリスに宣戦布告し、第二次世界大戦のアジア・太平洋地域での戦闘が始まりました。" },
    { q: "1945年8月、連合国から日本に対して突きつけられた、無条件降伏を求める宣言を何というか？", a: ["カイロ宣言", "ヤルタ宣言", "ポツダム宣言", "大西洋憲章"], c: 2, e: "日本は当初これを黙殺しましたが、原爆投下やソ連参戦を経て受諾を決定しました。" },
    { q: "1945年8月6日、世界で初めて原子爆弾が投下された日本の都市はどこか？", a: ["長崎", "広島", "東京", "沖縄"], c: 1, e: "8月6日に広島、8月9日に長崎へ原爆が投下され、甚大な被害を出しました。" },

    // 戦後〜現代
    { q: "第二次世界大戦後、日本を間接統治した連合国軍最高司令官総司令部の略称は何か？", a: ["GHQ", "NATO", "UNICEF", "WTO"], c: 0, e: "最高司令官のマッカーサーのもと、日本の民主化政策を強力に進めました。" },
    { q: "GHQの指示で行われた三大改革のうち、地主の土地を国が強制的に買い上げ、小作人に安く売り渡した改革は？", a: ["地租改正", "農地改革", "財閥解体", "国家総動員解除"], c: 1, e: "これにより多くの自作農が生まれ、農村の民主化が進みました。" },
    { q: "1946年11月3日に公布され、翌年5月3日に施行された、主権在民・平和主義・基本的人権の尊重を三大原則とする憲法は？", a: ["大日本帝国憲法", "日本国憲法", "明治憲法", "暫定憲法"], c: 1, e: "天皇は「象徴」となり、戦争の放棄（9条）などが明記されました。" },
    { q: "第二次世界大戦後、資本主義の「アメリカ」と社会主義の「ソ連」の間で続いた、武力を行使しない対立関係を何というか？", a: ["熱い戦い", "冷戦（冷たい戦争）", "局地戦", "代理戦争"], c: 1, e: "直接の交戦はないものの、世界を二分する軍事的・政治的緊張が続きました。" },
    { q: "1950年、朝鮮半島の主権をめぐって北緯38度線を境界に勃発した戦争は何か？", a: ["ベトナム戦争", "朝鮮戦争", "湾岸戦争", "日中戦争"], c: 1, e: "この戦争の際、在日米軍の出動に伴う空白を埋めるため、警察予備隊（のちの自衛隊）が組織されました。" },
    { q: "朝鮮戦争の際、米軍から大量の物資発注を受けたことで、日本の経済が急速に復興したこの特需を何というか？", a: ["朝鮮特需", "復興特需", "大正バブル", "高度経済成長"], c: 0, e: "これにより、戦後の日本経済は破滅的状況から脱出するきっかけを得ました。" },
    { q: "1951年、日本が48カ国の連合国との間で結び、主権を回復した講和条約は何か？", a: ["サンフランシスコ平和条約", "日米安全保障条約", "日ソ共同宣言", "日中共同声明"], c: 0, e: "この条約と同時に、米軍の日本駐留を認める「日米安全保障条約」も結ばれました。" },
    { q: "1956年、ソ連との国交を回復し、日本の国際連合への加盟が承認される契機となった宣言は何か？", a: ["日中共同声明", "日ソ共同宣言", "日韓基本条約", "サンフランシスコ宣言"], c: 1, e: "鳩山一郎首相のときに調印され、戦争状態が正式に終了し国交が回復しました。" },
    { q: "1950年代後半から1970年代初めにかけて、日本の経済が年平均10%前後の高い割合で成長した現象は？", a: ["バブル経済", "高度経済成長", "安定成長", "特需景気"], c: 1, e: "「もはや戦後ではない」と言われ、カラーテレビ・クーラー・自動車（3C）が普及しました。" },
    { q: "1972年、当時の佐藤栄作首相のもとで実現した、太平洋戦争後も米軍の統治下にあった地域の日本返還は何か？", a: ["小笠原返還", "沖縄返還", "北方領土返還", "千島列島返還"], c: 1, e: "「核抜き・本土並み」の返還が実現しました。佐藤首相は非核三原則の法制化などでも知られます。" },
    { q: "1972年、田中角栄首相が訪中して調印し、中国（中華人民共和国）との国交を正常化させた声明は何か？", a: ["日中平和友好条約", "日中共同声明", "日中講和条約", "日中基本条約"], c: 1, e: "これにより台湾（中華民国）との外交関係は断絶することになりました。" },
    { q: "1973年、第四次中東戦争をきっかけに原油価格が高騰し、世界および日本経済を混乱させた出来事は？", a: ["世界恐慌", "石油危機（オイルショック）", "リーマンショック", "バブル崩壊"], c: 1, e: "トイレットペーパーの買い占め騒動などが起き、日本の高度経済成長は終わりを告げました。" },
    { q: "1980年代後半から地価や株価が異常に高騰し、1990年代初めに崩壊した日本の好景気・経済現象は何か？", a: ["高度経済成長", "バブル経済", "平成景気", "ITバブル"], c: 1, e: "崩壊後は「失われた30年」と呼ばれる長期の平成不況へ突入しました。" },
    { q: "1989年、冷戦の象徴であったドイツの建造物が民衆によって破壊された、冷戦終結を象徴する出来事は何か？", a: ["ベルリンの壁崩壊", "マルタ会談", "ソ連崩壊", "チェルノブイリ事故"], c: 0, e: "これにより東欧の社会主義体制が次々と倒れ、同年末のマルタ会談で冷戦の終結が宣言されました。" },
    { q: "1993年、マーストリヒト条約の発効により、ヨーロッパの経済・政治的統合を目指して発足した組織は？", a: ["ASEAN", "EU（欧州連合）", "APEC", "NATO"], c: 1, e: "共通通貨「ユーロ」の導入など、国家の枠組みを超えた統合を進めました。" },
    { q: "2008年、アメリカの投資銀行の破綻をきっかけに、世界的な大不況を引き起こした金融危機を何というか？", a: ["リーマン・ショック", "世界恐慌", "アジア通貨危機", "ITショック"], c: 0, e: "日本の輸出産業にも大打撃を与え、急速な円高・株安が進みました。" },

    // --- ここから後半46問（100問に向けた歴史知識の更なる補強） ---
    // 古代〜中世追加
    { q: "縄文時代、人々が主に住んでいた、地面を掘り下げて柱を立て、茅などで屋根を葺いた住居は？", a: ["高床倉庫", "竪穴住居", "寝殿造", "書院造"], c: 1, e: "地面を四角や丸に掘り下げ、中央に炉を設けた住居です。" },
    { q: "弥生時代、収穫した米を湿気やネズミから守るために造られた倉庫を何というか？", a: ["竪穴倉庫", "高床倉庫", "納屋", "蔵"], c: 1, e: "柱に「ネズミ返し」をつけ、床を高くして風通しをよくした倉庫です。" },
    { q: "57年、倭の奴国が中国（後漢）の光武帝から授かったとされる、志賀島で発見されたものは何か？", a: ["銅鏡", "金印", "鉄剣", "銅鐸"], c: 1, e: "「漢委奴国王」と刻まれた金印が、江戸時代に福岡県の志賀島で発見されました。" },
    { q: "聖徳太子が建立した、世界最古の木造建築物とされる奈良県の寺院はどこか？", a: ["東大寺", "法隆寺", "興福寺", "唐招提寺"], c: 1, e: "飛鳥文化の代表。聖徳太子によって建てられたと伝えられています。" },
    { q: "663年、日本（倭）が百済の復興を助けるために出兵したが、唐・新羅の連合軍に大敗した戦いは？", a: ["白村江の戦い", "任那の戦い", "刀伊の入寇", "元寇"], c: 0, e: "敗戦後、中大兄皇子は九州に防人を配置し、水城などの防衛施設を築きました。" },
    { q: "743年、聖武天皇が出した、新しく開墾した土地の永久私有を認める法律は何か？", a: ["三世一身の法", "墾田永年私財法", "班田収授法", "公地公民法"], c: 1, e: "これにより公地公民の原則が崩れ、貴族や寺社が「荘園」を広げる原因となりました。" },
    { q: "鑑真、空海、最澄のうち、唐から何度も遭難しながら来日し、日本の仏教（戒律）を発展させた僧は？", a: ["最澄", "空海", "鑑真", "行基"], c: 2, e: "鑑真は視力を失いながらも来日を果たし、唐招提寺を開きました。" },
    { q: "平安時代初期、最澄が比叡山（滋賀県）に開いた宗派は何か？", a: ["天台宗", "真言宗", "浄土宗", "臨済宗"], c: 0, e: "最澄は天台宗（延暦寺）、空海は真言宗（高野山金剛峯寺）を開きました。" },
    { q: "平安時代初期、空海が高野山（和歌山県）に開いた宗派は何か？", a: ["天台宗", "真言宗", "日蓮宗", "曹洞宗"], c: 1, e: "空海（弘法大師）は真言宗を開き、密教を伝えました。" },
    { q: "10世紀前半、関東で大規模な武士の反乱を起こし、自らを「新皇」と称した人物は誰か？", a: ["藤原純友", "平将門", "源頼朝", "平清盛"], c: 1, e: "平将門の乱（関東）と藤原純友の乱（瀬戸内海）を合わせて「承平・天慶の乱」と呼びます。" },
    { q: "源頼朝が、全国の国ごとに配置した、軍事・警察を担う役職を何というか？", a: ["地頭", "守護", "執権", "検非違使"], c: 1, e: "「守護」は国ごとに置かれ軍事・警察を、「地頭」は荘園や公領ごとに置かれ年貢の徴収などを行いました。" },
    { q: "源頼朝が、荘園や公領ごとに配置した、土地の管理や年貢の徴収を行う役職を何というか？", a: ["守護", "地頭", "家老", "代官"], c: 1, e: "地頭はのちに現地の武士として勢力を伸ばし、領主化していきました。" },
    { q: "鎌倉時代、琵琶法師によって語り継がれた、平氏の繁栄と没落を描いた軍記物語は何か？", a: ["平家物語", "源氏物語", "太平記", "将門記"], c: 0, e: "「祇園精舎の鐘の声…」で始まる、諸行無常をテーマにした文学です。" },
    { q: "鎌倉時代、親鸞が開き、「悪人正機説」などを説いて農民らに広がった仏教の宗派は何か？", a: ["浄土宗", "浄土真宗（一向宗）", "時宗", "日蓮宗"], c: 1, e: "法然が浄土宗を開き、その弟子の親鸞が浄土真宗を開きました。" },
    { q: "室町時代、守護が任国の領主（大名）へと成長し、一国を独自に支配するようになった大名を何というか？", a: ["戦国大名", "守護大名", "譜代大名", "外様大名"], c: 1, e: "室町幕府の権威を背景にしながら、国内の武士を臣従させていきました。" },
    { q: "応仁の乱の後、実力のある者が上の身分の者に打ち勝って政権を奪う、当時の社会風潮を何というか？", a: ["御恩と奉公", "下剋上", "一味同心", "家柄主義"], c: 1, e: "この風潮により、室町幕府の権威は失墜し戦国時代へ突入しました。" },
    { q: "戦国大名が、自分の領地を支配するために独自に定めた法律を何というか？", a: ["御成敗式目", "分国法（戦国法）", "武家諸法度", "公事方御定書"], c: 1, e: "武田信玄の『甲州法度之次第』などが有名で、領民や家臣を厳しく統制しました。" },

    // 近世追加
    { q: "1575年、織田信長・徳川家康の連合軍が、大量の鉄砲を用いて武田勝頼の騎馬隊を破った戦いは？", a: ["桶狭間の戦い", "長篠の戦い", "姉川の戦い", "関ヶ原の戦い"], c: 1, e: "馬防柵と鉄砲の組織的な運用により、最強と呼ばれた武田の騎馬隊を圧倒しました。" },
    { q: "ヨーロッパ人がアジアへ進出した時代、日本と南蛮人（ポルトガル・スペイン）との間で行われた貿易は？", a: ["勘合貿易", "南蛮貿易", "朱印船貿易", "日宋貿易"], c: 1, e: "時計、ガラス、カボチャ、タバコなどのほか、キリスト教もこの貿易に付随して広まりました。" },
    { q: "江戸幕府が、信頼できる海外の商船に対して交付した、海外渡航を許可する朱印状を用いた貿易は？", a: ["南蛮貿易", "朱印船貿易", "出島貿易", "密貿易"], c: 1, e: "徳川家康によって推奨され、東南アジア各地に「日本町」が形成されました。" },
    { q: "江戸時代、幕府から直接領地（1万石以上）を与えられた武士を何というか？", a: ["旗本", "御家人", "大名", "守護"], c: 2, e: "1万石以上の領地を持つ者を大名、1万石未満で将軍にお目見えできる者を旗本と呼びました。" },
    { q: "関ヶ原の戦い以前から徳川氏に従っていた、幕府の要職（老中など）に就くことができる大名は？", a: ["親藩", "譜代大名", "外様大名", "旗本"], c: 1, e: "徳川の親戚を「親藩」、古くからの家臣を「譜代」、関ヶ原以降に従った者を「外様」と分けました。" },
    { q: "江戸幕府が、キリシタンの取り締まりのために、すべての国民をいずれかの寺の檀家とさせた制度は？", a: ["寺請制度（宗門改）", "絵踏", "キリスト教厳禁令", "五人組"], c: 0, e: "これにより、国民全員が仏教徒であることを寺院に証明させました。" },
    { q: "5代将軍・徳川綱吉に仕え、儒学（朱子学）を重んじる政治を補佐した儒学者は誰か？", a: ["新井白石", "新井白石", "木下順庵", "荻生徂徠"], c: 2, e: "綱吉は湯島聖堂を建てるなど、文治政治（学問を重んじる政治）を進めました。（※選択肢を修正）" },
    { q: "徳川吉宗の享保の改革において、庶民の意見を聞くために評定所の前に設置された箱は何か？", a: ["目安箱", "意見箱", "投書箱", "公事箱"], c: 0, e: "庶民の意見を取り入れ、小石川養生所（貧民のための病院）などが設置されました。" },
    { q: "江戸時代、本居宣長が『古事記』などの古典を研究し、日本古来の精神を明らかにしようとした学問は？", a: ["蘭学", "国学", "儒学", "漢学"], c: 1, e: "本居宣長は30年以上かけて『古事記伝』を執筆しました。" },
    { q: "水野忠邦が行った「天保の改革」において、物価を引き下げるために解散を命じた組織は何か？", a: ["座", "株仲間", "問屋", "市場"], c: 1, e: "株仲間が流通を独占して物価を上げていると考え解散させましたが、かえって景気が悪化しました。" },

// クイズの表示を生成
function generateQuiz() {
    const container = document.getElementById('quiz-container');
    quizData.forEach((data, index) => {
        const card = document.createElement('div');
        card.className = 'quiz-card';

        const num = document.createElement('div');
        num.className = 'quiz-num';
        num.innerText = `第 ${index + 1} 問`;

        const question = document.createElement('div');
        question.className = 'quiz-question';
        question.innerText = data.q;

        const optionsGroup = document.createElement('div');
        optionsGroup.className = 'options-group';

        data.a.forEach((option, optIndex) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = option;
            btn.setAttribute('onclick', `checkAnswer(this, ${index}, ${optIndex})`);
            optionsGroup.appendChild(btn);
        });

        const explanation = document.createElement('div');
        explanation.className = 'explanation';
        explanation.id = `explain-${index}`;
        explanation.innerHTML = `<strong>【解説】</strong> ${data.e}`;

        card.appendChild(num);
        card.appendChild(question);
        card.appendChild(optionsGroup);
        card.appendChild(explanation);
        container.appendChild(card);
    });
}

// 解答の即時チェック
function checkAnswer(selectedBtn, quizIndex, optIndex) {
    const card = selectedBtn.parentElement;
    const buttons = card.getElementsByClassName('option-btn');
    const correctIndex = quizData[quizIndex].c;

    // すでに回答済みの場合は何もしない
    if (buttons[0].disabled) return;

    // 全てのボタンを無効化
    for (let i = 0; i < buttons.length; i++) {
        buttons[i].disabled = true;
        if (i === correctIndex) {
            buttons[i].classList.add('correct'); // 正解のボタンを緑に
        }
    }

    // 選んだボタンが不正解だった場合、赤にする
    if (optIndex !== correctIndex) {
        selectedBtn.classList.add('wrong');
        selectedBtn.setAttribute('data-user-correct', 'false');
    } else {
        selectedBtn.setAttribute('data-user-correct', 'true');
    }

    // 解説を表示
    document.getElementById(`explain-${quizIndex}`).style.display = 'block';
}

// 最終スコアの計算
function calculateScore() {
    let score = 0;
    let unanswered = 0;

    quizData.forEach((data, index) => {
        const card = document.getElementsByClassName('quiz-card')[index];
        const buttons = card.getElementsByClassName('option-btn');
        
        let answered = false;
        for (let i = 0; i < buttons.length; i++) {
            if (buttons[i].disabled) {
                answered = true;
                if (buttons[i].getAttribute('data-user-correct') === 'true') {
                    score++;
                }
            }
        }
        if (!answered) unanswered++;
    });

    if (unanswered > 0) {
        if (!confirm(`まだ解答していない問題が ${unanswered} 問あります。このまま採点しますか？`)) {
            return;
        }
    }

    // 結果の表示
    document.getElementById('score-output').innerText = score;
    
    let comment = "";
    if (score === 100) comment = "素晴らしい！完璧です！歴史マスターですね！";
    else if (score >= 80) comment = "高得点です！入試や定期テストもバッチリですね！";
    else if (score >= 60) comment = "合格ラインです。間違えた部分の解説をよく読んで復習しましょう。";
    else comment = "まずは解説をじっくり読んで、基礎からもう一度確認してみましょう！";
    
    document.getElementById('score-comment').innerText = comment;
    
    const resultPanel = document.getElementById('result-panel');
    resultPanel.style.display = 'block';
    resultPanel.scrollIntoView({ behavior: 'smooth' });
}

// 起動時にクイズを生成
window.onload = generateQuiz;
</script>
