<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>学校の図書室 管理システム（個別予約機能版）</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: #f0f4f1; 
            padding: 20px; 
            color: #2c3e50; 
        }
        .container { 
            max-width: 1450px; 
            margin: 0 auto; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
        }
        h1 {
            text-align: center;
            color: #1e5631;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        section { 
            margin-bottom: 35px; 
            padding: 20px; 
            border: 1px solid #d0dfd4; 
            border-radius: 8px; 
            background: #fafdfb; 
        }
        h2 { 
            color: #2e7d32; 
            margin-top: 0; 
            border-bottom: 3px solid #81c784; 
            padding-bottom: 8px; 
            font-size: 1.3rem;
        }
        h3 {
            color: #1b5e20;
            background-color: #c8e6c9;
            padding: 8px 12px;
            border-radius: 4px;
            margin-top: 25px;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        input, select, button { 
            padding: 10px; 
            margin: 6px; 
            border: 1px solid #cccccc; 
            border-radius: 6px; 
            font-size: 1rem;
            vertical-align: middle;
        }
        button { 
            background-color: #4caf50; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
        }
        button:hover { background-color: #388e3c; }
        
        .btn-del { background-color: #e53935; }
        .btn-del:hover { background-color: #c62828; }
        .btn-warning-clear { background-color: #ff9100; color: white; }
        .btn-warning-clear:hover { background-color: #ff6d00; }
        .btn-return { background-color: #ffb300; color: #333; }
        .btn-return:hover { background-color: #f59f00; }
        .btn-bulk { background-color: #0288d1; }
        .btn-bulk:hover { background-color: #01579b; }
        .btn-reserve { background-color: #9c27b0; }
        .btn-reserve:hover { background-color: #7b1fa2; }

        .config-panel {
            background-color: #efebe9;
            border: 1px solid #d7ccc8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; background: white; }
        th, td { border: 1px solid #e0e0e0; padding: 11px; text-align: left; font-size: 0.95rem; }
        th { background-color: #e8f5e9; color: #2e7d32; font-weight: bold; }
        
        .overdue-row { background-color: #ffebee !important; }
        .badge-overdue { 
            background-color: #c62828; 
            color: white; 
            padding: 3px 8px; 
            border-radius: 4px; 
            font-size: 0.8rem; 
            font-weight: bold;
        }
        .badge-reserved {
            background-color: #9c27b0;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .badge-tag {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 3px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }

        .tab-box { margin: 15px 0; }
        .tab-btn { 
            background: #e8f5e9; 
            color: #2e7d32;
            border: none; 
            padding: 10px 20px; 
            margin-right: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 6px; 
        }
        .tab-btn.active { background: #2e7d32; color: white; }
        
        .user-card {
            display: inline-block; 
            background: #e8f5e9; 
            padding: 8px 12px; 
            margin: 6px; 
            border-radius: 6px; 
            font-size: 0.95rem;
            border-left: 4px solid #2e7d32;
        }
        .bulk-area {
            background: #e1f5fe;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #b3e5fc;
            margin-bottom: 20px;
        }
        .date-preview {
            font-size: 0.85rem;
            color: #e65100;
            font-weight: bold;
            display: block;
            margin-top: 4px;
        }
        .empty-msg {
            color: #888;
            font-style: italic;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 図書室 管理システム</h1>

    <div style="text-align: right; margin-bottom: 10px;">
        <button onclick="clearLoanRecordsOnly()" class="btn-warning-clear" style="font-size: 0.8rem; padding: 6px 12px;">🧹 貸出・予約・履歴のみ消去する</button>
        <button onclick="forceResetAll()" class="btn-del" style="font-size: 0.8rem; padding: 6px 12px;">⚠️ データを全リセットする</button>
    </div>

    <div class="config-panel">
        <strong>⚙️ 貸出ルールの設定（リアルタイム反映）</strong><br>
        <label>生徒の上限冊数: <input type="number" id="cfgMaxBooks" min="1" max="10" style="width: 60px; padding: 6px;" onchange="saveConfig()"></label> 冊分
        <label style="margin-left: 20px;">生徒の貸出期間: <input type="number" id="cfgLoanDays" min="1" max="60" style="width: 60px; padding: 6px;" onchange="saveConfig()"></label> 日間
        <span style="font-size: 0.85rem; color: #555; margin-left: 15px;">※ 先生は常に無制限・期限なしとして処理されます。</span>
    </div>

    <section>
        <h2>👤 1. 貸出人の登録・管理</h2>
        <select id="userType" onchange="changeUserType()">
            <option value="生徒">生徒</option>
            <option value="先生">先生</option>
        </select>
        
        <span id="studentGroup">
            <select id="userGrade">
                <option value="1年">1年</option>
                <option value="2年">2年</option>
                <option value="3年">3年</option>
            </select>
            <select id="userClass">
                <option value="A組">A組</option>
                <option value="B組">B組</option>
                <option value="C組">C組</option>
            </select>
        </span>

        <input type="text" id="userName" placeholder="名前を入力">
        <button onclick="addUser()">登録</button>

        <div class="tab-box">
            <small><b>学年絞り込み：</b></small>
            <button class="tab-btn active" id="tab-all" onclick="filterUser('ALL')">すべて</button>
            <button class="tab-btn" id="tab-1" onclick="filterUser('1年')">1年</button>
            <button class="tab-btn" id="tab-2" onclick="filterUser('2年')">2年</button>
            <button class="tab-btn" id="tab-3" onclick="filterUser('3年')">3年</button>
            <button class="tab-btn" id="tab-t" onclick="filterUser('先生')">先生</button>
        </div>
        <div id="userListArea"></div>
    </section>

    <section>
        <h2>📖 2. 本の登録</h2>
        <input type="text" id="bookTitle" placeholder="本のタイトル" style="width: 250px;">
        <input type="text" id="bookAuthor" placeholder="著者名" style="width: 150px;">
        <input type="text" id="bookGenre" placeholder="ジャンル（例：小説）" style="width: 140px;">
        <input type="text" id="bookNdc" placeholder="NDC番号（例: 913 または 9）" style="width: 150px;" maxlength="10">
        <label style="font-size:0.9rem; margin-left:5px;">購入日: <input type="date" id="bookPurchaseDate"></label>
        <select id="bookStatus">
            <option value="新品同様">新品同様</option>
            <option value="良好">良好</option>
            <option value="傷みあり">傷みあり</option>
        </select>
        <button onclick="addBook()">本を登録</button>
    </section>

    <section>
        <h2>🔄 3. 貸出・返却・予約・除籍手続き</h2>
        
        <div class="bulk-area">
            <strong>⚙️ 選択した本を一括処理する（貸出人・予約人 共通）</strong><br>
            <select id="bulkUserSelect" onchange="previewBulkDate()">
            </select>
            <span id="bulkDatePreview" class="date-preview"></span>
            <button onclick="borrowBulkBooks()" class="btn-bulk" style="padding: 8px 14px; margin-top: 5px;">選択した本を一括貸出</button>
            <span style="font-size: 0.85rem; color: #666; margin-left: 15px;">※ 予約は本の一覧表（貸出中の本のみ）から個別に行えます。</span>
        </div>

        <div id="ndcTablesContainer"></div>
    </section>

    <section>
        <h2>📊 4. 利用者ごとの貸出数 履歴集計（その場で返却）</h2>
        <select id="historySelect" onchange="showHistory()">
        </select>
        <div id="historyResult" style="margin-top: 10px; font-weight: bold; background: white; padding: 15px; border-radius: 6px; border: 1px solid #ddd;"></div>
    </section>
</div>

<script>
    let config = JSON.parse(localStorage.getItem('sch_config_v10')) || { maxBooks: 3, loanDays: 14 };
    let users = JSON.parse(localStorage.getItem('sch_users_v10')) || [];
    let books = JSON.parse(localStorage.getItem('sch_books_v10')) || [];
    let historyCount = JSON.parse(localStorage.getItem('sch_history_count_v10')) || {}; 

    let currentUserFilter = 'ALL';

    const NDC_CLASSES = {
        '0': '0類 総記（情報・図書館など）', '1': '1類 哲学（宗教・心理など）', '2': '2類 歴史（地理・伝記など）',
        '3': '3類 社会科学（政治・経済など）', '4': '4類 自然科学（数学・理科など）', '5': '5類 技術・工学（家庭・工業など）',
        '6': '6類 産業（農業・商業など）', '7': '7類 芸術（美術・スポーツなど）', '8': '8類 言語（国語・英語など）',
        '9': '9類 文学（小説・詩など）', 'unknown': '分類不能・未分類'
    };

    function saveConfig() {
        config.maxBooks = parseInt(document.getElementById('cfgMaxBooks').value) || 3;
        config.loanDays = parseInt(document.getElementById('cfgLoanDays').value) || 14;
        localStorage.setItem('sch_config_v10', JSON.stringify(config));
        renderBooks();
    }

    function loadConfigUI() {
        document.getElementById('cfgMaxBooks').value = config.maxBooks;
        document.getElementById('cfgLoanDays').value = config.loanDays;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function getTodayStr() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function calculateDueDateStr(userType) {
        if (userType === '先生') return '期限なし(先生)';
        const d = new Date();
        d.setDate(d.getDate() + config.loanDays);
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function changeUserType() {
        const type = document.getElementById('userType').value;
        document.getElementById('studentGroup').style.display = (type === '先生') ? 'none' : 'inline';
    }

    function addUser() {
        const type = document.getElementById('userType').value;
        const name = document.getElementById('userName').value.trim();
        if(!name) return alert('名前を入力してください');

        let grade = '先生'; let className = ''; let displayName = `[先生] ${name}`;
        if(type === '生徒') {
            grade = document.getElementById('userGrade').value;
            className = document.getElementById('userClass').value;
            displayName = `[${grade}${className}] ${name}`;
        }
        if(users.some(u => u.displayName === displayName)) return alert('同一名簿が既に存在します');

        const userId = 'user_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
        
        users.push({ 
            id: userId, name: name, type: type, grade: grade, className: className, displayName: displayName 
        });

        localStorage.setItem('sch_users_v10', JSON.stringify(users));
        document.getElementById('userName').value = '';
        
        renderUsers();
        updateUserDropdowns();
        showHistory();
    }

    function renderUsers() {
        const area = document.getElementById('userListArea');
        area.innerHTML = '';
        const filtered = users.filter(u => currentUserFilter === 'ALL' || u.grade === currentUserFilter);

        if(filtered.length === 0) {
            area.innerHTML = '<div class="empty-msg">登録された利用者がいません。</div>';
            return;
        }

        filtered.forEach(u => {
            const span = document.createElement('span');
            span.className = 'user-card';
            span.innerHTML = `${escapeHtml(u.displayName)} <button class="btn-del" style="padding:2px 6px; font-size:0.75rem; margin-left:5px;" onclick="deleteUser('${u.id}')">×</button>`;
            area.appendChild(span);
        });
    }

    function deleteUser(id) {
        if(!confirm('この利用者を削除しますか？')) return;
        if(books.some(b => b.borrowerId === id)) return alert('貸出中の本があるため削除できません。');
        
        users = users.filter(u => u.id !== id);
        localStorage.setItem('sch_users_v10', JSON.stringify(users));
        renderUsers();
        updateUserDropdowns();
        showHistory();
    }

    function filterUser(filter) {
        currentUserFilter = filter;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(filter === 'ALL') document.getElementById('tab-all').classList.add('active');
        else if(filter === '1年') document.getElementById('tab-1').classList.add('active');
        else if(filter === '2年') document.getElementById('tab-2').classList.add('active');
        else if(filter === '3年') document.getElementById('tab-3').classList.add('active');
        else if(filter === '先生') document.getElementById('tab-t').classList.add('active');
        renderUsers();
    }

    function addBook() {
        const title = document.getElementById('bookTitle').value.trim();
        const author = document.getElementById('bookAuthor').value.trim();
        const genre = document.getElementById('bookGenre').value.trim();
        let ndc = document.getElementById('bookNdc').value.trim();
        let purchaseDate = document.getElementById('bookPurchaseDate').value;
        const status = document.getElementById('bookStatus').value;

        if(!title) return alert('本のタイトルを入力してください');
        if(!purchaseDate) purchaseDate = getTodayStr();

        const bookId = 'book_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
        
        books.push({
            id: bookId, title, author, genre, ndc, purchaseDate, status,
            borrowerId: null, dueDate: null, reservedUserId: null
        });

        localStorage.setItem('sch_books_v10', JSON.stringify(books));
        
        document.getElementById('bookTitle').value = '';
        document.getElementById('bookAuthor').value = '';
        document.getElementById('bookGenre').value = '';
        document.getElementById('bookNdc').value = '';
        
        renderBooks();
    }

    function getNdcClassKey(ndc) {
        if(!ndc) return 'unknown';
        const firstChar = ndc.trim().charAt(0);
        if(NDC_CLASSES[firstChar]) return firstChar;
        return 'unknown';
    }

    // 【主要修正点】本のレンダリング処理
    function renderBooks() {
        const container = document.getElementById('ndcTablesContainer');
        container.innerHTML = '';

        const grouped = {};
        Object.keys(NDC_CLASSES).forEach(k => grouped[k] = []);
        books.forEach(b => {
            const key = getNdcClassKey(b.ndc);
            grouped[key].push(b);
        });

        let hasAnyBook = false;

        Object.keys(grouped).forEach(key => {
            const list = grouped[key];
            if(list.length === 0) return;
            hasAnyBook = true;

            const h3 = document.createElement('h3');
            h3.innerText = NDC_CLASSES[key];
            container.appendChild(h3);

            const table = document.createElement('table');
            table.innerHTML = `
                <thead>
                    <tr>
                        <th style="width:40px; text-align:center;">選択</th>
                        <th>タイトル / 著者</th>
                        <th>分類/ジャンル</th>
                        <th>状態 / 購入日</th>
                        <th>貸出状況 (返却期限)</th>
                        <th>予約者</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            `;
            const tbody = table.querySelector('tbody');

            list.forEach(b => {
                const tr = document.createElement('tr');
                
                let isOverdue = false;
                if(b.dueDate && b.dueDate !== '期限なし(先生)') {
                    if(new Date(b.dueDate) < new Date(getTodayStr())) {
                        isOverdue = true;
                        tr.className = 'overdue-row';
                    }
                }

                let borrowerText = '可（書架）';
                if(b.borrowerId) {
                    const u = users.find(x => x.id === b.borrowerId);
                    const nameStr = u ? u.displayName : '不明な利用者';
                    const overdueBadge = isOverdue ? ' <span class="badge-overdue">延滞</span>' : '';
                    borrowerText = `❌ 貸出中: ${escapeHtml(nameStr)}<br><small>(${b.dueDate})${overdueBadge}</small>`;
                }

                let resText = '-';
                if(b.reservedUserId) {
                    const u = users.find(x => x.id === b.reservedUserId);
                    resText = u ? `<span class="badge-reserved">予約: ${escapeHtml(u.displayName)}</span> <button class="btn-del" style="padding:2px 5px; font-size:0.75rem;" onclick="cancelReserve('${b.id}')">取消</button>` : '予約あり';
                }

                // 操作ボタンの出し分け
                let actionBtn = '';
                if(b.borrowerId) {
                    actionBtn += `<button class="btn-return" onclick="returnBook('${b.id}')">返却</button> `;
                    
                    // 🌟「貸出中」かつ「まだ誰も予約していない」時だけ、個別予約ボタンを出す
                    if(!b.reservedUserId) {
                        actionBtn += `<button class="btn-reserve" onclick="reserveSingleBook('${b.id}')">予約</button> `;
                    }
                }
                actionBtn += `<button class="btn-del" onclick="scrapBook('${b.id}')">除籍</button>`;

                tr.innerHTML = `
                    <td style="text-align:center;"><input type="checkbox" class="book-chk" data-id="${b.id}"></td>
                    <td><b>${escapeHtml(b.title)}</b><br><small style="color:#666">${escapeHtml(b.author || '著者不明')}</small></td>
                    <td><span class="badge-tag">${escapeHtml(b.ndc || '未分類')}</span><br><small>${escapeHtml(b.genre)}</small></td>
                    <td><small>${escapeHtml(b.status)} / ${escapeHtml(b.purchaseDate)}</small></td>
                    <td>${borrowerText}</td>
                    <td>${resText}</td>
                    <td>${actionBtn}</td>
                `;
                tbody.appendChild(tr);
            });
            container.appendChild(table);
        });

        if(!hasAnyBook) {
            container.innerHTML = '<div class="empty-msg">登録されている本がありません。</div>';
        }
    }

    function updateUserDropdowns() {
        const bulkSelect = document.getElementById('bulkUserSelect');
        const historySelect = document.getElementById('historySelect');
        
        let options = '<option value="">-- 利用者を選択 --</option>';
        users.forEach(u => {
            options += `<option value="${u.id}">${escapeHtml(u.displayName)}</option>`;
        });

        bulkSelect.innerHTML = options;
        historySelect.innerHTML = options;
    }

    function previewBulkDate() {
        const uid = document.getElementById('bulkUserSelect').value;
        const preview = document.getElementById('bulkDatePreview');
        if(!uid) { preview.innerText = ''; return; }
        
        const user = users.find(u => u.id === uid);
        if(user) {
            preview.innerText = `返却予定日: ${calculateDueDateStr(user.type)}`;
        }
    }

    function getCheckedBookIds() {
        const chks = document.querySelectorAll('.book-chk:checked');
        const ids = [];
        chks.forEach(c => ids.push(c.getAttribute('data-id')));
        return ids;
    }

    function borrowBulkBooks() {
        const uid = document.getElementById('bulkUserSelect').value;
        if(!uid) return alert('一括貸出を行う利用者を選択してください。');
        const user = users.find(u => u.id === uid);
        if(!user) return;

        const bookIds = getCheckedBookIds();
        if(bookIds.length === 0) return alert('本が選択されていません。表の左側のチェックボックスを選択してください。');

        let currentBorrowedCount = books.filter(b => b.borrowerId === user.id).length;

        if(user.type === '生徒' && (currentBorrowedCount + bookIds.length) > config.maxBooks) {
            return alert(`冊数上限オーバーです！\n現在貸出中: ${currentBorrowedCount}冊\n追加選択: ${bookIds.length}冊\n生徒の上限は ${config.maxBooks} 冊です。`);
        }

        let successCount = 0;
        bookIds.forEach(id => {
            const b = books.find(x => x.id === id);
            if(!b) return;
            if(b.borrowerId) return; 
            if(b.reservedUserId && b.reservedUserId !== user.id) return; // 予約者以外は借りられない

            b.borrowerId = user.id;
            b.dueDate = calculateDueDateStr(user.type);
            
            if(b.reservedUserId === user.id) b.reservedUserId = null;

            historyCount[user.id] = (historyCount[user.id] || 0) + 1;
            successCount++;
        });

        localStorage.setItem('sch_books_v10', JSON.stringify(books));
        localStorage.setItem('sch_history_count_v10', JSON.stringify(historyCount));
        
        alert(`${successCount} 冊の貸出処理を行いました。`);
        renderBooks();
        showHistory();
    }

    // 🌟 新設: 個別予約の実行処理
    function reserveSingleBook(bookId) {
        const uid = document.getElementById('bulkUserSelect').value;
        if(!uid) return alert('予約を行うには、まず上の「3. 一括処理」エリアにあるプルダウンから【予約する人】を選択してください。');
        
        const user = users.find(u => u.id === uid);
        const b = books.find(x => x.id === bookId);
        
        if(!b || !user) return;
        if(b.borrowerId === user.id) return alert('自分が今借りている本を予約することはできません。');

        b.reservedUserId = user.id;
        localStorage.setItem('sch_books_v10', JSON.stringify(books));
        
        alert(`「${b.title}」を ${user.displayName} さんに予約しました。`);
        renderBooks();
    }

    // 🌟 新設: 予約の取り消し処理
    function cancelReserve(bookId) {
        const b = books.find(x => x.id === bookId);
        if(!b) return;
        b.reservedUserId = null;
        localStorage.setItem('sch_books_v10', JSON.stringify(books));
        renderBooks();
    }

    function returnBook(bookId) {
        const b = books.find(x => x.id === bookId);
        if(!b) return;
        b.borrowerId = null;
        b.dueDate = null;
        localStorage.setItem('sch_books_v10', JSON.stringify(books));
        renderBooks();
    }

    function scrapBook(bookId) {
        if(!confirm('本当にこの本を除籍しますか？')) return;
        books = books.filter(x => x.id !== bookId);
        localStorage.setItem('sch_books_v10', JSON.stringify(books));
        renderBooks();
    }

    function showHistory() {
        const uid = document.getElementById('historySelect').value;
        const result = document.getElementById('historyResult');
        if(!uid) { result.innerHTML = '利用者を上から選択してください。'; return; }

        const user = users.find(u => u.id === uid);
        if(!user) return;

        const totalBorrowed = historyCount[uid] || 0;
        const currentList = books.filter(b => b.borrowerId === uid);
        
        let currentBooksHtml = '';
        if(currentList.length === 0) {
            currentBooksHtml = '<span style="color:#888; font-weight:normal;">なし</span>';
        } else {
            currentBooksHtml = '<ul>';
            currentList.forEach(b => {
                currentBooksHtml += `<li style="font-weight:normal; margin-bottom:4px;">「${escapeHtml(b.title)}」 (期限: ${b.dueDate}) <button class="btn-return" style="padding:2px 6px; font-size:0.8rem;" onclick="returnBook('${b.id}'); showHistory();">その場で返却</button></li>`;
            });
            currentBooksHtml += '</ul>';
        }

        result.innerHTML = `
            <div>👤 利用者: ${escapeHtml(user.displayName)}</div>
            <div style="margin: 8px 0; color:#0288d1;">📊 累計貸出冊数: ${totalBorrowed} 冊</div>
            <div style="margin-top:12px;">⏰ 現在貸出中の本:</div>
            ${currentBooksHtml}
        `;
    }

    function clearLoanRecordsOnly() {
        if(!confirm('すべての「貸出・予約・履歴」データのみを一括消去します。よろしいですか？')) return;
        books.forEach(b => {
            b.borrowerId = null;
            b.dueDate = null;
            b.reservedUserId = null;
        });
        historyCount = {};
        localStorage.setItem('sch_books_v10', JSON.stringify(books));
        localStorage.setItem('sch_history_count_v10', JSON.stringify(historyCount));
        renderBooks();
        showHistory();
        alert('貸出・予約・履歴データを消去しました。');
    }

    function forceResetAll() {
        if(!confirm('【⚠️完全リセット】すべてのデータを完全に消去します。よろしいですか？')) return;
        localStorage.clear();
        config = { maxBooks: 3, loanDays: 14 };
        users = [];
        books = [];
        historyCount = {};
        loadConfigUI();
        renderUsers();
        updateUserDropdowns();
        renderBooks();
        showHistory();
        alert('すべてのデータを完全に初期化しました。');
    }

    window.onload = function() {
        loadConfigUI();
        renderUsers();
        updateUserDropdowns();
        renderBooks();
        showHistory();
        document.getElementById('bookPurchaseDate').value = getTodayStr();
    };
</script>
</body>
</html>
