<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘れ物防止リスト</title>
    <style>
        /* 全体のベースデザイン（優しいクリーム色の背景） */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fefaf4;
            color: #4a4a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        /* メインのカード（少し角を丸くして可愛い影をつける） */
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(229, 115, 115, 0.1);
            width: 100%;
            max-width: 480px;
        }
        h1 {
            text-align: center;
            color: #ff6b6b; /* 明るいコーラルレッド */
            font-size: 26px;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .section {
            margin-bottom: 30px;
            background-color: #fdfdfd;
            border-radius: 12px;
            padding: 15px;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.02);
        }
        /* 提出物セクションの見出し（オレンジピンク） */
        .homework-section h2 {
            font-size: 18px;
            color: #e67e22;
            border-bottom: 3px dashed #f39c12;
            padding-bottom: 5px;
            margin-top: 0;
        }
        /* 持ち物セクションの見出し（さわやかミントブルー） */
        .belongings-section h2 {
            font-size: 18px;
            color: #16a085;
            border-bottom: 3px dashed #1abc9c;
            padding-bottom: 5px;
            margin-top: 0;
        }
        .checklist {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .checklist li {
            padding: 12px 5px;
            border-bottom: 1px dashed #e0e0e0;
            display: flex;
            justify-content: space-between; /* 文字と日付を左右に離す */
            align-items: center;
        }
        .checklist li:last-child {
            border-bottom: none;
        }
        .item-left {
            display: flex;
            align-items: center;
            flex-grow: 1;
        }
        label {
            display: flex;
            align-items: center;
            cursor: pointer;
            width: 100%;
        }
        input[type="checkbox"] {
            margin-right: 12px;
            transform: scale(1.3);
            cursor: pointer;
            accent-color: #ff6b6b; /* チェックボックスの色を可愛く変更 */
        }
        /* 日付入力欄（カレンダー）のデザイン */
        input[type="date"] {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 3px 5px;
            font-size: 13px;
            color: #666;
            background-color: #fafafa;
            font-family: inherit;
        }
        /* チェックが入ったら文字と日付を薄くする */
        input[type="checkbox"]:checked ~ span,
        input[type="checkbox"]:checked ~ .date-picker {
            text-decoration: line-through;
            color: #bbb;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎒 忘れ物防止リスト</h1>
    
    <!-- 提出物（宿題）のセクション -->
    <div class="section homework-section">
        <h2>📝 提出物・宿題</h2>
        <ul class="checklist">
            <li>
                <label class="item-left">
                    <input type="checkbox">
                    <span>HTMLの宿題</span>
                </label>
                <!-- 日付を選べるタグ（初期値を設定可能） -->
                <input type="date" class="date-picker" value="2026-07-07">
            </li>
            <li>
                <label class="item-left">
                    <input type="checkbox">
                    <span>数学のプリント</span>
                </label>
                <input type="date" class="date-picker" value="2026-07-08">
            </li>
            <li>
                <label class="item-left">
                    <input type="checkbox">
                    <span>英語のワーク</span>
                </label>
                <input type="date" class="date-picker">
            </li>
        </ul>
    </div>

    <!-- 毎日の持ち物のセクション -->
    <div class="section belongings-section">
        <h2>✨ 毎日の持ち物</h2>
        <ul class="checklist">
            <li>
                <label class="item-left">
                    <input type="checkbox">
                    <span>教科書・ノート</span>
                </label>
            </li>
            <li>
                <label class="item-left">
                    <input type="checkbox">
                    <span>筆箱</span>
                </label>
            </li>
            <li>
                <label class="item-left">
                    <input type="checkbox">
                    <span>家の鍵</span>
                </label>
            </li>
            <li>
                <label class="item-left">
                    <input type="checkbox">
                    <span>水筒</span>
                </label>
            </li>
        </ul>
    </div>
</div>

</body>
</html>
