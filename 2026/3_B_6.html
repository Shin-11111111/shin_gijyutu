<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢検二級 模擬クイズ（読み・意味 10問ランダム）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 22px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e67e22;
            padding-bottom: 10px;
        }
        .progress {
            text-align: right;
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }
        .question-box {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 25px;
            line-height: 1.6;
            background-color: #fdf2e9;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #e67e22;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .btn-option {
            background-color: #ffffff;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }
        .btn-option:hover:not(:disabled) {
            background-color: #fdf6f0;
            border-color: #e67e22;
        }
        .btn-option:disabled {
            cursor: not-allowed;
        }
        .correct {
            background-color: #2ecc71 !important;
            color: white;
            border-color: #2ecc71 !important;
        }
        .incorrect {
            background-color: #e74c3c !important;
            color: white;
            border-color: #e74c3c !important;
        }
        .result-panel {
            text-align: center;
            margin-top: 20px;
            display: none;
        }
        .result-feedback {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .btn-next, .btn-restart {
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: background 0.2s;
        }
        .btn-next:hover, .btn-restart:hover {
            background-color: #d35400;
        }
        .score-display {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <!-- クイズ画面 -->
    <div id="quiz-screen">
        <div class="progress" id="progress">第 1 問 / 10 問</div>
        <div class="question-box" id="question">問題がここに表示されます。</div>
        <div class="options" id="options-container">
            <!-- ボタンがJSで生成されます -->
        </div>
        <div class="result-panel" id="next-panel">
            <div class="result-feedback" id="feedback">正解！</div>
            <button class="btn-next" onclick="nextQuestion()">次の問題へ</button>
        </div>
    </div>

    <!-- 結果画面 -->
    <div id="result-screen" style="display: none; text-align: center;">
        <h2>結果発表</h2>
        <div class="score-display" id="score-text">10問中 0問正解！</div>
        <p id="evaluation-text"></p>
        <button class="btn-restart" onclick="startQuiz()">もう一度挑戦する</button>
    </div>

let selectedQuestions = [];
let currentQuestionIndex = 0;
let score = 0;

// クイズの初期化・開始
function startQuiz() {
    // 100問からランダムに10問を抽出
    const shuffled = [...quizData].sort(() => 0.5 - Math.random());
    selectedQuestions = shuffled.slice(0, 10);
    
    currentQuestionIndex = 0;
    score = 0;
    
    document.getElementById("result-screen").style.display = "none";
    document.getElementById("quiz-screen").style.display = "block";
    
    showQuestion();
}

// 問題を表示
function showQuestion() {
    document.getElementById("next-panel").style.display = "none";
    
    const currentQuestion = selectedQuestions[currentQuestionIndex];
    
    // 進捗表示
    document.getElementById("progress").innerText = `第 ${currentQuestionIndex + 1} 問 / 10 問`;
    // 問題文表示
    document.getElementById("question").innerText = currentQuestion.q;
    
    // 選択肢ボタン生成
    const optionsContainer = document.getElementById("options-container");
    optionsContainer.innerHTML = "";
    
    currentQuestion.a.forEach((option, index) => {
        const button = document.createElement("button");
        button.className = "btn-option";
        button.innerText = option;
        button.onclick = () => checkAnswer(index);
        optionsContainer.appendChild(button);
    });
}

// 答え合わせ
function checkAnswer(selectedIndex) {
    const currentQuestion = selectedQuestions[currentQuestionIndex];
    const buttons = document.getElementsByClassName("btn-option");
    
    // すべてのボタンを無効化
    for (let button of buttons) {
        button.disabled = true;
    }
    
    if (selectedIndex === currentQuestion.c) {
        // 正解
        buttons[selectedIndex].classList.add("correct");
        document.getElementById("feedback").innerText = "⭕️ 正解！";
        document.getElementById("feedback").style.color = "#2ecc71";
        score++;
    } else {
        // 不正解
        buttons[selectedIndex].classList.add("incorrect");
        buttons[currentQuestion.c].classList.add("correct"); // 正解をハイライト
        document.getElementById("feedback").innerText = `❌ 不正解... （正解：${currentQuestion.a[currentQuestion.c]}）`;
        document.getElementById("feedback").style.color = "#e74c3c";
    }
    
    document.getElementById("next-panel").style.display = "block";
}

// 次の問題へ（または結果表示）
function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < 10) {
        showQuestion();
    } else {
        showResult();
    }
}

// 結果画面の表示
function showResult() {
    document.getElementById("quiz-screen").style.display = "none";
    document.getElementById("result-screen").style.display = "block";
    
    document.getElementById("score-text").innerText = `10問中 ${score} 問正解！`;
    
    let evaluation = "";
    if (score === 10) {
        evaluation = "完璧です！漢検二級の読み・語彙マスターですね！";
    } else if (score >= 8) {
        evaluation = "素晴らしい合格圏内です！その調子！";
    } else if (score >= 5) {
        evaluation = "あと一歩！間違えた読み方や意味をしっかり復習しましょう。";
    } else {
        evaluation = "苦手な語彙があるようです。繰り返し挑戦して覚えましょう！";
    }
    document.getElementById("evaluation-text").innerText = evaluation;
}

// ページ読み込み時にクイズを開始
window.onload = startQuiz;
