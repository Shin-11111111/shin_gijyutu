<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お出かけ天気＆服装チェック Pro</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #eef2f3, #8e9eab);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.5s ease;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .subtitle {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4a90e2, #50e3c2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4);
        }
        .loading {
            display: none;
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 14px;
        }
        .result-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            background-color: #f8f9fa;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }
        .location-name {
            font-size: 14px;
            color: #7f8c8d;
            text-align: center;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .weather-main {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
            text-align: center;
        }
        .temp-info {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            font-size: 16px;
        }
        .high { color: #e74c3c; font-weight: bold; }
        .low { color: #3498db; font-weight: bold; }
        
        .info-card {
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            line-height: 1.4;
        }
        .umbrella-card {
            background-color: #e8f4fd;
            border-left: 4px solid #3498db;
            color: #2980b9;
        }
        .fashion-card {
            background-color: #fdf2e9;
            border-left: 4px solid #e67e22;
            color: #d35400;
        }
        .temp-diff-card {
            background-color: #f5eef8;
            border-left: 4px solid #9b59b6;
            color: #8e44ad;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>☀️ 天気＆服装ナビ Pro</h1>
    <div class="subtitle">現在地を取得して最適な準備をご提案します</div>
    <button onclick="startNavigation()">現在地からチェック！</button>
    
    <div id="loading" class="loading">GPS取得＆データ読み込み中...</div>
    <div id="result" class="result-box"></div>
</div>

<script>
// 天気コード変換（スタイル用の背景タイプも返却）
function getWeatherInfo(code) {
    if (code === 0) return { text: "☀️ 快晴", bg: "linear-gradient(135deg, #ff7e5f, #feb47b)" };
    if (code <= 3) return { text: "🌤️ 晴れ / くもり", bg: "linear-gradient(135deg, #757f9a, #d7dde8)" };
    if (code <= 48) return { text: "🌫️ 霧", bg: "linear-gradient(135deg, #757f9a, #4a00e0)" };
    if (code <= 67) return { text: "🌧️ 雨", bg: "linear-gradient(135deg, #3a7bd5, #3a6073)" };
    if (code <= 77) return { text: "❄️ 雪", bg: "linear-gradient(135deg, #e6dada, #274046)" };
    if (code <= 82) return { text: "🌦️ にわか雨", bg: "linear-gradient(135deg, #5c258d, #4389a2)" };
    if (code <= 99) return { text: "⚡ 雷雨", bg: "linear-gradient(135deg, #0f2027, #203a43)" };
    return { text: "☁️ 不明", bg: "linear-gradient(135deg, #eef2f3, #8e9eab)" };
}

// 最高気温の服装ベース
function getFashionAdvice(temp) {
    if (temp >= 26) return "👕 半袖やノースリーブで快適に過ごせます。熱中症に気をつけて！";
    if (temp >= 21) return "長袖シャツや、半袖＋薄手のカーディガンがちょうど良いです。";
    if (temp >= 16) return "🧥 セーターや、少し厚手のジャケット・パーカーが必要です。";
    if (temp >= 12) return "トレンチコートや、厚手のジャケットを羽織りましょう。";
    return "🧣 冬物の厚手コートやダウンジャケット、マフラーで完全防寒を！";
}

// 寒暖差チェック
function getTempDiffAdvice(max, min) {
    const diff = max - min;
    if (diff >= 10) {
        return `⚠️ 寒暖差が ${diff.toFixed(1)}°C あります！朝晩は冷え込むため、着脱しやすいアウター（カーディガンやジャケット）を必ずお持ちください。`;
    }
    return `気温差は ${diff.toFixed(1)}°C と比較的穏やかです。お出かけの時間帯を気にせず過ごせます。`;
}

// 逆ジオコーディング（経緯度から地名を取得）
async function getLocationName(lat, lon) {
    try {
        const response = await fetch(`https://openstreetmap.org{lat}&lon=${lon}&format=json&accept-language=ja`);
        const data = await response.json();
        if (data.address) {
            return data.address.province || data.address.city || data.address.town || "現在地付近";
        }
        return "取得地域";
    } catch {
        return "現在地付近";
    }
}

// ボタン押下時のトリガー
function startNavigation() {
    const resultBox = document.getElementById('result');
    const loading = document.getElementById('loading');
    
    resultBox.style.display = 'none';
    loading.style.display = 'block';

    // 位置情報の取得要求
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                getWeatherAndFashion(position.coords.latitude, position.coords.longitude);
            },
            (error) => {
                console.warn("位置情報の取得に失敗。東京固定で処理します。", error);
                getWeatherAndFashion(35.6785, 139.6823); // デフォルト東京
            }
        );
    } else {
        getWeatherAndFashion(35.6785, 139.6823);
    }
}

// メインデータ処理
async function getWeatherAndFashion(latitude, longitude) {
    const resultBox = document.getElementById('result');
    const loading = document.getElementById('loading');

    // weathercode から weather_code に変更
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo`;

    try {
        const [weatherRes, locationName] = await Promise.all([
            fetch(url).then(res => res.json()),
            getLocationName(latitude, longitude)
        ]);

        const weatherCode = weatherRes.daily.weather_code[0];
        const maxTemp = weatherRes.daily.temperature_2m_max[0];
        const minTemp = weatherRes.daily.temperature_2m_min[0];
        
        const weatherInfo = getWeatherInfo(weatherCode);

        // 背景色の変更
        document.body.style.background = weatherInfo.bg;

        // 傘判定
        let umbrellaMessage = "🟢 傘は持たなくて大丈夫そうです！";
        if ([51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82, 95, 96, 99].includes(weatherCode)) {
            umbrellaMessage = "🔵 雨が降りそうです。傘を持っていこう！";
        }

        const fashionMessage = getFashionAdvice(maxTemp);
        const diffMessage = getTempDiffAdvice(maxTemp, minTemp);

        resultBox.innerHTML = `
            <div class="location-name">📍 ${locationName} の天気</div>
            <div class="weather-main">${weatherInfo.text}</div>
            <hr style="border:0; border-top:1px solid #ddd;">
            <div class="temp-info">
                <span class="high">最高: ${maxTemp}°C</span>
                <span class="low">最低: ${minTemp}°C</span>
            </div>
            <div class="info-card umbrella-card">
                <strong>🌂 傘の準備：</strong>
                <span>${umbrellaMessage}</span>
            </div>
            <div class="info-card fashion-card">
                <strong>👔 服装の目安：</strong>
                <span>${fashionMessage}</span>
            </div>
            <div class="info-card temp-diff-card">
                <strong>体感温度・寒暖差：</strong>
                <span>${diffMessage}</span>
            </div>
        `;
        
        loading.style.display = 'none';
        resultBox.style.display = 'block';

    } catch (error) {
        loading.style.display = 'none';
        resultBox.innerHTML = '⚠️ データの取得に失敗しました。電波の良い所で再度お試しください。';
        resultBox.style.display = 'block';
        console.error(error);
    }
}
</script>

</body>
</html>
