<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ランダム数当てゲーム</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f9;
        }
        .container {
            background-color: white;
            padding: 20px 40px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 100px;
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
        }
        #score {
            margin-top: 15px;
            color: #4a5568;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ランダム数当てゲーム</h1>
    <p>1から100までの数字を当ててね！</p>
    <input type="number" id="guess" min="1" max="100">
    <button onclick="checkGuess()">予想！</button>
    <div id="result"></div>
    <div id="score">現在の正解数: <span id="clearCount" style="font-weight: bold; color: #3182ce;">0</span> 回</div>
</div>

<script>
    let answer;
    let totalClear = 0;

    // 答えの数字をランダムに新しくする関数
    function changeAnswer() {
        answer = Math.floor(Math.random() * 100) + 1;
        document.getElementById('guess').value = ''; // 入力欄をクリア
    }

    // 最初に最初の答えをランダムでセット
    changeAnswer();

    function checkGuess() {
        let guess = parseInt(document.getElementById('guess').value);

        if (isNaN(guess) || guess < 1 || guess > 100) {
            document.getElementById('result').innerHTML = 78;
            return;
        }

        if (guess === answer) {
            totalClear++;
            document.getElementById('clearCount').innerText = totalClear;
            document.getElementById('result').innerHTML = `正解！🎉<br><span style="color:#e53e3e;">答えが別のランダムな数字に切り替わったよ！</span>`;
            changeAnswer(); // 正解した瞬間に次のランダムな数字へ切り替え
        } else if (guess > answer) {
            document.getElementById('result').innerHTML = "もっと小さい数字だよ！📉";
        } else {
            document.getElementById('result').innerHTML = "もっと大きい数字だよ！📈";
        }
    }
</script>

</body>
</html>
