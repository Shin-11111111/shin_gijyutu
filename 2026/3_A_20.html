<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE 欲しいものリスト (タグ検索・スペース対応版)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* --- デフォルトテーマ（ライト・ブルー） --- */
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --owned-card-bg: #e8f5e9;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --accent-color: #ff9800;
            --success-color: #2e7d32;
            --border-color: #e0e0e0;
            --danger-color: #e53935;
            --summary-bg: #ffffff;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
            --font-family: 'Helvetica Neue', Arial, sans-serif;
            --radius: 12px;
        }

        /* --- 1. サイバーパンク --- */
        body.theme-cyber {
            --bg-color: #0d0e15;
            --card-bg: #181925;
            --owned-card-bg: #052e16;
            --text-color: #00ffcc;
            --primary-color: #ff007f;
            --accent-color: #ff007f;
            --success-color: #00ffcc;
            --border-color: #ff007f;
            --danger-color: #ff3366;
            --summary-bg: #12131c;
            --card-shadow: 0 0 15px rgba(255, 0, 127, 0.3);
            --radius: 2px;
        }

        /* --- 2. レトロポップ --- */
        body.theme-retro {
            --bg-color: #fef08a;
            --card-bg: #ffffff;
            --owned-card-bg: #bbf7d0;
            --text-color: #4c1d95;
            --primary-color: #8b5cf6;
            --accent-color: #ec4899;
            --success-color: #10b981;
            --border-color: #4c1d95;
            --danger-color: #ef4444;
            --summary-bg: #ffffff;
            --card-shadow: 4px 4px 0px #4c1d95;
            --radius: 16px;
        }

        /* --- 3. ラグジュアリー --- */
        body.theme-luxury {
            --bg-color: #111111;
            --card-bg: #1a1a1a;
            --owned-card-bg: #1a271d;
            --text-color: #f3e5ab;
            --primary-color: #d4af37;
            --accent-color: #d4af37;
            --success-color: #81c784;
            --border-color: #333333;
            --danger-color: #e57373;
            --summary-bg: #222222;
            --card-shadow: 0 4px 20px rgba(212, 175, 55, 0.15);
            --radius: 4px;
        }

        /* --- 4. ミニマルライト --- */
        body.theme-minimal {
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --owned-card-bg: #f5f5f5;
            --text-color: #111111;
            --primary-color: #111111;
            --accent-color: #666666;
            --success-color: #111111;
            --border-color: #eeeeee;
            --danger-color: #999999;
            --summary-bg: #ffffff;
            --card-shadow: 0 2px 5px rgba(0,0,0,0.02);
            --radius: 0px;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            transition: all 0.4s ease;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
        }

        .header-area {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 12px;
            font-size: 28px;
            letter-spacing: 1px;
            transition: color 0.4s;
        }

        .theme-switcher {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--card-bg);
            padding: 8px 18px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
        }

        .theme-switcher span { font-size: 12px; font-weight: bold; }

        .theme-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .theme-btn:hover { transform: scale(1.25); }
        .theme-btn.btn-default { background: #4a90e2; }
        .theme-btn.btn-cyber { background: #ff007f; }
        .theme-btn.btn-retro { background: #8b5cf6; }
        .theme-btn.btn-luxury { background: #d4af37; }
        .theme-btn.btn-minimal { background: #111111; }

        .progress-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .progress-bar-bg {
            background: rgba(0,0,0,0.1);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--primary-color), var(--success-color));
            height: 100%;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .top-actions {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) { .top-actions { grid-template-columns: 1fr; } }

        .form-section, .backup-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
            transition: all 0.4s;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }

        .form-group { margin-bottom: 12px; }
        .form-group.full-width { grid-column: span 2; }
        @media (max-width: 500px) { .form-group.full-width { grid-column: span 1; } }

        .form-group label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 12px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-sizing: border-box;
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
        }

        .form-group textarea { resize: vertical; height: 50px; }

        .submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: var(--radius);
            cursor: pointer;
            width: 100%;
            font-size: 15px;
            font-weight: bold;
            margin-top: 10px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .submit-btn:active { transform: scale(0.98); }

        .backup-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
        }

        .btn-secondary {
            background-color: rgba(0,0,0,0.08);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: bold;
            text-align: center;
        }

        .summary-section {
            background: var(--summary-bg);
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            text-align: center;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
        }

        .summary-card h3 { margin: 0 0 5px 0; font-size: 12px; opacity: 0.8; line-height: 1.2; }
        .summary-card p { margin: 0; font-size: 18px; font-weight: bold; line-height: 1.3; }
        .summary-card input {
            width: 110px;
            padding: 4px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background: var(--card-bg);
            color: var(--text-color);
        }

        .txt-wish { color: var(--accent-color); }
        .txt-safe { color: var(--success-color); }
        .txt-over { color: var(--danger-color); }

        .filter-sort-section {
            background: var(--card-bg);
            padding: 12px 15px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            border: 1px solid var(--border-color);
        }

        .filter-group { display: flex; align-items: center; gap: 6px; }
        .filter-group label { font-weight: bold; font-size: 12px; white-space: nowrap; }
        .filter-group select, .filter-group input {
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 12px;
            background-color: var(--card-bg);
            color: var(--text-color);
            outline: none;
        }

        .tag-badge {
            display: inline-block;
            font-size: 10px;
            background: rgba(0,0,0,0.06);
            border: 1px solid var(--border-color);
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 4px;
            margin-bottom: 4px;
            transition: background 0.2s;
        }
        .tag-badge:hover {
            background: var(--primary-color);
            color: white;
        }

        .item-tags-box {
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .section-title {
            font-size: 20px;
            margin: 30px 0 15px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 6px;
        }

        .item-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .item-card:hover { transform: translateY(-4px); }
        .item-card.is-owned { background-color: var(--owned-card-bg); }

        .item-img-container {
            width: 100%;
            height: 160px;
            background-color: rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .item-img { width: 100%; height: 100%; object-fit: cover; }
        .no-img-text { opacity: 0.5; font-size: 12px; }

        .status-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            color: white;
            z-index: 1;
        }
        .badge-wish { background-color: var(--accent-color); }
        .badge-owned { background-color: var(--success-color); }

        .category-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            color: #fff;
            z-index: 1;
        }

        .item-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .item-name {
            font-size: 17px;
            margin: 0 0 6px 0;
            font-weight: bold;
            word-break: break-all;
        }

        .item-card.is-owned .item-name-text {
            text-decoration: line-through var(--danger-color) 3px;
            opacity: 0.7;
        }

        .already-owned-tag {
            display: none;
            color: var(--danger-color);
            font-size: 11px;
            font-weight: bold;
            margin-left: 4px;
        }
        .item-card.is-owned .already-owned-tag { display: inline-block; }

        .item-price { font-size: 15px; font-weight: bold; margin-bottom: 2px; }
        .item-wish-info { font-size: 12px; opacity: 0.9; margin-bottom: 8px; font-weight: bold; }

        .item-extra-info {
            background: rgba(255, 152, 0, 0.1);
            border-left: 3px solid var(--accent-color);
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .due-date-text { color: var(--danger-color); font-weight: bold; }

        .shop-link-btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 4px;
        }

        .item-memo-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed var(--border-color);
            padding: 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-bottom: 10px;
            white-space: pre-wrap;
        }

        .item-edit-selectors {
            background: rgba(0,0,0,0.04);
            padding: 6px 8px;
            border-radius: var(--radius);
            margin-bottom: 10px;
        }

        .inline-select-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .inline-select-group span { font-size: 11px; opacity: 0.8; font-weight: bold; }
        .inline-select {
            font-size: 11px;
            padding: 2px 4px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--card-bg);
            color: var(--text-color);
        }

        .item-count-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
            background: rgba(0,0,0,0.04);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .btn-group { display: flex; gap: 4px; }
        .count-btn {
            background: rgba(0,0,0,0.15);
            color: var(--text-color);
            border: none;
            width: 24px;
            height: 24px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .count-btn:hover { background: rgba(0,0,0,0.25); }

        .delete-btn {
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 6px 10px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h1>ULTIMATE 欲しいものリスト</h1>
        
        <div class="theme-switcher">
            <span>テーマ選択:</span>
            <button class="theme-btn btn-default" title="スタンダード" onclick="setTheme('default')"></button>
            <button class="theme-btn btn-cyber" title="サイバーパンク ⚡" onclick="setTheme('cyber')"></button>
            <button class="theme-btn btn-retro" title="レトロポップ 👾" onclick="setTheme('retro')"></button>
            <button class="theme-btn btn-luxury" title="ラグジュアリー 👑" onclick="setTheme('luxury')"></button>
            <button class="theme-btn btn-minimal" title="ミニマルライト 🤍" onclick="setTheme('minimal')"></button>
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-header">
            <span>🎉 コンプリート達成率</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>
    </div>

    <div class="top-actions">
        <div class="form-section">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="itemName">アイテムの名前</label>
                    <input type="text" id="itemName" placeholder="例：ワイヤレスイヤホン">
                </div>
                <div class="form-group">
                    <label for="itemPrice">金額 (円)</label>
                    <input type="number" id="itemPrice" min="0" placeholder="例：15000">
                </div>
                <div class="form-group">
                    <label for="itemWishCount">欲しい個数</label>
                    <input type="number" id="itemWishCount" min="1" value="1">
                </div>
                <div class="form-group">
                    <label for="itemCategory">カテゴリー</label>
                    <select id="itemCategory">
                        <option value="家電">家電・ガジェット</option>
                        <option value="服">服・ファッション</option>
                        <option value="日用品">日用品・消耗品</option>
                        <option value="趣味">趣味・エンタメ</option>
                        <option value="その他" selected>その他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="itemPriority">優先度</label>
                    <select id="itemPriority">
                        <option value="3">高 🔥🔥</option>
                        <option value="2" selected>中 ⭐</option>
                        <option value="1">低</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="itemDueDate">欲しい期限（購入予定日）</label>
                    <input type="date" id="itemDueDate">
                </div>
                <div class="form-group">
                    <label for="itemUrl">商品URL (ショップリンク)</label>
                    <input type="url" id="itemUrl" placeholder="https://...">
                </div>
                <div class="form-group full-width">
                    <label for="itemTags">タグ (スペース、またはカンマ区切りで複数登録可能)</label>
                    <input type="text" id="itemTags" placeholder="例: セール 最優先 2026冬 (スペース空けでOK)">
                </div>
                <div class="form-group full-width">
                    <label for="itemMemo">メモ・用途</label>
                    <textarea id="itemMemo" placeholder="例：セールで安くなったら買う。"></textarea>
                </div>
                <div class="form-group full-width">
                    <label for="itemFile">画像アップロード</label>
                    <input type="file" id="itemFile" accept="image/*">
                </div>
            </div>
            <button class="submit-btn" id="submitBtn" onclick="addItem()">リストに追加する</button>
        </div>

        <div class="backup-section">
            <h3 style="margin: 0; font-size: 14px; text-align: center;">データ管理</h3>
            <button class="btn-secondary" onclick="exportData()">データを保存 (書き出し)</button>
            <label class="btn-secondary" style="display: block; text-align: center; cursor: pointer;">
                データを復元 (読み込み)
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(this)">
            </label>
            <button class="btn-secondary" style="color: var(--danger-color);" onclick="clearAllData()">データを全消去</button>
        </div>
    </div>

    <div class="summary-section">
        <div class="summary-card">
            <h3>今月の予算設定</h3>
            <p><input type="number" id="budgetAmount" min="0" value="0" onchange="saveBudget()"></p>
        </div>
        <div class="summary-card">
            <h3>現在の貯金額</h3>
            <p><input type="number" id="savingsAmount" min="0" value="0" onchange="saveSavings()"></p>
        </div>
        <div class="summary-card">
            <h3>貯金達成率</h3>
            <p id="savingsStatus" class="txt-safe">0%</p>
        </div>
        <div class="summary-card">
            <h3>未購入総額</h3>
            <p class="txt-wish"><span id="wishPrice">0</span> 円</p>
        </div>
        <div class="summary-card">
            <h3>予算の状況</h3>
            <p id="budgetStatus" class="txt-safe">-</p>
        </div>
    </div>

    <div class="filter-sort-section">
        <div class="filter-group">
            <label for="filterTag">タグで絞り込み:</label>
            <select id="filterTag" onchange="renderList()">
                <option value="ALL">すべてのタグ</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="filterCategory">カテゴリー絞り込み:</label>
            <select id="filterCategory" onchange="saveAndUpdateUI()">
                <option value="ALL">すべて表示</option>
                <option value="家電">家電・ガジェット</option>
                <option value="服">服・ファッション</option>
                <option value="日用品">日用品・消耗品</option>
                <option value="趣味">趣味・エンタメ</option>
                <option value="その他">その他</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="sortOrder">並び替え:</label>
            <select id="sortOrder" onchange="saveAndUpdateUI()">
                <option value="date-desc" selected>登録が新しい順</option>
                <option value="date-asc">登録が古い順</option>
                <option value="duedate-asc">期限が近い順 📅</option>
                <option value="price-desc">金額が高い順</option>
                <option value="price-asc">金額が低い順</option>
                <option value="priority-desc">優先度が高い順</option>
            </select>
        </div>
    </div>

    <h2 class="section-title">🛒 ほしいものリスト</h2>
    <div class="item-list" id="itemList"></div>

    <h2 class="section-title">🏆 殿堂入り（購入済み）コレクション</h2>
    <div class="item-list" id="archiveList"></div>
</div>

<script>
    let items = [];
    let userBudget = 0;
    let userSavings = 0;

    function init() {
        const savedTheme = localStorage.getItem('wishlist_theme') || 'default';
        setTheme(savedTheme, false);

        try {
            const localData = localStorage.getItem('wishlist_items');
            items = localData ? JSON.parse(localData) : [];
            if (!Array.isArray(items)) items = [];

            userBudget = parseInt(localStorage.getItem('wishlist_budget')) || 0;
            document.getElementById('budgetAmount').value = userBudget;

            userSavings = parseInt(localStorage.getItem('wishlist_savings')) || 0;
            document.getElementById('savingsAmount').value = userSavings;
        } catch(e) {
            items = [];
        }
        saveAndUpdateUI();
    }

    function setTheme(themeName, shouldSave = true) {
        document.body.className = themeName === 'default' ? '' : `theme-${themeName}`;
        if (shouldSave) {
            localStorage.setItem('wishlist_theme', themeName);
        }
    }

    function saveBudget() {
        const val = parseInt(document.getElementById('budgetAmount').value) || 0;
        userBudget = val;
        localStorage.setItem('wishlist_budget', val);
        calculateSummary();
    }

    function saveSavings() {
        const val = parseInt(document.getElementById('savingsAmount').value) || 0;
        userSavings = val;
        localStorage.setItem('wishlist_savings', val);
        calculateSummary();
    }

    function escapeHTML(str) {
        if (!str) return "";
        return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }

    let currentBase64Image = "";
    document.getElementById('itemFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) { currentBase64Image = ""; return; }
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 400;
                const scale = MAX_WIDTH / img.width;
                canvas.width = (img.width > MAX_WIDTH) ? MAX_WIDTH : img.width;
                canvas.height = (img.width > MAX_WIDTH) ? img.height * scale : img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                currentBase64Image = canvas.toDataURL('image/jpeg', 0.6);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // カンマ、全角カンマ、読点、および半角スペース・全角スペースですべて切り分ける共通関数
    function parseTags(tagsString) {
        if (!tagsString) return [];
        const rawTags = tagsString.split(/[\s,，、]+/);
        return rawTags.map(t => t.trim()).filter(t => t !== "");
    }

    function addItem() {
        const nameInput = document.getElementById('itemName');
        const priceInput = document.getElementById('itemPrice');
        const wishCountInput = document.getElementById('itemWishCount');
        const priorityInput = document.getElementById('itemPriority');
        const categoryInput = document.getElementById('itemCategory');
        const dueDateInput = document.getElementById('itemDueDate');
        const urlInput = document.getElementById('itemUrl');
        const tagsInput = document.getElementById('itemTags');
        const memoInput = document.getElementById('itemMemo');

        if (nameInput.value.trim() === "") {
            alert("名前を入力してください！");
            return;
        }

        const processedTags = parseTags(tagsInput.value);

        const item = {
            id: Date.now(),
            name: nameInput.value,
            price: parseInt(priceInput.value) || 0,
            wishCount: Math.max(1, parseInt(wishCountInput.value) || 1),
            priority: parseInt(priorityInput.value) || 2,
            category: categoryInput.value || "その他",
            dueDate: dueDateInput.value || "",
            url: urlInput.value || "",
            tags: processedTags,
            memo: memoInput.value || "",
            image: currentBase64Image,
            count: 0
        };

        items.push(item);
        
        nameInput.value = "";
        priceInput.value = "";
        wishCountInput.value = "1";
        dueDateInput.value = "";
        urlInput.value = "";
        tagsInput.value = "";
        memoInput.value = "";
        document.getElementById('itemFile').value = "";
        currentBase64Image = "";

        saveAndUpdateUI();
    }

    function updateTagDropdown() {
        const filterTagSelect = document.getElementById('filterTag');
        const currentSelected = filterTagSelect.value;
        
        const allTagsSet = new Set();
        items.forEach(item => {
            if (item.tags && Array.isArray(item.tags)) {
                item.tags.forEach(t => allTagsSet.add(t));
            }
        });

        filterTagSelect.innerHTML = '<option value="ALL">すべてのタグ</option>';
        allTagsSet.forEach(tag => {
            const opt = document.createElement('option');
            opt.value = tag;
            opt.textContent = tag;
            if (tag === currentSelected) {
                opt.selected = true;
            }
            filterTagSelect.appendChild(opt);
        });
    }

    function selectTagFromCard(tagName) {
        const filterTagSelect = document.getElementById('filterTag');
        filterTagSelect.value = tagName;
        renderList();
    }

    function saveAndUpdateUI() {
        localStorage.setItem('wishlist_items', JSON.stringify(items));
        updateTagDropdown();
        sortItems();
        renderList();
        calculateSummary();
        updateProgressBar();
    }

    function updateProgressBar() {
        if (items.length === 0) {
            document.getElementById('progressPercent').textContent = "0%";
            document.getElementById('progressBarFill').style.width = "0%";
            return;
        }

        let totalWish = 0;
        let totalOwned = 0;

        items.forEach(item => {
            const wish = Number(item.wishCount) || 1;
            const owned = Math.min(wish, Number(item.count) || 0);
            totalWish += wish;
            totalOwned += owned;
        });

        const percent = totalWish > 0 ? Math.round((totalOwned / totalWish) * 100) : 0;
        document.getElementById('progressPercent').textContent = `${percent}%`;
        document.getElementById('progressBarFill').style.width = `${percent}%`;
    }

    function sortItems() {
        const order = document.getElementById('sortOrder').value;
        items.sort((a, b) => {
            if (order === 'date-desc') return b.id - a.id;
            if (order === 'date-asc') return a.id - b.id;
            if (order === 'price-desc') return b.price - a.price;
            if (order === 'price-asc') return a.price - b.price;
            if (order === 'priority-desc') return b.priority - a.priority;
            if (order === 'duedate-asc') {
                if (!a.dueDate) return 1;
                if (!b.dueDate) return -1;
                return new Date(a.dueDate) - new Date(b.dueDate);
            }
            return 0;
        });
    }

    function editCardTags(id, currentTagsText) {
        const newTagsText = prompt("タグを入力してください（スペース、またはカンマ区切りで複数設定可能）:", currentTagsText);
        if (newTagsText === null) return;

        const item = items.find(i => i.id === id);
        if (item) {
            item.tags = parseTags(newTagsText);
            saveAndUpdateUI();
        }
    }

    function renderList() {
        const itemList = document.getElementById('itemList');
        const archiveList = document.getElementById('archiveList');
        const filterCat = document.getElementById('filterCategory').value;
        const filterTag = document.getElementById('filterTag').value;
        
        itemList.innerHTML = "";
        archiveList.innerHTML = "";

        items.forEach(item => {
            if (filterCat !== "ALL" && item.category !== filterCat) return;

            if (filterTag !== "ALL") {
                if (!item.tags || !item.tags.includes(filterTag)) return;
            }

            const wishCount = Number(item.wishCount) || 1;
            const ownedCount = Number(item.count) || 0;
            const remainingWish = Math.max(0, wishCount - ownedCount);
            const isOwned = remainingWish === 0;

            const card = document.createElement('div');
            card.className = `item-card ${isOwned ? 'is-owned' : ''}`;

            let imgHTML = `<span class="no-img-text">No Image</span>`;
            if (item.image) {
                imgHTML = `<img src="${escapeHTML(item.image)}" class="item-img">`;
            }

            const badgeHTML = isOwned 
                ? `<div class="status-badge badge-owned">所持完了 (${ownedCount}/${wishCount})</div>` 
                : `<div class="status-badge badge-wish">あと ${remainingWish} 個欲しい</div>`;

            const categoryHTML = `<div class="category-badge">${escapeHTML(item.category || "その他")}</div>`;

            let extraInfoHTML = "";
            if (item.dueDate || item.url) {
                let dueDateHTML = item.dueDate ? `<div>📅 期限: <span class="due-date-text">${escapeHTML(item.dueDate)}</span></div>` : "";
                let shopLinkHTML = item.url ? `<div><a href="${escapeHTML(item.url)}" target="_blank" rel="noopener" class="shop-link-btn">🛒 商品ページを開く ↗</a></div>` : "";
                extraInfoHTML = `<div class="item-extra-info">${dueDateHTML}${shopLinkHTML}</div>`;
            }

            let memoHTML = "";
            if (item.memo) {
                memoHTML = `<div class="item-memo-box"><strong>📝 メモ:</strong><br>${escapeHTML(item.memo)}</div>`;
            }

            let tagsHTML = "";
            const itemTagsArray = item.tags || [];
            if (itemTagsArray.length > 0) {
                const tagsBadges = itemTagsArray.map(t => 
                    `<span class="tag-badge" onclick="selectTagFromCard('${escapeHTML(t)}')">#${escapeHTML(t)}</span>`
                ).join("");
                tagsHTML = `<div class="item-tags-box">${tagsBadges}</div>`;
            } else {
                tagsHTML = `<div class="item-tags-box"><span style="font-size:10px; opacity:0.5;">タグなし</span></div>`;
            }

            // カード編集ダイアログ内ではスペース区切りで見やすく編集できるように保持
            const rawTagsString = itemTagsArray.join(' ');

            card.innerHTML = `
                <div class="item-img-container">
                    ${imgHTML}
                    ${badgeHTML}
                    ${categoryHTML}
                </div>
                <div class="item-info">
                    <div>
                        <div class="item-name">
                            <span class="item-name-text">${escapeHTML(item.name)}</span>
                            <span class="already-owned-tag">🎉 コンプリート！</span>
                        </div>
                        <div class="item-price">${Number(item.price).toLocaleString()} 円 / 個</div>
                        <div class="item-wish-info">欲しい数: <strong>${wishCount}</strong> 個</div>
                        
                        ${extraInfoHTML}
                        ${memoHTML}
                        
                        <div>
                            <span style="font-size: 11px; font-weight: bold; opacity: 0.8;">🏷️ タグ:</span>
                            <button type="button" style="font-size:10px; background:none; border:none; color:var(--primary-color); cursor:pointer; padding:0 4px;" onclick="editCardTags(${item.id}, '${escapeHTML(rawTagsString)}')">✏️編集</button>
                            ${tagsHTML}
                        </div>

                        <div class="item-edit-selectors">
                            <div class="inline-select-group">
                                <span>優先度:</span>
                                <select class="inline-select" onchange="updatePriority(${item.id}, this.value)">
                                    <option value="3" ${item.priority === 3 ? 'selected' : ''}>高 🔥</option>
                                    <option value="2" ${item.priority === 2 ? 'selected' : ''}>中 ⭐</option>
                                    <option value="1" ${item.priority === 1 ? 'selected' : ''}>低</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div>
                        <div class="item-count-control">
                            <span>欲しい数量</span>
                            <div class="btn-group">
                                <button type="button" class="count-btn" onclick="updateWishCount(${item.id}, -1)">-</button>
                                <span style="min-width:18px; text-align:center; font-weight:bold;">${wishCount}</span>
                                <button type="button" class="count-btn" onclick="updateWishCount(${item.id}, 1)">+</button>
                            </div>
                        </div>
                        <div class="item-count-control">
                            <span>手持ち数量</span>
                            <div class="btn-group">
                                <button type="button" class="count-btn" onclick="updateCount(${item.id}, -1)">-</button>
                                <span style="min-width:18px; text-align:center; font-weight:bold;">${ownedCount}</span>
                                <button type="button" class="count-btn" onclick="updateCount(${item.id}, 1)">+</button>
                            </div>
                        </div>
                        <button type="button" class="delete-btn" onclick="deleteItem(${item.id})">削除する</button>
                    </div>
                </div>
            `;

            if (isOwned) {
                archiveList.appendChild(card);
            } else {
                itemList.appendChild(card);
            }
        });

        if (itemList.children.length === 0) {
            itemList.innerHTML = `<p style="grid-column: 1/-1; text-align: center; opacity: 0.6; font-size: 14px; padding: 20px;">表示できるアイテムがありません。</p>`;
        }
        if (archiveList.children.length === 0) {
            archiveList.innerHTML = `<p style="grid-column: 1/-1; text-align: center; opacity: 0.5; font-size: 13px; padding: 15px;">まだコンプリートしたアイテムはありません。手持ち数量を増やしてみましょう！</p>`;
        }
    }

    function calculateSummary() {
        let wishTotal = 0;
        items.forEach(item => {
            const price = Number(item.price) || 0;
            const wishCount = Number(item.wishCount) || 1;
            const ownedCount = Number(item.count) || 0;
            const remaining = Math.max(0, wishCount - ownedCount);
            wishTotal += (price * remaining);
        });

        document.getElementById('wishPrice').textContent = wishTotal.toLocaleString();

        const statusEl = document.getElementById('budgetStatus');
        if (userBudget <= 0) {
            statusEl.textContent = "未設定";
            statusEl.className = "";
        } else {
            const diff = userBudget - wishTotal;
            if (diff >= 0) {
                statusEl.textContent = `残り ${diff.toLocaleString()} 円 (予算内)`;
                statusEl.className = "txt-safe";
            } else {
                statusEl.textContent = `${Math.abs(diff).toLocaleString()} 円 オーバー!`;
                statusEl.className = "txt-over";
            }
        }

        const savingsStatusEl = document.getElementById('savingsStatus');
        if (wishTotal === 0) {
            savingsStatusEl.textContent = "完了！";
            savingsStatusEl.className = "txt-safe";
        } else {
            const savingsPercent = Math.min(100, Math.round((userSavings / wishTotal) * 100));
            const remainingSavings = Math.max(0, wishTotal - userSavings);
            
            if (remainingSavings === 0) {
                savingsStatusEl.innerHTML = `${savingsPercent}% <br><span style="font-size:11px;">いつでも買える！🎉</span>`;
                savingsStatusEl.className = "txt-safe";
            } else {
                savingsStatusEl.innerHTML = `${savingsPercent}% <br><span style="font-size:11px; font-weight:normal; opacity:0.8;">(あと ${remainingSavings.toLocaleString()} 円)</span>`;
                savingsStatusEl.className = savingsPercent >= 50 ? "txt-wish" : "";
            }
        }
    }

    function updatePriority(id, val) {
        const item = items.find(i => i.id === id);
        if (item) { item.priority = parseInt(val); saveAndUpdateUI(); }
    }

    function updateWishCount(id, change) {
        const item = items.find(i => i.id === id);
        if (item) {
            item.wishCount = Math.max(1, (Number(item.wishCount) || 1) + change);
            saveAndUpdateUI();
        }
    }

    function updateCount(id, change) {
        const item = items.find(i => i.id === id);
        if (item) {
            const oldCount = Number(item.count) || 0;
            const newCount = Math.max(0, oldCount + change);
            item.count = newCount;

            if (change > 0 && newCount >= item.wishCount && oldCount < item.wishCount) {
                fireConfetti();
            }

            saveAndUpdateUI();
        }
    }

    function fireConfetti() {
        if (typeof confetti === 'function') {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });
        }
    }

    function deleteItem(id) {
        if (confirm("本当に削除しますか？")) {
            items = items.filter(i => i.id !== id);
            saveAndUpdateUI();
        }
    }

    function clearAllData() {
        if (confirm("データを一度全てリセットしますか？")) {
            localStorage.removeItem('wishlist_items');
            localStorage.removeItem('wishlist_budget');
            localStorage.removeItem('wishlist_savings');
            items = [];
            userBudget = 0;
            userSavings = 0;
            document.getElementById('budgetAmount').value = 0;
            document.getElementById('savingsAmount').value = 0;
            saveAndUpdateUI();
            alert("データを完全に初期化しました。");
        }
    }

    function exportData() {
        if (items.length === 0 && userBudget === 0 && userSavings === 0) { 
            alert("保存するデータがありません。"); 
            return; 
        }
        const exportObj = {
            version: "1.2",
            budget: userBudget,
            savings: userSavings,
            items: items
        };
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportObj));
        const a = document.createElement('a');
        a.setAttribute("href", dataStr);
        a.setAttribute("download", `wishlist_tags_${Date.now()}.json`);
        document.body.appendChild(a);
        a.click();
        a.remove();
    }

    function importData(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                
                if (imported && imported.items && Array.isArray(imported.items)) {
                    items = imported.items;
                    userBudget = imported.budget || 0;
                    userSavings = imported.savings || 0;
                } else if (Array.isArray(imported)) {
                    items = imported;
                } else {
                    throw new Error("Invalid format");
                }

                document.getElementById('budgetAmount').value = userBudget;
                document.getElementById('savingsAmount').value = userSavings;
                localStorage.setItem('wishlist_budget', userBudget);
                localStorage.setItem('wishlist_savings', userSavings);
                
                saveAndUpdateUI();
                alert("すべてのデータを復元しました。");
            } catch (err) { 
                alert("読み込みに失敗しました。"); 
            }
            input.value = "";
        };
        reader.readAsText(file);
    }

    window.onload = init;
</script>

</body>
</html>
