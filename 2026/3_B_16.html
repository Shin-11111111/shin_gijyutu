<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超難関！国語の品詞識別クイズ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .quiz-container {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            max-width: 550px;
            width: 100%;
        }

        h1 {
            font-size: 22px;
            text-align: center;
            color: #38bdf8;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }

        .question-box {
            background-color: #0f172a;
            padding: 20px;
            border-radius: 8px;
            font-size: 17px;
            line-height: 1.6;
            margin-bottom: 20px;
            border-left: 5px solid #38bdf8;
        }

        .word-highlight {
            color: #f43f5e;
            font-size: 22px;
            text-decoration: underline;
            font-weight: bold;
            margin: 0 3px;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: #334155;
            border: 1px solid #475569;
            color: #f8fafc;
            padding: 14px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background-color: #475569;
            border-color: #38bdf8;
        }

        .result-box {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            min-height: 50px;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .correct { color: #4ade80; }
        .incorrect { color: #f87171; }

        .next-btn {
            display: block;
            width: 100%;
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .next-btn:hover {
            background-color: #0369a1;
        }

        .score-board {
            text-align: right;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>🔥 超難関！品詞識別クイズ</h1>
    <div class="score-board">正解数: <span id="score">0</span> / <span id="total">0</span></div>
     
    <div class="question-box" id="questionText">
        問題読み込み中...
    </div>

    <div class="options-container" id="optionsContainer"></div>

    <div class="result-box" id="resultMessage"></div>
     
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()" style="display: none;">次の難問へ</button>
</div>

<script>
    // 全20問にパワーアップした難関データ
    const quizData = [
        { 
            word: "ない", 
            sentence: "ここには誰も【ない】。", 
            options: ["助動詞", "形容詞", "形容動詞の一部", "特殊な助詞"], 
            correct: 1,
            comment: "「〜ない」が「ぬ」に置き換えられない、かつ単独で意味が通る（存在しないの意）ため『形容詞』です。"
        },
        { 
            word: "ない", 
            sentence: "本を読ま【ない】。", 
            options: ["形容詞", "連体詞", "助動詞", "副詞"], 
            correct: 2,
            comment: "「読まぬ」と言い換えられるため、これは動詞に付く否定の『助動詞』です。"
        },
        { 
            word: "そうだ", 
            sentence: "彼は今にも泣き【そうだ】。", 
            options: ["助動詞（様態）", "助動詞（伝聞）", "形容動詞の活用語尾", "名詞＋助動詞"], 
            correct: 0,
            comment: "動詞の連用形（泣き）に接続し、様子を表しているので様態の『助動詞』です。"
        },
        { 
            word: "そうだ", 
            sentence: "明日は雨が降る【そうだ】。", 
            options: ["助動詞（様態）", "助動詞（伝聞）", "形容動詞", "接続詞の一部"], 
            correct: 1,
            comment: "動詞の終止形（降る）に接続し、噂や伝聞を表しているので伝聞の『助動詞』です。"
        },
        { 
            word: "同じだ", 
            sentence: "彼の意見も私と【同じだ】。", 
            options: ["形容動詞", "連体詞", "形容詞", "助動詞"], 
            correct: 0,
            comment: "「同じだー同じならー同じに」と活用するため、国語文法上は『形容動詞』に分類されます。"
        },
        { 
            word: "同じ", 
            sentence: "【同じ】服を持っています。", 
            options: ["形容動詞の語幹", "連体詞", "副詞", "名詞"], 
            correct: 1,
            comment: "「同じ服」の「同じ」は後ろの名詞を直接修飾し、この形のまま活用しない（同じな服とは言えない）ため『連体詞』扱いになります。"
        },
        { 
            word: "すぐ", 
            sentence: "【すぐ】に向かいます。", 
            options: ["副詞", "名詞", "連体詞", "接続詞"], 
            correct: 0,
            comment: "動詞「向かう」を修飾し、活用しない自立語なので『副詞』です。"
        },
        { 
            word: "すぐ", 
            sentence: "彼の【すぐ】後ろに立つ。", 
            options: ["副詞", "名詞", "連体詞", "形容動詞の語幹"], 
            correct: 1,
            comment: "「すぐ後ろ」の「すぐ」は、直後に助詞「の」や「に」を補える性質を持つため、ここでは『名詞』として扱われます。"
        },
        { 
            word: "と", 
            sentence: "絶対に合格する【と】思う。", 
            options: ["格助詞", "接続助詞", "並立助詞", "副詞の一部"], 
            correct: 0,
            comment: "心の中で思ったことや発言内容を引用する『格助詞』です。"
        },
        { 
            word: "と", 
            sentence: "春になる【と】桜が咲く。", 
            options: ["格助詞", "接続助詞", "並立助詞", "終助詞"], 
            correct: 1,
            comment: "「～すると、後ろの事態が起こる」という文と文の接続関係を示す『接続助詞』です。"
        },
        // --- ここから追加問題 ---
        { 
            word: "らしい", 
            sentence: "あきらめるのは君【らしい】ない。", 
            options: ["助動詞（推定）", "形容詞の一部", "接尾語（形容詞化）", "比況の助動詞"], 
            correct: 2,
            comment: "名詞（君）について「〜にふさわしい」という意味の形容詞を作っており、さらに下に「ない（君らしくない）」と続くため、接尾語由来の『形容詞の一部（活用語尾側）』です。"
        },
        { 
            word: "らしい", 
            sentence: "どうやら荷物が届いた【らしい】。", 
            options: ["形容詞", "助動詞（推定）", "伝聞の助動詞", "接尾語"], 
            correct: 1,
            comment: "動詞の終止形（届いた）に接続し、客観的な根拠に基づく推量・推測を表す『助動詞』です。"
        },
        { 
            word: "大きな", 
            sentence: "【大きな】声を出す。", 
            options: ["形容詞", "形容動詞", "連体詞", "副詞"], 
            correct: 2,
            comment: "「大きな」は体言（声）のみを修飾し、「大きに」「大きだ」などと活用しないため『連体詞』です。"
        },
        { 
            word: "大きく", 
            sentence: "声を【大きく】する。", 
            options: ["形容詞の連用形", "形容動詞の連用形", "副詞", "連体詞"], 
            correct: 0,
            comment: "「大きい」という『形容詞』が、動詞「する」を修飾するために連用形（〜く）に変化したものです。"
        },
        { 
            word: "ので", 
            sentence: "雨が降った【ので】遅れました。", 
            options: ["格助詞", "接続助詞", "副助詞", "終助詞"], 
            correct: 1,
            comment: "原因や理由を表して、前の文を後ろの文へとつなぐ役割をする『接続助詞』です（「の」と「で」に分解しません）。"
        },
        { 
            word: "で", 
            sentence: "これは私のペン【で】す。", 
            options: ["助動詞の一部", "格助詞", "接続助詞", "形容動詞の語尾"], 
            correct: 0,
            comment: "丁寧の助動詞「です」の連用形、または断定の助動詞「だ」の連用形「で」＋補助動詞「候（す）」由来の『助動詞の一部』となります。"
        },
        { 
            word: "きれいだ", 
            sentence: "部屋が【きれいだ】。", 
            options: ["名詞＋助動詞", "形容詞", "形容動詞", "副詞"], 
            correct: 2,
            comment: "状態を表し、「きれいならば」「きれいに」と活用し、単独で述語になれるため『形容動詞』です。"
        },
        { 
            word: "単に", 
            sentence: "それは【単に】噂に過ぎない。", 
            options: ["形容動詞の連用形", "連体詞", "副詞", "接続詞"], 
            correct: 2,
            comment: "「単に〜に過ぎない」のように、後ろの動詞や文全体（用言）を修飾する、活用しない自立語なので『副詞』です。"
        },
        { 
            word: "て", 
            sentence: "宿題を終え【て】から遊ぶ。", 
            options: ["格助詞", "接続助詞", "終助詞", "助動詞の語尾"], 
            correct: 1,
            comment: "動詞の連用形（終え）に付き、前後の動作の連続や前後関係を表す『接続助詞』です。"
        },
        { 
            word: "動いた", 
            sentence: "ついに事態が【動いた】。", 
            options: ["動詞（終止形）", "動詞の連用形＋助動詞", "形容詞＋助動詞", "名詞＋助動詞"], 
            correct: 1,
            comment: "動詞「動く」の連用形が音便化した「動い」に、過去・完了の助動詞「た」が結合した形です。"
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let totalQuestions = 0;
    let answered = false;

    function loadQuestion() {
        answered = false;
        document.getElementById("resultMessage").innerText = "";
        document.getElementById("nextBtn").style.display = "none";
         
        currentQuestionIndex = Math.floor(Math.random() * quizData.length);
        const currentQuiz = quizData[currentQuestionIndex];

        const formattedSentence = currentQuiz.sentence.replace(
            `【${currentQuiz.word}】`, 
            `<span class="word-highlight">${currentQuiz.word}</span>`
        );
        document.getElementById("questionText").innerHTML = `下線部の品詞（文法的性質）として正しいものは？<br><br>${formattedSentence}`;

        const optionsContainer = document.getElementById("optionsContainer");
        optionsContainer.innerHTML = "";
         
        currentQuiz.options.forEach((option, index) => {
            const button = document.createElement("button");
            button.className = "option-btn";
            button.innerText = `${index + 1}. ${option}`;
            button.onclick = () => checkAnswer(index, button);
            optionsContainer.appendChild(button);
        });
    }

    function checkAnswer(selectedIndex, clickedButton) {
        if (answered) return;
        answered = true;
        totalQuestions++;
        document.getElementById("total").innerText = totalQuestions;

        const currentQuiz = quizData[currentQuestionIndex];
        const resultMessage = document.getElementById("resultMessage");
        const buttons = document.getElementsByClassName("option-btn");

        if (selectedIndex === currentQuiz.correct) {
            resultMessage.innerHTML = `⭕ 正解！お見事！<br><span style="font-size:14px; font-weight:normal; color:#94a3b8;">解説: ${currentQuiz.comment}</span>`;
            resultMessage.className = "result-box correct";
            clickedButton.style.backgroundColor = "#064e3b";
            clickedButton.style.borderColor = "#4ade80";
            score++;
            document.getElementById("score").innerText = score;
        } else {
            resultMessage.innerHTML = `❌ 不正解！ 正解は 「${currentQuiz.correct + 1}」 です。<br><span style="font-size:14px; font-weight:normal; color:#94a3b8;">解説: ${currentQuiz.comment}</span>`;
            resultMessage.className = "result-box incorrect";
            clickedButton.style.backgroundColor = "#7f1d1d";
            clickedButton.style.borderColor = "#f87171";
             
            buttons[currentQuiz.correct].style.backgroundColor = "#064e3b";
            buttons[currentQuiz.correct].style.borderColor = "#4ade80";
        }

        document.getElementById("nextBtn").style.display = "block";
    }

    function nextQuestion() {
        loadQuestion();
    }

    window.onload = loadQuestion;
</script>

</body>
</html>
