<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校受験ナビ | 東京都対応・君の合格ロードマップ</title>
    <!-- Google Fonts の読み込み -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 共通スタイル（水色と白ベース） --- */
        :root {
            --main-color: #5dade2;      /* 爽やかな水色 */
            --accent-white: #ffffff;    /* ホワイト */
            --bg-light: #f2f9ff;        /* 薄い水色の背景 */
            --text-dark: #2c3e50;       /* 読みやすい濃いグレー */
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--text-dark);
            background-color: var(--bg-light);
            line-height: 1.6;
        }

        /* --- ヘッダー --- */
        header {
            background-color: var(--accent-white);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--main-color);
            text-decoration: none;
        }

        nav a {
            color: var(--text-dark);
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--main-color);
        }

        /* --- メインビジュアル --- */
        .hero {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            padding: 60px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 32px;
            margin-bottom: 15px;
            color: #1a5276;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 0px;
        }

        /* --- コンテンツレイアウト --- */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        section {
            background-color: var(--accent-white);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 50px;
        }

        h2 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 10px;
            color: #1a5276;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background-color: var(--main-color);
            border-radius: 2px;
        }

        h3 {
            margin-top: 10px;
            margin-bottom: 15px;
            color: #2980b9;
            border-left: 4px solid var(--main-color);
            padding-left: 10px;
            font-size: 20px;
        }

        /* --- 学年別カード --- */
        .grade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .grade-card {
            background-color: #f9fcff;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 2px solid #e3f2fd;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .grade-card:hover {
            transform: translateY(-5px);
            border-color: var(--main-color);
            box-shadow: 0 10px 25px rgba(93, 173, 226, 0.2);
        }

        .grade-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            color: var(--accent-white);
            font-weight: bold;
            margin-bottom: 15px;
            align-self: center;
        }

        .bg-c1 { background-color: #3498db; }
        .bg-c2 { background-color: #2980b9; }
        .bg-c3 { background-color: #1f618d; }

        .grade-card ul {
            text-align: left;
            list-style: none;
            margin: 20px 0;
        }

        .grade-card ul li {
            padding: 5px 0;
            position: relative;
            padding-left: 20px;
            font-size: 15px;
        }

        .grade-card ul li::before {
            content: '✓';
            color: var(--main-color);
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            background-color: var(--main-color);
            color: var(--accent-white);
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 15px;
        }

        .btn:hover { background-color: #2980b9; }

        /* --- 5教科ポイント表 --- */
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }
        .subject-box {
            background: #fdfefe;
            border: 1px solid #e3f2fd;
            border-radius: 8px;
            padding: 20px;
        }
        .subject-title {
            font-weight: bold;
            color: #1f618d;
            font-size: 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .keyword-badge {
            background-color: #e8f4f8;
            color: #2980b9;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
        }
        .subject-box p {
            font-size: 14px;
            color: #555;
        }

        /* --- 東京都の塾・内申計算 --- */
        .calc-box {
            background-color: #e8f4f8;
            padding: 30px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }
        .calc-selects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin: 25px 0;
            text-align: left;
        }
        .calc-selects div {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 0px;
        }
        .calc-selects label { font-size: 14px; font-weight: bold; color: #1f618d; }
        .calc-selects select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 15px; background: white; }
        
        .calc-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s;
            box-shadow: 0 4px 10px rgba(230,126,34,0.3);
        }
        .calc-btn:hover { background-color: #d35400; }
        
        .result-display {
            margin-top: 25px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 2px dashed var(--main-color);
            display: none;
        }
        .result-display h4 { font-size: 22px; color: #1a5276; margin-bottom: 10px; }
        .result-display span { font-size: 32px; color: #e74c3c; font-weight: bold; }

        /* --- アコーディオンQ&A --- */
        .qa-item {
            border-bottom: 1px solid #e3f2fd;
            padding: 15px 0;
        }
        .qa-question {
            font-weight: bold;
            color: #1f618d;
            cursor: pointer;
            position: relative;
            padding-right: 30px;
        }
        .qa-question::after {
            content: '▼';
            position: absolute;
            right: 0;
            font-size: 12px;
        }
        .qa-answer {
            margin-top: 10px;
            color: #555;
            display: none;
            padding-left: 10px;
            border-left: 2px solid var(--main-color);
        }
        
        /* --- フッター --- */
        footer {
            background-color: #1a5276;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- ヘッダー -->
    <header>
        <div class="header-container">
            <a href="#" class="logo">高校受験ナビ</a>
            <nav>
                <a href="#roadmap">合格ロードマップ</a>
                <a href="#subjects">5教科ポイント</a>
                <a href="#calc">内申計算</a>
            </nav>
        </div>
    </header>

    <!-- メインビジュアル -->
    <div class="hero">
        <h1>東京都対応・君の合格ロードマップ</h1>
        <p>志望校合格に向けて、今やるべきことを見つけよう！</p>
    </div>

    <div class="container">
        <!-- 学年別ロードマップ -->
        <section id="roadmap">
            <h2>学年別合格ロードマップ</h2>
            <div class="grade-grid">
                <div class="grade-card">
                    <div>
                        <span class="grade-badge bg-c1">中学1年生</span>
                        <h3>基礎固めと学習習慣</h3>
                        <ul>
                            <li>毎日の家庭学習の習慣づけ</li>
                            <li>定期テストでの高得点キープ</li>
