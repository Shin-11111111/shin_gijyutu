<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>整理整頓ナビゲーター</title>
    <style>
        :root {
            --primary-color: #4a7c59;
            --bg-color: #f4f7f5;
            --text-color: #333;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .card {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: var(--primary-color);
            font-size: 24px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
            margin-top: 0;
        }
        .rule-box {
            background-color: #ebf2fa;
            border-left: 4px solid #5fa8d3;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
        }
        .step {
            margin-bottom: 20px;
        }
        .step-title {
            font-weight: bold;
            font-size: 18px;
            color: #2b2d42;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        .step-number {
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 14px;
        }
        .checklist {
            list-style: none;
            padding-left: 0;
        }
        .checklist li {
            margin: 8px 0;
            display: flex;
            align-items: flex-start;
            cursor: pointer;
        }
        .checklist input[type="checkbox"] {
            margin-right: 10px;
            margin-top: 4px;
            transform: scale(1.2);
            accent-color: var(--primary-color);
        }
        .checklist input[type="checkbox"]:checked + span {
            text-decoration: line-through;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>✨ 整理整頓</h1>
    
    <div class="rule-box">
        <strong>💡 始める前の鉄則：</strong><br>
        「今日は引き出し1つだけ」など、小さなスペースから始めましょう！収納グッズはまだ買わないでくださいね。
    </div>

    <div class="step">
        <div class="step-title"><span class="step-number">1</span>すべて出す</div>
        <ul class="checklist">
            <li><label><input type="checkbox"> <span>いらない物といる物を別ける</span></label></li>
            <li><label><input type="checkbox"> <span>どれだけの量があるか、全体を眺めて把握する</span></label></li>
        </ul>
    </div>

    <div class="step">
        <div class="step-title"><span class="step-number">2</span>仕分ける</div>
        <ul class="checklist">
            <li><label><input type="checkbox"> <span>「使うもの」（1年以内に使ったもの）を集める</span></label></li>
            <li><label>
