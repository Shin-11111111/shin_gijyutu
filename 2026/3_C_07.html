<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校生活便利ツール：持ち物・教室チェッカー</title>
    <style>
        /* 全体のデザイン（CSS） */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
        }
        .description {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .select-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            font-size: 16px;
            background-color: white;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        /* 結果を表示するエリア */
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            background-color: #e8f4fd;
            border-left: 5px solid #3498db;
            display: none; /* 最初は非表示 */
        }
        .result-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .info-item {
            margin: 5px 0;
            font-size: 16px;
        }
        .highlight {
            font-weight: bold;
            color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎒 持ち物・教室チェッカー</h1>
    <p class="description">次の時間の教科を選ぶと、移動する教室と必要な持ち物がすぐわかります！</p>

    <div class="select-group">
        <label for="subject-select">次の授業の教科は？</label>
        <select id="subject-select">
            <option value="">-- 教科を選んでください --</option>
            <option value="math">数学</option>
            <option value="science">理科</option>
            <option value="english">英語</option>
            <option value="japanese">国語</option>
            <option value="social">社会</option>
            <option value="home">家庭科</option>
            <option value="tech">技術</option>
            <option value="pe">保体</option>
            <option value="art">美術</option>
            <option value="music">音楽</option>
        </select>
    </div>

    <button class="btn" onclick="checkInfo()">調べる</button>

    <div id="result" class="result-box">
        <div class="result-title" id="res-subject">教科名</div>
        <div class="info-item">📍 行く場所: <span id="res-room" class="highlight">-</span></div>
        <div class="info-item">📝 持ち物: <span id="res-items">-</span></div>
    </div>
</div>

<script>
    // 各教科のデータ（音楽の場所を「音楽室」に修正しました）
    const scheduleData = {
        math: { name: "数学", room: "少人数", items: "教科書、筆記用具、ノート、ワーク、パソコン" },
        science: { name: "理科", room: "理科室", items: "教科書、ノート、筆記用具" },
        english: { name: "英語", room: "少人数", items: "教科書、筆記用具、ノート、ファイル、ワーク、パソコン" },
        japanese: { name: "国語", room: "教室", items: "教科書、ノート、筆記用具" },
        social: { name: "社会", room: "教室", items: "教科書、ファイル、筆記用具" },
        home: { name: "家庭科", room: "家庭科室", items: "教科書、ファイル、筆記用具" },
        tech: { name: "技術", room: "金工室", items: "ファイル、タブレット、筆記用具、⭐やる気⭐" },
        pe: { name: "保体", room: "外", items: "体育着、水筒" },
        art: { name: "美術", room: "美術室", items: "筆記用具、美術セット" },
        music: { name: "音楽", room: "音楽室", items: "教科書、ファイル、筆記用具" }
    };

    // ボタンを押したときに動くプログラム
    function checkInfo() {
        const select = document.getElementById("subject-select");
        const selectedValue = select.value;
        const resultBox = document.getElementById("result");

        // 教科が選ばれていないとき
        if (selectedValue === "") {
            alert("教科を選んでください！");
            resultBox.style.display = "none";
            return;
        }

        // データの読み込み
        const data = scheduleData[selectedValue];

        // 画面の文字を書き換える
        document.getElementById("res-subject").innerText = "📖 " + data.name;
        document.getElementById("res-room").innerText = data.room;
        document.getElementById("res-items").innerText = data.items;

        // 結果を表示する
        resultBox.style.display = "block";
    }
</script>

</body>
</html>
