<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定期考査 ＆ 提出物マネージャー</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #ff4757;
            --accent-color: #2ed573;
            --warning-color: #ffa502;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .wrapper {
            max-width: 450px;
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .text-center { text-align: center; }

        h1, h2 {
            margin: 0 0 1rem 0;
            color: #555;
        }

        h1 { font-size: 1.4rem; }
        h2 { font-size: 1.2rem; border-bottom: 2px solid #eee; padding-bottom: 5px; }

        .days-number {
            font-size: 4.5rem;
            font-weight: 900;
            color: var(--primary-color);
            line-height: 1;
            display: block;
            margin: 0.5rem 0;
        }

        .unit {
            font-size: 1.5rem;
            color: var(--text-color);
            margin-left: 0.2rem;
        }

        /* 入力フォームのスタイル */
        .setting-section {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        input[type="text"], input[type="date"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.9rem;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            background: #555;
            color: #fff;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }

        button:hover { background: #333; }
        .btn-add { background: var(--accent-color); width: 100%; margin-top: 5px; }
        .btn-add:hover { background: #22c15b; }
        .btn-delete { background: #e0e0e0; color: #333; padding: 3px 8px; font-size: 0.75rem; }
        .btn-delete:hover { background: #ccc; }

        /* 提出物リスト */
        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #eee;
        }
        .task-item:last-child { border-bottom: none; }
        .task-name { font-weight: bold; font-size: 0.95rem; }
        .task-info { font-size: 0.8rem; color: #777; margin-top: 2px; }
        .task-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .task-countdown {
            font-size: 0.85rem;
            font-weight: bold;
            background: #f0f0f0;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .urgent { background-color: #ffe0e3; color: var(--primary-color); }
        .today-task { background-color: #fff1d6; color: var(--warning-color); }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- テストカウントダウン設定＆表示 -->
        <div class="container text-center">
            <div class="setting-section" style="text-align: left;">
                <details>
                    <summary style="cursor: pointer; font-weight: bold; color: #666;">⚙️ テスト日の設定を開く</summary>
                    <div style="margin-top: 10px;">
                        <div class="form-group">
                            <label>テスト名:</label>
                            <input type="text" id="input-exam-name" value="定期考査">
                        </div>
                        <div class="form-group">
                            <label>テスト日:</label>
                            <input type="date" id="input-exam-date">
                        </div>
                        <button onclick="saveExamSettings()">設定を保存</button>
                    </div>
                </details>
            </div>

            <h1 id="exam-title">定期考査まで</h1>
            <div>
                あと <span id="exam-days" class="days-number">0</span>
            </div>
            <div style="font-size: 0.85rem; color: #888; margin-top: 10px;">
                目標日: <span id="exam-target-text">未設定</span>
            </div>
        </div>

        <!-- 提出物リスト -->
        <div class="container">
            <h2>📝 提出物の追加・残り</h2>
            
            <!-- 提出物追加フォーム -->
            <div class="setting-section">
                <div class="form-group">
                    <input type="text" id="input-task-name" placeholder="課題名 (例: 数学ワーク)">
                </div>
                <div class="form-group">
                    <input type="text" id="input-task-detail" placeholder="範囲など (例: P.20〜25)">
                </div>
                <div class="form-group">
                    <label style="font-size: 0.8rem; color:#666;">提出期限:</label>
                    <input type="date" id="input-task-date">
                </div>
                <button class="btn-add" onclick="addTask()">提出物を追加する</button>
            </div>

            <!-- リスト本体 -->
            <ul id="task-list" class="task-list"></ul>
        </div>
    </div>

    <script>
        // 日付の時刻をリセットする関数
        function getSimpleDate(dateObj) {
            return new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
        }

        // --- ① テスト設定の保存と読込 ---
        function loadExamSettings() {
            const savedName = localStorage.getItem('examName') || '定期考査';
            const savedDate = localStorage.getItem('examDate') || '2026-10-20'; // 初期値

            document.getElementById('input-exam-name').value = savedName;
            document.getElementById('input-exam-date').value = savedDate;

            updateExamCountdown(savedName, savedDate);
        }

        function saveExamSettings() {
            const name = document.getElementById('input-exam-name').value;
            const date = document.getElementById('input-exam-date').value;

            if(!date) {
                alert("テスト日を入力してください");
                return;
            }

            localStorage.setItem('examName', name);
            localStorage.setItem('examDate', date);
            
            updateExamCountdown(name, date);
            alert("テスト日を保存しました！");
        }

        function updateExamCountdown(name, dateString) {
            const targetDate = new Date(dateString + "T00:00:00");
            const now = new Date();
            
            const diffTime = getSimpleDate(targetDate) - getSimpleDate(now);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            const titleEl = document.getElementById("exam-title");
            const daysEl = document.getElementById("exam-days");
            const targetTextEl = document.getElementById("exam-target-text");

            titleEl.textContent = `${name}まで`;
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
            targetTextEl.textContent = targetDate.toLocaleDateString('ja-JP', options);

            if (diffDays > 0) {
                daysEl.innerHTML = `${diffDays}<span class="unit">日</span>`;
            } else if (diffDays === 0) {
                titleEl.textContent = name;
                daysEl.innerHTML = `<span style="color:var(--accent-color)">当日！</span>`;
                daysEl.style.fontSize = "3.5rem";
            } else {
                titleEl.textContent = name;
                daysEl.innerHTML = `<span style="color:var(--accent-color)">終了！</span>`;
                daysEl.style.fontSize = "3.5rem";
            }
        }


        // --- ② 提出物データの保存と読込 ---
        let homeworkList = JSON.parse(localStorage.getItem('homeworkList')) || [];

        function saveTasks() {
            localStorage.setItem('homeworkList', JSON.stringify(homeworkList));
            renderTasks();
        }

        function addTask() {
            const name = document.getElementById('input-task-name').value;
            const detail = document.getElementById('input-task-detail').value;
            const date = document.getElementById('input-task-date').value;

            if (!name || !date) {
                alert("「課題名」と「提出期限」は必須です！");
                return;
            }

            homeworkList.push({ id: Date.now(), name, detail, date });
            saveTasks();

            // 入力欄をクリア
            document.getElementById('input-task-name').value = '';
            document.getElementById('input-task-detail').value = '';
            document.getElementById('input-task-date').value = '';
        }

        function deleteTask(id) {
            homeworkList = homeworkList.filter(task => task.id !== id);
            saveTasks();
        }

        function renderTasks() {
            const listEl = document.getElementById("task-list");
            listEl.innerHTML = "";
            
            const todaySimple = getSimpleDate(new Date());

            // 期限が近い順に並び替え
            homeworkList.sort((a, b) => new Date(a.date) - new Date(b.date));

            homeworkList.forEach(task => {
                const taskDate = new Date(task.date + "T00:00:00");
                const diffTime = getSimpleDate(taskDate) - todaySimple;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                const li = document.createElement("li");
                li.className = "task-item";

                const leftDiv = document.createElement("div");
                leftDiv.innerHTML = `<div class="task-name">${task.name}</div><div class="task-info">${task.detail}</div>`;

                const rightDiv = document.createElement("div");
                rightDiv.className = "task-right";

                let badgeHTML = "";
                if (diffDays > 2) {
                    badgeHTML = `<span class="task-countdown">あと ${diffDays} 日</span>`;
                } else if (diffDays <= 2 && diffDays > 0) {
                    badgeHTML = `<span class="task-countdown urgent">あと ${diffDays} 日！</span>`;
                } else if (diffDays === 0) {
                    badgeHTML = `<span class="task-countdown today-task">今日まで！</span>`;
                } else {
                    badgeHTML = `<span class="task-countdown" style="color:#aaa; background:#eee;">期限切</span>`;
                }

                const deleteBtn = document.createElement("button");
                deleteBtn.className = "btn-delete";
                deleteBtn.textContent = "完了 / 削除";
                deleteBtn.onclick = () => deleteTask(task.id);

                rightDiv.innerHTML = badgeHTML;
                rightDiv.appendChild(deleteBtn);
                
                li.appendChild(leftDiv);
                li.appendChild(rightDiv);
                listEl.appendChild(li);
            });
        }

        // 起動時にデータを読み込む
        loadExamSettings();
        renderTasks();
    </script>
</body>
</html>
