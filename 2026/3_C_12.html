<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来の自分からのエール</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        h1 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #555;
        }
        .quote {
            font-weight: bold;
            color: #3498db;
            font-size: 18px;
            margin: 20px 0;
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 65, 108, 0.6);
        }
        .btn:active {
            transform: translateY(0);
        }
        .timer {
            margin-top: 25px;
            font-size: 14px;
            color: #7f8c8d;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>受験を乗り越えるあなたへ</h1>
    <p>「やる気」は待っていても降ってきません。<br>実は、<strong>5分だけ動かすこと</strong>で脳が騙されてやる気が出てくる仕組み（作業興奮）になっています。</p>
    
    <div class="quote" id="quote-text">ボタンを押して、今日の魔法の言葉を受け取ろう。</div>
    
    <button class="btn" onclick="changeQuote()">言葉を受け取る</button>
    
    <div class="timer">
        💡 とりあえず【参考書を開くだけ】、<br>【ノートに日付を書くだけ】やってみませんか？
    </div>
</div>

<script>
    const quotes = [
        "「今サボれば合格は遠のく。今動けば一歩近づく。どっちの未来が欲しい？」",
        "「完璧を目指さなくていい。まずは教科書を1ページ開く、それだけで今日の勝者！」",
        "「努力した結果が出ないことはあっても、努力しない結果が出ることはない。」",
        "「行きたい大学のキャンパスを歩いている自分を、今想像してみて。」",
        "「今の苦しみは期間限定。合格した後の自由は一生モノ！」",
        "「やる気が出ない時は、ハードルを極限まで下げて『5分だけ』机に向かおう。」",
        "「ライバルがスマホを見ている今、あなたがペンを持てば差がつく瞬間です。」"
    ];

    function changeQuote() {
        const textElement = document.getElementById('quote-text');
        const randomIndex = Math.floor(Math.random() * quotes.length);
        
        // 演出として一度文字を薄くする
        textElement.style.opacity = 0;
        setTimeout(() => {
            textElement.innerText = quotes[randomIndex];
            textElement.style.opacity = 1;
            textElement.style.transition = 'opacity 0.3s';
        }, 200);
    }
</script>

</body>
</html>
