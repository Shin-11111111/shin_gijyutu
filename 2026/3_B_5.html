<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>爆音やることリスト</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; text-align: center; }
        .setup-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { padding: 10px; margin: 5px 0; border: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; }
        .timer-display { font-size: 1.5em; font-weight: bold; margin: 15px 0; color: #333; }
        .timer-urgent { color: orange; animation: pulse 1s infinite; }
        .warning { color: red; font-weight: bold; font-size: 1.5em; display: none; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        button { padding: 6px 12px; cursor: pointer; font-weight: bold; }
        input { padding: 6px; width: 220px; font-size: 1em; }
        .input-area { margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- Chromeの音声ブロックを解除するためのスタート画面 -->
    <div id="setupScreen" class="setup-screen" onclick="unlockAudio()">
        <h2>🚨 警告：爆音注意 🚨</h2>
        <p style="font-size: 1.2em; margin-top: 10px;">ここをクリックしてアプリを起動（音を許可）してください</p>
    </div>

    <h1>🚨 爆音やることリスト</h1>
    <p>未完了のタスクがあると、30秒後に爆音がループ再生されます。</p>
    
    <div class="input-area">
        <input type="text" id="taskInput" placeholder="やることを入力">
        <button onclick="addTask()">追加</button>
    </div>

    <!-- カウントダウンを表示する場所 -->
    <div id="timerDisplay" class="timer-display"></div>

    <ul id="taskList"></ul>
    <p id="alertMsg" class="warning">⚠️ 未完了のタスクがあります！爆音再生中！</p>

    <script>
        const input = document.getElementById('taskInput');
        const list = document.getElementById('taskList');
        const alertMsg = document.getElementById('alertMsg');
        const timerDisplay = document.getElementById('timerDisplay');
        
        let checkTimer;
        let countdownInterval;
        let timeLeft = 30;
        
        // Web Audio API の設定
        let audioCtx = null;
        let oscillator = null;
        let gainNode = null;
        let pulseInterval = null;

        function unlockAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('setupScreen').style.display = 'none';
        }

        function playLoudSound() {
            if (!audioCtx) return;
            if (oscillator) return;

            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();

            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);

            let isMuted = false;
            pulseInterval = setInterval(() => {
                if (gainNode) {
                    gainNode.gain.setValueAtTime(isMuted ? 1.0 : 0.0, audioCtx.currentTime);
                    isMuted = !isMuted;
                }
            }, 150);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }

        function stopLoudSound() {
            if (oscillator) {
                oscillator.stop();
                oscillator.disconnect();
                oscillator = null;
            }
            if (gainNode) {
                gainNode.disconnect();
                gainNode = null;
            }
            if (pulseInterval) {
                clearInterval(pulseInterval);
                pulseInterval = null;
            }
        }

        function addTask() {
            if (!input.value.trim()) return;

            const li = document.createElement('li');
            li.innerHTML = `
                <span>${input.value}</span>
                <button onclick="completeTask(this)">完了！</button>
            `;
            list.appendChild(li);
            input.value = '';

            resetTimer();
        }

        function completeTask(button) {
            button.parentElement.remove();
            resetTimer();
        }

        function resetTimer() {
            // タイマーとカウントダウンをすべてクリア
            clearTimeout(checkTimer);
            clearInterval(countdownInterval);
            stopLoudSound();
            alertMsg.style.display = 'none';
            timerDisplay.className = 'timer-display';

            // タスクが空になったら表示を消す
            if (list.children.length === 0) {
                timerDisplay.innerText = '';
                return;
            }

            // カウントダウンの初期化
            timeLeft = 30;
            timerDisplay.innerText = `⏱️ 爆音まであと ${timeLeft} 秒`;

            // 1秒ごとにカウントダウンを減らす
            countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    timerDisplay.innerText = `💥 タイムアウト！`;
                } else {
                    timerDisplay.innerText = `⏱️ 爆音まであと ${timeLeft} 秒`;
                    // 残り10秒以下で文字を大きく・赤っぽくする演出
                    if (timeLeft <= 10) {
                        timerDisplay.className = 'timer-display timer-urgent';
                    }
                }
            }, 1000);

            // 30秒後の爆音実行タイマー
            checkTimer = setTimeout(() => {
                if (list.children.length > 0) {
                    playLoudSound();
                    alertMsg.style.display = 'block';
                }
            }, 30000); 
        }
    </script>
</body>
</html>
