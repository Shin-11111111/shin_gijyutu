


<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイム黒板板書ツール</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #2c3e50;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        /* コントロールパネル */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-start { background-color: #2ecc71; color: white; }
        .btn-start:hover { background-color: #27ae60; }
        .btn-stop { background-color: #e74c3c; color: white; }
        .btn-stop:hover { background-color: #c0392b; }
        .btn-clear { background-color: #95a5a6; color: white; }
        .btn-clear:hover { background-color: #7f8c8d; }

        .status {
            color: #ecf0f1;
            font-size: 14px;
            font-weight: bold;
        }

        /* 黒板エリア */
        .blackboard {
            flex: 1;
            background-color: #004d40; /* リアルな黒板の深緑 */
            border: 12px solid #8d6e63; /* 木枠 */
            border-radius: 4px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.3);
            padding: 30px;
            overflow-y: auto;
            color: rgba(255, 255, 255, 0.9); /* チョーク風の白 */
            font-size: 28px;
            line-height: 1.8;
            letter-spacing: 2px;
            white-space: pre-wrap;
            font-weight: bold;
            text-shadow: 0 0 4px rgba(255,255,255,0.3); /* チョークの粉っぽさ */
        }

        /* 認識中の未確定テキスト（少し薄く表示） */
        .interim {
            color: rgba(255, 255, 255, 0.4);
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-start" id="startBtn">音声認識を開始</button>
        <button class="btn-stop" id="stopBtn" disabled>停止</button>
        <button class="btn-clear" id="clearBtn">黒板を消す</button>
        <span class="status" id="status">ステータス: 停止中</span>
    </div>

    <!-- 黒板 -->
    <div class="blackboard" id="blackboard"><span class="interim" id="interimSpan"></span></div>

    <script>
        // Web Speech API の初期化
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            alert("お使いのブラウザは音声認識に対応していません。Google Chrome または Microsoft Edge をお試しください。");
        } else {
            const recognition = new SpeechRecognition();
            
            // 設定
            recognition.lang = 'ja-JP';       // 言語を日本語に設定
            recognition.interimResults = true; // 認識途中の結果も取得する
            recognition.continuous = true;     // 音声認識を自動で終了せず喋り続けられるようにする

            // DOM要素の取得
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const clearBtn = document.getElementById('clearBtn');
            const statusText = document.getElementById('status');
            const blackboard = document.getElementById('blackboard');
            const interimSpan = document.getElementById('interimSpan');

            let finalTranscript = ''; // 確定したテキストの保存用

            // 音声認識開始
            startBtn.addEventListener('click', () => {
                recognition.start();
            });

            // 音声認識停止
            stopBtn.addEventListener('click', () => {
                recognition.stop();
            });

            // 黒板をクリア
            clearBtn.addEventListener('click', () => {
                finalTranscript = '';
                interimSpan.textContent = '';
                updateBlackboard();
            });

            // 認識が始まったとき
            recognition.onstart = () => {
                statusText.textContent = "ステータス: 認識中... 話しかけてください";
                statusText.style.color = "#2ecc71";
                startBtn.disabled = true;
                stopBtn.disabled = false;
            };

            // 認識が終了したとき
            recognition.onend = () => {
                statusText.textContent = "ステータス: 停止中";
                statusText.style.color = "#ecf0f1";
                startBtn.disabled = false;
                stopBtn.disabled = true;
            };

            // エラーが発生したとき
            recognition.onerror = (event) => {
                console.error("音声認識エラー:", event.error);
                if(event.error === 'not-allowed') {
                    alert("マイクの使用が許可されていません。ブラウザの設定を確認してください。");
                }
            };

            // 音声を認識したとき
            recognition.onresult = (event) => {
                let interimTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        // 句読点っぽく、確定したタイミングで改行を入れると板書らしくなります
                        finalTranscript += event.results[i][0].transcript + '。\n';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                // 表示を更新
                updateBlackboard(interimTranscript);
            };

            // 黒板の描画更新関数
            function updateBlackboard(interim = '') {
                // 確定した文字をセットし、その直後に未確定の文字を薄く表示する
                blackboard.innerHTML = finalTranscript;
                
                if (interim) {
                    const span = document.createElement('span');
                    span.className = 'interim';
                    span.textContent = interim;
                    blackboard.appendChild(span);
                }
                
                // 常に最新の書き込み（下部）へ自動スクロール
                blackboard.scrollTop = blackboard.scrollHeight;
            }
        }
    </script>
</body>
</html>
