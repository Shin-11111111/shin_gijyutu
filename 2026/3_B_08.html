            isWaitingNext = false;
            
            document.getElementById("select-screen").style.display = "none";
            document.getElementById("game-screen").style.display = "block";
            document.getElementById("commentary-text").innerText = "タイピングをクリアするとここに解説が出ます。";
            
            const gradeNames = {m1: "中1", m2: "中2", m3: "中3"};
            const subjectNames = {kokugo:"国語", suugaku:"数学", eigo:"英語", rika:"理科", shakai:"社会"};
            document.getElementById("subject-title").innerText = `【${gradeNames[grade]} / ${subjectNames[subject]}】ランダム特訓`;
            
            nextWord();
        }

        function nextWord() {
            isWaitingNext = false;
            if (currentWordIndex >= currentSubject.length) {
                document.getElementById("word-kanji").innerText = "🎉 5問クリア！";
                document.getElementById("word-romaji").innerText = "ナイスファイト！もう一度挑戦しよう！";
                document.getElementById("remain-count").innerText = "0";
                return;
            }

            typedIndex = 0;
            const wordData = currentSubject[currentWordIndex];
            currentRomaji = wordData.romaji;
            
            document.getElementById("word-kanji").innerText = wordData.kanji;
            document.getElementById("remain-count").innerText = currentSubject.length - currentWordIndex;
            updateRomajiDisplay();
        }

        function updateRomajiDisplay() {
            const typedPart = `<span class="typed">${currentRomaji.substring(0, typedIndex)}</span>`;
            const untypedPart = currentRomaji.substring(typedIndex);
            document.getElementById("word-romaji").innerHTML = typedPart + untypedPart;
        }

        window.addEventListener("keydown", (e) => {
            if (document.getElementById("game-screen").style.display !== "block" || currentWordIndex >= currentSubject.length || isWaitingNext) return;
            if (e.key.length > 1) return;

            const targetChar = currentRomaji[typedIndex].toLowerCase();
            const inputChar = e.key.toLowerCase();

            if (inputChar === targetChar) {
                typedIndex++;
                updateRomajiDisplay();

                if (typedIndex === currentRomaji.length) {
                    isWaitingNext = true;
                    document.getElementById("commentary-text").innerText = currentSubject[currentWordIndex].desc;
                    currentWordIndex++;
                    setTimeout(nextWord, 1800); // 1.8秒間解説を表示
                }
            }
        });

        function backToMenu() {
            document.getElementById("select-screen").style.display = "flex";
            document.getElementById("game-screen").style.display = "none";
        }
    </script>
</body>
</html>
