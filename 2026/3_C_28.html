<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お母さんへのおつかいメモ</title>
    <style>
        /* 全体のデザイン（CSS） */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fff0f5; 
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }
        h1 {
            font-size: 22px;
            color: #d81b60; 
            margin-bottom: 5px;
        }
        .subtitle {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
        }
        .category-title {
            font-size: 14px;
            font-weight: bold;
            color: #444;
            text-align: left;
            margin-top: 18px;
            margin-bottom: 6px;
            border-left: 4px solid #d81b60;
            padding-left: 8px;
        }
        .item-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 6px;
            margin-bottom: 12px;
        }
        .item-btn {
            background-color: #fce4ec;
            color: #c2185b;
            border: 1px solid #f8bbd0;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .item-btn:hover {
            background-color: #d81b60;
            color: white;
        }
        .custom-input-area {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            margin-bottom: 15px;
        }
        .custom-input-area input {
            flex: 1;
            padding: 8px;
            border: 2px solid #f8bbd0;
            border-radius: 6px;
            font-size: 14px;
        }
        .custom-input-area button {
            background-color: #c2185b;
            color: white;
            border: none;
            padding: 8px 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        /* リストの表示エリア */
        .list-section {
            background: #fafafa;
            border: 2px dashed #f8bbd0;
            border-radius: 10px;
            padding: 15px;
            min-height: 80px;
            margin-top: 25px;
            margin-bottom: 15px;
            text-align: left;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            font-size: 18px;
            font-weight: bold;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 16px;
        }
        /* ボタンの配置エリア */
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        /* 【今回追加】リセットボタンのデザイン */
        .reset-btn {
            flex: 1;
            background-color: #7f8c8d; /* 落ち着いたグレー */
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        .reset-btn:hover {
            background-color: #95a5a6;
        }
        /* 完了ボタンのデザイン */
        .show-btn {
            flex: 2; /* リセットボタンより少し大きく表示 */
            background-color: #d81b60;
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .show-btn:hover {
            background-color: #c2185b;
        }
        /* スマホで見せる用の全画面 */
        .fullscreen-view {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #d81b60;
            color: white;
            padding: 30px;
            box-sizing: border-box;
            z-index: 1000;
            overflow-y: auto;
        }
        .fullscreen-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            border-bottom: 3px solid white;
            padding-bottom: 10px;
            text-align: center;
        }
        .fullscreen-list {
            font-size: 38px;
            font-weight: bold;
            text-align: left;
            line-height: 1.8;
            margin-left: 10px;
        }
        .back-btn {
            background: white;
            color: #d81b60;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            margin: 40px auto 0 auto;
            display: block;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container" id="main-app">
    <h1>🛒 お母さんへのおつかいメモ</h1>
    <p class="subtitle">買ってきてほしいものをタップ！ないものは下に入力してね</p>

    <!-- カテゴリ1：お肉・お魚・野菜 -->
    <div class="category-title">🥩 お肉・お魚・お野菜</div>
    <div class="item-buttons">
        <button class="item-btn" onclick="addItem('🐷 豚肉（薄切りなど）')">🐷 豚肉</button>
        <button class="item-btn" onclick="addItem('🐔 鶏肉（もも・むね）')">🐔 鶏肉</button>
        <button class="item-btn" onclick="addItem('🐟 お魚・お刺身')">🐟 お魚</button>
        <button class="item-btn" onclick="addItem('🥔 じゃがいも・玉ねぎ')">🥔 じゃがいも/玉ねぎ</button>
        <button class="item-btn" onclick="addItem('🥬 キャベツ・レタス')">🥬 キャベツ/レタス</button>
        <button class="item-btn" onclick="addItem('🥕 人参・きゅうり')">🥕 人参/きゅうり</button>
    </div>

    <!-- カテゴリ2：生鮮食品・いつもの -->
    <div class="category-title">🥛 乳製品・卵・朝食</div>
    <div class="item-buttons">
        <button class="item-btn" onclick="addItem('🥛 牛乳')">🥛 牛乳</button>
        <button class="item-btn" onclick="addItem('🍞 食パン')">🍞 食パン</button>
        <button class="item-btn" onclick="addItem('🥚 たまご')">🥚 たまご</button>
        <button class="item-btn" onclick="addItem('🧀 チーズ')">🧀 チーズ</button>
        <button class="item-btn" onclick="addItem('🥓 ハム・ウインナー')">🥓 ウインナー</button>
        <button class="item-btn" onclick="addItem('🥣 ヨーグルト')">🥣 ヨーグルト</button>
        <button class="item-btn" onclick="addItem('🍎 ジャム・バター')">🍎 ジャム/バター</button>
    </div>

    <!-- カテゴリ3：ごはん・おかず・冷凍食品 -->
    <div class="category-title">🍱 おかず・冷凍食品・麺類</div>
    <div class="item-buttons">
        <button class="item-btn" onclick="addItem('🥟 冷凍食品')">🥟 冷凍食品</button>
        <button class="item-btn" onclick="addItem('🍜 カップ麺・袋麺')">🍜 カップ麺</button>
        <button class="item-btn" onclick="addItem('🍛 カレールー')">🍛 カレールー</button>
        <button class="item-btn" onclick="addItem('🍝 パスタソース')">🍝 パスタソース</button>
        <button class="item-btn" onclick="addItem('🧊 納豆・お豆腐')">🧊 納豆/豆腐</button>
    </div>

    <!-- カテゴリ4：調味料 -->
    <div class="category-title">🧂 調味料・スパイス</div>
    <div class="item-buttons">
        <button class="item-btn" onclick="addItem('🍅 ケチャップ')">🍅 ケチャップ</button>
        <button class="item-btn" onclick="addItem('🥚 マヨネーズ')">🥚 マヨネーズ</button>
        <button class="item-btn" onclick="addItem('🟫 しょうゆ・味噌')">🟫 しょうゆ/味噌</button>
        <button class="item-btn" onclick="addItem('🧂 塩・コショウ・砂糖')">🧂 塩コショウ砂糖</button>
        <button class="item-btn" onclick="addItem('🧴 サラダ油・オリーブオイル')">🧴 サラダ油</button>
    </div>

    <!-- カテゴリ5：おやつ・お菓子 -->
    <div class="category-title">🍫 おやつ・デザート</div>
    <div class="item-buttons">
        <button class="item-btn" onclick="addItem('🍦 アイスクリーム')">🍦 アイス</button>
        <button class="item-btn" onclick="addItem('🍫 チョコレート')">🍫 チョコ</button>
        <button class="item-btn" onclick="addItem('🍟 ポテトチップス')">🍟 ポテチ</button>
        <button class="item-btn" onclick="addItem('🍪 クッキー・グミ')">🍪 クッキー/グミ</button>
        <button class="item-btn" onclick="addItem('🍰 ケーキ・プリン')">🍰 ケーキ/プリン</button>
    </div>

    <!-- カテゴリ6：ジュース・お茶 -->
    <div class="category-title">🥤 飲み物</div>
    <div class="item-buttons">
        <button class="item-btn" onclick="addItem('🥤 炭酸ジュース')">🥤 炭酸ジュース</button>
        <button class="item-btn" onclick="addItem('🍎 果汁100%ジュース')">🍎 果汁ジュース</button>
        <button class="item-btn" onclick="addItem('🍵 お茶（ペットボトル）')">🍵 お茶</button>
        <button class="item-btn" onclick="addItem('☕ コーヒー・ココア')">☕ コーヒー/ココア</button>
    </div>

    <!-- カテゴリ7：学校用の文房具 -->
    <div class="category-title">✏️ 学校の道具・文房具</div>
    <div class="item-buttons">
        <button class="item-btn" onclick="addItem('📓 キャンパスノート')">📓 ノート</button>
        <button class="item-btn" onclick="addItem('✏️ シャーペン芯')">✏️ シャー芯</button>
        <button class="item-btn" onclick="addItem('🧼 消しゴム')">🧼 消しゴム</button>
        <button class="item-btn" onclick="addItem('✂️ のり・テープ')">✂️ のり/テープ</button>
        <button class="item-btn" onclick="addItem('📁 クリアファイル')">📁 ファイル</button>
        <button class="item-btn" onclick="addItem('🖊️ 赤ペン・蛍光ペン')">🖊️ 赤/蛍光ペン</button>
    </div>

    <!-- カテゴリ8：日用品・ドラッグストア -->
    <div class="category-title">🧻 日用品・衛生用品</div>
    <div class="item-buttons">
        <button class="item-btn" onclick="addItem('🧻 ボックスティッシュ')">🧻 ティッシュ</button>
        <button class="item-btn" onclick="addItem('🧻 トイレットペーパー')">🧻 トイペ</button>
        <button class="item-btn" onclick="addItem('🧼 シャンプー・洗剤類')">🧼 シャンプー/洗剤</button>
        <button class="item-btn" onclick="addItem('🦷 歯ブラシ・歯磨き粉')">🦷 歯ブラシ</button>
        <button class="item-btn" onclick="addItem('🩹 絆創膏・マスク')">🩹 絆創膏/マスク</button>
        <button class="item-btn" onclick="addItem('🔋 乾電池')">🔋 乾電池</button>
    </div>

    <!-- 自由入力エリア -->
    <div class="category-title">✍️ ボタンにないものを自由に追加</div>
    <div class="custom-input-area">
        <input type="text" id="custom-item-text" placeholder="例：マンガの15巻、工作用のダンボール">
        <button onclick="addCustomItem()">リストに追加</button>
    </div>

    <!-- 現在選ばれているリスト -->
    <div class="list-section">
        <ul id="shopping-list">
            <!-- ここに選んだものが追加されます -->
        </ul>
    </div>

    <!-- ボタンを並べるエリア -->
    <div class="action-buttons">
        <button class="reset-btn" onclick="resetList()">全部消す 🧹</button>
        <button class="show-btn" onclick="showFullscreen()">お母さんに見せる画面にする！</button>
    </div>
</div>

<!-- お母さんに見せるためのドデカ全画面 -->
<div class="fullscreen-view" id="fullscreen-screen">
    <div class="fullscreen-title">📢 お母さん！これ買ってきて！</div>
    <div class="fullscreen-list" id="big-list">
        <!-- ここにドデカ文字でリストが出ます -->
    </div>
    <button class="back-btn" onclick="hideFullscreen()">← もどる</button>
</div>

<script>
let omoideList = [];

// ボタンから追加する処理
function addItem(itemName) {
    if (omoideList.includes(itemName)) {
        alert("それはもうリストに入っているよ！");
        return;
    }
    omoideList.push(itemName);
    updateList();
}

// 自由入力から追加する処理
function addCustomItem() {
    const inputEl = document.getElementById('custom-item-text');
    const customName = inputEl.value.trim();
    if (customName === "") {
        alert("文字を入力してください！");
        return;
    }
    addItem(`📝 ${customName}`);
    inputEl.value = ""; 
}

// 1個ずつ削除する処理
function deleteItem(index) {
    omoideList.splice(index, 1);
    updateList();
}

// 【新機能】リストを全部まとめて消す処理
function resetList() {
    // リストが元々空っぽのときは何もしない
    if (omoideList.length === 0) {
        alert("リストはすでに空っぽだよ！");
        return;
    }

    // 間違えて押しちゃったときのために、一回確認画面を出す（安心設計）
    if (confirm("リストをすべてクリアして、最初から作り直しますか？")) {
        omoideList = []; // 配列の中身を完全に空にする
        updateList();   // 画面の表示を真っさらに更新する
    }
}

// リスト更新
function updateList() {
    const listEl = document.getElementById('shopping-list');
    listEl.innerHTML = "";
    for (let i = 0; i < omoideList.length; i++) {
        const li = document.createElement('li');
        li.innerHTML = `${omoideList[i]} <button class="delete-btn" onclick="deleteItem(${i})">❌</button>`;
        listEl.appendChild(li);
    }
}

// 全画面表示
function showFullscreen() {
    if (omoideList.length === 0) {
        alert("買ってほしいものが何も選ばれていないよ！");
        return;
    }
    const fullscreenScreen = document.getElementById('fullscreen-screen');
    const bigList = document.getElementById('big-list');
    
    bigList.innerHTML = "";
    for (let i = 0; i < omoideList.length; i++) {
        bigList.innerHTML += `・ ${omoideList[i]}<br>`;
    }
    fullscreenScreen.style.display = "block";
}

function hideFullscreen() {
    document.getElementById('fullscreen-screen').style.display = "none";
}
</script>

</body>
</html>
