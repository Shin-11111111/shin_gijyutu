<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>サイコロ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        html,body{
            height:100%;
            margin:0;
            font-family:system-ui,-apple-system,Segoe UI,Roboto,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
            background:linear-gradient(180deg,#e8f0ff,#ffffff);
        }
        .wrap{
            height:100%;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:18px;
            padding:20px;
            box-sizing:border-box
        }
        h1{
            font-size:18px;
            margin:0;
            color:#0b3b66
        }
        #diceCanvas{
            touch-action:none;
            border-radius:18px;
            box-shadow:0 8px 24px rgba(11,59,102,0.12);
            overflow:hidden;
        }
        .wrap{
            perspective:600px;
        }
        .hint{
            color:#43627a;
            font-size:14px;
            opacity:0.9
        }
        .button{
            padding:10px 18px;
            border-radius:12px;
            background:#0b6cff;
            color:white;
            border:none;
            font-weight:600;
            box-shadow:0 6px 18px rgba(11,108,255,0.18)
        }
        .footer{
            position:fixed;
            left:12px;
            right:12px;
            bottom:18px;
            text-align:center;
            color:#99a7b8;
            font-size:13px
        }
        @media (min-width:600px){
            #diceCanvas{
                width:320px;
                height:320px
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>サイコロ</h1>
        <button id="rollBtn" class="button">振る</button>
        <div id="diceCanvas" aria-label="サイコロ"></div>
        <div id="result" style="font-size:28px;font-weight:700;color:#0b3b66;min-height:40px;letter-spacing:0.05em;"></div>
    </div>

    <script>
        const container = document.getElementById('diceCanvas');

        function getSize(){
            return Math.min(window.innerWidth - 40, 360);
        }

        const size = getSize();
        container.style.width  = size + 'px';
        container.style.height = size + 'px';

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(size, size);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        camera.position.set(0, 0, 5);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(5, 8, 5);
        scene.add(dirLight);

        function makeFaceTexture(face){
            const c = document.createElement('canvas');
            c.width = c.height = 256;
            const cx = c.getContext('2d');

            cx.fillStyle = '#ffffff';
            const r = 32;
            cx.beginPath();
            cx.moveTo(r,0); cx.lineTo(256-r,0);
            cx.arcTo(256,0,256,r,r);
            cx.lineTo(256,256-r);
            cx.arcTo(256,256,256-r,256,r);
            cx.lineTo(r,256);
            cx.arcTo(0,256,0,256-r,r);
            cx.lineTo(0,r);
            cx.arcTo(0,0,r,0,r);
            cx.closePath();
            cx.fill();

            const pos = {
                1:[                    [0.5,0.5]                                         ],
                2:[[0.28,0.28],                              [0.72,0.72]                 ],
                3:[[0.28,0.28],        [0.5,0.5],            [0.72,0.72]                 ],
                4:[[0.28,0.28],[0.72,0.28],  [0.28,0.72],[0.72,0.72]                    ],
                5:[[0.28,0.28],[0.72,0.28],[0.5,0.5],[0.28,0.72],[0.72,0.72]            ],
                6:[[0.28,0.22],[0.72,0.22],[0.28,0.5],[0.72,0.5],[0.28,0.78],[0.72,0.78]]
            };
            cx.fillStyle = face === 1 ? '#e03030' : '#1a1a2e'; // 1だけ赤ピップ
            for(const [nx,ny] of pos[face]){
                cx.beginPath();
                cx.arc(nx*256, ny*256, 20, 0, Math.PI*2);
                cx.fill();
            }
            return new THREE.CanvasTexture(c);
        }

        const faceOrder = [3, 4, 1, 6, 2, 5];
        const materials = faceOrder.map(f => new THREE.MeshLambertMaterial({ map: makeFaceTexture(f) }));

        const geometry = new THREE.BoxGeometry(2, 2, 2);
        const dice = new THREE.Mesh(geometry, materials);
        scene.add(dice);

        const faceRotations = {
            1: new THREE.Euler( Math.PI/2, 0, 0),
            2: new THREE.Euler( 0, 0, 0),
            3: new THREE.Euler( 0, -Math.PI/2, 0),
            4: new THREE.Euler( 0,  Math.PI/2, 0),
            5: new THREE.Euler( 0,  Math.PI, 0),
            6: new THREE.Euler(-Math.PI/2, 0, 0),
        };

        let rolling = false;
        let currentFace = 1;

        function animate(){
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        dice.rotation.copy(faceRotations[currentFace]);

        function rollDice(){
            if(rolling) return;
            rolling = true;
            const el = document.getElementById('result');
            el.style.transition = 'none';
            el.style.opacity = '0';
            el.textContent = '';

            const duration = 1200;
            const start = performance.now();

            const axis = new THREE.Vector3(
                Math.random()*2-1,
                Math.random()*2-1,
                Math.random()*0.3
            ).normalize();

            const startQ = dice.quaternion.clone();
            const totalAngle = (Math.PI*2) * (3 + Math.random()*2);

            function step(now){
                const elapsed = now - start;
                const t = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - t, 3);

                if(t < 1){
                    const spinQ = new THREE.Quaternion().setFromAxisAngle(axis, totalAngle * ease);
                    dice.quaternion.copy(startQ).premultiply(spinQ);
                    requestAnimationFrame(step);
                } else {
                    const directions = [
                        new THREE.Vector3( 1, 0, 0),
                        new THREE.Vector3(-1, 0, 0),
                        new THREE.Vector3( 0, 1, 0),
                        new THREE.Vector3( 0,-1, 0),
                        new THREE.Vector3( 0, 0, 1),
                        new THREE.Vector3( 0, 0,-1),
                    ];
                    const forward = new THREE.Vector3(0, 0, 1);
                    let maxDot = -Infinity, bestIdx = 4;
                    directions.forEach((dir, i) => {
                        const world = dir.clone().applyQuaternion(dice.quaternion);
                        const dot = world.dot(forward);
                        if(dot > maxDot){ maxDot = dot; bestIdx = i; }
                    });
                    const detectedFace = faceOrder[bestIdx];
                    currentFace = detectedFace;

                    const snapFrom = dice.quaternion.clone();
                    const snapTo   = new THREE.Quaternion().setFromEuler(faceRotations[detectedFace]);
                    const snapDuration = 300;
                    const snapStart = performance.now();

                    function snapStep(now){
                        const st = Math.min((now - snapStart) / snapDuration, 1);
                        const eased = 1 - Math.pow(1 - st, 3);
                        dice.quaternion.slerpQuaternions(snapFrom, snapTo, eased);
                        if(st < 1){
                            requestAnimationFrame(snapStep);
                        } else {
                            dice.quaternion.copy(snapTo);
                            rolling = false;
                        }
                    }
                    requestAnimationFrame(snapStep);

                    const nums = ['', '１', '２', '３', '４', '５', '６'];
                    const el = document.getElementById('result');
                    el.textContent = `🎲 ${nums[detectedFace]}`;
                    el.style.opacity = '0';
                    el.style.transition = 'opacity 0.4s ease';
                    requestAnimationFrame(() => { el.style.opacity = '1'; });
                }
            }
            requestAnimationFrame(step);
        }

        function onActivate(e){ e.preventDefault(); rollDice(); }
        function onBtnClick(){ rollDice(); }

        container.addEventListener('touchstart', onActivate, {passive:false});
        container.addEventListener('click', onActivate);
        document.getElementById('rollBtn').addEventListener('click', onBtnClick);

        window.addEventListener('resize', ()=>{
            const s = getSize();
            container.style.width  = s + 'px';
            container.style.height = s + 'px';
            renderer.setSize(s, s);
        });
    </script>
</body>
</html>
