<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校内教室予約システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans JP', 'Inter', sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col pb-12">

    <script>
        // ------------- デプロイして発行されたウェブアプリのURLを貼り付け -------------
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwikk-MGjF1ohfjR20QnNByTv4MCoUgDQ2oC1GlhlTcxLj2u__BF-8-tx9mqziuCF8PUg/exec'; 
        // -------------------------------------------------------------------------

        let teacherName = localStorage.getItem('teacher_name') || '';
        let selectedDate = new Date().toISOString().split('T')[0];
        let rooms = [];
        let reservations = [];
        
        const periods = [
            { id: 'p1', name: '1校時', time: '08:45 - 09:30' },
            { id: 'p2', name: '2校時', time: '09:40 - 10:25' },
            { id: 'p3', name: '3校時', time: '10:45 - 11:30' },
            { id: 'p4', name: '4校時', time: '11:40 - 12:25' },
            { id: 'p_lunch', name: '昼休み', time: '12:25 - 13:10' },
            { id: 'p5', name: '5校時', time: '13:15 - 14:00' },
            { id: 'p6', name: '6校時', time: '14:10 - 14:55' },
            { id: 'p_after', name: '放課後', time: '15:00 - 17:00' }
        ];

        async function loadDataFromServer() {
            showToast('同期中...', 'info');
            
            return new Promise((resolve, reject) => {
                window.handleGASResponse = function(data) {
                    rooms = data.data.rooms;
                    reservations = data.data.reservations;
                    renderUI();
                    
                    document.getElementById('gas-jsonp-script')?.remove();
                    delete window.handleGASResponse;
                    resolve();
                };

                const script = document.createElement('script');
                script.id = 'gas-jsonp-script';
                script.src = `${GAS_WEB_APP_URL}?callback=handleGASResponse&_=${new Date().getTime()}`;
                script.onerror = function() {
                    showToast('データの読み込みに失敗しました。', 'error');
                    reject();
                };
                document.body.appendChild(script);
            });
        }

        async function sendDataToGAS(action, payload) {
            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: action,
                        data: payload
                    })
                });
                const result = await response.json();
                if (result.success) {
                    rooms = result.data.rooms;
                    reservations = result.data.reservations;
                    renderUI();
                    return true;
                } else {
                    showToast('エラー: ' + result.error, 'error');
                    return false;
                }
            } catch (e) {
                showToast('通信エラーが発生しました。', 'error');
                console.error(e);
                return false;
            }
        }

        function renderUI() {
            renderTeacherNameHeader();
            renderTimelineHeader();
            renderReservationGrid();
            updateDashboardStats();
        }

        function renderTeacherNameHeader() {
            const nameDisplay = document.getElementById('current-teacher-name');
            const nameInputContainer = document.getElementById('name-input-container');
            const activeUserDisplay = document.getElementById('active-user-display');
            if (teacherName) {
                nameDisplay.textContent = `${teacherName} 先生`;
                nameInputContainer.classList.add('hidden');
                activeUserDisplay.classList.remove('hidden');
            } else {
                nameInputContainer.classList.remove('hidden');
                activeUserDisplay.classList.add('hidden');
            }
        }

        function renderTimelineHeader() {
            const dateLabel = document.getElementById('selected-date-label');
            const d = new Date(selectedDate);
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            dateLabel.textContent = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日 (${days[d.getDay()]})`;
            document.getElementById('date-picker').value = selectedDate;
        }

        function renderReservationGrid() {
            const gridContainer = document.getElementById('timetable-grid');
            gridContainer.innerHTML = '';

            if (rooms.length === 0) {
                gridContainer.innerHTML = `
                    <div class="col-span-full py-12 text-center text-slate-500">
                        <p class="mb-2">教室データがありません。右上の「教室管理」から登録してください。</p>
                    </div>`;
                return;
            }

            const headerRow = document.createElement('div');
            headerRow.className = `grid grid-cols-1 md:grid-cols-9 gap-2 bg-slate-100 p-3 rounded-lg font-bold text-sm text-slate-600 hidden md:grid mb-2 border border-slate-200`;
            headerRow.innerHTML = `<div class="col-span-1 text-slate-700 flex items-center"><i class="fa-solid fa-school mr-2 text-indigo-500"></i>特別教室スペース</div>`;
            
            periods.forEach(period => {
                headerRow.innerHTML += `
                    <div class="text-center flex flex-col justify-center">
                        <span class="text-slate-800 font-semibold">${period.name}</span>
                        <span class="text-xs text-slate-400 font-normal">${period.time}</span>
                    </div>`;
            });
            gridContainer.appendChild(headerRow);

            const dailyReservations = reservations.filter(res => res.date === selectedDate);

            rooms.forEach(room => {
                const roomRow = document.createElement('div');
                roomRow.className = 'bg-white border border-slate-200 rounded-xl p-4 md:p-3 shadow-sm hover:shadow-md transition-shadow mb-4 grid grid-cols-1 md:grid-cols-9 gap-3 items-center';
                roomRow.innerHTML = `
                    <div class="col-span-1 flex md:flex-col justify-between md:justify-center border-b md:border-b-0 md:border-r border-slate-100 pb-3 md:pb-0 md:pr-4">
                        <div>
                            <h3 class="font-bold text-slate-800 text-base md:text-sm flex items-center"><span class="w-2.5 h-2.5 rounded-full bg-emerald-500 mr-2"></span>${escapeHtml(room.name)}</h3>
                            <p class="text-xs text-slate-500 mt-1"><i class="fa-solid fa-location-dot mr-1"></i>${escapeHtml(room.location)}</p>
                        </div>
                        <button class="md:hidden text-indigo-600 text-xs font-semibold bg-indigo-50 px-2 py-1 rounded" onclick="toggleMobileRoomCollapse('${room.id}')">
                            <span id="collapse-btn-text-${room.id}">開く</span> <i id="collapse-icon-${room.id}" class="fa-solid fa-chevron-down ml-1"></i>
                        </button>
                    </div>`;

                const periodsWrapper = document.createElement('div');
                periodsWrapper.id = `periods-container-${room.id}`;
                periodsWrapper.className = 'col-span-8 grid grid-cols-2 sm:grid-cols-4 md:grid-cols-8 gap-2.5';
                
                periods.forEach(period => {
                    const cell = document.createElement('div');
                    cell.className = 'relative rounded-lg p-2.5 min-h-[85px] border transition-all flex flex-col justify-between group ';
                    const res = dailyReservations.find(r => r.roomId === room.id && r.periodId === period.id);

                    if (res) {
                        cell.className += ' bg-amber-50 border-amber-200 hover:bg-amber-100/70';
                        cell.innerHTML = `
                            <div>
                                <div class="flex items-center justify-between">
                                    <span class="text-[10px] md:hidden font-bold bg-amber-200 text-amber-800 px-1.5 py-0.5 rounded">${period.name}</span>
                                    <span class="text-[11px] font-semibold text-amber-900"><i class="fa-solid fa-user-tie mr-1"></i>${escapeHtml(res.teacherName)}</span>
                                </div>
                                <div class="mt-1 text-xs text-amber-800 font-medium line-clamp-2">${res.gradeClass ? `[${escapeHtml(res.gradeClass)}] ` : ''}${escapeHtml(res.purpose)}</div>
                            </div>
                            <div class="flex items-center justify-between mt-2 pt-1 border-t border-amber-200/50">
                                <span class="text-[9px] text-amber-600 font-mono">${period.time.split(' ')[0]}</span>
                                <button onclick="deleteReservationPrompt('${res.id}', '${res.teacherName}')" class="text-red-500 hover:text-red-700 z-10 relative"><i class="fa-regular fa-trash-can"></i></button>
                            </div>`;
                    } else {
                        cell.className += ' bg-slate-50 border-dashed border-slate-200 hover:bg-indigo-50 hover:border-indigo-300';
                        cell.innerHTML = `
                            <div>
                                <span class="text-[10px] md:hidden font-bold bg-slate-200 text-slate-700 px-1.5 py-0.5 rounded">${period.name}</span>
                                <div class="text-xs text-slate-400 mt-2 text-center group-hover:hidden">空き</div>
                                <div class="hidden group-hover:flex text-xs text-indigo-600 justify-center items-center h-full font-bold py-1"><i class="fa-solid fa-plus mr-1"></i>予約</div>
                            </div>
                            <div class="text-[9px] text-slate-400 font-mono text-right mt-auto">${period.time.split(' ')[0]}</div>
                            <div class="absolute inset-0 cursor-pointer rounded-lg" onclick="openReservationModal('${room.id}', '${room.name}', '${period.id}', '${period.name}')"></div>`;
                    }
                    periodsWrapper.appendChild(cell);
                });

                roomRow.appendChild(periodsWrapper);
                gridContainer.appendChild(roomRow);
            });
        }

        window.toggleMobileRoomCollapse = function(roomId) {
            const container = document.getElementById(`periods-container-${roomId}`);
            const btnText = document.getElementById('collapse-btn-text-' + roomId);
            const icon = document.getElementById('collapse-icon-' + roomId);
            container.classList.toggle('hidden-mobile');
            const isHidden = container.classList.contains('hidden-mobile');
            btnText.textContent = isHidden ? '開く' : '閉じる';
            icon.className = isHidden ? 'fa-solid fa-chevron-down ml-1' : 'fa-solid fa-chevron-up ml-1';
        };

        function updateDashboardStats() {
            document.getElementById('stat-total-rooms').textContent = rooms.length;
            document.getElementById('stat-today-reservations').textContent = reservations.filter(res => res.date === selectedDate).length;
            document.getElementById('stat-my-reservations').textContent = reservations.filter(res => res.teacherName === teacherName).length;
        }

        window.saveTeacherName = function() {
            const val = document.getElementById('teacher-name-input').value.trim();
            if (!val) return showToast('名前を入力してください', 'warning');
            teacherName = val;
            localStorage.setItem('teacher_name', val);
            renderUI();
            showToast(`ようこそ、${teacherName} 先生`, 'success');
        };

        window.editTeacherName = function() {
            const val = prompt('教員名を変更します:', teacherName);
            if (val && val.trim()) {
                teacherName = val.trim();
                localStorage.setItem('teacher_name', teacherName);
                renderUI();
                showToast('教員名を変更しました', 'success');
            }
        };

        window.changeDate = function(offset) {
            const current = new Date(selectedDate);
            current.setDate(current.getDate() + offset);
            selectedDate = current.toISOString().split('T')[0];
            renderUI();
        };

        window.setDateToday = function() {
            selectedDate = new Date().toISOString().split('T')[0];
            renderUI();
        };

        window.onDatePickerChange = function(event) {
            selectedDate = event.target.value;
            renderUI();
        };

        let activeReservationDetails = null;

        window.openReservationModal = function(roomId, roomName, periodId, periodName) {
            if (!teacherName) {
                showToast('予約をするには、まず画面上部で教員名を登録してください。', 'warning');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }
            activeReservationDetails = { roomId, periodId };
            document.getElementById('modal-room-name').textContent = roomName;
            document.getElementById('modal-date').textContent = selectedDate;
            document.getElementById('modal-period').textContent = periodName;
            document.getElementById('modal-teacher-name').value = teacherName;
            document.getElementById('modal-grade').value = '';
            document.getElementById('modal-purpose').value = '';
            document.getElementById('reservation-modal').classList.remove('hidden');
            document.getElementById('reservation-modal').classList.add('flex');
        };

        window.closeReservationModal = function() {
            document.getElementById('reservation-modal').classList.add('hidden');
            activeReservationDetails = null;
        };

        window.submitReservation = async function(event) {
            event.preventDefault();
            if (!activeReservationDetails) return;

            const rName = document.getElementById('modal-teacher-name').value.trim();
            const grade = document.getElementById('modal-grade').value.trim();
            const purpose = document.getElementById('modal-purpose').value.trim();

            showToast('予約を送信中...', 'info');
            closeReservationModal();

            const success = await sendDataToGAS('addReservation', {
                roomId: activeReservationDetails.roomId,
                periodId: activeReservationDetails.periodId,
                date: selectedDate,
                teacherName: rName,
                gradeClass: grade,
                purpose: purpose || '教室利用'
            });

            if (success) showToast('予約が完了しました！', 'success');
        };

        window.deleteReservationPrompt = function(reservationId, resTeacherName) {
            if (confirm(`${resTeacherName}先生の予約を削除してもよろしいですか？`)) {
                showToast('予約を削除中...', 'info');
                sendDataToGAS('removeReservation', { reservationId: reservationId });
            }
        };

        window.openSettingsModal = function() {
            renderSettingsRoomList();
            document.getElementById('settings-modal').classList.remove('hidden');
            document.getElementById('settings-modal').classList.add('flex');
        };

        window.closeSettingsModal = function() {
            document.getElementById('settings-modal').classList.add('hidden');
        };

        function renderSettingsRoomList() {
            const list = document.getElementById('settings-room-list');
            list.innerHTML = '';
            if (rooms.length === 0) {
                list.innerHTML = '<p class="text-slate-400 text-center py-4">登録されている教室がありません</p>';
                return;
            }
            rooms.forEach(room => {
                const li = document.createElement('div');
                li.className = 'flex items-center justify-between p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm';
                li.innerHTML = `
                    <div><span class="font-bold text-slate-700">${escapeHtml(room.name)}</span><span class="text-xs text-slate-500 ml-2">(${escapeHtml(room.location)})</span></div>
                    <button onclick="deleteRoomPrompt('${room.id}', '${room.name}')" class="text-red-500 hover:text-red-700 p-1"><i class="fa-regular fa-trash-can"></i></button>
                `;
                list.appendChild(li);
            });
        }

        window.deleteRoomPrompt = async function(roomId, roomName) {
            if (confirm(`教室「${roomName}」を削除すると、この教室の過去・未来すべての予約も同時に消去されます。本当によろしいですか？`)) {
                showToast('教室を削除中...', 'info');
                await sendDataToGAS('removeRoom', { roomId: roomId });
                renderSettingsRoomList();
            }
        };

        // 5. 教室追加の処理：GASを呼び出すように修正
        window.addNewRoom = async function(event) {
            event.preventDefault();
            const name = document.getElementById('new-room-name').value.trim();
            const location = document.getElementById('new-room-location').value.trim();

            showToast('教室を追加中...', 'info');
            document.getElementById('new-room-name').value = '';
            document.getElementById('new-room-location').value = '';

            const success = await sendDataToGAS('addRoom', {
                name: name,
                location: location || '指定なし'
            });

            if (success) {
                renderSettingsRoomList();
                showToast('教室を追加しました', 'success');
            }
        };

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let bg = 'bg-slate-800 text-white';
            if (type === 'success') bg = 'bg-emerald-600 text-white';
            if (type === 'error') bg = 'bg-rose-600 text-white';
            if (type === 'warning') bg = 'bg-amber-500 text-slate-900';
            toast.className = `${bg} px-4 py-3 rounded-xl shadow-lg flex items-center text-sm font-medium transition-all duration-300 max-w-sm w-full`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        }

        function escapeHtml(string) {
            if (!string) return '';
            return String(string).replace(/[&<>"']/g, function(match) {
                const groups = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
                return groups[match];
            });
        }

        window.onload = function() {
            loadDataFromServer();
        };
    </script>

    <header class="bg-gradient-to-r from-slate-900 via-slate-800 to-indigo-950 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-2.5 rounded-xl text-white shadow-inner flex items-center justify-center"><i class="fa-solid fa-school text-xl"></i></div>
                <div>
                    <h1 class="text-lg sm:text-xl font-bold tracking-tight">校内教室予約システム</h1>
                    <p class="text-xs text-slate-300 mt-0.5">GAS API経由セキュア同期版</p>
                </div>
            </div>
            <div class="flex flex-wrap items-center gap-3">
                <div id="name-input-container" class="flex items-center space-x-2 w-full sm:w-auto">
                    <input type="text" id="teacher-name-input" placeholder="お名前（例: 山田）" class="pl-3 pr-3 py-1.5 bg-slate-800 border border-slate-700 rounded-lg text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <button onclick="saveTeacherName()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold px-4 py-1.5 rounded-lg transition-colors shadow">登録</button>
                </div>
                <div id="active-user-display" class="hidden flex items-center bg-slate-800 border border-slate-700 px-3 py-1.5 rounded-lg text-sm">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 mr-2.5 animate-pulse"></span>
                    <span id="current-teacher-name" class="font-medium mr-2 text-slate-200">読み込み中...</span>
                    <button onclick="editTeacherName()" class="text-slate-400 hover:text-white ml-2 pl-2 border-l border-slate-700 transition-colors"><i class="fa-regular fa-pen-to-square"></i></button>
                </div>
                <button onclick="openSettingsModal()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 px-3 py-1.5 rounded-lg text-sm font-medium flex items-center"><i class="fa-solid fa-sliders mr-2"></i>教室管理</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6 flex-grow w-full">
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
            <div class="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm flex items-center space-x-4">
                <div class="p-3 bg-indigo-50 text-indigo-600 rounded-xl"><i class="fa-solid fa-school text-xl"></i></div>
                <div><p class="text-xs font-semibold text-slate-500 uppercase">登録教室数</p><h3 class="text-2xl font-bold text-slate-800 mt-0.5" id="stat-total-rooms">0</h3></div>
            </div>
            <div class="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm flex items-center space-x-4">
                <div class="p-3 bg-amber-50 text-amber-600 rounded-xl"><i class="fa-solid fa-calendar-check text-xl"></i></div>
                <div><p class="text-xs font-semibold text-slate-500 uppercase">本日の総予約</p><h3 class="text-2xl font-bold text-slate-800 mt-0.5" id="stat-today-reservations">0</h3></div>
            </div>
            <div class="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm flex items-center space-x-4">
                <div class="p-3 bg-emerald-50 text-emerald-600 rounded-xl"><i class="fa-solid fa-bookmark text-xl"></i></div>
                <div><p class="text-xs font-semibold text-slate-500 uppercase">あなたの現在の予約数</p><h3 class="text-2xl font-bold text-slate-800 mt-0.5" id="stat-my-reservations">0</h3></div>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl p-4 shadow-sm mb-6 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center space-x-1.5 w-full sm:w-auto">
                <button onclick="changeDate(-1)" class="p-2 border rounded-lg hover:bg-slate-100"><i class="fa-solid fa-chevron-left"></i></button>
                <button onclick="setDateToday()" class="px-3.5 py-1.5 text-sm font-semibold bg-indigo-50 text-indigo-700 border border-indigo-100 rounded-lg">今日</button>
                <button onclick="changeDate(1)" class="p-2 border rounded-lg hover:bg-slate-100"><i class="fa-solid fa-chevron-right"></i></button>
                <div class="border-l h-6 mx-2 hidden sm:block"></div>
                <input type="date" id="date-picker" onchange="onDatePickerChange(event)" class="border rounded-lg p-1 text-sm bg-slate-50">
            </div>
            <div class="text-center sm:text-right">
                <h2 id="selected-date-label" class="text-lg font-bold text-slate-800">----年--月--日 (-)</h2>
            </div>
        </div>

        <div class="overflow-x-auto">
            <style>@media (max-width: 767px) { .hidden-mobile { display: none !important; } }</style>
            <div id="timetable-grid" class="min-w-full">
                <div class="py-12 text-center text-slate-400"><p>システムをロードしています...</p></div>
            </div>
        </div>
    </main>

    <div id="reservation-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden border">
            <div class="bg-indigo-600 px-6 py-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg">教室の予約をする</h3>
                <button onclick="closeReservationModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form onsubmit="submitReservation(event)" class="p-6 space-y-4">
                <div class="bg-indigo-50/50 rounded-xl p-3 border text-sm text-indigo-900">
                    <div>教室: <span id="modal-room-name" class="font-bold"></span></div>
                    <div>日付: <span id="modal-date" class="font-bold"></span></div>
                    <div>時限: <span id="modal-period" class="font-bold"></span></div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">予約者（教員名）</label>
                    <input type="text" id="modal-teacher-name" required class="w-full border p-2 rounded-lg text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">使用クラス（任意）</label>
                    <input type="text" id="modal-grade" class="w-full border p-2 rounded-lg text-sm" placeholder="例: 5年3組">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">使用目的</label>
                    <input type="text" id="modal-purpose" class="w-full border p-2 rounded-lg text-sm" placeholder="例: 実験">
                </div>
                <div class="flex justify-end space-x-2 pt-4 border-t">
                    <button type="button" onclick="closeReservationModal()" class="px-4 py-2 text-sm text-slate-600">キャンセル</button>
                    <button type="submit" class="px-5 py-2 text-sm text-white bg-indigo-600 rounded-lg shadow-md">予約を確定する</button>
                </div>
            </form>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full flex flex-col max-h-[90vh]">
            <div class="bg-slate-900 px-6 py-4 text-white flex justify-between items-center">
                <h3 class="font-bold text-lg">教室の追加・管理</h3>
                <button onclick="closeSettingsModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 overflow-y-auto space-y-6 flex-grow">
                <form onsubmit="addNewRoom(event)" class="bg-slate-50 border p-4 rounded-xl space-y-3">
                    <h4 class="text-xs font-bold text-slate-500 uppercase">新しい教室を登録する</h4>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <input type="text" id="new-room-name" placeholder="教室名" required class="p-2 border rounded-lg text-sm">
                        <input type="text" id="new-room-location" placeholder="場所(例: 3階)" class="p-2 border rounded-lg text-sm">
                    </div>
                    <button type="submit" class="w-full bg-slate-800 text-white text-xs font-bold py-2 rounded-lg">追加</button>
                </form>
                <div class="space-y-3">
                    <h4 class="text-xs font-bold text-slate-500 uppercase">現在登録されている教室一覧</h4>
                    <div id="settings-room-list" class="space-y-2 max-h-[250px] overflow-y-auto"></div>
                </div>
            </div>
            <div class="bg-slate-50 px-6 py-4 flex justify-end border-t">
                <button type="button" onclick="closeSettingsModal()" class="px-4 py-2 border rounded-lg text-sm bg-white">閉じる</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col space-y-2 w-full max-w-xs"></div>
</body>
</html>
