<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイピング練習（技術科編）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #00ff88;
            --neon-red: #ff3131;
        }
        body {
            background-color: #0a0a0c;
            color: #fff;
            font-family: 'Noto Sans JP', 'JetBrains Mono', monospace;
            overflow: hidden;
            user-select: none;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .char {
            display: inline-block;
            transition: all 0.1s ease;
            position: relative;
            color: rgba(255, 255, 255, 0.2);
        }
        .char.done { color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); animation: char-done-glow 0.15s ease-out; }
        @keyframes char-done-glow {
            0%   { color: #fff; text-shadow: 0 0 20px #fff, 0 0 40px var(--neon-blue); transform: scale(1.3); }
            100% { color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); transform: scale(1); }
        }
        .char.miss { color: var(--neon-red); animation: char-miss-anim 0.2s ease-in-out; }
        @keyframes char-miss-anim {
            0%,100% { transform: translateX(0) scale(1); }
            25%     { transform: translateX(-4px) scale(1.2); color: #fff; text-shadow: 0 0 10px var(--neon-red); }
            75%     { transform: translateX(4px) scale(1.2); }
        }
        .char.next {
            color: #fff;
            border-bottom: 2px solid var(--neon-blue);
            text-shadow: 0 0 5px #fff;
        }
        .screen-shake {
            animation: screen-shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes screen-shake {
            10%, 90% { margin-left: -1px; margin-right: 1px; }
            20%, 80% { margin-left: 2px; margin-right: -2px; }
            30%, 50%, 70% { margin-left: -4px; margin-right: 4px; }
            40%, 60% { margin-left: 4px; margin-right: -4px; }
        }
        #monster-container {
            animation: floating 3s ease-in-out infinite;
            will-change: transform;
        }
        .monster-hit {
            animation: monster-hit-anim 0.1s ease-in-out;
        }
        @keyframes monster-hit-anim {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.15); filter: brightness(2); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .monster-death {
            animation: monster-death-anim 0.5s ease-out forwards;
        }
        @keyframes monster-death-anim {
            0% { transform: scale(1); opacity: 1; filter: brightness(5); }
            100% { transform: scale(1.5); opacity: 0; filter: blur(10px); }
        }

        .damage-popup {
            position: absolute;
            color: var(--neon-pink);
            font-weight: bold;
            font-family: 'Orbitron';
            pointer-events: none;
            animation: damage-float 1.0s ease-out forwards;
            z-index: 50;
        }
        @keyframes damage-float {
            0% { transform: translateY(0) scale(1.5); opacity: 1; }
            100% { transform: translateY(-80px) scale(1); opacity: 0; }
        }

        /* HP Bars */
        .hp-bar-container {
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hp-bar-fill {
            height: 100%;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #enemy-hp-fill { background: linear-gradient(90deg, var(--neon-pink), var(--neon-red)); box-shadow: 0 0 10px var(--neon-red); }
        #player-hp-fill { background: linear-gradient(90deg, #0088ff, var(--neon-blue)); box-shadow: 0 0 10px var(--neon-blue); }

        .combo-text {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--neon-blue));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            pointer-events: none;
        }
        .combo-animate {
            animation: combo-pop 1.5s ease-out forwards;
        }
        @keyframes combo-pop {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1); }
        }

        #hidden-input {
            opacity: 0;
            position: absolute;
            z-index: -1;
        }
        
        .btn-neon {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            transition: all 0.3s;
            cursor: pointer;
        }
        .btn-neon:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .monster-shake {
            animation: monster-shake-anim 0.1s ease-in-out !important;
        }

        @keyframes monster-shake-anim {
            0% { transform: translate(0, 0) rotate(0deg); filter: brightness(1) sepia(0); }
            20% { transform: translate(-8px, 4px) rotate(-6deg); filter: brightness(2) sepia(1) saturate(5) hue-rotate(-50deg); }
            40% { transform: translate(8px, -4px) rotate(6deg); }
            60% { transform: translate(-8px, -2px) rotate(-3deg); }
            80% { transform: translate(8px, 2px) rotate(3deg); }
            100% { transform: translate(0, 0) rotate(0deg); filter: brightness(1) sepia(0); }
        }
        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            animation: particle-burst 0.6s ease-out forwards;
            z-index: 9999;
        }
        @keyframes particle-burst {
            0%   { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx),var(--dy)) scale(0); opacity: 0; }
        }
        #bg-grid {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image:
                linear-gradient(rgba(0,243,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,243,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: grid-scroll 20s linear infinite;
        }
        @keyframes grid-scroll {
            0%   { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }
        #bg-scanline {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
        }
        #bg-scan-sweep {
            position: fixed; left: 0; right: 0; height: 120px;
            pointer-events: none; z-index: 1;
            background: linear-gradient(to bottom, transparent, rgba(0,243,255,0.04), transparent);
            animation: scan-sweep 4s linear infinite;
        }
        @keyframes scan-sweep {
            0%   { top: -120px; }
            100% { top: 100vh; }
        }
        #screen-flash { position: fixed; inset: 0; pointer-events: none; z-index: 200; opacity: 0; }
        .flash-hit  { animation: flash-hit-anim  0.15s ease-out forwards; }
        .flash-miss { animation: flash-miss-anim 0.2s  ease-out forwards; }
        @keyframes flash-hit-anim {
            0%   { opacity: 0.3; background: radial-gradient(ellipse at center, rgba(0,243,255,0.4), transparent 70%); }
            100% { opacity: 0; }
        }
        @keyframes flash-miss-anim {
            0%   { opacity: 0.4; background: radial-gradient(ellipse at center, rgba(255,49,49,0.5), transparent 70%); }
            100% { opacity: 0; }
        }
        .energy-wave {
            position: fixed; inset: 0; pointer-events: none; z-index: 198;
            border: 2px solid rgba(0,243,255,0.6); border-radius: 50%;
            animation: energy-expand 0.4s ease-out forwards;
        }
        @keyframes energy-expand {
            0%   { transform: scale(0.2); opacity: 0.8; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        #cutin-overlay {
            position: fixed; inset: 0; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; overflow: hidden;
        }
        .cutin-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900; letter-spacing: 0.15em; color: #fff;
            text-shadow: 0 0 30px var(--neon-blue), 0 0 60px var(--neon-blue);
            white-space: nowrap; opacity: 0;
        }
        .cutin-enter { animation: cutin-in 1.4s cubic-bezier(0.22,1,0.36,1) forwards; }
        @keyframes cutin-in {
            0%   { opacity: 0; transform: scaleX(3) translateX(-30%); filter: blur(20px); }
            25%  { opacity: 1; transform: scaleX(1) translateX(0);    filter: blur(0); }
            70%  { opacity: 1; transform: scaleX(1) translateX(0); }
            100% { opacity: 0; transform: scaleX(0.8) translateX(10%); filter: blur(10px); }
        }
        .cutin-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--neon-blue), transparent); opacity: 0; }
        .cutin-line-top    { top: 44%; }
        .cutin-line-bottom { top: 56%; }
        .cutin-line-anim { animation: cutin-line-flash 1.4s ease forwards; }
        @keyframes cutin-line-flash {
            0%   { opacity: 0; transform: scaleX(0); }
            25%  { opacity: 1; transform: scaleX(1); }
            70%  { opacity: 1; }
            100% { opacity: 0; }
        }
        #game-container { transition: filter 0.8s ease; }
        .theme-purple { filter: hue-rotate(40deg); }
        .theme-red    { filter: hue-rotate(160deg); }
        .theme-gold   { filter: hue-rotate(200deg) saturate(1.5); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div id="bg-grid"></div>
    <div id="bg-scanline"></div>
    <div id="bg-scan-sweep"></div>

    <div id="screen-flash"></div>

    <div id="cutin-overlay">
        <div class="cutin-line cutin-line-top"></div>
        <div class="cutin-text" id="cutin-text"></div>
        <div class="cutin-line cutin-line-bottom"></div>
    </div>
    <div class="fixed inset-0 pointer-events-none opacity-20" style="transform: translateZ(0); will-change: transform;">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-500 rounded-full blur-[150px]" style="transform: translateZ(0); will-change: transform;"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-pink-500 rounded-full blur-[150px]" style="transform: translateZ(0); will-change: transform;"></div>
    </div>

    <div id="game-container" class="max-w-4xl w-full px-6 z-10">
        
        <div class="grid grid-cols-4 gap-4 mb-3 md:mb-6 orbitron text-sm">
            <div class="glass-panel p-3 rounded-xl text-center border-l-2 border-l-blue-400">
                <p class="text-[10px] uppercase text-blue-400">Time</p>
                <p id="timer-display" class="text-xl font-bold">60s</p>
            </div>
            <div class="glass-panel p-3 rounded-xl text-center border-l-2 border-l-green-400">
                <p class="text-[10px] uppercase text-green-400">Score</p>
                <p id="score-display" class="text-xl font-bold text-green-400">0</p>
                <p id="highscore-display" class="text-[15px] text-green-400/50 mt-0.5" style="display:none;">BEST: <span id="highscore-value">0</span></p>
            </div>
            <div class="glass-panel p-3 rounded-xl text-center border-l-2 border-l-purple-400">
                <p class="text-[10px] uppercase text-purple-400">Accuracy</p>
                <p id="accuracy-display" class="text-xl font-bold">0%</p>
            </div>
            <div class="glass-panel p-3 rounded-xl text-center border-l-2 border-l-red-400">
                <p class="text-[10px] uppercase text-red-400">Slayed</p>
                <p id="slayed-display" class="text-xl font-bold">0</p>
            </div>
        </div>

        <div class="relative glass-panel rounded-3xl overflow-hidden flex flex-col items-center justify-center" style="padding: clamp(0.75rem, 2.5vh, 2rem); min-height: clamp(200px, 48vh, 420px);">
            <div id="battle-stage" class="relative w-full flex flex-col items-center justify-center" style="margin-bottom: clamp(0.25rem, 1.5vh, 1.5rem);">
                <div id="combo-display" class="absolute top-0 combo-text orbitron">0 COMBO!</div>
                
                <div id="monster-container" class="w-32 h-32 mb-4 opacity-0 transition-opacity duration-500">
                    <svg id="monster-svg" viewBox="0 0 100 100" class="w-full h-full">
                        <!-- タイプ0: 四角いロボット -->
                        <g id="monster-type-0">
                            <rect id="monster-body" x="20" y="20" width="60" height="60" fill="rgba(255,0,255,0.2)" stroke="#ff00ff" stroke-width="2"/>
                            <rect x="30" y="38" width="12" height="8" rx="2" fill="#ff00ff"/>
                            <rect x="58" y="38" width="12" height="8" rx="2" fill="#ff00ff"/>
                            <rect x="35" y="58" width="30" height="4" rx="2" fill="#ff00ff"/>
                            <line x1="20" y1="35" x2="10" y2="25" stroke="#ff00ff" stroke-width="2"/>
                            <line x1="80" y1="35" x2="90" y2="25" stroke="#ff00ff" stroke-width="2"/>
                        </g>
                        <!-- タイプ1: クモ型 -->
                        <g id="monster-type-1" style="display:none">
                            <ellipse cx="50" cy="50" rx="22" ry="18" fill="rgba(0,255,136,0.15)" stroke="#00ff88" stroke-width="2"/>
                            <circle cx="42" cy="45" r="5" fill="#00ff88"/>
                            <circle cx="58" cy="45" r="5" fill="#00ff88"/>
                            <circle cx="50" cy="57" r="3" fill="#00ff88"/>
                            <line x1="28" y1="40" x2="12" y2="28" stroke="#00ff88" stroke-width="1.5"/>
                            <line x1="28" y1="50" x2="10" y2="50" stroke="#00ff88" stroke-width="1.5"/>
                            <line x1="28" y1="60" x2="12" y2="72" stroke="#00ff88" stroke-width="1.5"/>
                            <line x1="72" y1="40" x2="88" y2="28" stroke="#00ff88" stroke-width="1.5"/>
                            <line x1="72" y1="50" x2="90" y2="50" stroke="#00ff88" stroke-width="1.5"/>
                            <line x1="72" y1="60" x2="88" y2="72" stroke="#00ff88" stroke-width="1.5"/>
                        </g>
                        <!-- タイプ2: ドラゴン型 -->
                        <g id="monster-type-2" style="display:none">
                            <polygon points="50,10 70,35 80,70 50,85 20,70 30,35" fill="rgba(255,49,49,0.15)" stroke="#ff3131" stroke-width="2"/>
                            <polygon points="50,10 58,25 50,30 42,25" fill="#ff3131" opacity="0.6"/>
                            <circle cx="42" cy="45" r="6" fill="#ff3131"/>
                            <circle cx="58" cy="45" r="6" fill="#ff3131"/>
                            <circle cx="43" cy="45" r="2" fill="#000"/>
                            <circle cx="59" cy="45" r="2" fill="#000"/>
                            <polyline points="38,62 44,58 50,64 56,58 62,62" fill="none" stroke="#ff3131" stroke-width="2"/>
                        </g>
                        <!-- タイプ3: ゴースト型 -->
                        <g id="monster-type-3" style="display:none">
                            <path d="M25,75 Q25,25 50,20 Q75,25 75,75 Q68,68 61,75 Q54,68 50,75 Q46,68 39,75 Q32,68 25,75Z" fill="rgba(0,243,255,0.12)" stroke="#00f3ff" stroke-width="2"/>
                            <circle cx="41" cy="50" r="7" fill="#00f3ff" opacity="0.8"/>
                            <circle cx="59" cy="50" r="7" fill="#00f3ff" opacity="0.8"/>
                            <circle cx="41" cy="50" r="3" fill="#000"/>
                            <circle cx="59" cy="50" r="3" fill="#000"/>
                        </g>
                        <!-- タイプ4: ウイルス型 -->
                        <g id="monster-type-4" style="display:none">
                            <circle cx="50" cy="50" r="20" fill="rgba(255,255,0,0.12)" stroke="#ffff00" stroke-width="2"/>
                            <circle cx="50" cy="50" r="12" fill="rgba(255,255,0,0.2)" stroke="#ffff00" stroke-width="1"/>
                            <line x1="50" y1="28" x2="50" y2="20" stroke="#ffff00" stroke-width="2"/><circle cx="50" cy="18" r="3" fill="#ffff00"/>
                            <line x1="50" y1="72" x2="50" y2="80" stroke="#ffff00" stroke-width="2"/><circle cx="50" cy="82" r="3" fill="#ffff00"/>
                            <line x1="28" y1="50" x2="20" y2="50" stroke="#ffff00" stroke-width="2"/><circle cx="18" cy="50" r="3" fill="#ffff00"/>
                            <line x1="72" y1="50" x2="80" y2="50" stroke="#ffff00" stroke-width="2"/><circle cx="82" cy="50" r="3" fill="#ffff00"/>
                            <line x1="35" y1="35" x2="28" y2="28" stroke="#ffff00" stroke-width="2"/><circle cx="26" cy="26" r="3" fill="#ffff00"/>
                            <line x1="65" y1="35" x2="72" y2="28" stroke="#ffff00" stroke-width="2"/><circle cx="74" cy="26" r="3" fill="#ffff00"/>
                            <line x1="35" y1="65" x2="28" y2="72" stroke="#ffff00" stroke-width="2"/><circle cx="26" cy="74" r="3" fill="#ffff00"/>
                            <line x1="65" y1="65" x2="72" y2="72" stroke="#ffff00" stroke-width="2"/><circle cx="74" cy="74" r="3" fill="#ffff00"/>
                            <circle cx="44" cy="47" r="3" fill="#ffff00"/>
                            <circle cx="56" cy="47" r="3" fill="#ffff00"/>
                            <path d="M43,57 Q50,63 57,57" fill="none" stroke="#ffff00" stroke-width="2"/>
                        </g>
                    </svg>
                </div>
                
                <div id="enemy-hp-container" class="w-64 opacity-0 transition-opacity">
                    <p class="orbitron text-[8px] text-pink-500 uppercase tracking-widest text-center mb-1">Target HP</p>
                    <div class="hp-bar-container">
                        <div id="enemy-hp-fill" class="hp-bar-fill w-full"></div>
                    </div>
                </div>
            </div>

            <div id="display-area" class="w-full text-center z-10 flex flex-col items-center">
                <div id="title-container" style="margin-bottom: clamp(0.5rem, 2vh, 2rem)">
                    <h1 class="orbitron text-4xl md:text-6xl lg:text-7xl font-black italic tracking-tighter text-white drop-shadow-[0_0_15px_rgba(0,243,255,0.8)]">
                        TECH<span class="text-pink-500">-</span>STRIKE
                    </h1>
                    <p class="text-blue-400 font-bold tracking-[0.5em] mt-1 md:mt-2 text-xs md:text-sm ml-2">久保田の技術部屋<span class="text-pink-500">ー</span>タイピング戦線</p>
                </div>
                
                <div id="ready-msg" class="orbitron text-4xl font-black italic tracking-widest text-white mb-4" style="display: none;">READY?</div>
                
                <div id="jp-display" class="text-xl md:text-2xl text-white/50 mb-2 h-8"></div>
                <div id="roma-display" class="text-3xl md:text-4xl font-bold tracking-[0.1em] orbitron min-h-[3rem]"></div>
            </div>

            <div id="player-hp-container" class="w-full" style="margin-top: clamp(0.5rem, 2vh, 3rem); opacity: 0; transition: opacity 0.3s;">
                <div class="flex justify-between items-end mb-1">
                    <p class="orbitron text-[10px] text-blue-400 font-bold tracking-widest uppercase">Player HP</p>
                    <p id="player-hp-text" class="orbitron text-[10px] text-blue-400">100%</p>
                </div>
                <div class="hp-bar-container">
                    <div id="player-hp-fill" class="hp-bar-fill w-full"></div>
                </div>
            </div>
        </div>

        <input type="text" id="hidden-input" autocomplete="off" spellcheck="false" inputmode="latin" />

        <div class="flex flex-col items-center gap-4" style="margin-top: clamp(0.5rem, 2vh, 2rem)">
            <button id="start-btn" class="btn-neon px-12 py-3 rounded-full text-lg font-bold orbitron tracking-widest">START MISSION</button>
            <p id="hint-text" class="text-gray-500 text-xs animate-pulse font-mono uppercase tracking-widest">Press Space or Enter to begin</p>
        </div>
    </div>

    <div id="result-modal" class="fixed inset-0 glass-panel bg-black/95 items-center justify-center z-[100] p-6" style="display:none;">
        <div class="max-w-md w-full text-center space-y-8 fade-in">
            <h2 class="text-5xl font-black orbitron text-white italic tracking-tighter">MISSION COMPLETE</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/5 p-4 rounded-2xl border border-red-500/30">
                    <p class="text-red-400 text-[10px] uppercase mb-1">Slayed</p>
                    <p id="final-slayed" class="text-4xl font-bold">0</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl border border-pink-500/30">
                    <p class="text-pink-400 text-[10px] uppercase mb-1">Total Slayed</p>
                    <p id="final-keys" class="text-4xl font-bold">0</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl border border-blue-500/30">
                    <p class="text-blue-400 text-[10px] uppercase mb-1">Score</p>
                    <p id="final-score" class="text-4xl font-bold">0</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl border border-green-500/30">
                    <p class="text-green-400 text-[10px] uppercase mb-1">Accuracy</p>
                    <p id="final-accuracy" class="text-4xl font-bold">0%</p>
                </div>
            </div>
            <button id="retry-btn" class="w-full btn-neon py-5 rounded-2xl text-xl font-bold orbitron">RETRY</button>
        </div>
    </div>

    <script>
        const words = [
            { jp: "コンピュータ", roma: "konpyu-ta" },

        function spawnParticles(x, y, color) {
            const count = 8;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const angle = (i / count) * Math.PI * 2;
                const dist  = 30 + Math.random() * 40;
                const size  = 3 + Math.random() * 4;
                p.style.cssText = `
                    left:${x}px; top:${y}px;
                    width:${size}px; height:${size}px;
                    background:${color};
                    box-shadow: 0 0 6px ${color};
                    --dx:${Math.cos(angle)*dist}px;
                    --dy:${Math.sin(angle)*dist}px;
                `;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }

            if (!_audioCtx || _audioCtx.state === 'closed') {
                _audioCtx = new AudioContext();
            }
            return _audioCtx;
        }

        const popupPool = [];
        function getPopup() {
            const popup = popupPool.pop() || (() => {
                const el = document.createElement('div');
                el.className = 'damage-popup';
                return el;
            })();
            return popup;
        }
        function releasePopup(popup) {
            popup.style.animation = 'none';
            popupPool.push(popup);
        }

        function playHitSound() {
            const audioCtx = getAudioContext();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1);

            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function nextWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            currentRomaArray = currentWord.roma.split("");
            charIndex = 0;

            renderRoma();
            updateEnemyHp();
            spawnMonster();
        }

        function renderRoma() {
            const existing = romaEl.querySelectorAll('.char');

            if (existing.length !== currentRomaArray.length) {
                let html = "";
                for (let i = 0; i < currentRomaArray.length; i++) {
                    let statusClass = "";
                    if (i < charIndex) statusClass = "done";
                    else if (i === charIndex) statusClass = "next";
                    html += `<span class="char ${statusClass}">${currentRomaArray[i]}</span>`;
                }
                romaEl.innerHTML = html;
                return;
            }

            for (let i = 0; i < currentRomaArray.length; i++) {
                const span = existing[i];
                const newChar = currentRomaArray[i];
                const newClass = i < charIndex ? "done" : i === charIndex ? "next" : "";

                if (span.textContent !== newChar) span.textContent = newChar;

                const current = span.className.replace("char", "").trim();
                if (current !== newClass) span.className = "char " + newClass;
            }
        }

        function spawnMonster() {
            monsterContainer.classList.remove('monster-death', 'monster-hit', 'monster-shake');
            void monsterContainer.offsetWidth;
            const type = Math.floor(Math.random() * monsterTypes);
            setMonsterType(type);
            const color = neonColors[Math.floor(Math.random() * neonColors.length)];
            const mb = document.getElementById('monster-body');
            if (mb) { mb.setAttribute('stroke', color); mb.setAttribute('fill', color + '33'); }
            document.querySelectorAll('#monster-svg circle').forEach(c => c.setAttribute('fill', color));
            document.querySelectorAll('#monster-svg path:not(#monster-body), #monster-svg polygon, #monster-svg ellipse, #monster-svg rect:not(#monster-body), #monster-svg line, #monster-svg polyline').forEach(el => {
                if (el.getAttribute('stroke')) el.setAttribute('stroke', color);
                if (el.getAttribute('fill') && el.getAttribute('fill') !== '#000' && el.getAttribute('fill') !== 'none') {
                    el.setAttribute('fill', el.getAttribute('fill').includes('rgba') ? color + '26' : color);
                }
            });
        }

        hiddenInput.addEventListener('keydown', (e) => {
            if (!isPlaying) return;

            let ch = e.key;

            if (ch === 'Process' || ch === 'Unidentified') {
                const codeMap = {
                    Minus: '-', Equal: '=', BracketLeft: '[', BracketRight: ']',
                    Backslash: '\\', Semicolon: ';', Quote: "'", Comma: ',',
                    Period: '.', Slash: '/',
                };
                if (e.code.startsWith('Key')) {
                    ch = e.shiftKey
                        ? e.code.slice(3).toUpperCase()
                        : e.code.slice(3).toLowerCase();
                } else if (e.code.startsWith('Digit')) {
                    ch = e.code.slice(5);
                } else {
                    ch = codeMap[e.code] ?? '';
                }
            }

            ch = ch.replace(/[Ａ-Ｚａ-ｚ０-９]/g, (c) =>
                String.fromCharCode(c.charCodeAt(0) - 0xFEE0)
            );

            if (ch.length === 1 && /^[\x20-\x7E]$/.test(ch)) {
                e.preventDefault();
                e.stopPropagation();
                hiddenInput.value = "";
                processChar(ch);
            }
        });

        document.addEventListener('click', () => { if (isPlaying) hiddenInput.focus(); });

        function processChar(typedChar) {
            typedChar = typedChar.toLowerCase();
            totalTyped++;

            let isCorrect = false;
            let expected = currentRomaArray[charIndex];

            if (typedChar === expected) {

                isCorrect = true;
                if (expected === 'n') {
                    const nextChar = currentRomaArray[charIndex + 1];
                    const needDoubleN = ['a','i','u','e','o','y','n'];

                    if (nextChar && needDoubleN.includes(nextChar)) {

                    } else {
                        if (currentRomaArray[charIndex - 1] !== 'n' && currentRomaArray[charIndex + 1] !== 'n') {
                            currentRomaArray.splice(charIndex + 1, 0, 'n');
                        }
                    }
                }

            } else {
                // 「つ」: tu <-> tsu
                if (!isCorrect && expected === 'u' && typedChar === 's' && currentRomaArray[charIndex - 1] === 't') {
                    currentRomaArray.splice(charIndex, 0, 's');
                    isCorrect = true;
                } else if (!isCorrect && expected === 's' && typedChar === 'u' && currentRomaArray[charIndex - 1] === 't' && currentRomaArray[charIndex + 1] === 'u') {
                    currentRomaArray.splice(charIndex, 1);
                    isCorrect = true;
                }

                // 「し」: si <-> shi
                if (!isCorrect && expected === 'i' && typedChar === 'h' && currentRomaArray[charIndex - 1] === 's') {
                    const nextNext = currentRomaArray[charIndex + 1];
                    if (nextNext !== 'a' && nextNext !== 'u' && nextNext !== 'o') {
                        currentRomaArray.splice(charIndex, 0, 'h');
                        isCorrect = true;
                    }
                } else if (!isCorrect && expected === 'h' && typedChar === 'i' && currentRomaArray[charIndex - 1] === 's' && currentRomaArray[charIndex + 1] === 'i') {
                    currentRomaArray.splice(charIndex, 1);
                    isCorrect = true;
                }

                // 「ち」: ti <-> chi
                if (!isCorrect && expected === 'i' && typedChar === 'h' && currentRomaArray[charIndex - 1] === 'c') {
                    currentRomaArray.splice(charIndex, 0, 'h');
                    isCorrect = true;
                } else if (!isCorrect && expected === 'h' && typedChar === 'i' && currentRomaArray[charIndex - 1] === 'c' && currentRomaArray[charIndex + 1] === 'i') {
                    currentRomaArray.splice(charIndex, 1);
                    isCorrect = true;
                } else if (!isCorrect && expected === 'c' && typedChar === 't' && currentRomaArray[charIndex + 1] === 'h' && currentRomaArray[charIndex + 2] === 'i') {
                    currentRomaArray[charIndex] = 't';
                    currentRomaArray.splice(charIndex + 1, 1);
                    isCorrect = true;
                }

                // 「ふ」: hu <-> fu
                if (!isCorrect) {
                    const nextForFu = currentRomaArray[charIndex + 1];
                    if (expected === 'h' && typedChar === 'f' && nextForFu === 'u') {
                        currentRomaArray[charIndex] = 'f'; isCorrect = true;
                    } else if (expected === 'f' && typedChar === 'h' && nextForFu === 'u') {
                        currentRomaArray[charIndex] = 'h'; isCorrect = true;
                    }
                }

                // 「じ」: zi <-> ji
                if (!isCorrect) {
                    const nextForJi = currentRomaArray[charIndex + 1];
                    if (expected === 'z' && typedChar === 'j' && nextForJi === 'i') {
                        currentRomaArray[charIndex] = 'j'; isCorrect = true;
                    } else if (expected === 'j' && typedChar === 'z' && nextForJi === 'i') {
                        currentRomaArray[charIndex] = 'z'; isCorrect = true;
                    }
                }

                // 「ず」: zu -> du
                if (!isCorrect) {
                    const nextForZu = currentRomaArray[charIndex + 1];
                    if (expected === 'z' && typedChar === 'd' && nextForZu === 'u') {
                        currentRomaArray[charIndex] = 'd'; isCorrect = true;
                    }
                }

                //「しゃ・しゅ・しょ」: sya/syu/syo <-> sha/shu/sho
                if (!isCorrect) {
                    const prev = currentRomaArray[charIndex - 1];
                    const next = currentRomaArray[charIndex + 1];
                    const nextIsYouonVowel = (next === 'a' || next === 'u' || next === 'o');

                    if (prev === 's' && (nextIsYouonVowel || next === 'h' || next === 'y')) {
                        if (expected === 'y' && typedChar === 'h') {
                            currentRomaArray[charIndex] = 'h';
                            isCorrect = true;
                        }
                        else if (expected === 'h' && typedChar === 'y') {
                            currentRomaArray[charIndex] = 'y';
                            isCorrect = true;
                        }
                    }
                }

                //「じゃ・じゅ・じょ」: jya/jyu/jyo <-> ja/ju/jo <-> zya/zyu/zyo
                if (!isCorrect) {
                    const prev = currentRomaArray[charIndex - 1];
                    const next = currentRomaArray[charIndex + 1];
                    const nextIsYouonVowel = (next === 'a' || next === 'u' || next === 'o');

                    if ((expected === 'z' && typedChar === 'j') || (expected === 'j' && typedChar === 'z')) {
                        const afterNext = currentRomaArray[charIndex + 2];
                        if (nextIsYouonVowel || (next === 'y' && (afterNext === 'a' || afterNext === 'u' || afterNext === 'o'))) {
                            currentRomaArray[charIndex] = typedChar;
                            isCorrect = true;
                        }
                    }

                    if (!isCorrect && (prev === 'j' || prev === 'z') && nextIsYouonVowel) {
                        if ((expected === 'a' || expected === 'u' || expected === 'o') && typedChar === 'y') {
                            currentRomaArray.splice(charIndex, 0, 'y');
                            isCorrect = true;
                        } else if (expected === 'y' && typedChar === next) {
                            currentRomaArray.splice(charIndex, 1);
                            isCorrect = true;
                        }
                    }
                }

                //「ちゃ・ちゅ・ちょ」: tya/tyu/tyo <-> cha/chu/cho
                if (!isCorrect) {
                    const prev = currentRomaArray[charIndex - 1];
                    const next = currentRomaArray[charIndex + 1];
                    const nextIsYouonVowel = (next === 'a' || next === 'u' || next === 'o');

                    if ((expected === 'c' && typedChar === 't') || (expected === 't' && typedChar === 'c')) {
                        const afterNext = currentRomaArray[charIndex + 2];
                        if (afterNext === 'a' || afterNext === 'u' || afterNext === 'o') {
                            if (next === 'y' || next === 'h') {
                                currentRomaArray[charIndex] = typedChar;
                                if (expected === 'c' && next === 'h') currentRomaArray[charIndex + 1] = 'y';
                                else if (expected === 't' && next === 'y') currentRomaArray[charIndex + 1] = 'h';
                                isCorrect = true;
                            }
                        }
                    }

                    if (!isCorrect && nextIsYouonVowel) {
                        if (prev === 'c' && expected === 'y' && typedChar === 'h') {
                            currentRomaArray[charIndex - 1] = 'c';
                            currentRomaArray[charIndex] = 'h';
                            isCorrect = true;
                        }
                        else if (prev === 't' && expected === 'h' && typedChar === 'y') {
                            currentRomaArray[charIndex - 1] = 't';
                            currentRomaArray[charIndex] = 'y';
                            isCorrect = true;
                        }
                        else if ((prev === 't' || prev === 'c') && (expected === 'a' || expected === 'u' || expected === 'o') && typedChar === 'y') {
                            currentRomaArray.splice(charIndex, 0, 'y');
                            isCorrect = true;
                        }
                    }
                }

                if (!isCorrect && charIndex > 0 && currentRomaArray[charIndex] === 'n' && currentRomaArray[charIndex - 1] === 'n') {
                    currentRomaArray.splice(charIndex, 1);
                    expected = currentRomaArray[charIndex]; 
                    if (typedChar === expected) isCorrect = true;
                }
            }

            if (isCorrect) {
                charIndex++;
                const comboBonus = combo * 10;
                const currentHitScore = 100 + comboBonus;
                score += currentHitScore;
                combo++;
                triggerHit(currentHitScore);
                showCombo();
                renderRoma();
                updateEnemyHp();
                updateStats();

                if (charIndex === currentRomaArray.length) {
                    slayed++;
                    updateStats();
                    totalSlayedCount++;
                    monsterContainer.classList.remove('monster-shake', 'monster-hit');
                    void monsterContainer.offsetWidth;
                    monsterContainer.classList.add('monster-death');
                    setTimeout(nextWord, 400);
                }
            } else {
                missCount++;
                combo = 0;
                triggerMiss();
                updateStats();

                if (playerHp <= 0) {
                    endGame(true);
                    return;
                }
            }
        }

        startBtn.addEventListener('click', initGame);
        document.getElementById('retry-btn').addEventListener('click', () => {
            retryGame();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                if (!isPlaying) {
                    e.preventDefault();
                    if (resultModal.style.display === 'flex') {
                        retryGame(); 
                    } else {
                        initGame();
                    }
                }
            }
            if (isPlaying && (e.code === 'Backspace' || e.code === 'Tab')) e.preventDefault();
        });

        function retryGame() {
            enemyHpContainer.style.transition = 'none';
            playerHpContainer.style.transition = 'none';
            monsterContainer.style.transition = 'none';
            enemyHpContainer.style.opacity = '0';
            playerHpContainer.style.opacity = '0';
            monsterContainer.style.opacity = '0';
            enemyHpContainer.style.display = '';
            playerHpContainer.style.display = '';
            monsterContainer.style.display = '';
            monsterContainer.classList.remove('monster-hit', 'monster-shake', 'monster-death');
            void monsterContainer.offsetWidth;
            enemyHpContainer.style.transition = '';
            playerHpContainer.style.transition = '';
            monsterContainer.style.transition = '';

            jpEl.textContent = "";
            romaEl.innerHTML = "";

            resultModal.style.display = 'none';
            startBtn.style.display = 'block';
            document.getElementById('hint-text').style.display = 'block';
            titleContainer.style.display = 'block';
            readyMsg.style.display = 'none';

            totalSlayedCount = 0;
            charIndex = 0;
            
            timerEl.textContent = "60s";
            scoreEl.textContent = 0;
            if (highScore > 0) {
                document.getElementById('highscore-value').textContent = highScore;
                document.getElementById('highscore-display').style.display = 'block';
            }
            accuracyEl.textContent = "0%";
            slayedEl.textContent = totalSlayedCount;

            score = 0;
            slayed = 0;
            totalTyped = 0;
            missCount = 0;
            combo = 0;
            playerHp = 100;
            
            updatePlayerHp();
        }

        document.addEventListener('click', () => { if (isPlaying) hiddenInput.focus(); });

        if (highScore > 0) {
            document.getElementById('highscore-value').textContent = highScore;
            document.getElementById('highscore-display').style.display = 'block';
        }

        function fitToScreen() {
            const container = document.getElementById('game-container');
            container.style.transform = '';
            container.style.marginTop = '';
            container.style.marginBottom = '';
            const availH = window.innerHeight;
            const availW = window.innerWidth;
            const contH = container.scrollHeight;
            const contW = container.scrollWidth;
            const scaleH = availH / contH;
            const scaleW = availW / contW;
            const scale = Math.min(scaleH, scaleW, 1);
            if (scale < 1) {
                container.style.transformOrigin = 'center center';
                container.style.transform = 'scale(' + scale + ')';
                container.style.marginTop = '-' + (contH * (1 - scale) / 2) + 'px';
                container.style.marginBottom = '-' + (contH * (1 - scale) / 2) + 'px';
            }
        }
        fitToScreen();
        window.addEventListener('resize', fitToScreen);
    </script>
</body>
</html>
